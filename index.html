        const hashPassword = async (password) => {
            if (!password) return '';
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        const normalizeForSearch = (str) => {
            if (!str) return '';
            let s = str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
            s = s.replace(/\bcong\.?\b/g, "congelado").replace(/\b(resf|ref)\.?\b/g, "resfriado").replace(/[-_./]/g, " ").replace(/\s+/g, " ").trim();
            return s;
        };
        const parsePrice = (priceStr) => {
            if (!priceStr) return null;
            let cleanStr = priceStr.includes('.') && priceStr.includes(',') ? priceStr.replace(/\./g, '').replace(',', '.') : priceStr.replace(',', '.');
            const val = parseFloat(cleanStr); return isNaN(val) ? null : val;
        };
        const formatPrice = (value) => {
            if (value === null || value === undefined) return 'R$ 0,00';
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 });
        };
        const checkDiscountRules = (code, name, originalPrice) => {
            const codeStr = (code || '').toString().trim(), nameStr = (name || '').toLowerCase().trim(), origPrice = parseFloat(originalPrice) || 0;
            let hasDiscount = true;
            if (codeStr.startsWith('16') || codeStr.startsWith('27') || codeStr.startsWith('90')) hasDiscount = false;
            if (nameStr.includes('fraldinha ramax')) hasDiscount = false;
            return { hasDiscount, origPrice, unitFinalPrice: hasDiscount ? Math.round((origPrice * 0.97) * 100) / 100 : origPrice };
        };

        const CustomMessageBox = ({ message, type = 'info', onClose }) => (

                    <h3 className="text-lg font-bold text-slate-800 mb-2">{type === 'error' ? 'Atenأ§أ£o' : type === 'success' ? 'Sucesso' : 'Aviso'}</h3>
                    <p className="text-slate-600 text-sm mb-6">{message}</p>
                    <button onClick={onClose} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl transition-colors">Entendi</button>

        );

        const LoginScreen = ({ onLogin, showMessage }) => {
            const [isRegistering, setIsRegistering] = useState(false);
            const [isLoading, setIsLoading] = useState(false);
            const [loginCode, setLoginCode] = useState('');
            const [password, setPassword] = useState('');
            const [regName, setRegName] = useState('');
            const [regCode, setRegCode] = useState('');
            const [regEmail, setRegEmail] = useState('');
            const [regPassword, setRegPassword] = useState('');
            const [pendingGoogleUser, setPendingGoogleUser] = useState(null);
            const [googleCode, setGoogleCode] = useState('');

            // Electron: recebe resultado da autenticaأ§أ£o feita no browser externo
            useEffect(() => {
                if (!window.electronBridge) return;
                const handler = async (e) => {
                    const { idToken, accessToken, action } = e.detail;
                    setIsLoading(true);
                    try {
                        const credential = firebase.auth.GoogleAuthProvider.credential(idToken, accessToken);
                        const result = await auth.signInWithCredential(credential);
                        if (action === 'register') {
                            const snapshot = await db.collection('users').where('email', '==', result.user.email).get();
                            if (!snapshot.empty) { showMessage('Google jأ، cadastrado. Faأ§a login.', 'error'); auth.signOut(); }
                            else { setPendingGoogleUser(result.user); }
                        } else {
                            const snapshot = await db.collection('users').where('email', '==', result.user.email).get();
                            if (!snapshot.empty) {
                                onLogin({ ...snapshot.docs[0].data(), id: snapshot.docs[0].id });
                            } else {
                                showMessage('Conta nأ£o encontrada. Crie seu cadastro primeiro.', 'error');
                                auth.signOut();
                            }
                        }
                    } catch(error) { showMessage(`Erro: ${error.message}`, 'error'); }
                    finally { setIsLoading(false); }
                };
                window.addEventListener('electronAuthResult', handler);
                return () => window.removeEventListener('electronAuthResult', handler);
            }, []);


            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&.])[A-Za-z\d@$!%*#?&.]{6,}$/;

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    const hashedPass = await hashPassword(password);
                    let snapshot = await db.collection('users').where('code', '==', loginCode).where('password', '==', hashedPass).get();
                    if (snapshot.empty) {
                        snapshot = await db.collection('users').where('code', '==', loginCode).where('password', '==', password).get();
                        if (!snapshot.empty) await db.collection('users').doc(snapshot.docs[0].id).update({ password: hashedPass });
                    }

                    if (!snapshot.empty) {
                        const userDoc = snapshot.docs[0].data();
                        if (userDoc.code === '99206' && userDoc.role !== 'admin') {
                            await db.collection('users').doc(snapshot.docs[0].id).update({ role: 'admin' });
                            userDoc.role = 'admin';
                        }
                        onLogin({ ...userDoc, id: snapshot.docs[0].id });
                    } else { showMessage('Cأ³digo ou senha incorretos.', 'error'); }
                } catch(err) { showMessage('Erro de conexأ£o com o banco.', 'error'); } finally { setIsLoading(false); }
            };

            const handleGoogleLoginOnly = async () => {
                // Electron: abre o browser do sistema para fazer login (evita verificaأ§أµes extras do Google)
                if (window.electronBridge) {
                    const port = window.location.port;
                    window.electronBridge.openBrowserAuth(`http://localhost:${port}/login?action=login`);
                    showMessage('Browser aberto! Faأ§a login lأ، e volte ao app.', 'info');
                    return;
                }
                setIsLoading(true);
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await auth.signInWithPopup(provider);
                    const snapshot = await db.collection('users').where('email', '==', result.user.email).get();
                    if (!snapshot.empty) {
                        onLogin({ ...snapshot.docs[0].data(), id: snapshot.docs[0].id });
                    } else {
                        showMessage('Conta nأ£o encontrada. Crie seu cadastro primeiro.', 'error');

                    let extractedProducts = [];

                        const linesMap = new Map();
                        
                        textContent.items.forEach(item => {
                            const y = Math.round(item.transform[5] / 6) * 6; 
                            if (!linesMap.has(y)) linesMap.set(y, []); linesMap.get(y).push(item);
                        });
                        
                        const sortedY = Array.from(linesMap.keys()).sort((a, b) => b - a);
                        
                        sortedY.forEach(y => {
                            const lineItems = linesMap.get(y).sort((a, b) => a.transform[4] - b.transform[4]);
                            const lineText = lineItems.map(item => item.str).join(' ').replace(/\s+/g, ' ').trim();
                            
                            const match = lineText.match(/(?:^|\s)(\d{4,7})\s+([A-Z0-9أ‡أƒأ•أپأ‰أچأ“أڑأ‚أٹأ”].*)/i);

                                const priceMatches = [...rest.matchAll(/\b(\d{1,3}(?:\.\d{3})*,\d{2}|\d+,\d{2}|\d+\.\d{2})\b/g)];

                                extractedProducts.push({

            };

                    const { hasDiscount, origPrice, unitFinalPrice } = checkDiscountRules(item.code, rp.name, rp.originalPrice);
                    const qty = Number(item.quantity);
                    return { ...item, quantity: qty, unitFinalPrice, discountedPrice: unitFinalPrice * qty, originalPrice: origPrice * qty, hasDiscount };
                });
                setEditedPrices({});

                setShowModal(false);

                    if (existingClient && validItems.length > 0) {

            const handleSaveToHistory = async () => {

                        const docRef = await db.collection('clients').add({ name: autoName, code: clientToSave.code, phone: '', cnpj: '', address: '', contactName: '', history: newCodes, rawData: orderText, profile: { title: "Cadastro Automأ،tico", color: "bg-slate-100 text-slate-600" } });

                    } else {
                        const currentHistory = clientToSave.history || [];
                        const updatedHistory = [...new Set([...currentHistory, ...newCodes])];
                        await db.collection('clients').doc(clientToSave.id).update({ history: updatedHistory });
                        showMessage('Histأ³rico do cliente atualizado!', 'success');
                    }
                    setShowHistoryPrompt(false);
                } catch (err) { showMessage('Erro ao salvar no histأ³rico.', 'error'); }
            };

            // Clientes filtrados para busca manual
            const clientesParaHistorico = useMemo(() => {
                if (!manualSearch.trim()) return clients.slice(0, 8);
                const s = manualSearch.toLowerCase();
                return clients.filter(c =>
                    (c.name || '').toLowerCase().includes(s) || (c.code || '').includes(s)
                ).slice(0, 8);
            }, [clients, manualSearch]);

            const handleManualSave = async () => {
                if (!manualSelected || !orderSummary) return;
                const newCodes = orderSummary.items.map(i => i.code);
                try {

                    <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-6">

                        <div className={`relative rounded-2xl border-2 transition-all duration-200 ${orderText.trim() ? 'border-rose-400 shadow-md shadow-rose-100' : 'border-slate-200'}`}>

                                value={orderText}
                                onChange={e => setOrderText(e.target.value)}
                                onPaste={e => { const t = e.clipboardData.getData('text'); setTimeout(() => handleProcessText(t), 120); }}

                        <button

                if (typeof XLSX === 'undefined') { showMessage('Biblioteca de planilha nأ£o carregou. Verifique a internet.', 'error'); return; }
                const reader = new FileReader();

                        if (!rows.length) { showMessage('Planilha vazia.', 'error'); return; }

                        let headerIdx = rows.findIndex(r => r.some(c => /id|nome|produto/i.test(String(c))));

                        const header = rows[headerIdx].map(c => String(c).toLowerCase().trim());

                        const pick = (...res) => { for (const re of res) { const i = header.findIndex(h => re.test(h)); if (i >= 0) return i; } return -1; };
                        const idxId = pick(/id.*cliente/, /c[oأ³]d.*cliente/, /^id\b/, /\bid\b/);

                        // Coluna combinada "cأ³digo - nome" (formato antigo)
                        const idxProdComb = pick(/produto\s*comprad/, /produto\s*adquir/, /^produto$/, /item\s*comprad/, /produto/);
                        if (idxId < 0 || (idxProdCode < 0 && idxProdComb < 0)) { showMessage('Nأ£o encontrei colunas de ID e Produto na planilha.', 'error'); return; }

                        // Resolve o cأ³digo bruto da planilha para o cأ³digo oficial da tabela (corrige zeros أ  esquerda)
                        const resolveCode = (raw) => prodExact.get(raw) || prodNorm.get(normCode(raw)) || raw;

                        // Agrupa cأ³digos de produto por ID de cliente
                        const grupos = new Map(); // id -> { id, nome, codes:Set }

                            rawId = String(rawId || '').trim();
                            if (!rawId) continue;
                            const nome = idxNome >= 0 ? String(r[idxNome] || '').trim() : '';

                            // Extrai o cأ³digo do produto, lidando com os dois formatos:
                            let prodCode = '';
                            if (idxProdCode >= 0) {
                                let v = r[idxProdCode];
                                if (typeof v === 'number') v = String(Math.round(v)); // 12062.0 -> "12062"
                                prodCode = String(v || '').trim();

                                prodCode = pm ? pm[1] : (typeof r[idxProdComb] === 'number' ? String(Math.round(r[idxProdComb])) : '');
                            }
                            if (!prodCode) continue;

                            prodCode = resolveCode(prodCode); // recupera cأ³digo oficial com zeros أ  esquerda
                            if (!grupos.has(rawId)) grupos.set(rawId, { id: rawId, nome, codes: new Set() });
                            grupos.get(rawId).codes.add(prodCode);

                                totalCodes: codesArr.length,
                                novosCodes: novos,
                                novosCount: cli ? novos.length : codesArr.length,
                                allCodes: codesArr

                        });

                            <div className="bg-[#e1ffc7] rounded-2xl p-4 border border-[#d3f4b8] mb-4">
                                <pre className="font-sans text-sm whitespace-pre-wrap text-slate-800">{personalizar(atual)}</pre>
                            </div>
                            <a href={waLink(atual)} target="_blank" rel="noopener noreferrer" onClick={() => { const s = new Set(enviados); s.add(atual.id); setEnviados(s); }} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-md transition-colors flex items-center justify-center gap-2 mb-3 text-lg">
                                <div className="h-6 w-6"><IconWhatsApp/></div> Abrir WhatsApp e Enviar

                            <div className="flex gap-2">
                                <button onClick={() => avancar(false)} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition-colors">Pular</button>
                                <button onClick={() => avancar(true)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-xl transition-colors">Prأ³ximo â†’</button>
                            </div>
                        </div>
                        <p className="text-center text-xs text-slate-400 mt-4">Toque em "Abrir WhatsApp e Enviar", confirme o envio no app, e volte aqui para "Prأ³ximo".</p>
                    </div>

            }

            // ===== MODO CONFIGURAأ‡أƒO =====
            return (
                <div className="animate-in fade-in space-y-6">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><div className="h-6 w-6 text-emerald-600"><IconWhatsApp/></div> Disparos WhatsApp</h2>
                        <p className="text-slate-500 text-sm">Monte uma campanha e envie cliente por cliente pelo seu WhatsApp Business.</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Composer */}
                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 space-y-4">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2"><div className="h-5 w-5 text-rose-600"><IconWand/></div> Mensagem</h3>
                            <textarea value={template} onChange={e => setTemplate(e.target.value)} rows="7" className="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:border-emerald-500 resize-none"></textarea>

                                    <div className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all ${incluirProduto ? 'left-5' : 'left-0.5'}`}></div>
                                </div>

                            </label>
                        </div>

                        {/* Audiأھncia */}
                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-bold text-slate-800">Quem vai receber</h3>
                                <span className="text-xs font-bold text-emerald-600">{selecionados.size} selecionado(s)</span>
                            </div>
                            <div className="flex flex-wrap gap-1.5 mb-3">
                                {[['todos', 'Todos'], ['inativos', 'ًںڑ¨ Inativos'], ['atencao', 'âڑ ï¸ڈ Atenأ§أ£o'], ['top', 'ًں”¥ Top']].map(([k, lbl]) => (
                                    <button key={k} onClick={() => setFiltro(k)} className={`text-xs font-bold px-3 py-1.5 rounded-lg transition-colors ${filtro === k ? 'bg-rose-700 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{lbl}</button>
                                ))}
                            </div>
                            <input type="text" value={busca} onChange={e => setBusca(e.target.value)} placeholder="Buscar nome ou ID..." className="w-full px-3 py-2 bg-slate-50 border rounded-xl text-sm outline-none focus:border-emerald-500 mb-2"/>
                            <div className="flex gap-2 mb-2">
                                <button onClick={marcarTodos} className="text-xs font-bold text-emerald-700 hover:bg-emerald-50 px-2 py-1 rounded-lg">Selecionar todos ({lista.length})</button>
                                <button onClick={limparSel} className="text-xs font-bold text-slate-500 hover:bg-slate-100 px-2 py-1 rounded-lg">Limpar</button>
                            </div>
                            <div className="flex-1 overflow-y-auto max-h-72 space-y-1 pr-1">
                                {lista.map(c => {
                                    const semTel = !waNumber(c.phone);
                                    const editando = phoneEditId === c.id;
                                    return (
                                        <div key={c.id} className={`p-2 rounded-lg border ${selecionados.has(c.id) ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-100 hover:border-slate-200'}`}>
                                            <div className="flex items-center gap-2.5">
                                                <input type="checkbox" checked={selecionados.has(c.id)} onChange={() => toggle(c.id)} className="h-4 w-4 rounded text-emerald-600 flex-shrink-0 cursor-pointer"/>
                                                <span onClick={() => toggle(c.id)} className="bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-black text-xs flex-shrink-0 cursor-pointer">{c.code || 'â€”'}</span>
                                                <span onClick={() => toggle(c.id)} className="text-sm font-bold text-slate-700 truncate flex-1 cursor-pointer">{c.name}</span>
                                                {semTel
                                                    ? (!editando && <button onClick={() => { setPhoneEditId(c.id); setPhoneInput(''); }} className="text-[10px] font-bold bg-amber-100 hover:bg-amber-200 text-amber-700 px-2 py-1 rounded-full flex-shrink-0 transition-colors flex items-center gap-1">+ telefone</button>)
                                                    : <span className="text-[10px] text-emerald-600 font-mono flex-shrink-0">ًں“± {c.phone}</span>}
                                            </div>
                                            {editando && (
                                                <div className="flex gap-1.5 mt-2 pl-6">
                                                    <input type="tel" autoFocus value={phoneInput} onChange={e => setPhoneInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') salvarTelefone(c.id); }} placeholder="DDD + nأ؛mero (ex: 22999998888)" className="flex-1 px-2.5 py-1.5 bg-white border border-emerald-300 rounded-lg text-xs outline-none focus:ring-2 focus:ring-emerald-400"/>
                                                    <button onClick={() => salvarTelefone(c.id)} disabled={phoneSaving} className="text-xs font-bold bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg transition-colors disabled:opacity-50">Salvar</button>
                                                    <button onClick={() => { setPhoneEditId(null); setPhoneInput(''); }} className="text-xs font-bold text-slate-400 hover:bg-slate-100 px-2 py-1.5 rounded-lg">âœ•</button>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                                {lista.length === 0 && <p className="text-center text-slate-400 text-sm py-6">Nenhum cliente neste filtro.</p>}
                            </div>
                        </div>
                    </div>

                    {/* Resumo + iniciar */}
                    <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div className="text-sm text-slate-600">
                            <p><b className="text-emerald-700">{comTelefone.length}</b> cliente(s) prontos para receber.</p>
                            {semTelefone.length > 0 && <p className="text-amber-600 text-xs mt-1">âڑ ï¸ڈ {semTelefone.length} selecionado(s) sem telefone serأ£o pulados. Toque em "+ telefone" na lista para cadastrar na hora.</p>}
                        </div>
                        <button onClick={iniciar} disabled={comTelefone.length === 0} className="bg-emerald-600 hover:bg-emerald-700 disabled:opacity-40 text-white font-bold py-3.5 px-8 rounded-2xl shadow-md transition-colors flex items-center gap-2 w-full sm:w-auto justify-center">
                            <div className="h-5 w-5"><IconWhatsApp/></div> Iniciar Campanha ({comTelefone.length})
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(() => { const s = window.localStorage.getItem('friganso_loggedUser'); return s ? JSON.parse(s) : null; });
            const [activeRoute, setActiveRoute] = useState(() => {
                const r = window.sessionStorage.getItem('friganso_initial_route');
                if (r) { window.sessionStorage.removeItem('friganso_initial_route'); return r; }
                return 'dashboard';
            });
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [messageBox, setMessageBox] = useState(null);
            const [clients, setClients] = useState([]);
            
            useEffect(() => {
                const unsubscribe = db.collection('clients').onSnapshot(snap => setClients(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                return () => unsubscribe();
            }, []);
            
            const [products, setProductsState] = useState(() => {
                const savedProds = window.localStorage.getItem('friganso_products');
                return savedProds ? JSON.parse(savedProds) : [];
            });

            const setProducts = (newProducts) => {
                setProductsState(newProducts);
                window.localStorage.setItem('friganso_products', JSON.stringify(newProducts));
            };

            const handleSetUser = (userData) => {
                if (userData) window.localStorage.setItem('friganso_loggedUser', JSON.stringify(userData));
                else { window.localStorage.removeItem('friganso_loggedUser'); auth.signOut(); }
                setUser(userData);
            };

            const showMessage = (message, type = 'info') => setMessageBox({ message, type });

            if (!user) {
                return (
                    <>
                        <LoginScreen onLogin={handleSetUser} showMessage={showMessage} />
                        {messageBox && <CustomMessageBox {...messageBox} onClose={() => setMessageBox(null)} />}
                    </>
                );
            }

            const renderContent = () => {
                switch(activeRoute) {
                    case 'dashboard': return <DashboardScreen user={user} />;
                    case 'clients': return <ClientsScreen products={products} showMessage={showMessage} setActiveRoute={setActiveRoute} />;
                    case 'radar': return <RadarScreen clients={clients} products={products} setActiveRoute={setActiveRoute} showMessage={showMessage} />;
                    case 'support': return <SupportScreen user={user} />;
                    case 'credits': return <CreditsScreen />;
                    case 'profile': return <ProfileAdminScreen user={user} showMessage={showMessage} />;
                    case 'pdf': return <PdfScreen user={user} products={products} setProducts={setProducts} showMessage={showMessage} />;
                    case 'resumo': return <ResumoScreen products={products} showMessage={showMessage} clients={clients} setActiveRoute={setActiveRoute} />;
                    case 'orcamentos': return <OrcamentosScreen products={products} showMessage={showMessage} activeRoute={activeRoute} />;
                    case 'disparos': return <DisparosScreen clients={clients} products={products} user={user} showMessage={showMessage} setActiveRoute={setActiveRoute} />;
                    default: return <DashboardScreen user={user} />;
                }
            };

            const NavButton = ({ route, icon: Icon, label }) => (
                <button onClick={() => { setActiveRoute(route); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 ${activeRoute === route ? 'bg-rose-800 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'}`}>
                    <div className="h-5 w-5"><Icon /></div> {label}
                </button>
            );

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden font-sans">
                    {messageBox && <CustomMessageBox {...messageBox} onClose={() => setMessageBox(null)} />}

                    <button className="md:hidden fixed top-4 left-4 z-50 p-2 bg-slate-900 text-white rounded-lg shadow-lg" onClick={() => setIsSidebarOpen(!isSidebarOpen)}>
                        <div className="h-6 w-6"><IconMenu/></div>
                    </button>

                    <div className={`fixed inset-y-0 left-0 z-40 w-72 bg-slate-950 text-slate-300 transform transition-transform duration-300 ease-in-out flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 md:static border-r border-slate-800 shadow-2xl`}>
                        <div className="p-6 border-b border-slate-800 flex items-center gap-4 bg-slate-900/50">
                            <FrigansoLogo className="h-12 w-12 rounded-xl bg-black/50 p-1.5 shadow-inner border border-slate-700" />
                            <div>
                                <h1 className="text-xl font-black text-white tracking-tight">FRIGANSO</h1>
                                <p className="text-[10px] text-rose-500 tracking-widest uppercase font-bold">Premium ERP</p>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-1 scrollbar-hide">
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-2 ml-2">Gestأ£o Principal</p>
                            <NavButton route="dashboard" icon={IconDashboard} label="Painel (Dashboard)" />
                            <NavButton route="clients" icon={IconUsers} label="CRM & Rotas" />
                            <NavButton route="radar" icon={IconDashboard} label="Radar de Clientes" />
                            <NavButton route="profile" icon={IconSettings} label="Meu Perfil / Admin" />
                            
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-8 ml-2">Vendas Diأ،rias</p>
                            <NavButton route="pdf" icon={IconFileText} label="Tabela do Dia (PDF)" />
                            <NavButton route="resumo" icon={IconReceipt} label="Resumo de Pedido" />
                            <NavButton route="orcamentos" icon={IconWhatsApp} label="Gerador de Zap" />
                            <NavButton route="disparos" icon={IconWhatsApp} label="Disparos WhatsApp" />
                            
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-8 ml-2">Sistema & Ajuda</p>
                            <NavButton route="support" icon={IconSupport} label="Suporte Tأ©cnico" />
                            <NavButton route="credits" icon={IconCode} label="Sobre o Desenvolvedor" />
                        </div>

                        <div className="p-4 border-t border-slate-800 bg-slate-900/50">
                            <div className="p-3 rounded-xl mb-2 flex items-center gap-3 bg-slate-900 border border-slate-800 cursor-pointer hover:border-rose-700/50 transition-colors" onClick={() => setActiveRoute('profile')}>
                                <div className="h-10 w-10 rounded-xl bg-rose-800 text-white flex items-center justify-center font-bold text-sm shadow-md overflow-hidden border border-rose-600">
                                    {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover"/> : user.name.charAt(0)}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-bold text-white truncate">{user.name}</p>
                                    <p className="text-[10px] text-slate-400 truncate uppercase tracking-wider font-bold">Cأ“D: {user.code} â€¢ {user.role}</p>
                                </div>
                            </div>
                            <button onClick={() => handleSetUser(null)} className="w-full flex items-center justify-center gap-2 px-4 py-3 text-sm font-bold text-red-400 hover:text-red-300 hover:bg-red-400/10 rounded-lg transition-colors border border-transparent hover:border-red-400/20">
                                <div className="h-4 w-4"><IconLogOut/></div> Sair da Conta
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto relative z-0 p-4 pt-20 md:p-8 bg-slate-100">
                        <div className="absolute inset-0 pointer-events-none opacity-[0.02]" style={{ backgroundImage: `url('${BG_IMAGE}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}></div>
                        <div className="relative z-10 max-w-7xl mx-auto">
                            {renderContent()}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- PWA: Service Worker + Deep Link -->
    <script>
        // Captura ?route= dos atalhos do manifest antes do React inicializar
        (function() {
            const p = new URLSearchParams(window.location.search);
            const r = p.get('route');
            if (r) window.sessionStorage.setItem('friganso_initial_route', r);
        })();

        // Captura o prompt de instalaأ§أ£o do PWA para usar no botأ£o do Perfil
        window.__pwaInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__pwaInstallPrompt = e;
            window.dispatchEvent(new Event('pwaInstallReady'));
        });
        window.addEventListener('appinstalled', () => {
            window.__pwaInstallPrompt = null;
            window.dispatchEvent(new Event('pwaAppInstalled'));
        });

        // Registra o Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[SW] Registrado:', reg.scope))
                    .catch(err => console.warn('[SW] Falhou:', err));
            });
        }
    </script>
</body>
</html>
