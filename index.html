                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-slate-500">Itens</label>
                                        {(editando.itens || []).map((it, i) => (
                                            <div key={i} className="bg-slate-50 border border-slate-200 rounded-xl p-3 space-y-2">
                                                <div className="flex items-center justify-between gap-2">
                                                    <span className="font-bold text-sm text-slate-700 truncate">{it.code} — {it.name}</span>
                                                    <button onClick={() => removerItemEdit(i)} title="Remover item" className="text-slate-300 hover:text-red-500 h-7 w-7 flex items-center justify-center flex-shrink-0"><div className="h-3.5 w-3.5"><IconX /></div></button>
                                                </div>
                                                <div className="grid grid-cols-3 gap-2">
                                                    <div>
                                                        <label className="text-[10px] font-bold text-slate-400">Qtd</label>
                                                        <input type="number" value={it.qty} onChange={e => mudarItem(i, 'qty', e.target.value)} className="w-full mt-0.5 px-2 py-1.5 bg-white border rounded-lg text-sm outline-none focus:border-rose-500" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-bold text-slate-400">Peso (kg)</label>
                                                        <input type="number" step="0.01" value={it.peso} onChange={e => mudarItem(i, 'peso', e.target.value)} className="w-full mt-0.5 px-2 py-1.5 bg-white border rounded-lg text-sm outline-none focus:border-rose-500" />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-bold text-slate-400">R$/kg</label>
                                                        <input type="number" step="0.01" value={it.valorKg} onChange={e => mudarItem(i, 'valorKg', e.target.value)} className="w-full mt-0.5 px-2 py-1.5 bg-white border rounded-lg text-sm outline-none focus:border-rose-500" />
                                                    </div>
                                                </div>
                                                <div className="text-right text-xs font-bold text-emerald-700">Subtotal: {formatPrice((Number(it.peso) || 0) * (Number(it.valorKg) || 0))}</div>
                                            </div>
                                        ))}
                                        {(editando.itens || []).length === 0 && <p className="text-xs text-slate-400 text-center py-2">Sem itens — o pedido precisa de pelo menos 1.</p>}
                                    </div>

                                    <div className="text-right text-lg font-black text-slate-800 pt-2 border-t">
                                        Novo total: {formatPrice(recomputarPedido(editando.itens).valor)}
                                    </div>
                                </div>
                                <div className="p-5 border-t bg-slate-50 flex gap-2 flex-shrink-0">
                                    <button onClick={() => setEditando(null)} className="flex-1 bg-white border-2 border-slate-200 hover:border-slate-300 text-slate-700 font-bold py-3 rounded-xl transition-colors">Cancelar</button>
                                    <button onClick={salvarEdicao} disabled={salvandoEdit} className="flex-1 bg-rose-700 hover:bg-rose-800 disabled:opacity-50 text-white font-bold py-3 rounded-xl transition-colors">{salvandoEdit ? 'Salvando...' : '💾 Salvar alterações'}</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 🎯 Campo do "Valor Máximo de Venda" — componente de TOPO (fora do PdfScreen) pra não perder
        // o foco a cada tecla: se fosse definido dentro do .map() do PdfScreen, cada re-render criaria
        // uma função-componente NOVA e o React remontaria o input, derrubando o cursor/foco.
        const CampoValorMaximo = ({ valor, onSave }) => {
            const [texto, setTexto] = useState(valor != null ? String(valor).replace('.', ',') : '');
            useEffect(() => { setTexto(valor != null ? String(valor).replace('.', ',') : ''); }, [valor]);
            const salvar = () => {
                const limpo = texto.trim();
                if (!limpo) { if (valor != null) onSave(null); return; }
                const num = parseFloat(limpo.replace(',', '.'));
                if (isNaN(num) || num <= 0) { setTexto(valor != null ? String(valor).replace('.', ',') : ''); return; } // inválido: volta ao valor salvo
                if (num !== valor) onSave(num);
            };
            return (
                <div className="flex items-center gap-1 justify-end">
                    <input type="text" inputMode="decimal" value={texto} onChange={e => setTexto(e.target.value)} onBlur={salvar} onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); }} placeholder="—" className="w-20 px-2 py-1.5 bg-white border border-slate-200 rounded-lg text-sm text-right outline-none focus:border-amber-500" />
                    {valor != null && <button onClick={() => { setTexto(''); onSave(null); }} title="Remover valor máximo" className="text-slate-300 hover:text-red-500 h-6 w-6 flex items-center justify-center flex-shrink-0"><div className="h-3 w-3"><IconX /></div></button>}
                </div>
            );
        };

        const PdfScreen = ({ user, products, setProducts, showMessage, listaNegra, toggleListaNegra, valorMaximo, setValorMaximoProduto }) => {
            const lnSet = new Set((listaNegra || []).map(String));
            const vmMap = valorMaximo || {};
            const [isLoading, setIsLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [cloudInfo, setCloudInfo] = useState(null);
            const [showCloudModal, setShowCloudModal] = useState(false);
            const [pdfVersions, setPdfVersions] = useState([]);
            const [isLoadingVersions, setIsLoadingVersions] = useState(false);
            // {changes:[...], novos:[...], removidos:n} — PERSISTE no aparelho (não some ao trocar de tela)
            const [priceChanges, setPriceChanges] = useState(() => { try { const r = window.localStorage.getItem('friganso_price_changes'); return r ? JSON.parse(r) : null; } catch (e) { return null; } });
            useEffect(() => { try { if (priceChanges) window.localStorage.setItem('friganso_price_changes', JSON.stringify(priceChanges)); else window.localStorage.removeItem('friganso_price_changes'); } catch (e) {} }, [priceChanges]);

            useEffect(() => {
                if (window.pdfjsLib) window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                fetchCloudInfo();
            }, []);

            // 📥 Tabela lida direto da tela "Lista de Preços" do SPAmov (botão "📥 Atualizar Tabela do Site").
            // Chega de dois jeitos: 1) já pronta no sessionStorage (URL curta, se a rota já apontava
            // pra cá antes do React montar) ou 2) via postMessage da extensão, se chegar depois do mount.
            useEffect(() => {
                const processarTabela = (raw) => {
                    if (!raw) return;
                    try {
                        const brutos = JSON.parse(raw);
                        const extractedProducts = (brutos || []).map(b => {
                            const { hasDiscount, unitFinalPrice } = checkDiscountRules(b.code, b.name, b.originalPrice);
                            return { code: String(b.code), name: b.name, originalPrice: Number(b.originalPrice) || 0, discountedPrice: unitFinalPrice, tipo: b.tipo || '', pesoItem: b.pesoItem || '', pcsItem: b.pcsItem || '', unidade: b.unidade || '', kgUn: b.kgUn || '', precoCartao: b.precoCartao != null ? Number(b.precoCartao) : null, precosPrazo: b.precosPrazo || null };
                        }).filter(p => p.code && p.originalPrice > 0);
                        if (!extractedProducts.length) { showMessage('Não veio nenhum produto válido da Lista de Preços.', 'error'); return; }
                        const produtosAtivosAntes = (products || []).filter(p => p.ativo !== false);
                        const antigos = new Map(produtosAtivosAntes.map(p => [String(p.code), p]));
                        const changes = [], novos = [];
                        extractedProducts.forEach(np => {
                            const op = antigos.get(String(np.code));
                            if (!op) { novos.push({ code: np.code, name: np.name, price: np.originalPrice }); return; }
                            const oldP = Number(op.originalPrice) || 0, newP = np.originalPrice;
                            if (Math.abs(oldP - newP) >= 0.01) changes.push({ code: np.code, name: np.name, oldPrice: oldP, newPrice: newP });
                        });
                        const removidos = produtosAtivosAntes.filter(p => !extractedProducts.some(np => String(np.code) === String(p.code))).length;
                        setPriceChanges(produtosAtivosAntes.length > 0 ? { changes, novos, removidos } : null);
                        setProducts(extractedProducts);
                        // 🔒 marca como "já sincronizado agora" — senão a sincronização automática da nuvem
                        // (useEffect do onSnapshot, lá embaixo) enxerga a última tabela DISTRIBUÍDA como
                        // "mais nova" que essa leitura local e sobrescreve ela de volta pros dados antigos.
                        try { window.localStorage.setItem('friganso_tabela_sync_ms', String(Date.now())); } catch (e) {}
                        showMessage(`Tabela lida direto do SPAmov! ${extractedProducts.length} produtos.` + (changes.length ? ` ${changes.length} mudança(s) de preço.` : ''), 'success');
                    } catch (e) { showMessage('Erro ao processar a tabela lida do SPAmov.', 'error'); }
                };
                const raw = window.sessionStorage.getItem('friganso_tabela_json');
                if (raw) { window.sessionStorage.removeItem('friganso_tabela_json'); processarTabela(raw); }
                const onMsg = (e) => {
                    const d = e.data;
                    if (!d || d.source !== 'friganso-ext' || d.type !== 'TABELA_PENDENTE' || !d.produtos) return;
                    window.sessionStorage.removeItem('friganso_tabela_json'); // evita reprocessar de novo se remontar essa tela
                    processarTabela(JSON.stringify(d.produtos));
                };
                window.addEventListener('message', onMsg);
                return () => window.removeEventListener('message', onMsg);
            }, []);

            const fetchCloudInfo = async () => {
                try {
                    const doc = await db.collection('system_data').doc('shared_pdf').get();
                    if(doc.exists) {
                        const data = doc.data();
                        const date = data.updatedAt ? data.updatedAt.toDate() : new Date();
                        setCloudInfo({ date: date.toLocaleDateString('pt-BR') + ' às ' + date.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) });
                    }
                } catch(e) { console.error(e) }
            };

            const fetchPdfVersions = async () => {
                setIsLoadingVersions(true);
                try {
                    const snap = await db.collection('pdf_versions').orderBy('updatedAt', 'desc').limit(20).get();
                    setPdfVersions(snap.docs.map(d => {
                        const data = d.data();
                        return { id: d.id, ...data, date: data.updatedAt ? data.updatedAt.toDate() : null };
                    }));
                } catch(e) { console.error(e); } finally { setIsLoadingVersions(false); }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') { showMessage('Selecione um PDF válido.', 'error'); return; }
                setIsLoading(true);
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let extractedProducts = [];
                    const byCode = new Map(); // dedup por código: se repetir, fica com o nome mais "de produto"
                    const letterScore = (s) => ((s || '').match(/[A-Za-zÀ-ú]/g) || []).length;

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const linesMap = new Map();
                        
                        textContent.items.forEach(item => {
                            const y = Math.round(item.transform[5] / 6) * 6; 
                            if (!linesMap.has(y)) linesMap.set(y, []); linesMap.get(y).push(item);
                        });
                        
                        const sortedY = Array.from(linesMap.keys()).sort((a, b) => b - a);
                        
                        sortedY.forEach(y => {
                            const lineItems = linesMap.get(y).sort((a, b) => a.transform[4] - b.transform[4]);
                            const lineText = lineItems.map(item => item.str).join(' ').replace(/\s+/g, ' ').trim();
                            
                            const match = lineText.match(/(?:^|\s)(\d{4,7})\s+([A-Z0-9ÇÃÕÁÉÍÓÚÂÊÔ].*)/i);
                            if (match) {
                                const code = match[1];
                                let rest = match[2].trim();

                                // 📐 Leitura por COLUNA (posição X), juntando a janela do produto (linha do código + de cima + de baixo).
                                // No PDF cada coluna tem um X fixo; o nome "transborda" pras linhas vizinhas e, em alguns casos,
                                // o código fica numa linha e os números (preço!) noutra — por isso varremos as 3 linhas.
                                const janela = [].concat(...[y + 6, y, y - 6].map(yy => linesMap.get(yy) || []));
                                const col = (xmin, xmax) => janela
                                    .filter(it => { const x = it.transform[4]; return x >= xmin && x < xmax && it.str && it.str.trim(); })
                                    .sort((a, b) => (Math.round(b.transform[5]) - Math.round(a.transform[5])) || (a.transform[4] - b.transform[4]))
                                    .map(it => it.str).join(' ').replace(/\s+/g, ' ').trim();

                                let finalName = col(60, 305);                 // 🔴 nome inteiro
                                const tipo = col(305, 325);                    // 🟤 CX / PC / UN / FD / SC...
                                const meio = col(325, 412);                    // 🟢 peso + 🩷 peças (separa por marcador Kg/Pç)
                                const pesoItem = (meio.match(/[\d.,]+(?:\s*à\s*[\d.,]+)?\s*Kg/i) || [''])[0].trim();
                                const pcsItem = (meio.match(/[\d.,]+(?:\s*à\s*[\d.,]+)?\s*P[çc]/i) || [''])[0].trim();
                                const unidade = col(412, 456);                 // Kg [L] / UN / Kg [B]
                                const kgUn = col(456, 535);                    // 🟣 ex: 459.25 Kg/23 Un
                                const rawPrice = parsePrice(col(535, 99999)) || 0; // ⬛ preço à vista (corrige o 00,00 do morango)

                                // fallback (jeito antigo) só se a coluna do nome vier vazia
                                if (!finalName) {
                                    finalName = rest;
                                    const precoNoNome = rest.match(/\d{1,3}(?:\.\d{3})*,\d{2}(?!\s*k?g\b)/i);
                                    if (precoNoNome) finalName = rest.slice(0, precoNoNome.index);
                                    finalName = finalName.split(/Vista\s*\/\s*PIX/i)[0].replace(/\s*\[?\s*L\s*\]?\s*$/i, '').replace(/[-—.,\s]+$/, '').trim();
                                }

                                const { hasDiscount, unitFinalPrice } = checkDiscountRules(code, finalName, rawPrice);
                                const cand = { code, name: finalName, originalPrice: rawPrice, discountedPrice: unitFinalPrice, tipo, pesoItem, pcsItem, unidade, kgUn };
                                const prev = byCode.get(code);
                                // código repetido = um deles é fragmento mal lido: fica com o de nome mais "de produto" (mais letras)
                                if (!prev || letterScore(cand.name) > letterScore(prev.name)) byCode.set(code, cand);
                            }
                        });
                    }
                    extractedProducts = Array.from(byCode.values());

                    // 🔔 Compara com a tabela anterior e lista mudanças de preço — usa só os produtos ATIVOS
                    // (da tabela do dia anterior), senão "removidos" ficaria contando todo o histórico
                    // acumulado (produtos que já estavam inativos há dias) em vez do que sumiu de ONTEM pra hoje.
                    const produtosAtivosAntes = (products || []).filter(p => p.ativo !== false);
                    const antigos = new Map(produtosAtivosAntes.map(p => [String(p.code), p]));
                    const changes = [], novos = [];
                    extractedProducts.forEach(np => {
                        const op = antigos.get(String(np.code));
                        if (!op) { novos.push({ code: np.code, name: np.name, price: Number(np.originalPrice) || 0 }); return; }
                        const oldP = Number(op.originalPrice) || 0, newP = Number(np.originalPrice) || 0;
                        if (Math.abs(oldP - newP) >= 0.01) changes.push({ code: np.code, name: np.name, oldPrice: oldP, newPrice: newP });
                    });
                    const removidos = produtosAtivosAntes.filter(p => !extractedProducts.some(np => String(np.code) === String(p.code))).length;
                    // só mostra comparação se já havia uma tabela antes (senão é a primeira carga)
                    setPriceChanges((produtosAtivosAntes.length > 0) ? { changes, novos, removidos } : null);

                    setProducts(extractedProducts);
                    // 🔒 mesma marca de "já sincronizado agora" do processarTabela — evita a sincronização
                    // automática da nuvem sobrescrever essa leitura de PDF com a última tabela distribuída.
                    try { window.localStorage.setItem('friganso_tabela_sync_ms', String(Date.now())); } catch (e) {}
                    showMessage(`Sucesso! ${extractedProducts.length} produtos carregados.` + (changes.length ? ` ${changes.length} mudança(s) de preço.` : ''), 'success');
                } catch (err) { showMessage('Erro ao processar PDF.', 'error'); } finally { setIsLoading(false); }
            };

            const handleDistribute = async () => {
                try {
                    setIsLoading(true);
                    const now = new Date();
                    // 🧹 Sanitiza: o Firestore rejeita qualquer campo com valor "undefined" (aceita null,
                    // mas não undefined). O round-trip por JSON remove essas chaves sozinho, sem mudar nada
                    // que já era válido — proteção barata contra produto antigo com campo faltando.
                    const productsSafe = JSON.parse(JSON.stringify(products));
                    await db.collection('system_data').doc('shared_pdf').set({ products: productsSafe, updatedAt: now });
                    await db.collection('pdf_versions').add({ products: productsSafe, updatedAt: now, productCount: productsSafe.length });
                    // marca já como sincronizado NESTE aparelho, pra ele não reprocessar a própria distribuição
                    // quando o listener automático (App) ecoar essa mesma escrita de volta
                    try { window.localStorage.setItem('friganso_tabela_sync_ms', String(now.getTime())); } catch (e) {}
                    showMessage('Tabela distribuída! Todo mundo recebe automaticamente agora. 🔄', 'success');
                    fetchCloudInfo();
                } catch(e) {
                    console.error('[Distribuir Tabela] erro:', e);
                    showMessage('Erro ao distribuir tabela: ' + (e && (e.message || e.code) ? (e.code ? e.code + ' — ' : '') + (e.message || '') : 'desconhecido') + ' (' + products.length + ' produtos)', 'error');
                } finally { setIsLoading(false); }
            };

            const handleDownloadCloud = async () => {
                try {
                    setIsLoading(true);
                    const doc = await db.collection('system_data').doc('shared_pdf').get();
                    if(doc.exists) {
                        setProducts(doc.data().products);
                        showMessage('Tabela mais recente da Nuvem baixada com sucesso!', 'success');
                    } else { showMessage('O Administrador ainda não distribuiu nenhuma tabela.', 'error'); }
                } catch(e) { showMessage('Erro ao baixar tabela da nuvem.', 'error'); } finally { setIsLoading(false); }
            };

            // 📊 Compara duas tabelas: o que mudou de preço, o que é novo e o que saiu (de "base" → "atual")
            const gerarComparacao = (baseArr, atualArr) => {
                const base = new Map((baseArr || []).map(p => [String(p.code), p]));
                const changes = [], novos = [];
                (atualArr || []).forEach(np => {
                    const op = base.get(String(np.code));
                    if (!op) { novos.push({ code: np.code, name: np.name, price: Number(np.originalPrice) || 0 }); return; }
                    const oldP = Number(op.originalPrice) || 0, newP = Number(np.originalPrice) || 0;
                    if (Math.abs(oldP - newP) >= 0.01) changes.push({ code: np.code, name: np.name, oldPrice: oldP, newPrice: newP });
                });
                const removidos = (baseArr || []).filter(p => !(atualArr || []).some(np => String(np.code) === String(p.code))).length;
                return { changes, novos, removidos };
            };

            // Botão "Comparar com a anterior": compara a tabela carregada com a última da nuvem;
            // se forem iguais (você baixou a atual), compara com a versão de antes.
            const compararComAnterior = async () => {
                if (!products || !products.length) { showMessage('Abra/baixe uma tabela primeiro.', 'error'); return; }
                try {
                    setIsLoading(true);
                    const snap = await db.collection('pdf_versions').orderBy('updatedAt', 'desc').limit(5).get();
                    const vers = snap.docs.map(d => d.data());
                    if (!vers.length) { showMessage('Não há tabela anterior na nuvem pra comparar.', 'error'); return; }
                    const produtosAtivos = products.filter(p => p.ativo !== false); // ignora o histórico acumulado, só a tabela de hoje
                    let comp = gerarComparacao(vers[0].products, produtosAtivos);
                    const vazio = comp.changes.length === 0 && comp.novos.length === 0 && comp.removidos === 0;
                    if (vazio && vers.length >= 2) comp = gerarComparacao(vers[1].products, produtosAtivos); // a atual é a v0 → compara com a real anterior
                    setPriceChanges(comp);
                    showMessage('Comparação com a tabela anterior pronta. Veja abaixo. 👇', 'success');
                } catch (e) { showMessage('Erro ao comparar com a anterior.', 'error'); } finally { setIsLoading(false); }
            };

            const [soLista, setSoLista] = useState(false); // mostrar só os itens da lista negra
            const [soValorMaximo, setSoValorMaximo] = useState(false); // mostrar só os itens com Valor Máximo definido
            const [soInativos, setSoInativos] = useState(false); // mostrar só os itens fora da tabela atual
            // 💳 Forma de pagamento (só pra VISUALIZAR na Tabela por enquanto — ainda não mexe no Resumo).
            // Regra de preço combinada: no Cartão cobra o preço de cartão (sem desconto); no Prazo Parcelado
            // o máximo é o preço à vista (sem desconto); à vista e a prazo (prazo único) podem vender o preço
            // à vista com até 3% de desconto — por isso "prazo" usa a MESMA conta de "avista" pra cobrar,
            // só mostra o preço de tabela do prazo escolhido como referência.
            const [modoPreco, setModoPreco] = useState('avista'); // avista | cartao | prazo | parcelado
            const [prazoDias, setPrazoDias] = useState(30);
            // 🧾 Preço "de tabela" pro modo escolhido — puro, direto do catálogo, SEM nenhuma regra/desconto.
            const precoTabelaModo = (p) => {
                if (modoPreco === 'cartao') return p.precoCartao != null ? p.precoCartao : null;
                if (modoPreco === 'parcelado') return p.originalPrice; // não tem coluna própria no SPAmov: teto é o à vista
                if (modoPreco === 'prazo') return (p.precosPrazo && p.precosPrazo[prazoDias] != null) ? p.precosPrazo[prazoDias] : null;
                return p.originalPrice; // avista
            };
            // 💰 Preço à vista COM até 3% de desconto — só existe pra À Vista e A Prazo (mesma regra).
            // Cartão e Prazo Parcelado não têm desconto, então não mostram nada nessa coluna.
            const precoComDesconto = (p) => {
                if (modoPreco === 'cartao' || modoPreco === 'parcelado') return null;
                const { unitFinalPrice } = checkDiscountRules(p.code, p.name, p.originalPrice);
                return unitFinalPrice;
            };
            const qtdInativos = useMemo(() => products.filter(p => p.ativo === false).length, [products]);
            const filteredProducts = useMemo(() => {
                let base = products;
                if (soLista) base = base.filter(p => lnSet.has(String(p.code)));
                if (soValorMaximo) base = base.filter(p => vmMap[String(p.code)] != null);
                if (soInativos) base = base.filter(p => p.ativo === false);
                if (searchTerm) base = base.filter(p => matchProduto(p, searchTerm.trim()));
                // ativos primeiro; os que sumiram da tabela atual ficam no fim da lista
                return base.slice().sort((a, b) => (a.ativo === false ? 1 : 0) - (b.ativo === false ? 1 : 0));
            }, [products, searchTerm, soLista, soValorMaximo, soInativos, listaNegra, valorMaximo]);

            return (
                <div className="animate-in fade-in space-y-6">
                    {showCloudModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md flex flex-col max-h-[70vh] overflow-hidden">
                                <div className="p-5 border-b bg-slate-50 flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><div className="h-5 w-5"><IconCloudDownload/></div> Histórico de Tabelas <span className="text-xs font-medium text-slate-400">(carregar ou comparar)</span></h2>
                                    <button onClick={() => setShowCloudModal(false)} className="h-8 w-8 flex items-center justify-center rounded-full bg-slate-200 hover:bg-slate-300 transition-colors"><div className="h-4 w-4"><IconX/></div></button>
                                </div>
                                <div className="overflow-y-auto flex-1 p-4 space-y-2">
                                    {isLoadingVersions ? (
                                        <div className="flex justify-center py-8"><div className="h-6 w-6 text-rose-600"><IconLoader2/></div></div>
                                    ) : pdfVersions.length === 0 ? (
                                        <div className="text-center py-8 text-slate-400 text-sm font-medium">Nenhuma versão salva. Distribua uma tabela para ver o histórico.</div>
                                    ) : pdfVersions.map((v, i) => (
                                        <div key={v.id} className="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-xl hover:border-rose-300 transition-colors">
                                            <div>
                                                <p className="font-bold text-slate-700 text-sm">{i === 0 ? '🟢 Versão Atual' : `Versão ${pdfVersions.length - i}`}</p>
                                                <p className="text-xs text-slate-500 mt-0.5">{v.date ? v.date.toLocaleDateString('pt-BR') + ' às ' + v.date.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) : 'Data desconhecida'} • {v.productCount || (v.products?.length || 0)} produtos</p>
                                            </div>
                                            <div className="flex items-center gap-1.5 flex-shrink-0">
                                                {products.length > 0 && <button onClick={() => { setPriceChanges(gerarComparacao(v.products, products.filter(p => p.ativo !== false))); setShowCloudModal(false); showMessage('Comparação com essa versão pronta — veja abaixo. 👇', 'success'); }} className="text-xs bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg font-bold shadow-sm transition-colors" title="Compara a tabela atual com esta versão">📊 Comparar</button>}
                                                <button onClick={() => { setProducts(v.products); setShowCloudModal(false); showMessage('Tabela carregada com sucesso!', 'success'); }} className="text-xs bg-rose-700 hover:bg-rose-800 text-white px-3 py-1.5 rounded-lg font-bold shadow-sm transition-colors">Carregar</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 border-t bg-slate-50">
                                    <button onClick={async () => { try { setIsLoading(true); const doc = await db.collection('system_data').doc('shared_pdf').get(); if(doc.exists){ setProducts(doc.data().products); setShowCloudModal(false); showMessage('Tabela atual carregada!','success'); } else { showMessage('Nenhuma tabela distribuída ainda.','error'); } } catch(e){ showMessage('Erro ao baixar.','error'); } finally{ setIsLoading(false); } }} disabled={isLoading} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-2.5 rounded-xl font-bold text-sm transition-colors flex items-center justify-center gap-2">
                                        <div className="h-4 w-4"><IconCloudDownload/></div> Baixar Tabela Atual
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    <header className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div>
                            <h1 className="text-2xl font-bold text-rose-800 flex items-center gap-2"><div className="h-6 w-6"><IconFileText /></div> Tabela de Preços</h1>
                            <p className="text-slate-500 text-sm mt-1">Sincronizada automaticamente no seu dispositivo.</p>
                            {cloudInfo && <p className="text-xs font-bold text-emerald-600 mt-2 bg-emerald-50 inline-block px-2 py-1 rounded-md border border-emerald-100">Última Tabela da Nuvem: {cloudInfo.date}</p>}
                        </div>
                        
                        <div className="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                            <button onClick={() => { fetchPdfVersions(); setShowCloudModal(true); }} disabled={isLoading} className="bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md">
                                <div className="h-5 w-5"><IconCloudDownload /></div> Nuvem
                            </button>
                            {products.length > 0 && (
                                <button onClick={compararComAnterior} disabled={isLoading} title="Compara a tabela atual com a anterior da nuvem" className="bg-amber-500 hover:bg-amber-600 text-white px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md">
                                    📊 Comparar com anterior
                                </button>
                            )}
                            {products.length > 0 && (
                                <button onClick={() => setSoLista(s => !s)} title="Itens que NÃO saem no Gerador de Zap / Disparos" className={`px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md ${soLista ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                                    🚫 Lista Negra{lnSet.size ? ' (' + lnSet.size + ')' : ''}
                                </button>
                            )}
                            {products.length > 0 && (
                                <button onClick={() => setSoValorMaximo(s => !s)} title="Itens com preço fixo (Valor Máximo de Venda)" className={`px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md ${soValorMaximo ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                                    🎯 Valor Máximo{Object.keys(vmMap).length ? ' (' + Object.keys(vmMap).length + ')' : ''}
                                </button>
                            )}
                            {products.length > 0 && (
                                <button onClick={() => qtdInativos > 0 && setSoInativos(s => !s)} disabled={qtdInativos === 0} title="Produtos que já apareceram numa tabela, mas não estão na de hoje (continuam com o último preço visto)" className={`px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md ${qtdInativos === 0 ? 'bg-slate-50 text-slate-400 cursor-default shadow-none' : soInativos ? 'bg-slate-900 text-white' : 'bg-red-50 text-red-700 hover:bg-red-100'}`}>
                                    🔴 Fora da tabela ({qtdInativos})
                                </button>
                            )}
                            <div className="relative flex-1 sm:flex-none">
                                <input type="file" accept=".pdf" onChange={handleFileUpload} disabled={isLoading} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                <button disabled={isLoading} className="w-full bg-rose-700 hover:bg-rose-800 text-white px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md">
                                    <div className="h-5 w-5">{isLoading ? <IconLoader2 /> : <IconUpload />}</div>{isLoading ? 'Lendo...' : 'Ler PDF Local'}
                                </button>
                            </div>
                            {user.role === 'admin' && products.length > 0 && (
                                <button onClick={handleDistribute} disabled={isLoading} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md">
                                    <div className="h-5 w-5"><IconCloudUpload /></div> Distribuir Tabela
                                </button>
                            )}
                        </div>
                    </header>

                    {/* 🔔 Mudanças de preço em relação à tabela anterior */}
                    {priceChanges && (priceChanges.changes.length > 0 || priceChanges.novos.length > 0 || priceChanges.removidos > 0) && (
                        <div className="bg-white rounded-3xl shadow-sm border-2 border-amber-200 overflow-hidden">
                            <div className="p-4 bg-amber-50 border-b border-amber-100 flex justify-between items-center">
                                <h3 className="font-bold text-amber-800 flex items-center gap-2"><span>🔔</span> Mudanças nesta tabela (comparado à anterior)</h3>
                                <button onClick={() => setPriceChanges(null)} className="h-7 w-7 flex items-center justify-center rounded-full bg-amber-100 hover:bg-amber-200 text-amber-700"><div className="h-3.5 w-3.5"><IconX/></div></button>
                            </div>
                            <div className="p-4 space-y-3 max-h-[40vh] overflow-y-auto">
                                <div className="flex flex-wrap gap-2 text-xs font-bold">
                                    <span className="bg-rose-100 text-rose-700 px-2 py-1 rounded-lg">{priceChanges.changes.length} preço(s) mudaram</span>
                                    <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-lg">{priceChanges.novos.length} novo(s)</span>
                                    {priceChanges.removidos > 0 && <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded-lg">{priceChanges.removidos} sairam</span>}
                                </div>
                                {priceChanges.changes.length > 0 && (
                                    <div className="space-y-1">
                                        {priceChanges.changes.map((c, idx) => {
                                            const subiu = c.newPrice > c.oldPrice;
                                            return (
                                                <div key={idx} className="flex items-center gap-2 text-sm bg-slate-50 rounded-lg px-3 py-2 border border-slate-100">
                                                    <span className="bg-rose-700 text-white px-1.5 py-0.5 rounded font-mono font-black text-[10px] flex-shrink-0">{c.code}</span>
                                                    <span className="text-slate-700 flex-1 truncate">{c.name}</span>
                                                    <span className="text-slate-400 line-through text-xs">{formatPrice(c.oldPrice)}</span>
                                                    <span className={`font-bold flex-shrink-0 ${subiu ? 'text-red-600' : 'text-emerald-600'}`}>{subiu ? '↑' : '↓'} {formatPrice(c.newPrice)}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                                {priceChanges.novos.length > 0 && (
                                    <div>
                                        <p className="text-[11px] font-bold text-emerald-700 uppercase tracking-wide mb-1">Novos produtos</p>
                                        <div className="flex flex-wrap gap-1">
                                            {priceChanges.novos.slice(0, 40).map((n, idx) => (
                                                <span key={idx} className="text-[11px] bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-lg px-2 py-1"><span className="font-mono font-bold">{n.code}</span> {n.name.length > 20 ? n.name.slice(0,20)+'…' : n.name} · {formatPrice(n.price)}</span>
                                            ))}
                                            {priceChanges.novos.length > 40 && <span className="text-[11px] text-slate-400 px-1 py-1">+{priceChanges.novos.length - 40} mais</span>}
                                        </div>
                                    </div>
                                )}
                                {priceChanges.changes.length === 0 && priceChanges.novos.length === 0 && (
                                    <p className="text-sm text-slate-500">Nenhum preço mudou — só houve saída de produto(s).</p>
                                )}
                            </div>
                        </div>
                    )}

                    {priceChanges && priceChanges.changes.length === 0 && priceChanges.novos.length === 0 && priceChanges.removidos === 0 && (
                        <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 text-emerald-700 text-sm font-semibold flex items-center justify-between">
                            <span>✅ Nenhuma mudança de preço em relação à tabela anterior.</span>
                            <button onClick={() => setPriceChanges(null)} className="text-emerald-600 hover:text-emerald-800"><div className="h-4 w-4"><IconX/></div></button>
                        </div>
                    )}

                    {products.length > 0 && (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[60vh] overflow-hidden">
                            <div className="p-4 border-b border-slate-100 bg-slate-50 relative"><div className="absolute left-7 top-1/2 -translate-y-1/2 text-slate-400 h-5 w-5"><IconSearch /></div><input type="text" placeholder="Pesquise por código ou nome..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:border-rose-500 outline-none font-medium" /></div>
                            <div className="px-4 py-3 border-b border-slate-100 bg-white flex flex-wrap items-center gap-2">
                                <span className="text-xs font-bold text-slate-500 uppercase tracking-wide mr-1">Forma de pagamento:</span>
                                {[['avista', 'À Vista'], ['cartao', 'Cartão'], ['prazo', 'A Prazo'], ['parcelado', 'Prazo Parcelado']].map(([key, label]) => (
                                    <button key={key} onClick={() => setModoPreco(key)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${modoPreco === key ? 'bg-rose-700 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{label}</button>
                                ))}
                                {modoPreco === 'prazo' && (
                                    <div className="flex items-center gap-1 ml-2">
                                        <span className="text-xs text-slate-400 mr-1">prazo:</span>
                                        {[7, 14, 21, 28, 30, 35, 45].map(n => (
                                            <button key={n} onClick={() => setPrazoDias(n)} className={`px-2 py-1 rounded-md text-[11px] font-bold ${prazoDias === n ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>{n}d</button>
                                        ))}
                                    </div>
                                )}
                                {(modoPreco === 'cartao' || modoPreco === 'parcelado') && (
                                    <span className="text-[11px] font-semibold text-amber-700 bg-amber-50 border border-amber-200 rounded-full px-2 py-1 ml-1">🔒 sem desconto</span>
                                )}
                            </div>
                            <div className="overflow-auto flex-1">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-white sticky top-0 shadow-sm"><tr><th className="p-4 font-bold text-slate-600 border-b">Cód</th><th className="p-4 font-bold text-slate-600 border-b">Produto</th><th className="p-4 font-bold text-slate-600 border-b text-right" title="Preço de tabela puro, sem nenhuma regra — igual ao SPAmov, no modo de pagamento escolhido acima">Tabela ({modoPreco === 'avista' ? 'À Vista' : modoPreco === 'cartao' ? 'Cartão' : modoPreco === 'parcelado' ? 'Parcelado' : `${prazoDias}d`})</th><th className="p-4 font-bold text-rose-700 border-b bg-rose-50 text-right">À Vista</th><th className="p-4 font-bold text-emerald-700 border-b bg-emerald-50 text-right" title="Preço à vista com até 3% de desconto — só vale pra À Vista e A Prazo; Cartão e Prazo Parcelado não têm desconto">À Vista c/ desc.</th><th className="p-4 font-bold text-slate-600 border-b text-right" title="Preço fixo (R$/kg) — some no Zap/Resumo como se fosse um desconto normal de 3%">🎯 Valor Máx.</th><th className="p-4 font-bold text-slate-600 border-b text-center" title="Lista Negra: itens marcados não saem no Zap/Disparos">Zap</th></tr></thead>
                                    <tbody>
                                        {filteredProducts.map((p, i) => {
                                            const banido = lnSet.has(String(p.code));
                                            const inativo = p.ativo === false;
                                            const vm = vmMap[String(p.code)];
                                            const temVm = vm != null;
                                            const precoTabela = precoTabelaModo(p);
                                            const precoDesc = precoComDesconto(p);
                                            return (
                                            <tr key={i} className={`hover:bg-slate-50 border-b border-slate-50 ${banido ? 'opacity-60 bg-slate-50' : ''} ${inativo ? 'bg-red-50/50' : ''}`}>
                                                <td className={`p-4 font-bold align-top ${inativo ? 'text-red-400' : 'text-slate-500'}`}>{p.code}</td>
                                                <td className="p-4 text-slate-800 font-medium align-top">
                                                    <span className={`${banido ? 'line-through' : ''} ${inativo ? 'text-red-700' : ''}`}>{p.name}</span>
                                                    {banido && <span className="ml-2 text-[10px] font-bold bg-slate-700 text-white px-2 py-0.5 rounded-full align-middle whitespace-nowrap">🚫 fora do Zap</span>}
                                                    {temVm && <span className="ml-2 text-[10px] font-bold bg-amber-500 text-white px-2 py-0.5 rounded-full align-middle whitespace-nowrap">🎯 preço fixo</span>}
                                                    {inativo && <span className="ml-2 text-[10px] font-bold bg-red-600 text-white px-2 py-0.5 rounded-full align-middle whitespace-nowrap">🔴 fora da tabela de hoje{p.ultimaVez ? ' · visto ' + p.ultimaVez.slice(8, 10) + '/' + p.ultimaVez.slice(5, 7) : ''}</span>}
                                                    {(p.tipo || p.pesoItem || p.pcsItem || p.kgUn) && (
                                                        <div className="text-[11px] text-slate-400 font-normal mt-0.5 flex flex-wrap gap-x-2 gap-y-0.5">
                                                            {p.tipo && <span>📦 {p.tipo}</span>}
                                                            {p.pesoItem && <span>⚖️ {p.pesoItem}/item</span>}
                                                            {p.pcsItem && <span>🔢 {p.pcsItem}</span>}
                                                            {p.kgUn && <span>📊 {p.kgUn}</span>}
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="p-4 text-right text-slate-600 align-top">{precoTabela != null ? formatPrice(precoTabela) : '—'}</td>
                                                <td className="p-4 text-right font-bold align-top text-rose-700 bg-rose-50/30">{formatPrice(p.originalPrice)}</td>
                                                <td className={`p-4 text-right font-bold align-top ${temVm ? 'text-amber-700 bg-amber-50/40' : 'text-emerald-700 bg-emerald-50/30'}`}>{precoDesc != null ? formatPrice(precoDesc) : '—'}</td>
                                                <td className="p-3 text-right align-top">
                                                    <CampoValorMaximo valor={temVm ? vm : null} onSave={(novo) => setValorMaximoProduto(p.code, novo)} />
                                                </td>
                                                <td className="p-3 text-center align-top">
                                                    <button onClick={() => toggleListaNegra(p.code)} title={banido ? 'Voltar a divulgar (tirar da lista negra)' : 'Não divulgar no Zap/Disparos (pôr na lista negra)'} className={`h-9 w-9 rounded-lg text-base transition-colors ${banido ? 'bg-emerald-100 hover:bg-emerald-200' : 'bg-slate-100 hover:bg-rose-100 grayscale opacity-60 hover:opacity-100 hover:grayscale-0'}`}>{banido ? '↩️' : '🚫'}</button>
                                                </td>
                                            </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ResumoScreen = ({ products, showMessage, clients, user, setActiveRoute }) => {
            // 💾 Rascunho do Resumo: assim como o Fazer Pedido, volta EXATAMENTE onde parou (texto colado,
            // pedido montado, edições de preço/qtd e o modo manual) mesmo saindo da tela e voltando.
            const RESUMO_RASCUNHO_KEY = 'friganso_resumo_rascunho';
            const resumoRascunhoInicial = (() => { try { return JSON.parse(window.localStorage.getItem(RESUMO_RASCUNHO_KEY) || '{}') || {}; } catch (e) { return {}; } })();
            const [orderText, setOrderText] = useState(resumoRascunhoInicial.orderText || '');
            const [showModal, setShowModal] = useState(false);
            const [pendingCustomer, setPendingCustomer] = useState(resumoRascunhoInicial.pendingCustomer || '');
            const [pendingSpamov, setPendingSpamov] = useState(resumoRascunhoInicial.pendingSpamov || '');
            const [pendingItems, setPendingItems] = useState([]);
            const [orderSummary, setOrderSummary] = useState(resumoRascunhoInicial.orderSummary || null);
            const [showHistoryPrompt, setShowHistoryPrompt] = useState(false);
            const [clientToSave, setClientToSave] = useState(null);
            const [editedPrices, setEditedPrices] = useState(resumoRascunhoInicial.editedPrices || {});
            const [editedQty, setEditedQty] = useState(resumoRascunhoInicial.editedQty || {});
            const getQty = (it) => (editedQty[it.code] !== undefined ? editedQty[it.code] : it.quantity);
            const [detectedClientName, setDetectedClientName] = useState(resumoRascunhoInicial.detectedClientName || '');
            const [isProcessing, setIsProcessing] = useState(false);
            const [wantCreateProfile, setWantCreateProfile] = useState(true);
            const [showManualHistory, setShowManualHistory] = useState(false);
            const [manualSearch, setManualSearch] = useState('');
            const [manualSelected, setManualSelected] = useState(null);
            // 💳 Condição de pagamento lida do pedido atual (texto cru do SPAmov, ex. "21 Dias") + o
            // histórico de condições do cliente (pra avisar se esse pedido destoa do padrão dele).
            const [condicaoAtual, setCondicaoAtual] = useState(resumoRascunhoInicial.condicaoAtual || '');
            const [condicaoHistorico, setCondicaoHistorico] = useState(null);
            useEffect(() => {
                if (!pendingCustomer) { setCondicaoHistorico(null); return; }
                let cancelado = false;
                condicaoDominanteCliente(pendingCustomer).then(r => { if (!cancelado) setCondicaoHistorico(r); });
                return () => { cancelado = true; };
            }, [pendingCustomer]);

            // ✍️ Montar o Resumo NA MÃO (cliente, itens, valor e o código do SPAmov digitados) — serve de
            // reserva pra quando a leitura automática (app/site) tiver algum bug. Usa o MESMO fluxo de baixo
            // (orderSummary) então tabela de itens editável, aviso de condição de pagamento e "Copiar
            // Resumo" funcionam igual a um pedido lido automaticamente.
            const [mpAtivo, setMpAtivo] = useState(!!resumoRascunhoInicial.mpAtivo);
            const [mpClienteId, setMpClienteId] = useState(resumoRascunhoInicial.mpClienteId || '');
            const [mpSpamov, setMpSpamov] = useState(resumoRascunhoInicial.mpSpamov || '');
            const [mpCondicao, setMpCondicao] = useState(resumoRascunhoInicial.mpCondicao || '');
            // 🧩 Prazo Parcelado é uma combinação de prazos (ex.: 7/14/21, ou só 14/21) — só existe no
            // manual, então monta com caixinhas de seleção em vez de um texto fixo.
            const [mpParceladoDias, setMpParceladoDias] = useState(Array.isArray(resumoRascunhoInicial.mpParceladoDias) ? resumoRascunhoInicial.mpParceladoDias : []);
            const toggleMpParceladoDia = (n) => setMpParceladoDias(prev => prev.includes(n) ? prev.filter(d => d !== n) : [...prev, n].sort((a, b) => a - b));
            const [mpBusca, setMpBusca] = useState('');
            const [mpItens, setMpItens] = useState(Array.isArray(resumoRascunhoInicial.mpItens) ? resumoRascunhoInicial.mpItens : []); // {code, name, qty, valor}
            const mpClienteSugestoes = useMemo(() => {
                const q = mpClienteId.trim();
                if (!q) return [];
                const norm = normalizeForSearch(q);
                const arr = clients.filter(c => String(c.code).includes(q) || normalizeForSearch(c.name || '').includes(norm));
                if (arr.length === 1 && String(arr[0].code) === q) return [];
                return arr.slice(0, 8);
            }, [clients, mpClienteId]);
            const mpResultados = useMemo(() => {
                const q = mpBusca.trim();
                if (!q) return [];
                return products.filter(p => matchProduto(p, q)).slice(0, 30);
            }, [products, mpBusca]);
            // 🔁 Mesma regra do Fazer Pedido: clicar de novo soma 1 na qty; a lista de resultados continua
            // aberta (não limpa a busca) pra selecionar mais itens em sequência sem redigitar.
            // 💳 Preço do item conforme a condição de pagamento — passa por normalizarCondicaoPagamento,
            // então funciona tanto com as strings do menu manual ("Prazo Parcelado", "Cartao Credito")
            // quanto com o texto cru vindo do SPAmov (ex.: "7/14/21 Dias" = parcelado, "21 Dias" = prazo
            // simples). Cartão usa o preço de cartão (sem desconto), Parcelado usa o teto (SEM desconto),
            // e tudo o mais (à vista / a prazo simples) pode ter até 3% de desconto, igual sempre.
            const precoParaCondicaoMp = (p, condicao) => {
                const cat = normalizarCondicaoPagamento(condicao);
                if (cat === 'parcelado') return Number(p.originalPrice) || 0;
                if (cat === 'cartao') return p.precoCartao != null ? Number(p.precoCartao) : (Number(p.originalPrice) || 0);
                const { unitFinalPrice } = checkDiscountRules(p.code, p.name, p.originalPrice);
                return unitFinalPrice || 0;
            };
            const addMpItem = (p) => {
                const preco = precoParaCondicaoMp(p, mpCondicao);
                setMpItens(prev => {
                    const idx = prev.findIndex(i => i.code === p.code);
                    if (idx === -1) return [...prev, { code: String(p.code), name: p.name, qty: 1, valor: preco }];
                    const novo = [...prev];
                    novo[idx] = { ...novo[idx], qty: (Number(novo[idx].qty) || 0) + 1 };
                    return novo;
                });
            };
            const removerMpItem = (code) => setMpItens(prev => prev.filter(i => i.code !== code));
            const mudarMpItem = (code, campo, valor) => setMpItens(prev => prev.map(i => i.code === code ? { ...i, [campo]: valor } : i));
            // Muda a condição depois de já ter itens? Recalcula o preço padrão de todos (não mexe se você
            // já editou o valor na mão DEPOIS dessa troca — só quando a condição em si muda).
            useEffect(() => {
                setMpItens(prev => prev.map(it => {
                    const p = products.find(pp => String(pp.code) === it.code);
                    return p ? { ...it, valor: precoParaCondicaoMp(p, mpCondicao) } : it;
                }));
                // eslint-disable-next-line
            }, [mpCondicao]);
            const limparMp = () => { setMpAtivo(false); setMpClienteId(''); setMpSpamov(''); setMpCondicao(''); setMpParceladoDias([]); setMpBusca(''); setMpItens([]); };
            const montarResumoManual = () => {
                if (!mpClienteId.trim()) { showMessage('Informe o ID do cliente.', 'error'); return; }
                const validos = mpItens.filter(i => Number(i.qty) > 0);
                if (!validos.length) { showMessage('Adicione ao menos 1 item.', 'error'); return; }
                if (mpCondicao === 'Prazo Parcelado' && !mpParceladoDias.length) { showMessage('Marque pelo menos um prazo do parcelamento (ex.: 7, 14, 21).', 'error'); return; }
                const processed = validos.map(it => {
                    const qty = Number(it.qty) || 1;
                    const preco = Number(it.valor) || 0;
                    return { code: String(it.code), name: it.name, quantity: qty, unitFinalPrice: preco, discountedPrice: preco * qty, originalPrice: preco * qty, hasDiscount: false, peso: qty, precoKg: preco, valorLinha: preco * qty };
                });
                const cli = clients.find(c => c.code === mpClienteId.trim());
                // 🧩 "Prazo Parcelado" vira "Prazo Parcelado (7/14/21)" com os dias marcados
                const condicaoFinal = (mpCondicao === 'Prazo Parcelado' && mpParceladoDias.length)
                    ? `Prazo Parcelado (${mpParceladoDias.join('/')})`
                    : (mpCondicao || '');
                setPendingCustomer(mpClienteId.trim());
                setPendingSpamov(mpSpamov.trim());
                setCondicaoAtual(condicaoFinal);
                setDetectedClientName(cli ? cli.name : '');
                setOrderSummary({ customerCode: mpClienteId.trim(), spamov: mpSpamov.trim(), items: processed, totalDiscounted: processed.reduce((a, c) => a + c.discountedPrice, 0), totalValor: processed.reduce((a, c) => a + c.valorLinha, 0) });
                if (cli) { setClientToSave(cli); setShowHistoryPrompt(true); }
                limparMp();
                showMessage('Resumo montado na mão! Confira os itens antes de copiar. ✍️', 'success');
            };

            // 💾 Salva o rascunho a cada mudança relevante — volta exatamente onde parou ao sair e voltar.
            useEffect(() => {
                try {
                    window.localStorage.setItem(RESUMO_RASCUNHO_KEY, JSON.stringify({
                        orderText, pendingCustomer, pendingSpamov, orderSummary, editedPrices, editedQty,
                        detectedClientName, condicaoAtual, mpAtivo, mpClienteId, mpSpamov, mpCondicao, mpParceladoDias, mpItens
                    }));
                } catch (e) {}
            }, [orderText, pendingCustomer, pendingSpamov, orderSummary, editedPrices, editedQty, detectedClientName, condicaoAtual, mpAtivo, mpClienteId, mpSpamov, mpCondicao, mpParceladoDias, mpItens]);

            const handleProcessText = (forcedText) => {
                const txt = typeof forcedText === 'string' ? forcedText : orderText;
                if (!txt.trim()) { showMessage('Cole o texto do pedido no campo acima.', 'error'); return; }
                setCondicaoAtual(''); // texto colado manualmente não traz condição de pagamento (só o pedido lido do SPAmov traz)
                setIsProcessing(true);
                try {
                    // Extrai cliente e SPAmov SEMPRE
                    let customerName = '', spamov = '', clienteName = '';
                    const spMatch = txt.match(/SPAmov[\s\t]*(\d+)/i);
                    if (spMatch) spamov = spMatch[1];
                    const clienteMatch = txt.match(/CLIENTE\s*\[[fj]\]\s*(\d+[a-z]?)\s*[-–]?\s*([^\n\r]+)?/i)
                        || txt.match(/\[[fj]\]\s*(\d+[a-z]?)\s*-\s*([^\n\r]+)/i)
                        || txt.match(/(?:cliente|código|codigo)[\s\t:\-]+(\d+)/i);
                    if (clienteMatch) {
                        customerName = clienteMatch[1].trim();
                        if (clienteMatch[2]) clienteName = clienteMatch[2].replace(/\s*\[.*?\]\s*/g, '').trim().split(/\s{2,}/)[0];
                    }

                    // Extrai produtos apenas se a tabela estiver carregada
                    let extractedItemsMap = new Map();
                    if (products.length > 0) {
                        txt.split('\n').forEach(line => {
                            if (!line.trim() || line.toUpperCase().includes('CLIENTE') || line.toUpperCase().includes('SPAMOV')) return;
                            const cleanLine = line.replace(/\([^)]+\)/g, ' ').trim();
                            let codeFound = null;
                            const possibleNumbers = cleanLine.match(/\d+/g) || [];
                            for (let numStr of possibleNumbers) {
                                if (products.some(p => p.code === numStr)) { codeFound = numStr; break; }
                            }
                            if (codeFound && !extractedItemsMap.has(codeFound)) {
                                const rp = products.find(p => p.code === codeFound);
                                extractedItemsMap.set(codeFound, { code: codeFound, name: rp.name, quantity: '' });
                            }
                        });
                    }

                    // Se não achou nada útil, ainda abre o modal se pelo menos tem ID do cliente
                    if (extractedItemsMap.size === 0 && !customerName) {
                        showMessage('Nenhuma informação reconhecida no texto.', 'error');
                        setIsProcessing(false); return;
                    }

                    const existingCli = clients.find(c => c.code === customerName);
                    setWantCreateProfile(!existingCli); // padrão: criar se for novo
                    setPendingCustomer(customerName);
                    setPendingSpamov(spamov);
                    setPendingItems(Array.from(extractedItemsMap.values()));
                    setDetectedClientName(clienteName);
                    setIsProcessing(false);
                    setShowModal(true);
                } catch (err) { showMessage('Erro crítico ao ler pedido.', 'error'); setIsProcessing(false); }
            };

            // Recebe o pedido enviado pela extensão do Chrome (lê o SPAmov)
            useEffect(() => {
                // 1) Pedido estruturado (com quantidades) — monta o resumo direto
                const rawJson = window.sessionStorage.getItem('friganso_pedido_json');
                if (rawJson) {
                    window.sessionStorage.removeItem('friganso_pedido_json');
                    try {
                        const data = JSON.parse(rawJson);
                        const processed = (data.itens || []).map(it => {
                            const rp = products.find(p => String(p.code) === String(it.code));
                            const nome = rp ? rp.name : (it.nome || ('Produto ' + it.code));
                            const base = rp ? rp.originalPrice : 0;
                            const { hasDiscount, origPrice, unitFinalPrice } = checkDiscountRules(it.code, nome, base);
                            const qty = Number(it.qty) || 1;
                            const peso = Number(it.peso) || 0;                              // ⚖️ P.Liq lido do SPAmov
                            const precoKg = unitFinalPrice || (Number(it.valorUnit) || 0);  // preço da tabela; senão o do SPAmov
                            return { code: String(it.code), name: nome, quantity: qty, unitFinalPrice, discountedPrice: unitFinalPrice * qty, originalPrice: origPrice * qty, hasDiscount, peso, precoKg, valorLinha: peso * precoKg };
                        }).filter(x => x.code);

                        // 🧪 SÓ PRA TESTE (não muda o Resumo normal): Valor da Nota = Peso (P.Liq. KG) × Preço/Kg,
                        // do jeito que o SPAmov realmente calcula. Mostrado na aba 🐞 Debug pra comparar.
                        try {
                            const debugItens = (data.itens || []).map(it => {
                                const rp = products.find(p => String(p.code) === String(it.code));
                                const nome = rp ? rp.name : (it.nome || ('Produto ' + it.code));
                                const base = rp ? rp.originalPrice : 0;
                                const { unitFinalPrice } = checkDiscountRules(it.code, nome, base);
                                const peso = Number(it.peso) || 0;
                                const valorSpamov = Number(it.valorUnit) || 0;     // preço/kg lido DIRETO da tela do SPAmov
                                const precoKg = unitFinalPrice || valorSpamov;      // usa o da tabela; se não tiver, o do SPAmov
                                return { code: String(it.code), nome, qty: Number(it.qty) || 1, peso, precoKg, precoTabela: unitFinalPrice, precoSpamov: valorSpamov, subtotal: peso * precoKg };
                            });
                            const total = debugItens.reduce((a, c) => a + c.subtotal, 0);
                            window.localStorage.setItem('friganso_debug_valor_nota', JSON.stringify({ cliente: data.cliente || '', spamov: data.spamov || '', itens: debugItens, total, ts: Date.now() }));
                        } catch (e) {}

                        if (processed.length) {
                            setPendingCustomer(data.cliente || '');
                            setPendingSpamov(data.spamov || '');
                            setDetectedClientName(data.clienteNome || '');
                            setCondicaoAtual(data.condicaoPagamento || '');
                            setOrderSummary({ customerCode: data.cliente || '', spamov: data.spamov || '', items: processed, totalDiscounted: processed.reduce((a, c) => a + c.discountedPrice, 0), totalValor: processed.reduce((a, c) => a + (c.valorLinha || 0), 0) });
                            const existing = clients.find(c => c.code === (data.cliente || ''));
                            if (existing) { setClientToSave(existing); setShowHistoryPrompt(true); }
                            showMessage('Pedido importado do SPAmov! ' + (products.length === 0 ? '(carregue a Tabela PDF p/ ver preços)' : ''), 'success');
                        } else {
                            showMessage('Pedido recebido, mas nenhum item reconhecido.', 'error');
                        }
                    } catch (e) { showMessage('Erro ao importar pedido do SPAmov.', 'error'); }
                    return;
                }
                // 2) Compatibilidade: pedido em texto (abre o modal para preencher quantidades)
                const ped = window.sessionStorage.getItem('friganso_pedido_texto');
                if (ped) {
                    window.sessionStorage.removeItem('friganso_pedido_texto');
                    setOrderText(ped);
                    setTimeout(() => handleProcessText(ped), 300);
                }
            }, []);

            const handleConfirmModal = async () => {
                const validItems = pendingItems.filter(item => Number(item.quantity) > 0);
                const processed = validItems.map(item => {
                    const rp = products.find(p => p.code === item.code);
                    const { hasDiscount, origPrice, unitFinalPrice } = checkDiscountRules(item.code, rp.name, rp.originalPrice);
                    const qty = Number(item.quantity);
                    return { ...item, quantity: qty, unitFinalPrice, discountedPrice: unitFinalPrice * qty, originalPrice: origPrice * qty, hasDiscount };
                });
                setEditedPrices({}); setEditedQty({});
                setOrderSummary({ customerCode: pendingCustomer, spamov: pendingSpamov, items: processed, totalDiscounted: processed.reduce((acc, c) => acc + c.discountedPrice, 0) });
                setShowModal(false);
                setShowManualHistory(false); setManualSearch(''); setManualSelected(null);

                if (pendingCustomer) {
                    const existingClient = clients.find(c => c.code === pendingCustomer);
                    if (existingClient && validItems.length > 0) {
                        // Cliente existe: só mostra prompt pra atualizar histórico
                        setClientToSave(existingClient);
                        setShowHistoryPrompt(true);
                    } else if (!existingClient && wantCreateProfile) {
                        // Cliente novo e usuário quer criar perfil: cria e navega
                        try {
                            const autoName = detectedClientName || `Cliente ${pendingCustomer}`;
                            const newCodes = processed.map(i => i.code);
                            const docRef = await db.collection('clients').add({
                                name: autoName, code: pendingCustomer, phone: '', cnpj: '',
                                address: '', contactName: '', history: newCodes, rawData: orderText,
                                profile: { title: "Cadastro Automático", color: "bg-slate-100 text-slate-600" }
                            });
                            window.localStorage.setItem('friganso_open_client_id', docRef.id);
                            showMessage(`Perfil de ${autoName} criado! Abrindo no CRM...`, 'success');
                            setTimeout(() => setActiveRoute('clients'), 900);
                        } catch(e) { showMessage('Erro ao criar perfil.', 'error'); }
                    } else if (!existingClient && !wantCreateProfile && validItems.length > 0) {
                        // Não quer criar perfil mas tem itens: só mostra histórico prompt
                        setClientToSave({ code: pendingCustomer, isNew: true });
                        setShowHistoryPrompt(true);
                    }
                }
            };

            const handleSaveToHistory = async () => {
                if (!clientToSave) return;
                const newCodes = orderSummary.items.map(i => i.code);
                try {

                            name: `Cliente ${manualSelected.code}`, code: manualSelected.code,

                    } else {
                        const currentHistory = manualSelected.history || [];
                        const updatedHistory = [...new Set([...currentHistory, ...newCodes])];

                const rp = products.find(p => String(p.code) === String(it.code));

                // desconto) em vez de sempre aplicar o preço à vista com -3%.
                const unitFinalPrice = precoParaCondicaoMp(rp, condicaoAtual);
                return { ...it, name: rp.name, unitFinalPrice: unitFinalPrice, naTabela: true, valorKg: unitFinalPrice || it.precoKg || 0 };

                    txt += `${item.code} - ${getQty(item)}x - ${formatPrice(price)}\n`;

                return txt.trim();

                                    </div>

                                    {/* Pergunta sobre perfil */}
                                    {pendingCustomer && (() => {

                                                        <div className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all ${wantCreateProfile ? 'left-6' : 'left-0.5'}`}></div>
                                                    </div>

                                                <input type="number" min="0" value={it.qty} onChange={e => mudarMpItem(it.code, 'qty', parseInt(e.target.value, 10) || 0)} className="w-14 text-center font-bold border-b-2 border-slate-200 focus:border-rose-500 outline-none" />
                                                <span className="text-slate-400 text-xs">x R$</span>
                                                <input type="text" value={String(it.valor).replace('.', ',')} onChange={e => mudarMpItem(it.code, 'valor', parseFloat(e.target.value.replace(',', '.')) || 0)} className="w-20 text-right font-bold border-b-2 border-rose-200 focus:border-rose-500 outline-none" />
                                                <button onClick={() => removerMpItem(it.code)} className="h-7 w-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-600 flex-shrink-0"><div className="h-3.5 w-3.5"><IconX/></div></button>

                            </div>

                        <div className={`relative rounded-2xl border-2 transition-all duration-200 ${orderText.trim() ? 'border-rose-400 shadow-md shadow-rose-100' : 'border-slate-200'}`}>

                                className="w-full h-44 p-4 rounded-2xl outline-none resize-none font-mono text-sm bg-slate-50 focus:bg-white transition-colors">

                                            <p className="text-sm font-bold text-blue-800">{clientToSave?.isNew ? '🆕 Cliente não cadastrado!' : '📋 Adicionar ao histórico?'}</p>
                                            <p className="text-xs text-blue-600 mt-1">{clientToSave?.isNew
                                                ? `ID ${clientToSave.code}${detectedClientName ? ` · ${detectedClientName}` : ''} — deseja cadastrar e salvar o histórico?`
                                                : `Adicionar estes itens ao histórico de ${clientToSave?.name || `ID ${clientToSave?.code}`}?`}
                                            </p>
                                         </div>
                                         <div className="flex gap-2">
                                            <button onClick={() => setShowHistoryPrompt(false)} className="px-3 py-1.5 text-xs font-bold text-blue-600 hover:bg-blue-100 rounded-lg transition-colors">Não</button>
                                            <button onClick={handleSaveToHistory} className="px-3 py-1.5 text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 rounded-lg shadow-sm transition-colors">Sim, Salvar</button>
                                         </div>
                                     </div>
                                )}

                                {/* Botão SEMPRE visível para salvar manualmente no histórico */}
                                {orderSummary && !showHistoryPrompt && (
                                    <div className="mt-4">
                                        {!showManualHistory ? (
                                            <button onClick={() => setShowManualHistory(true)} className="w-full py-2.5 px-4 text-sm font-bold text-slate-500 hover:text-blue-700 hover:bg-blue-50 border border-dashed border-slate-300 hover:border-blue-300 rounded-xl transition-all flex items-center justify-center gap-2">
                                                <span>💾</span> Salvar no histórico do cliente
                                            </button>
                                        ) : (
                                            <div className="p-4 bg-blue-50 border border-blue-200 rounded-xl animate-in fade-in slide-in-from-bottom-2">
                                                <div className="flex items-center justify-between mb-3">
                                                    <p className="text-sm font-bold text-blue-800">💾 Salvar no histórico</p>
                                                    <button onClick={() => { setShowManualHistory(false); setManualSearch(''); setManualSelected(null); }} className="text-slate-400 hover:text-slate-600 text-xl leading-none font-bold">×</button>
                                                </div>
                                                {manualSelected ? (
                                                    <div className="flex items-center justify-between bg-white rounded-xl px-4 py-3 border border-blue-200">
                                                        <div>
                                                            <p className="text-sm font-bold text-slate-800">{manualSelected.isNew ? `Novo cliente` : manualSelected.name}</p>
                                                            <p className="text-xs text-slate-500 font-mono mt-0.5">Cód. {manualSelected.code}</p>
                                                        </div>
                                                        <div className="flex gap-2 items-center">
                                                            <button onClick={() => { setManualSelected(null); setManualSearch(''); }} className="text-xs text-slate-500 hover:text-slate-700 px-2 py-1.5 rounded-lg hover:bg-slate-100 transition-colors">Trocar</button>
                                                            <button onClick={handleManualSave} className="text-xs font-bold bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg shadow-sm transition-colors">Salvar</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <input
                                                            type="text"
                                                            autoFocus
                                                            placeholder="Buscar por nome ou código do cliente..."
                                                            value={manualSearch}
                                                            onChange={e => setManualSearch(e.target.value)}
                                                            className="w-full px-3 py-2.5 bg-white border border-blue-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-400 mb-2"
                                                        />
                                                        <div className="space-y-1 max-h-48 overflow-y-auto">
                                                            {clientesParaHistorico.map(c => (
