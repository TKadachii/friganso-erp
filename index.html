            const questionsDefinition = [{ id: 'q1', text: '1. Possui açougue interno e desossa carnes?' }, { id: 'q2', text: '2. Compra peças inteiras no osso (Dianteiro/Banda)?' }, { id: 'q3', text: '3. Prefere caixarias já limpas/porcionadas?' }, { id: 'q4', text: '4. Alta demanda por carnes resfriadas (não congeladas)?' }, { id: 'q5', text: '5. Possui setor de frios fatiados na hora?' }, { id: 'q6', text: '6. Compra grande volume de embutidos (Mortadela)?' }, { id: 'q7', text: '7. Serve refeições prontas (Restaurante)?' }, { id: 'q8', text: '8. Preferência por laticínios (Mussarela, Prato)?' }, { id: 'q9', text: '9. Fatia bifes para exposição em balcão?' }, { id: 'q10', text: '10. Busca padronização extrema nos cortes?' }, { id: 'q11', text: '11. Processa carne moída no estabelecimento?' }, { id: 'q12', text: '12. Possui câmara fria para estocagem?' }, { id: 'q13', text: '13. Preferência por produtos de giro rápido/validade curta?' }, { id: 'q14', text: '14. Compra complementos (Pão de alho, Batata)?' }, { id: 'q15', text: '15. Variedade grande de itens (mix amplo)?' }, { id: 'q16', text: '16. Concentra pedidos em poucos itens de volume altíssimo?' }, { id: 'q17', text: '17. Forte foco em churrasco (Picanha, Costela)?' }, { id: 'q18', text: '18. Demanda constante por miúdos/ossos?' }, { id: 'q19', text: '19. Decide compra baseado no menor preço?' }, { id: 'q20', text: '20. Exige marcas específicas para prateleira?' }];
            const initialFormState = { name: '', contactName: '', phone: '', code: '', cnpj: '', address: '' }; questionsDefinition.forEach(q => initialFormState[q.id] = 0);
            const [formData, setFormData] = useState(initialFormState);

            const calculateClientProfile = (data) => {
                const acougueScore = data.q1 + data.q2 + data.q4 + data.q9 + data.q11 + data.q18; const mercadoScore = data.q5 + data.q6 + data.q8 + data.q12 + data.q13 + data.q15 + data.q20; const restauranteScore = data.q3 + data.q7 + data.q10 + data.q14 + data.q16;
                const pAcougue = acougueScore / 30, pMercado = mercadoScore / 35, pRestaurante = restauranteScore / 25; const maxScore = Math.max(pAcougue, pMercado, pRestaurante);
                if (maxScore === 0) return { title: "Cadastro Inicial", color: "bg-slate-100 text-slate-600" };
                if (maxScore === pAcougue) return { title: data.q2 >= 4 ? "Açougue Bruto (Osso)" : "Açougue Padrão", color: "bg-red-100 text-red-800" };
                if (maxScore === pMercado) return { title: "Mercado / Mercearia", color: "bg-blue-100 text-blue-800" };
                return { title: "Restaurante / Food Service", color: "bg-orange-100 text-orange-800" };
            };

            const handleExtractClientData = () => {
                if (!rawClientText.trim()) { showMessage('Cole o texto primeiro.', 'error'); return; }
                try {
                    let extracted = { ...formData };
                    const clienteMatch = rawClientText.match(/CLIENTE\s*\[f\]\s*(\d+)/i) || rawClientText.match(/ID:\s*(\d+)/i);
                    if (clienteMatch) extracted.code = clienteMatch[1].trim();
                    const cnpjMatch = rawClientText.match(/CNPJ\s*\(\s*([\d.\-\/]+)\s*\)/i);
                    if (cnpjMatch) extracted.cnpj = cnpjMatch[1].trim();
                    const nameMatch = rawClientText.match(/(?:SUPERMERCADO|MERCADO|AÇOUGUE|RESTAURANTE)[\s\S]*?(?=\n|CNPJ)/i);
                    if (nameMatch) {
                        let cleanName = nameMatch[0].replace(/SUPERMERCADO OPCAO DO BAIRRO LTDA\/MERCADO OPCAO-\s*/i, '').trim();
                        extracted.name = cleanName.substring(0, 40); 
                    }
                    const cepMatch = rawClientText.match(/\b\d{5}-\d{3}\b/);
                    if (cepMatch) extracted.address = cepMatch[0];
                    setFormData(extracted); showMessage('Dados extraídos com inteligência!', 'success');
                } catch (e) { showMessage('Erro na extração dos dados.', 'error'); }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if(questionsDefinition.filter(q => formData[q.id] > 0).length < 5) { showMessage("Responda pelo menos 5 perguntas para mapeamento.", 'error'); return; }
                const profileData = calculateClientProfile(formData);
                try { await db.collection('clients').add({ ...formData, profile: profileData, history: [] }); showMessage("Cliente salvo na nuvem!", 'success'); setIsAdding(false); setFormData(initialFormState); setRawClientText(''); } catch(err) { showMessage("Erro ao salvar cliente", 'error'); }
            };

            const handleUpdateClient = async () => {
                if(!editForm.code) { showMessage("O ID não pode ficar vazio.", "error"); return; }
                try {
                    await db.collection('clients').doc(selectedClient.id).update({ name: editForm.name, contactName: editForm.contactName || '', code: editForm.code, cnpj: editForm.cnpj || '', phone: editForm.phone || '', address: editForm.address || '', mapLocation: editForm.mapLocation || '' });
                    showMessage("Alterações salvas!", "success");
                } catch(e) { showMessage("Erro ao atualizar.", "error"); }
            };

            const handleExtractHistory = async () => {
                if (!rawHistoryText.trim()) return;
                setIsExtractingHistory(true);
                try {
                    const matches = [...rawHistoryText.matchAll(/\d*S(\d{4,7})/g)];
                    let foundCodes = matches.map(m => m[1]);
                    if (foundCodes.length === 0) {
                        products.forEach(p => { if (rawHistoryText.includes(p.code)) foundCodes.push(p.code); });
                    }
                    const validCodes = [...new Set(foundCodes)].filter(code => products.some(p => p.code === code));
                    if (validCodes.length === 0) { showMessage('Nenhum código reconhecido.', 'error'); setIsExtractingHistory(false); return; }
                    
                    const currentHistory = editForm.history || [];
                    const newHistory = [...new Set([...currentHistory, ...validCodes])];
                    await db.collection('clients').doc(selectedClient.id).update({ history: newHistory });
                    setRawHistoryText('');
                    showMessage(`${validCodes.length} produtos adicionados ao histórico!`, 'success');
                } catch (e) { showMessage('Erro ao salvar.', 'error'); } finally { setIsExtractingHistory(false); }
            };

            const handleExtractProfileData = () => {
                if (!rawProfileText.trim()) { showMessage('Cole o texto primeiro.', 'error'); return; }
                try {
                    let updates = {};
                    const clienteMatch = rawProfileText.match(/CLIENTE\s*\[f\]\s*(\d+)/i) || rawProfileText.match(/ID:\s*(\d+)/i);
                    if (clienteMatch) updates.code = clienteMatch[1].trim();
                    const cnpjMatch = rawProfileText.match(/CNPJ\s*\(\s*([\d.\-\/]+)\s*\)/i);
                    if (cnpjMatch) updates.cnpj = cnpjMatch[1].trim();
                    const nameMatch = rawProfileText.match(/(?:SUPERMERCADO|MERCADO|AÇOUGUE|RESTAURANTE|MERCEARIA)[\s\S]*?(?=\n|CNPJ)/i);
                    if (nameMatch) { let n = nameMatch[0].trim(); updates.name = n.substring(0, 40); }
                    const phoneMatch = rawProfileText.match(/(?:FONE|TEL|WHATSAPP|ZAP|CEL)[:\s]*(\(?\d{2}\)?\s*\d{4,5}[-\s]?\d{4})/i);
                    if (phoneMatch) updates.phone = phoneMatch[1].trim();
                    const cepMatch = rawProfileText.match(/\b\d{5}-\d{3}\b/);
                    if (cepMatch) updates.address = cepMatch[0];
                    setEditForm(prev => ({...prev, ...updates}));
                    showMessage('Dados extraídos com sucesso!', 'success');
                    setRawProfileText('');
                } catch (e) { showMessage('Erro na extração dos dados.', 'error'); }
            };

            if (isAdding) return (
                <div className="animate-in fade-in">

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-6">

                        <textarea value={rawClientText} onChange={e => setRawClientText(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-rose-500 text-xs font-mono h-24 mb-3 resize-none" placeholder="Cole o bloco do ERP aqui..."></textarea>
                        <button type="button" onClick={handleExtractClientData} className="bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-all text-sm">Extrair Dados</button>

                                <div><label className="block text-xs font-bold text-slate-500 mb-1">Nome do Contato / Dono</label><input type="text" value={formData.contactName} onChange={e=>setFormData({...formData, contactName: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg focus:border-rose-500 outline-none"/></div>
                                <div><label className="block text-xs font-bold text-slate-500 mb-1">ID Cliente (Obrigatório)*</label><input type="text" required value={formData.code} onChange={e=>setFormData({...formData, code: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg focus:border-rose-500 outline-none"/></div>

            return (

        const CreditsScreen = () => (

                        <h2 className="text-2xl font-black text-slate-800 mb-1">Sistema Friganso Premium ERP</h2>

                            </p>
                            <p className="text-sm text-slate-500 mb-1 uppercase tracking-wider font-bold">Contato Direto</p>
                            <a href="mailto:bruno.moura.f.silva@gmail.com" className="text-blue-600 font-medium flex items-center gap-2 hover:underline"><div className="h-4 w-4"><IconMail/></div> bruno.moura.f.silva@gmail.com</a>

        // ===== RADAR DE CLIENTES: controle situacional + recomendações diárias =====
        const RadarScreen = ({ clients, products, setActiveRoute, showMessage }) => {
            // Categoria do produto por palavras-chave do nome
            const CAT_RE = {
                acougue: /costela|alcatra|patinho|cox[aã]o|ac[eé]m|contra.?fil|dianteiro|traseiro|banda|pernil|barriga|toucinho|f[ií]gado|mocot|bucho|rabada|carne|fraldinha|maminha|picanha|cupim|lagarto|m[uú]sculo|peito\s*resf|carr[eé]|suin|bovin/i,
                mercado: /mussarela|queijo|presunto|pres\.|mortadela|mort\.|salsich|lingui|ling\.|bacon|margarina|hamburg|frios|requeij|leite|manteiga|nuggets|empanad|pres\s|coxa|asa|frango|salsich[aã]o/i,
                restaurante: /p[aã]o de alho|fil[eé] de peito|file de peito|frango temp|coalho|batata|grill|churrasc|espeto|picanha|alcatra|costela.*grill|pizza/i
            };
            const profileCat = (title) => {
                const t = (title || '').toLowerCase();
                if (/a[cç]ougue/.test(t)) return 'acougue';
                if (/mercad|mercear/.test(t)) return 'mercado';
                if (/restaurante|food/.test(t)) return 'restaurante';
                return '';
            };
            const nameCat = (name) => {
                const n = (name || '').toLowerCase();
                if (/supermerc|mercad|mercear|minimerc|atacad|distribuidora|bebidas/.test(n)) return 'mercado';
                if (/restaurante|churrasc|lanchonete|petiscaria|espeto|gril|pizza|confeitaria|bar\b|butecou/.test(n)) return 'restaurante';
                if (/a[cç]ougue|carne/.test(n)) return 'acougue';
                return '';
            };
            const categoryForClient = (c) => profileCat(c.profile && c.profile.title) || nameCat(c.name) || 'geral';
            const matchesCategory = (name, cat) => cat === 'geral' ? true : (CAT_RE[cat] ? CAT_RE[cat].test(name || '') : true);
            const hashStr = (s) => { let h = 0; const str = String(s || ''); for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) >>> 0; } return h; };

            const catLabel = { acougue: '🥩 Açougue', mercado: '🛒 Mercado', restaurante: '🍽️ Restaurante', geral: '📦 Geral' };

            // Classificação situacional por nº de produtos diferentes já comprados
            const stats = useMemo(() => {
                const lvl = (c) => (c.history || []).length;
                const inativos = clients.filter(c => lvl(c) === 0);
                const atencao = clients.filter(c => lvl(c) >= 1 && lvl(c) <= 3);
                const medios = clients.filter(c => lvl(c) >= 4 && lvl(c) <= 8);
                const top = clients.filter(c => lvl(c) >= 9);
                const ranking = [...clients].sort((a, b) => lvl(b) - lvl(a));
                return { inativos, atencao, medios, top, ranking, total: clients.length };
            }, [clients]);

            // Recomendações do dia (rotaciona pela data, prioriza quem precisa de atenção)
            const recs = useMemo(() => {
                if (!clients.length || !products.length) return [];
                const today = new Date();
                const daySeed = Number(`${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`);
                const out = [];
                clients.forEach(c => {
                    const cat = categoryForClient(c);
                    const bought = new Set((c.history || []).map(String));
                    let cands = products.filter(p => !bought.has(String(p.code)) && matchesCategory(p.name, cat));
                    if (!cands.length) cands = products.filter(p => !bought.has(String(p.code)));
                    if (!cands.length) return;
                    const idx = (daySeed + hashStr(c.code)) % cands.length;
                    out.push({ client: c, product: cands[idx], cat, hist: (c.history || []).length });
                });
                // prioriza menos histórico (atenção); desempate rotativo pelo dia
                out.sort((a, b) => (a.hist - b.hist) || ((hashStr(a.client.code) + daySeed) % 100) - ((hashStr(b.client.code) + daySeed) % 100));
                return out;
            }, [clients, products]);

            const abrirCliente = (c) => { window.localStorage.setItem('friganso_open_client_id', c.id); setActiveRoute('clients'); };
            const gerarOferta = (productCode) => {
                window.localStorage.setItem('friganso_offer_codes', JSON.stringify([String(productCode)]));
                setActiveRoute('orcamentos');
            };

            const StatCard = ({ emoji, label, value, sub, color }) => (
                <div className={`bg-white rounded-2xl p-5 border shadow-sm ${color}`}>
                    <div className="flex items-center justify-between"><span className="text-2xl">{emoji}</span><span className="text-3xl font-black text-slate-800">{value}</span></div>
                    <p className="text-sm font-bold text-slate-700 mt-2">{label}</p>
                    <p className="text-xs text-slate-400">{sub}</p>
                </div>
            );

            const destaque = recs[0];

            return (

                    </div>

                    {products.length === 0 && (
                        <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-amber-700 text-sm font-medium">
                            ⚠️ Carregue a <b>Tabela do Dia (PDF)</b> para liberar as recomendações de produtos.
                        </div>
                    )}

                    {/* Cards de situação */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">

                        <StatCard emoji="🙂" label="Compradores Médios" value={stats.medios.length} sub="4 a 8 produtos" color="border-blue-200" />
                        <StatCard emoji="⚠️" label="Precisam de Atenção" value={stats.atencao.length} sub="1 a 3 produtos" color="border-amber-200" />
                        <StatCard emoji="🚨" label="Inativos (não compraram)" value={stats.inativos.length} sub="sem histórico" color="border-rose-200" />
                    </div>

                    {/* Destaque do dia */}
                    {destaque && (
                        <div className="bg-gradient-to-br from-rose-700 to-rose-900 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 right-0 text-[120px] opacity-10 leading-none -mt-4 -mr-2">🎯</div>
                            <p className="text-xs font-bold uppercase tracking-widest text-rose-200">Recomendação do Dia</p>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="bg-white text-rose-800 px-2.5 py-1 rounded-lg font-mono font-black text-lg leading-none shadow-sm">{destaque.client.code || '—'}</span>
                                <h3 className="text-2xl font-extrabold">{destaque.client.name}</h3>
                            </div>
                            <p className="text-rose-200 text-sm mt-1">{catLabel[destaque.cat]} · {destaque.hist === 0 ? 'ainda não comprou nada' : `${destaque.hist} produto(s) no histórico`}</p>
                            <div className="bg-white/15 backdrop-blur rounded-2xl p-4 mt-4 border border-white/20">
                                <p className="text-xs text-rose-100">Ofereça hoje:</p>
                                <p className="text-lg font-bold leading-tight mt-0.5">{destaque.product.code} — {destaque.product.name}</p>
                            </div>
                            <div className="flex gap-2 mt-4">
                                <button onClick={() => gerarOferta(destaque.product.code)} className="bg-white text-rose-800 font-bold px-4 py-2.5 rounded-xl text-sm shadow hover:bg-rose-50 transition-colors flex items-center gap-2"><div className="h-4 w-4"><IconWhatsApp/></div> Gerar Oferta no Zap</button>
                                <button onClick={() => abrirCliente(destaque.client)} className="bg-white/20 hover:bg-white/30 text-white font-bold px-4 py-2.5 rounded-xl text-sm transition-colors">Ver Perfil</button>
                            </div>
                        </div>
                    )}

                    {/* Lista de recomendações */}
                    <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-5 border-b border-slate-100"><h3 className="font-bold text-slate-800 flex items-center gap-2"><div className="h-5 w-5 text-rose-600"><IconWand/></div> Quem abordar hoje (por prioridade)</h3></div>
                        <div className="divide-y divide-slate-100 max-h-[420px] overflow-y-auto">
                            {recs.slice(1, 16).map((r, i) => (
                                <div key={i} className="p-4 flex items-center justify-between gap-3 hover:bg-slate-50 transition-colors">
                                    <div className="min-w-0 flex-1">
                                        <div className="flex items-center gap-2">
                                            <span className="bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-black text-xs flex-shrink-0">{r.client.code || '—'}</span>
                                            <p className="font-bold text-slate-800 text-sm truncate">{r.client.name}</p>
                                            <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full flex-shrink-0">{catLabel[r.cat]}</span>
                                            {r.hist === 0 && <span className="text-[10px] font-bold bg-rose-100 text-rose-600 px-2 py-0.5 rounded-full flex-shrink-0">inativo</span>}
                                        </div>
                                        <p className="text-xs text-slate-500 truncate mt-0.5">Sugestão: <b className="text-slate-700">{r.product.code}</b> — {r.product.name}</p>
                                    </div>
                                    <div className="flex gap-1.5 flex-shrink-0">
                                        <button onClick={() => gerarOferta(r.product.code)} title="Gerar oferta" className="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 h-9 w-9 rounded-lg flex items-center justify-center transition-colors"><div className="h-4 w-4"><IconWhatsApp/></div></button>
                                        <button onClick={() => abrirCliente(r.client)} title="Ver perfil" className="bg-slate-100 hover:bg-slate-200 text-slate-600 h-9 w-9 rounded-lg flex items-center justify-center transition-colors"><div className="h-4 w-4"><IconUser/></div></button>
                                    </div>
                                </div>
                            ))}
                            {recs.length === 0 && <div className="p-8 text-center text-slate-400 text-sm">Cadastre clientes e carregue a tabela de produtos para ver recomendações.</div>}
                        </div>
                    </div>

                    {/* Ranking + listas situacionais */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">

                            <div className="divide-y divide-slate-100 max-h-[360px] overflow-y-auto">
                                {stats.ranking.slice(0, 20).map((c, i) => (

                            <div className="divide-y divide-slate-100 max-h-[360px] overflow-y-auto">
                                {[...stats.inativos, ...stats.atencao].slice(0, 20).map(c => (
                                    <button key={c.id} onClick={() => abrirCliente(c)} className="w-full p-3 flex items-center gap-3 hover:bg-slate-50 transition-colors text-left">
                                        <span className={`h-2.5 w-2.5 rounded-full flex-shrink-0 ${(c.history || []).length === 0 ? 'bg-rose-500' : 'bg-amber-400'}`}></span>
                                        <span className="bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-black text-xs flex-shrink-0">{c.code || '—'}</span>
                                        <span className="font-bold text-sm text-slate-700 truncate flex-1">{c.name}</span>
                                        <span className="text-xs font-bold text-slate-400">{(c.history || []).length === 0 ? 'nunca comprou' : `${(c.history || []).length} itens`}</span>
                                    </button>
                                ))}
                                {stats.inativos.length === 0 && stats.atencao.length === 0 && <div className="p-8 text-center text-slate-400 text-sm">Nenhum cliente precisando de atenção. 🎉</div>}
                            </div>
                        </div>
                    </div>
                </div>

                        <Passo n="1">Cole o texto do pedido no campo e toque em <b>Gerar Resumo</b>.</Passo>
                        <Passo n="2">Ajuste as quantidades e preços; o sistema aplica os descontos automaticamente.</Passo>
                        <Passo n="3">Copie o <b>Resumo do WhatsApp</b> pronto para enviar ao cliente.</Passo>
                        <Passo n="4">Use o botão <b>💾 Salvar no histórico</b> para registrar a compra no perfil do cliente (ou criar o cliente se ainda não existir).</Passo>
                        <Ir rota="resumo">Abrir Resumo de Pedido</Ir>
                    </Secao>

                    {/* 4. Gerador de Zap */}
                    <Secao id="zap" icon={IconWhatsApp} cor="bg-green-600" titulo="4. Gerador de Zap" sub="Ofertas avulsas rápidas">
                        <Banner grad="from-green-500 to-green-700" emoji="🏷️" titulo="Monte ofertas em segundos" />
                        <Passo n="1">Digite o que procura (ex: <i>Picanha</i>) e selecione os produtos.</Passo>
                        <Passo n="2">O sistema monta o texto com preço e desconto, no formato do WhatsApp.</Passo>
                        <Passo n="3">Copie e mande para quem quiser.</Passo>
                        {/* exemplo visual da mensagem */}
                        <div className="bg-[#e1ffc7] rounded-xl p-3 border border-[#d3f4b8] text-xs">
                            <pre className="font-sans whitespace-pre-wrap text-slate-800">🥩 *OFERTAS DO DIA*{'\n\n'}Cod: 0129{'\n\n'}BATATA NOISETTES{'\n'}💰 Valor: ~R$ 12,22~ por *R$ 11,85/kg* 🔥</pre>
                        </div>
                        <Ir rota="orcamentos">Abrir Gerador de Zap</Ir>
                    </Secao>

                    {/* 5. Radar */}
                    <Secao id="radar" icon={IconDashboard} cor="bg-purple-600" titulo="5. Radar de Clientes" sub="Quem comprar mais, quem resgatar, e recomendações">
                        <Banner grad="from-purple-500 to-purple-700" emoji="🎯" titulo="Inteligência comercial diária" />
                        <Passo n="1">Veja os cards de situação: <b>Top compradores</b>, <b>Médios</b>, <b>Atenção</b> e <b>Inativos</b>.</Passo>
                        <Passo n="2">A <b>Recomendação do Dia</b> sugere qual cliente abordar e qual produto oferecer (combina com o perfil).</Passo>
                        <Passo n="3">Use o <b>Ranking</b> e a lista de <b>Clientes para resgatar</b> para priorizar quem precisa de atenção.</Passo>
                        <Passo n="4">Botões em cada cliente: <b>gerar oferta</b> no Zap ou <b>ver perfil</b>.</Passo>
                        <Ir rota="radar">Abrir Radar de Clientes</Ir>
                    </Secao>

                    {/* 6. Disparos */}
                    <Secao id="disparos" icon={IconWhatsApp} cor="bg-teal-600" titulo="6. Disparos WhatsApp" sub="Campanhas em massa, cliente por cliente">
                        <Banner grad="from-teal-500 to-teal-700" emoji="📱" titulo="Ofertas no WhatsApp Business" />
                        <Passo n="1">Monte a <b>mensagem</b>. Use variáveis: <code className="bg-slate-100 px-1 rounded">{'{ofertas}'}</code>, <code className="bg-slate-100 px-1 rounded">{'{contato}'}</code>, <code className="bg-slate-100 px-1 rounded">{'{saudacao}'}</code>.</Passo>
                        <Passo n="2">Escolha o que ofertar: <b>só o que já comprou</b> ou <b>novos produtos</b>, e quantos por mensagem (ou Todos).</Passo>
                        <Passo n="3">Personalize textos de <code className="bg-slate-100 px-1 rounded">{'{saudacao}'}</code> e <code className="bg-slate-100 px-1 rounded">{'{vendedor}'}</code> como quiser.</Passo>
                        <Passo n="4">Escolha <b>quem recebe</b> pelos filtros (Compra mais, Com histórico, Com número, etc.). Quem está sem telefone você cadastra ali na hora com <b>+ telefone</b>.</Passo>
                        <Passo n="5">Toque em <b>Iniciar Campanha</b>. Para cada cliente, abre seu WhatsApp com a mensagem pronta — você confirma o envio e avança.</Passo>
                        <Dica>É <b>grátis e seguro</b>: você confirma cada envio pelo seu WhatsApp Business, sem risco de bloqueio.</Dica>
                        <Ir rota="disparos">Abrir Disparos WhatsApp</Ir>
                    </Secao>

                    {/* 7. Perfil / Instalar */}
                    <Secao id="perfil" icon={IconSettings} cor="bg-slate-700" titulo="7. Meu Perfil e Instalar o App" sub="Seus dados e instalação no celular/PC">
                        <Banner grad="from-slate-600 to-slate-800" emoji="⚙️" titulo="Configurações e instalação" />
                        <Passo n="1">Em <b>Meu Perfil / Admin</b> você vê seus dados e o botão de <b>instalar o app</b>.</Passo>
                        <Passo n="2">No celular: <b>Instalar App</b> coloca o Friganso na tela inicial, como um aplicativo.</Passo>
                        <Passo n="3">Depois de instalado, funciona <b>offline</b> — só precisa de internet para atualizar a tabela de preços e sincronizar clientes.</Passo>
                        <Ir rota="profile">Abrir Meu Perfil</Ir>
                    </Secao>

                    {/* 8. Extensão do Chrome */}
                    <Secao id="extensao" icon={IconBook} cor="bg-rose-700" titulo="8. Extensão do Chrome (SPAmov → Resumo)" sub="Manda o pedido do SPAmov pro app sem digitar">
                        <Banner grad="from-rose-600 to-rose-800" emoji="🔌" titulo="Do SPAmov pro Resumo em 1 clique" />
                        <p className="text-sm text-slate-600">A extensão coloca um botão dentro do SPAmov que lê o pedido (cliente, SPAmov e itens com quantidade) e abre o Resumo já preenchido.</p>
                        <p className="text-sm font-bold text-slate-700 pt-1">📥 Instalar (uma vez só)</p>
                        <Passo n="1">Em <b>Meu Perfil</b>, baixe a <b>Extensão (.zip)</b> e <b>descompacte</b> numa pasta fixa (não apague depois).</Passo>
                        <Passo n="2">No Chrome, abra <b>chrome://extensions</b> e ligue o <b>Modo do desenvolvedor</b> (canto superior direito).</Passo>
                        <Passo n="3">Clique em <b>Carregar sem compactação</b> e selecione a pasta descompactada.</Passo>
                        <Passo n="4">Na extensão, em <b>"Pode ler e alterar os dados do site"</b>, escolha <b>Em spd1.friganso.com.br</b>.</Passo>
                        <p className="text-sm font-bold text-slate-700 pt-1">🚀 Usar no dia a dia</p>
                        <Passo n="5">Abra um pedido no SPAmov e clique no botão vermelho <b>📋 Enviar pro Friganso ERP</b> (canto inferior direito).</Passo>
                        <Passo n="6">O app abre o Resumo preenchido. Confira as <b>quantidades</b> (são editáveis) e finalize.</Passo>
                        <Dica>Se algum dado vier errado, corrija direto no Resumo. A quantidade e o preço são editáveis ali mesmo.</Dica>
                        <Ir rota="profile">Baixar a Extensão</Ir>
                    </Secao>

                    <p className="text-center text-xs text-slate-400 pt-2">Ficou com dúvida? Use o <b>Suporte Técnico</b> no menu. 🦢</p>
                </div>
            );
        };

        // ===== FAZER PEDIDO: monta o pedido e manda a extensão lançar no SPAmov =====
        const FazerPedidoScreen = ({ products, clients, user, showMessage }) => {
            // Histórico de compras carrega SÓ aqui (quando abre o Fazer Pedido), não no boot do app
            const [purchases, setPurchases] = useState([]);
            useEffect(() => {
                try {
                    const unsub = db.collection('purchases').orderBy('ts', 'desc').limit(400).onSnapshot(
                        snap => setPurchases(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                        () => {}
                    );
                    return () => unsub();
                } catch (e) {}
            }, []);
            const RASCUNHO_KEY = 'friganso_pedido_rascunho';
            const rascunhoInicial = (() => { try { return JSON.parse(window.localStorage.getItem(RASCUNHO_KEY) || '{}') || {}; } catch (e) { return {}; } })();
            const [clienteId, setClienteId] = useState(rascunhoInicial.clienteId || '');
            const [clienteFoco, setClienteFoco] = useState(false);
            const [busca, setBusca] = useState('');
            const [itens, setItens] = useState(Array.isArray(rascunhoInicial.itens) ? rascunhoInicial.itens : []); // {code, name, qty}
            const [enviado, setEnviado] = useState(false);
            const [historico, setHistorico] = useState(() => {
                try { const raw = window.localStorage.getItem('friganso_pedidos_hist'); const arr = raw ? JSON.parse(raw) : []; return Array.isArray(arr) ? arr : []; } catch (e) { return []; }
            });

            const clienteInfo = useMemo(() => clients.find(c => String(c.code) === clienteId.trim()), [clients, clienteId]);
            const [tipoPessoa, setTipoPessoa] = useState(rascunhoInicial.tipoPessoa || 'juridica'); // juridica (CNPJ) | fisica (CPF)
            useEffect(() => {
                if (clienteInfo && clienteInfo.tipo) {
                    if (/f[ií]sica/i.test(clienteInfo.tipo)) setTipoPessoa('fisica');
                    else if (/jur[ií]dica/i.test(clienteInfo.tipo)) setTipoPessoa('juridica');
                }
            }, [clienteInfo]);

            // 💾 Rascunho: salva o pedido a cada tecla (cliente, itens, tipo) — volta exatamente onde parou
            useEffect(() => {
                try { window.localStorage.setItem(RASCUNHO_KEY, JSON.stringify({ clienteId, itens, tipoPessoa })); } catch (e) {}
            }, [clienteId, itens, tipoPessoa]);

            // 🔍 Sugestões de cliente enquanto digita (por ID ou nome)
            const clienteSugestoes = useMemo(() => {
                const q = clienteId.trim();
                if (!q) return [];
                const norm = normalizeForSearch(q);
                const arr = clients.filter(c => String(c.code).includes(q) || normalizeForSearch(c.name || '').includes(norm));
                if (arr.length === 1 && String(arr[0].code) === q) return []; // já é exato, não precisa sugerir
                return arr.slice(0, 8);
            }, [clients, clienteId]);

            const limparPedido = () => {
                setClienteId(''); setItens([]); setTipoPessoa('juridica'); setBusca(''); setEnviado(false);
                try { window.localStorage.removeItem(RASCUNHO_KEY); } catch (e) {}
                showMessage('Pedido limpo. Começar do zero. 🧹', 'info');
            };

            // (O registro da compra agora acontece no RESUMO DE PEDIDO, ao tocar em "Copiar Resumo".)
            const diaISO = (ts) => { const d = new Date(ts); return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2); };

            // Compras anteriores do cliente que está no campo (mais recentes primeiro)
            const comprasDoCliente = useMemo(() => {
                const q = clienteId.trim();
                if (!q) return [];
                return purchases.filter(p => String(p.clienteCode) === q).slice(0, 15);
            }, [purchases, clienteId]);

            // Tudo que o cliente já comprou alguma vez (histórico antigo da planilha + tudo que aparecer nas compras por dia)
            const jaComprou = useMemo(() => {
                const q = clienteId.trim();
                if (!q) return [];
                const codes = new Set();
                if (clienteInfo && Array.isArray(clienteInfo.history)) clienteInfo.history.forEach(c => codes.add(String(c)));
                purchases.filter(p => String(p.clienteCode) === q).forEach(p => (p.itens || []).forEach(it => codes.add(String(it.code))));
                return Array.from(codes).map(code => {
                    const prod = products.find(p => String(p.code) === code);
                    return { code: code, name: prod ? prod.name : ('Produto ' + code), naTabela: !!prod };
                });
            }, [clienteInfo, purchases, clienteId, products]);
            const rotuloDia = (dia, ts) => {
                const hoje = diaISO(Date.now());
                const ontem = diaISO(Date.now() - 86400000);
                if (dia === hoje) return 'Hoje';
                if (dia === ontem) return 'Ontem';
                const d = new Date(ts || (dia + 'T12:00:00'));
                return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
            };

            const ehHoje = (ts) => { const d = new Date(ts), n = new Date(); return d.getDate() === n.getDate() && d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear(); };
            const hora = (ts) => { const d = new Date(ts); return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2); };
            const histHoje = useMemo(() => historico.filter(h => ehHoje(h.ts)), [historico]);

            const salvarHistorico = (lista) => { try { window.localStorage.setItem('friganso_pedidos_hist', JSON.stringify(lista)); } catch (e) {} setHistorico(lista); };
            const addHistorico = (cliente, itensValidos, tipo) => {
                const entry = { id: Date.now() + '_' + Math.random().toString(36).slice(2, 6), cliente: cliente, tipoPessoa: tipo || 'juridica', itens: itensValidos.map(i => ({ code: String(i.code), name: i.name, qty: Number(i.qty) })), ts: Date.now() };
                salvarHistorico([entry, ...historico].slice(0, 60));
            };
            const puxarHistorico = (h) => {
                setClienteId(h.cliente || '');
                setTipoPessoa(h.tipoPessoa || 'juridica');
                setItens(h.itens.map(i => ({ code: String(i.code), name: i.name || ('Produto ' + i.code), qty: Number(i.qty) || 1 })));
                showMessage('Pedido carregado! Confira e mande de novo.', 'success');
            };
            const removerHistorico = (id) => salvarHistorico(historico.filter(h => h.id !== id));
            const mandarTodosHist = () => {
                if (!histHoje.length) { showMessage('Sem pedidos no histórico de hoje.', 'error'); return; }
                const pedidos = histHoje.map(h => ({ cliente: h.cliente, tipoPessoa: h.tipoPessoa || 'juridica', itens: h.itens.map(i => ({ code: String(i.code), nome: i.name, qty: Number(i.qty) })) }));
                window.postMessage({ source: 'friganso-app', type: 'LANCAR_VARIOS', pedidos: pedidos }, '*');
                showMessage(`${pedidos.length} pedido(s) enviado(s) pra fila da extensão! No SPAmov, clique em 🚀 Lançar pedido.`, 'success');
            };

            const resultados = useMemo(() => {
                const q = busca.trim();
                if (!q) return [];
                return products.filter(p => matchProduto(p, q)).slice(0, 30);
            }, [products, busca]);

            const addItem = (p) => {
                setItens(prev => prev.some(i => i.code === p.code) ? prev : [...prev, { code: String(p.code), name: p.name, qty: 1 }]);
                setBusca('');
            };
            const setQty = (code, q) => { const n = parseInt(q, 10); setItens(prev => prev.map(i => i.code === code ? { ...i, qty: (isNaN(n) ? '' : n) } : i)); };
            const remover = (code) => setItens(prev => prev.filter(i => i.code !== code));

            const lancar = () => {
                if (!clienteId.trim()) { showMessage('Informe o ID do cliente.', 'error'); return; }
                const validos = itens.filter(i => Number(i.qty) > 0);
                if (!validos.length) { showMessage('Adicione ao menos 1 item com quantidade.', 'error'); return; }
                const pedido = { cliente: clienteId.trim(), tipoPessoa: tipoPessoa, itens: validos.map(i => ({ code: String(i.code), nome: i.name, qty: Number(i.qty) })) };
                // Envia para a extensão (que está ouvindo nesta página)
                window.postMessage({ source: 'friganso-app', type: 'LANCAR_PEDIDO', pedido: pedido }, '*');
                setEnviado(true);
                showMessage('Pedido enviado para a extensão! Abra a aba do SPAmov e clique em "🚀 Lançar pedido".', 'success');
            };

            const salvarHist = () => {
                if (!clienteId.trim()) { showMessage('Informe o ID do cliente.', 'error'); return; }
                const validos = itens.filter(i => Number(i.qty) > 0);
                if (!validos.length) { showMessage('Adicione ao menos 1 item com quantidade.', 'error'); return; }
                addHistorico(clienteId.trim(), validos, tipoPessoa);
                showMessage('Pedido salvo no histórico do dia! 📋', 'success');
            };

            // ⚡ TUDO automático: abre o SPAmov, loga, navega pra VENDAS - VENDEDOR e lança o pedido sozinho
            const lancarAuto = () => {
                if (!clienteId.trim()) { showMessage('Informe o ID do cliente.', 'error'); return; }
                const validos = itens.filter(i => Number(i.qty) > 0);
                if (!validos.length) { showMessage('Adicione ao menos 1 item com quantidade.', 'error'); return; }
                const u = window.localStorage.getItem('friganso_spamov_user') || '';
                const s = window.localStorage.getItem('friganso_spamov_pass') || '';
                if (!u || !s) { showMessage('Primeiro salve seu login do SPAmov na aba 🐞 Debug.', 'error'); return; }
                const pedido = { cliente: clienteId.trim(), tipoPessoa: tipoPessoa, itens: validos.map(i => ({ code: String(i.code), nome: i.name, qty: Number(i.qty) })) };
                const SPURL = 'http://spd1.friganso.com.br/rdm-business/';
                const msg = { source: 'friganso-app', type: 'LANCAR_AUTO', usuario: u, senha: s, pedido: pedido };
                setEnviado(true);
                // 💻 PROGRAMA DE PC: lança DENTRO do navegador embutido (sem abrir o Chrome / sem extensão)
                if (isElectron && window.electronAuto && window.__frigNav) {
                    window.electronAuto.lancar(pedido, { usuario: u, senha: s });
                    window.__frigNav.abrir(SPURL);
                    showMessage('Abrindo no navegador do programa... vou logar, navegar e lançar sozinho. 🤖', 'success');
                    return;
                }
                // 📱 APP ANDROID: lança no navegador nativo controlado (user-agent de PC, sem extensão, sem Firefox)
                if (isCapacitor) {
                    const P = (window.Capacitor && window.Capacitor.Plugins) ? window.Capacitor.Plugins.SpamovAuto : null;
                    if (P && P.lancar) {
                        P.lancar({ url: SPURL, creds: { usuario: u, senha: s }, pedido: pedido });
                        showMessage('Abrindo o SPAmov no app... vou logar, navegar e lançar sozinho. 🤖', 'success');
                    } else {
                        setEnviado(false);
                        showMessage('Automação nativa indisponível nesta versão do app. Me avise pra corrigir.', 'error');
                    }
                    return;
                }
                // 📱 Celular: o modo PC do Firefox é POR ABA — aba nova nasce em modo celular e quebra o robô.
                // Então no celular a gente NAVEGA A MESMA ABA (mantém o modo PC). No PC, abre aba nova (mantém o app aberto).
                const ehCelular = (navigator.maxTouchPoints > 0) || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) || window.innerWidth < 820;
                if (ehCelular) {
                    showMessage('Salvando o pedido e abrindo o SPAmov nesta aba... 🤖', 'success');
                    let foi = false;
                    const ir = () => { if (foi) return; foi = true; window.location.href = SPURL; };
                    const onAck = (e) => { if (e.data && e.data.source === 'friganso-ext' && e.data.type === 'AUTO_SAVED') { window.removeEventListener('message', onAck); ir(); } };
                    window.addEventListener('message', onAck);
                    window.postMessage(msg, '*');
                    setTimeout(ir, 1200); // garantia: se a confirmação não voltar, vai mesmo assim
                } else {
                    window.postMessage(msg, '*');
                    showMessage('Abrindo o SPAmov... vou logar, navegar e lançar sozinho. 🤖', 'success');
                    window.open(SPURL, 'spamov_login');
                }
            };

            return (
                <div className="animate-in fade-in max-w-5xl mx-auto">
                    <div className="mb-4">
                        <h2 className="text-xl sm:text-2xl font-bold text-slate-800 flex items-center gap-2"><span>🛒</span> Fazer Pedido</h2>
                        <p className="text-slate-500 text-xs sm:text-sm">Monte o pedido aqui e a extensão lança no SPAmov pra você.</p>
                    </div>

                    <div className="lg:grid lg:grid-cols-3 lg:gap-5 space-y-4 lg:space-y-0">
                    <div className="lg:col-span-2 space-y-4">

                    {products.length === 0 && (
                        <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-amber-700 text-sm font-medium">⚠️ Carregue a <b>Tabela do Dia (PDF)</b> para buscar os produtos.</div>
                    )}

                    {/* Cliente */}
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4">
                        <label className="text-xs font-bold text-slate-500">ID ou nome do Cliente</label>
                        <input type="text" value={clienteId} onChange={e => setClienteId(e.target.value)} onFocus={() => setClienteFoco(true)} onBlur={() => setTimeout(() => setClienteFoco(false), 150)} placeholder="Ex: 30298 ou um nome..." className="w-full mt-1 px-3 py-2.5 bg-slate-50 border rounded-xl text-sm font-bold outline-none focus:border-rose-500" />
                        {/* 🔍 Sugestões de cliente (por ID ou nome) */}
                        {clienteFoco && clienteSugestoes.length > 0 && (
                            <div className="mt-1.5 space-y-1 max-h-52 overflow-y-auto">
                                {clienteSugestoes.map(c => (
                                    <button key={c.code} type="button" onMouseDown={e => e.preventDefault()} onClick={() => { setClienteId(String(c.code)); setClienteFoco(false); }} className="w-full text-left px-3 py-2 bg-slate-50 hover:bg-rose-50 rounded-lg flex items-center gap-2 transition-colors border border-transparent hover:border-rose-200">
                                        <span className="bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-black text-xs flex-shrink-0">{c.code}</span>
                                        <span className="text-sm text-slate-700 flex-1 truncate">{c.name}</span>
                                    </button>
                                ))}
                            </div>
                        )}
                        {clienteId.trim() && !clienteFoco && (clienteInfo
                            ? <p className="text-xs text-emerald-600 font-bold mt-1.5">✓ {clienteInfo.name}</p>
                            : <p className="text-xs text-slate-400 mt-1.5">Cliente não está no CRM (tudo bem, o SPAmov valida pelo ID).</p>)}
                        <label className="text-xs font-bold text-slate-500 block mt-3 mb-1">Tipo de Pessoa</label>
                        <div className="flex gap-2">
                            <button onClick={() => setTipoPessoa('juridica')} className={`flex-1 py-2 rounded-xl text-sm font-bold border-2 transition-colors ${tipoPessoa === 'juridica' ? 'border-rose-500 bg-rose-50 text-rose-700' : 'border-slate-200 text-slate-500'}`}>Jurídica (CNPJ)</button>
                            <button onClick={() => setTipoPessoa('fisica')} className={`flex-1 py-2 rounded-xl text-sm font-bold border-2 transition-colors ${tipoPessoa === 'fisica' ? 'border-rose-500 bg-rose-50 text-rose-700' : 'border-slate-200 text-slate-500'}`}>Física (CPF)</button>
                        </div>
                        {clienteInfo && clienteInfo.tipo && <p className="text-[10px] text-slate-400 mt-1">Detectado do CRM: {clienteInfo.tipo}</p>}
                    </div>

                    {/* 🧾 Compras do cliente: por dia (novo) + tudo que já comprou (histórico) */}
                    {clienteId.trim() && (comprasDoCliente.length > 0 || jaComprou.length > 0) && (
                        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 space-y-3">
                            <h3 className="font-bold text-slate-800 text-sm flex items-center gap-2"><span>🧾</span> Compras deste cliente</h3>

                            {comprasDoCliente.length > 0 && (
