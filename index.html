        if (window.electronBridge) {

            });

        const hashPassword = async (password) => {
            if (!password) return '';
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        const normalizeForSearch = (str) => {
            if (!str) return '';
            let s = str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
            s = s.replace(/\bcong\.?\b/g, "congelado").replace(/\b(resf|ref)\.?\b/g, "resfriado").replace(/[-_./]/g, " ").replace(/\s+/g, " ").trim();
            return s;
        };
        // Busca de produto tolerante: cada palavra digitada precisa existir no nome (em qualquer ordem),
        // tratando "contra file" e "contrafile" como iguais. Também casa por código.
        const matchProduto = (p, query) => {
            if (!p) return false;
            const q = (query || '').trim();
            if (!q) return false;
            if (String(p.code).includes(q)) return true;
            const nName = normalizeForSearch(p.name);
            const nNameJunto = nName.replace(/\s+/g, '');
            const norm = normalizeForSearch(q);
            const tokens = norm.split(' ').filter(Boolean);
            if (!tokens.length) return false;
            return tokens.every(t => nName.includes(t) || nNameJunto.includes(t));
        };
        const parsePrice = (priceStr) => {
            if (!priceStr) return null;
            let cleanStr = priceStr.includes('.') && priceStr.includes(',') ? priceStr.replace(/\./g, '').replace(',', '.') : priceStr.replace(',', '.');
            const val = parseFloat(cleanStr); return isNaN(val) ? null : val;
        };
        const formatPrice = (value) => {
            if (value === null || value === undefined) return 'R$ 0,00';
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 });
        };
        // true quando rodando dentro do programa de PC (Electron) — habilita o navegador embutido
        const isElectron = (typeof window !== 'undefined') && (!!window.electronBridge || (navigator.userAgent || '').indexOf('Electron') !== -1);
        // 📱 App Android nativo (Capacitor): tem o navegador controlado pra automação do SPAmov
        const isCapacitor = (typeof window !== 'undefined') && !!(window.Capacitor && (typeof window.Capacitor.isNativePlatform === 'function' ? window.Capacitor.isNativePlatform() : window.Capacitor.isNative));
        const checkDiscountRules = (code, name, originalPrice) => {
            const codeStr = (code || '').toString().trim(), nameStr = (name || '').toLowerCase().trim(), origPrice = parseFloat(originalPrice) || 0;
            let hasDiscount = true;
            if (codeStr.startsWith('16') || codeStr.startsWith('27') || codeStr.startsWith('90')) hasDiscount = false; // grupos sem desconto
            if (codeStr === '24962') hasDiscount = false; // Fraldinha Ramax (por código, garantido)
            if (nameStr.includes('fraldinha ramax') || (nameStr.includes('fraldinha') && nameStr.includes('ramax'))) hasDiscount = false;
            return { hasDiscount, origPrice, unitFinalPrice: hasDiscount ? Math.round((origPrice * 0.97) * 100) / 100 : origPrice };
        };

        // 🧾 Registra a compra na ficha do cliente (nuvem). Anti-duplicata de 5 min.
        let _ultimaCompraReg = { sig: '', ts: 0 };
        const registrarCompra = async (clienteCode, itensValidos, tipo, via, clients, user) => {
            try {
                const itensSafe = (itensValidos || [])
                    .map(i => ({ code: String(i.code), name: i.name || i.nome || ('Produto ' + i.code), qty: Number(i.qty != null ? i.qty : i.quantity) }))
                    .filter(i => i.code && i.qty > 0);
                if (!clienteCode || !itensSafe.length) return;
                const sig = String(clienteCode) + '|' + itensSafe.map(i => i.code + 'x' + i.qty).sort().join(',');
                const agora = Date.now();
                if (_ultimaCompraReg.sig === sig && (agora - _ultimaCompraReg.ts) < 5 * 60 * 1000) return;
                _ultimaCompraReg = { sig, ts: agora };
                const d = new Date(agora);
                const dia = d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
                const cli = (clients || []).find(c => String(c.code) === String(clienteCode));
                await db.collection('purchases').add({
                    clienteCode: String(clienteCode),
                    clienteName: (cli && cli.name) || '',
                    tipoPessoa: tipo || (cli && cli.tipo) || 'juridica',
                    itens: itensSafe,
                    dia: dia,
                    ts: agora,
                    via: via || '',
                    vendedor: (user && user.code) || ''
                });
                // mantém o histórico de códigos do cliente atualizado (pras recomendações/Disparos)
                if (cli && cli.id) {
                    const atual = cli.history || [];
                    const novos = [...new Set([...atual, ...itensSafe.map(i => i.code)])];
                    if (novos.length !== atual.length) { try { await db.collection('clients').doc(cli.id).update({ history: novos }); } catch (e) {} }
                }
            } catch (e) { /* silencioso */ }
        };

        const CustomMessageBox = ({ message, type = 'info', onClose }) => {

            useEffect(() => {

                return () => clearTimeout(t);

            // Electron: recebe resultado da autenticação feita no browser externo
            useEffect(() => {

                    const { idToken, accessToken, action } = e.detail;
                    setIsLoading(true);

                        const credential = firebase.auth.GoogleAuthProvider.credential(idToken, accessToken);
                        const result = await auth.signInWithCredential(credential);
                        if (action === 'register') {

                            if (!snapshot.empty) { showMessage('Google já cadastrado. Faça login.', 'error'); auth.signOut(); }

                            const snapshot = await db.collection('users').where('email', '==', result.user.email).get();

                    const docRef = await db.collection('users').add(newUser);

            return (

                            <h1 className="text-3xl font-extrabold text-slate-800">Friganso<span className="text-rose-700">ERP</span></h1>

                                <div className="text-center mt-4"><button type="button" onClick={() => setIsRegistering(true)} disabled={isLoading} className="text-sm font-bold text-slate-600 hover:text-rose-700 transition-colors">Não possui acesso? <span className="underline">Cadastrar</span></button></div>

                                <input type="text" value={regName} onChange={e => setRegName(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:border-rose-500" required placeholder="Nome Completo"/>
                                <input type="text" value={regCode} onChange={e => setRegCode(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:border-rose-500" required placeholder="Cód Vendedor (ID)"/>
                                <input type="email" value={regEmail} onChange={e => setRegEmail(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:border-rose-500" required placeholder="E-mail Corporativo"/>
                                <input type="password" value={regPassword} onChange={e => setRegPassword(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:border-rose-500" required placeholder="Senha (Letras, Núm, Especiais)"/>
                                <button type="submit" disabled={isLoading} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-lg mt-2 flex justify-center">{isLoading ? <div className="h-5 w-5"><IconLoader2/></div> : 'Criar Cadastro'}</button>
                                <div className="text-center mt-2"><button type="button" onClick={() => setIsRegistering(false)} disabled={isLoading} className="text-sm font-bold text-rose-700 hover:text-rose-800">Voltar para Login</button></div>

        const ProfileAdminScreen = ({ user, showMessage, setActiveRoute }) => {
            const [usersList, setUsersList] = useState([]);
            const [loading, setLoading] = useState(false);
            const [installPrompt, setInstallPrompt] = useState(window.__pwaInstallPrompt || null);
            const [isInstalled, setIsInstalled] = useState(window.matchMedia('(display-mode: standalone)').matches);
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // 🔑 Alterar senha da própria conta
            const [mostrarSenha, setMostrarSenha] = useState(false);
            const [novaSenha, setNovaSenha] = useState('');
            const [novaSenha2, setNovaSenha2] = useState('');
            const [salvandoSenha, setSalvandoSenha] = useState(false);
            const alterarSenha = async (e) => {
                e.preventDefault();
                const regra = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&.])[A-Za-z\d@$!%*#?&.]{6,}$/;
                if (!regra.test(novaSenha)) { showMessage('Senha precisa de letras, números e caractere especial (mín. 6).', 'error'); return; }
                if (novaSenha !== novaSenha2) { showMessage('As senhas não conferem.', 'error'); return; }
                if (!user.id) { showMessage('Não consegui identificar sua conta. Saia e entre de novo.', 'error'); return; }
                setSalvandoSenha(true);
                try {
                    const hashed = await hashPassword(novaSenha);
                    await db.collection('users').doc(user.id).update({ password: hashed });
                    showMessage('Senha alterada com sucesso! 🔑', 'success');
                    setMostrarSenha(false); setNovaSenha(''); setNovaSenha2('');
                } catch (err) { showMessage('Erro ao alterar a senha.', 'error'); } finally { setSalvandoSenha(false); }
            };

            useEffect(() => {
                const onReady = () => setInstallPrompt(window.__pwaInstallPrompt);
                const onInstalled = () => { setIsInstalled(true); setInstallPrompt(null); };
                window.addEventListener('pwaInstallReady', onReady);
                window.addEventListener('pwaAppInstalled', onInstalled);
                return () => {
                    window.removeEventListener('pwaInstallReady', onReady);
                    window.removeEventListener('pwaAppInstalled', onInstalled);
                };
            }, []);

            const handleInstallApp = async () => {
                if (!installPrompt) return;
                installPrompt.prompt();

        const PdfScreen = ({ user, products, setProducts, showMessage }) => {
            const [isLoading, setIsLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [cloudInfo, setCloudInfo] = useState(null);
            const [showCloudModal, setShowCloudModal] = useState(false);
            const [pdfVersions, setPdfVersions] = useState([]);
            const [isLoadingVersions, setIsLoadingVersions] = useState(false);
            const [priceChanges, setPriceChanges] = useState(null); // {changes:[...], novos:[...], removidos:n} ao carregar tabela nova

            useEffect(() => { 
                if (window.pdfjsLib) window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; 
                fetchCloudInfo();
            }, []);

            const fetchCloudInfo = async () => {
                try {
                    const doc = await db.collection('system_data').doc('shared_pdf').get();
                    if(doc.exists) {
                        const data = doc.data();
                        const date = data.updatedAt ? data.updatedAt.toDate() : new Date();
                        setCloudInfo({ date: date.toLocaleDateString('pt-BR') + ' às ' + date.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) });
                    }
                } catch(e) { console.error(e) }
            };

            const fetchPdfVersions = async () => {
                setIsLoadingVersions(true);
                try {
                    const snap = await db.collection('pdf_versions').orderBy('updatedAt', 'desc').limit(20).get();
                    setPdfVersions(snap.docs.map(d => {
                        const data = d.data();
                        return { id: d.id, ...data, date: data.updatedAt ? data.updatedAt.toDate() : null };
                    }));
                } catch(e) { console.error(e); } finally { setIsLoadingVersions(false); }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file || file.type !== 'application/pdf') { showMessage('Selecione um PDF válido.', 'error'); return; }
                setIsLoading(true);
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let extractedProducts = [];
                    const byCode = new Map(); // dedup por código: se repetir, fica com o nome mais "de produto"
                    const letterScore = (s) => ((s || '').match(/[A-Za-zÀ-ú]/g) || []).length;

                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const linesMap = new Map();
                        
                        textContent.items.forEach(item => {
                            const y = Math.round(item.transform[5] / 6) * 6; 
                            if (!linesMap.has(y)) linesMap.set(y, []); linesMap.get(y).push(item);
                        });
                        
                        const sortedY = Array.from(linesMap.keys()).sort((a, b) => b - a);
                        
                        sortedY.forEach(y => {
                            const lineItems = linesMap.get(y).sort((a, b) => a.transform[4] - b.transform[4]);
                            const lineText = lineItems.map(item => item.str).join(' ').replace(/\s+/g, ' ').trim();
                            
                            const match = lineText.match(/(?:^|\s)(\d{4,7})\s+([A-Z0-9ÇÃÕÁÉÍÓÚÂÊÔ].*)/i);
                            if (match) {
                                const code = match[1]; 
                                let rest = match[2].trim(); 
                                
                                // O grande truque de limpeza de preço: achar o último número com vírgula de verdade!
                                // (?!\s*k?g\b) ignora PESO (ex: "+-16,00 KG") pra não confundir peso com preço.
                                const priceMatches = [...rest.matchAll(/\b(\d{1,3}(?:\.\d{3})*,\d{2}|\d+,\d{2}|\d+\.\d{2})\b(?!\s*k?g\b)/gi)];
                                let rawPriceStr = null;
                                if (priceMatches.length > 0) { 
                                    rawPriceStr = priceMatches[priceMatches.length - 1][1]; 
                                }
                                const rawPrice = parsePrice(rawPriceStr) || 0; 
                                
                                // Nome do produto = tudo até o PRIMEIRO PREÇO (número com vírgula, ex 12,22),
                                // mas mantendo os pesos/embalagem (ex CX/+-28KG, PC/1,05KG) que fazem parte do nome.
                                let finalName = rest;
                                // primeiro número com vírgula que NÃO seja um peso (não é seguido por kg/g)
                                const precoNoNome = rest.match(/\d{1,3}(?:\.\d{3})*,\d{2}(?!\s*k?g\b)/i);
                                if (precoNoNome) finalName = rest.slice(0, precoNoNome.index);
                                // remove marcadores de coluna que sobrarem no fim
                                finalName = finalName.split(/Vista\s*\/\s*PIX/i)[0];
                                finalName = finalName.replace(/\s*\[?\s*L\s*\]?\s*$/i, '');
                                finalName = finalName.replace(/[-—.,\s]+$/, '').trim();

                                const { hasDiscount, unitFinalPrice } = checkDiscountRules(code, finalName, rawPrice);
                                const cand = { code, name: finalName, originalPrice: rawPrice, discountedPrice: unitFinalPrice };
                                const prev = byCode.get(code);
                                // código repetido = um deles é fragmento mal lido: fica com o de nome mais "de produto" (mais letras)
                                if (!prev || letterScore(cand.name) > letterScore(prev.name)) byCode.set(code, cand);
                            }
                        });
                    }
                    extractedProducts = Array.from(byCode.values());

                    // 🔔 Compara com a tabela anterior (a que estava carregada) e lista mudanças de preço
                    const antigos = new Map((products || []).map(p => [String(p.code), p]));
                    const changes = [], novos = [];
                    extractedProducts.forEach(np => {
                        const op = antigos.get(String(np.code));
                        if (!op) { novos.push({ code: np.code, name: np.name, price: Number(np.originalPrice) || 0 }); return; }
                        const oldP = Number(op.originalPrice) || 0, newP = Number(np.originalPrice) || 0;
                        if (Math.abs(oldP - newP) >= 0.01) changes.push({ code: np.code, name: np.name, oldPrice: oldP, newPrice: newP });
                    });
                    const removidos = (products || []).filter(p => !extractedProducts.some(np => String(np.code) === String(p.code))).length;
                    // só mostra comparação se já havia uma tabela antes (senão é a primeira carga)
                    setPriceChanges((products && products.length > 0) ? { changes, novos, removidos } : null);

                    setProducts(extractedProducts);
                    showMessage(`Sucesso! ${extractedProducts.length} produtos carregados.` + (changes.length ? ` ${changes.length} mudança(s) de preço.` : ''), 'success');
                } catch (err) { showMessage('Erro ao processar PDF.', 'error'); } finally { setIsLoading(false); }
            };

            const handleDistribute = async () => {
                try {
                    setIsLoading(true);
                    const now = new Date();
                    await db.collection('system_data').doc('shared_pdf').set({ products, updatedAt: now });
                    await db.collection('pdf_versions').add({ products, updatedAt: now, productCount: products.length });
                    showMessage('Tabela salva na Nuvem para todos os Vendedores!', 'success');
                    fetchCloudInfo();
                } catch(e) { showMessage('Erro ao distribuir tabela.', 'error'); } finally { setIsLoading(false); }
            };

            const handleDownloadCloud = async () => {
                try {
                    setIsLoading(true);
                    const doc = await db.collection('system_data').doc('shared_pdf').get();
                    if(doc.exists) {
                        setProducts(doc.data().products);
                        showMessage('Tabela mais recente da Nuvem baixada com sucesso!', 'success');
                    } else { showMessage('O Administrador ainda não distribuiu nenhuma tabela.', 'error'); }
                } catch(e) { showMessage('Erro ao baixar tabela da nuvem.', 'error'); } finally { setIsLoading(false); }
            };

            const filteredProducts = useMemo(() => {
                if (!searchTerm) return products;
                return products.filter(p => matchProduto(p, searchTerm.trim()));

            return (
                <div className="animate-in fade-in space-y-6">
                    {showCloudModal && (

                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md flex flex-col max-h-[70vh] overflow-hidden">
                                <div className="p-5 border-b bg-slate-50 flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><div className="h-5 w-5"><IconCloudDownload/></div> Histórico de Tabelas</h2>
                                    <button onClick={() => setShowCloudModal(false)} className="h-8 w-8 flex items-center justify-center rounded-full bg-slate-200 hover:bg-slate-300 transition-colors"><div className="h-4 w-4"><IconX/></div></button>
                                </div>
                                <div className="overflow-y-auto flex-1 p-4 space-y-2">
                                    {isLoadingVersions ? (
                                        <div className="flex justify-center py-8"><div className="h-6 w-6 text-rose-600"><IconLoader2/></div></div>
                                    ) : pdfVersions.length === 0 ? (
                                        <div className="text-center py-8 text-slate-400 text-sm font-medium">Nenhuma versão salva. Distribua uma tabela para ver o histórico.</div>
                                    ) : pdfVersions.map((v, i) => (
                                        <div key={v.id} className="flex items-center justify-between p-3 bg-slate-50 border border-slate-200 rounded-xl hover:border-rose-300 transition-colors">
                                            <div>
                                                <p className="font-bold text-slate-700 text-sm">{i === 0 ? '🟢 Versão Atual' : `Versão ${pdfVersions.length - i}`}</p>
                                                <p className="text-xs text-slate-500 mt-0.5">{v.date ? v.date.toLocaleDateString('pt-BR') + ' às ' + v.date.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) : 'Data desconhecida'} • {v.productCount || (v.products?.length || 0)} produtos</p>
                                            </div>
                                            <button onClick={() => { setProducts(v.products); setShowCloudModal(false); showMessage('Tabela carregada com sucesso!', 'success'); }} className="text-xs bg-rose-700 hover:bg-rose-800 text-white px-3 py-1.5 rounded-lg font-bold shadow-sm transition-colors">Carregar</button>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 border-t bg-slate-50">
                                    <button onClick={async () => { try { setIsLoading(true); const doc = await db.collection('system_data').doc('shared_pdf').get(); if(doc.exists){ setProducts(doc.data().products); setShowCloudModal(false); showMessage('Tabela atual carregada!','success'); } else { showMessage('Nenhuma tabela distribuída ainda.','error'); } } catch(e){ showMessage('Erro ao baixar.','error'); } finally{ setIsLoading(false); } }} disabled={isLoading} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-2.5 rounded-xl font-bold text-sm transition-colors flex items-center justify-center gap-2">
                                        <div className="h-4 w-4"><IconCloudDownload/></div> Baixar Tabela Atual
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    <header className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div>
                            <h1 className="text-2xl font-bold text-rose-800 flex items-center gap-2"><div className="h-6 w-6"><IconFileText /></div> Tabela de Preços</h1>

                                <div className="h-5 w-5"><IconCloudDownload /></div> Nuvem
                            </button>
                            <div className="relative flex-1 sm:flex-none">
                                <input type="file" accept=".pdf" onChange={handleFileUpload} disabled={isLoading} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                <button disabled={isLoading} className="w-full bg-rose-700 hover:bg-rose-800 text-white px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md">
                                    <div className="h-5 w-5">{isLoading ? <IconLoader2 /> : <IconUpload />}</div>{isLoading ? 'Lendo...' : 'Ler PDF Local'}
                                </button>
                            </div>
                            {user.role === 'admin' && products.length > 0 && (
                                <button onClick={handleDistribute} disabled={isLoading} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-md">
                                    <div className="h-5 w-5"><IconCloudUpload /></div> Distribuir Tabela
                                </button>
                            )}
                        </div>
                    </header>

                    {/* 🔔 Mudanças de preço em relação à tabela anterior */}
                    {priceChanges && (priceChanges.changes.length > 0 || priceChanges.novos.length > 0 || priceChanges.removidos > 0) && (
                        <div className="bg-white rounded-3xl shadow-sm border-2 border-amber-200 overflow-hidden">
                            <div className="p-4 bg-amber-50 border-b border-amber-100 flex justify-between items-center">
                                <h3 className="font-bold text-amber-800 flex items-center gap-2"><span>🔔</span> Mudanças nesta tabela (comparado à anterior)</h3>
                                <button onClick={() => setPriceChanges(null)} className="h-7 w-7 flex items-center justify-center rounded-full bg-amber-100 hover:bg-amber-200 text-amber-700"><div className="h-3.5 w-3.5"><IconX/></div></button>
                            </div>
                            <div className="p-4 space-y-3 max-h-[40vh] overflow-y-auto">
                                <div className="flex flex-wrap gap-2 text-xs font-bold">
                                    <span className="bg-rose-100 text-rose-700 px-2 py-1 rounded-lg">{priceChanges.changes.length} preço(s) mudaram</span>
                                    <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded-lg">{priceChanges.novos.length} novo(s)</span>
                                    {priceChanges.removidos > 0 && <span className="bg-slate-100 text-slate-600 px-2 py-1 rounded-lg">{priceChanges.removidos} sairam</span>}
                                </div>
                                {priceChanges.changes.length > 0 && (
                                    <div className="space-y-1">
                                        {priceChanges.changes.map((c, idx) => {
                                            const subiu = c.newPrice > c.oldPrice;
                                            return (
                                                <div key={idx} className="flex items-center gap-2 text-sm bg-slate-50 rounded-lg px-3 py-2 border border-slate-100">
                                                    <span className="bg-rose-700 text-white px-1.5 py-0.5 rounded font-mono font-black text-[10px] flex-shrink-0">{c.code}</span>
                                                    <span className="text-slate-700 flex-1 truncate">{c.name}</span>
                                                    <span className="text-slate-400 line-through text-xs">{formatPrice(c.oldPrice)}</span>
                                                    <span className={`font-bold flex-shrink-0 ${subiu ? 'text-red-600' : 'text-emerald-600'}`}>{subiu ? '↑' : '↓'} {formatPrice(c.newPrice)}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                                {priceChanges.novos.length > 0 && (
                                    <div>
                                        <p className="text-[11px] font-bold text-emerald-700 uppercase tracking-wide mb-1">Novos produtos</p>
                                        <div className="flex flex-wrap gap-1">
                                            {priceChanges.novos.slice(0, 40).map((n, idx) => (
                                                <span key={idx} className="text-[11px] bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-lg px-2 py-1"><span className="font-mono font-bold">{n.code}</span> {n.name.length > 20 ? n.name.slice(0,20)+'…' : n.name} · {formatPrice(n.price)}</span>
                                            ))}
                                            {priceChanges.novos.length > 40 && <span className="text-[11px] text-slate-400 px-1 py-1">+{priceChanges.novos.length - 40} mais</span>}
                                        </div>
                                    </div>
                                )}
                                {priceChanges.changes.length === 0 && priceChanges.novos.length === 0 && (
                                    <p className="text-sm text-slate-500">Nenhum preço mudou — só houve saída de produto(s).</p>
                                )}
                            </div>
                        </div>
                    )}

                    {priceChanges && priceChanges.changes.length === 0 && priceChanges.novos.length === 0 && priceChanges.removidos === 0 && (
                        <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 text-emerald-700 text-sm font-semibold flex items-center justify-between">
                            <span>✅ Nenhuma mudança de preço em relação à tabela anterior.</span>
                            <button onClick={() => setPriceChanges(null)} className="text-emerald-600 hover:text-emerald-800"><div className="h-4 w-4"><IconX/></div></button>
                        </div>
                    )}

                    {products.length > 0 && (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[60vh] overflow-hidden">
                            <div className="p-4 border-b border-slate-100 bg-slate-50 relative"><div className="absolute left-7 top-1/2 -translate-y-1/2 text-slate-400 h-5 w-5"><IconSearch /></div><input type="text" placeholder="Pesquise por código ou nome..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:border-rose-500 outline-none font-medium" /></div>
                            <div className="overflow-auto flex-1">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-white sticky top-0 shadow-sm"><tr><th className="p-4 font-bold text-slate-600 border-b">Cód</th><th className="p-4 font-bold text-slate-600 border-b">Produto</th><th className="p-4 font-bold text-slate-600 border-b text-right">Orig.</th><th className="p-4 font-bold text-rose-700 border-b bg-rose-50 text-right">À Vista (-3%)</th></tr></thead>
                                    <tbody>
                                        {filteredProducts.map((p, i) => (
                                            <tr key={i} className="hover:bg-slate-50 border-b border-slate-50">
                                                <td className="p-4 text-slate-500 font-bold">{p.code}</td>
                                                <td className="p-4 text-slate-800 font-medium">{p.name}</td>
                                                <td className="p-4 text-right text-slate-600">{formatPrice(p.originalPrice)}</td>
                                                <td className="p-4 text-right font-bold text-rose-700 bg-rose-50/30">{formatPrice(p.discountedPrice)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ResumoScreen = ({ products, showMessage, clients, user, setActiveRoute }) => {
            const [orderText, setOrderText] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [pendingCustomer, setPendingCustomer] = useState('');
            const [pendingSpamov, setPendingSpamov] = useState('');
            const [pendingItems, setPendingItems] = useState([]);
            const [orderSummary, setOrderSummary] = useState(null);
            const [showHistoryPrompt, setShowHistoryPrompt] = useState(false);
            const [clientToSave, setClientToSave] = useState(null);
            const [editedPrices, setEditedPrices] = useState({});
            const [editedQty, setEditedQty] = useState({});
            const getQty = (it) => (editedQty[it.code] !== undefined ? editedQty[it.code] : it.quantity);
            const [detectedClientName, setDetectedClientName] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [wantCreateProfile, setWantCreateProfile] = useState(true);
            const [showManualHistory, setShowManualHistory] = useState(false);
            const [manualSearch, setManualSearch] = useState('');
            const [manualSelected, setManualSelected] = useState(null);

            const handleProcessText = (forcedText) => {
                const txt = typeof forcedText === 'string' ? forcedText : orderText;
                if (!txt.trim()) { showMessage('Cole o texto do pedido no campo acima.', 'error'); return; }
                setIsProcessing(true);
                try {
                    // Extrai cliente e SPAmov SEMPRE
                    let customerName = '', spamov = '', clienteName = '';
                    const spMatch = txt.match(/SPAmov[\s\t]*(\d+)/i);
                    if (spMatch) spamov = spMatch[1];
                    const clienteMatch = txt.match(/CLIENTE\s*\[[fj]\]\s*(\d+[a-z]?)\s*[-–]?\s*([^\n\r]+)?/i)
                        || txt.match(/\[[fj]\]\s*(\d+[a-z]?)\s*-\s*([^\n\r]+)/i)
                        || txt.match(/(?:cliente|código|codigo)[\s\t:\-]+(\d+)/i);
                    if (clienteMatch) {
                        customerName = clienteMatch[1].trim();
                        if (clienteMatch[2]) clienteName = clienteMatch[2].replace(/\s*\[.*?\]\s*/g, '').trim().split(/\s{2,}/)[0];
                    }

                    // Extrai produtos apenas se a tabela estiver carregada
                    let extractedItemsMap = new Map();
                    if (products.length > 0) {
                        txt.split('\n').forEach(line => {
                            if (!line.trim() || line.toUpperCase().includes('CLIENTE') || line.toUpperCase().includes('SPAMOV')) return;
                            const cleanLine = line.replace(/\([^)]+\)/g, ' ').trim();
                            let codeFound = null;
                            const possibleNumbers = cleanLine.match(/\d+/g) || [];
                            for (let numStr of possibleNumbers) {
                                if (products.some(p => p.code === numStr)) { codeFound = numStr; break; }
                            }
                            if (codeFound && !extractedItemsMap.has(codeFound)) {
                                const rp = products.find(p => p.code === codeFound);
                                extractedItemsMap.set(codeFound, { code: codeFound, name: rp.name, quantity: '' });
                            }
                        });
                    }

                    // Se não achou nada útil, ainda abre o modal se pelo menos tem ID do cliente
                    if (extractedItemsMap.size === 0 && !customerName) {
                        showMessage('Nenhuma informação reconhecida no texto.', 'error');
                        setIsProcessing(false); return;
                    }

                    const existingCli = clients.find(c => c.code === customerName);
                    setWantCreateProfile(!existingCli); // padrão: criar se for novo
                    setPendingCustomer(customerName);
                    setPendingSpamov(spamov);
                    setPendingItems(Array.from(extractedItemsMap.values()));
                    setDetectedClientName(clienteName);
                    setIsProcessing(false);
                    setShowModal(true);
                } catch (err) { showMessage('Erro crítico ao ler pedido.', 'error'); setIsProcessing(false); }
            };

            // Recebe o pedido enviado pela extensão do Chrome (lê o SPAmov)
            useEffect(() => {
                // 1) Pedido estruturado (com quantidades) — monta o resumo direto
                const rawJson = window.sessionStorage.getItem('friganso_pedido_json');
                if (rawJson) {
                    window.sessionStorage.removeItem('friganso_pedido_json');
                    try {
                        const data = JSON.parse(rawJson);
                        const processed = (data.itens || []).map(it => {
                            const rp = products.find(p => String(p.code) === String(it.code));
                            const nome = rp ? rp.name : (it.nome || ('Produto ' + it.code));
                            const base = rp ? rp.originalPrice : 0;
                            const { hasDiscount, origPrice, unitFinalPrice } = checkDiscountRules(it.code, nome, base);
                            const qty = Number(it.qty) || 1;
                            return { code: String(it.code), name: nome, quantity: qty, unitFinalPrice, discountedPrice: unitFinalPrice * qty, originalPrice: origPrice * qty, hasDiscount };
                        }).filter(x => x.code);
                        if (processed.length) {
                            setPendingCustomer(data.cliente || '');
                            setPendingSpamov(data.spamov || '');
                            setDetectedClientName(data.clienteNome || '');
                            setOrderSummary({ customerCode: data.cliente || '', spamov: data.spamov || '', items: processed, totalDiscounted: processed.reduce((a, c) => a + c.discountedPrice, 0) });
                            const existing = clients.find(c => c.code === (data.cliente || ''));
                            if (existing) { setClientToSave(existing); setShowHistoryPrompt(true); }
                            showMessage('Pedido importado do SPAmov! ' + (products.length === 0 ? '(carregue a Tabela PDF p/ ver preços)' : ''), 'success');
                        } else {
                            showMessage('Pedido recebido, mas nenhum item reconhecido.', 'error');
                        }
                    } catch (e) { showMessage('Erro ao importar pedido do SPAmov.', 'error'); }
                    return;
                }
                // 2) Compatibilidade: pedido em texto (abre o modal para preencher quantidades)
                const ped = window.sessionStorage.getItem('friganso_pedido_texto');
                if (ped) {
                    window.sessionStorage.removeItem('friganso_pedido_texto');
                    setOrderText(ped);
                    setTimeout(() => handleProcessText(ped), 300);
                }
            }, []);

            const handleConfirmModal = async () => {
                const validItems = pendingItems.filter(item => Number(item.quantity) > 0);
                const processed = validItems.map(item => {
                    const rp = products.find(p => p.code === item.code);
                    const { hasDiscount, origPrice, unitFinalPrice } = checkDiscountRules(item.code, rp.name, rp.originalPrice);
                    const qty = Number(item.quantity);
                    return { ...item, quantity: qty, unitFinalPrice, discountedPrice: unitFinalPrice * qty, originalPrice: origPrice * qty, hasDiscount };
                });
                setEditedPrices({}); setEditedQty({});
                setOrderSummary({ customerCode: pendingCustomer, spamov: pendingSpamov, items: processed, totalDiscounted: processed.reduce((acc, c) => acc + c.discountedPrice, 0) });
                setShowModal(false);
                setShowManualHistory(false); setManualSearch(''); setManualSelected(null);

                if (pendingCustomer) {
                    const existingClient = clients.find(c => c.code === pendingCustomer);
                    if (existingClient && validItems.length > 0) {
                        // Cliente existe: só mostra prompt pra atualizar histórico
                        setClientToSave(existingClient);
                        setShowHistoryPrompt(true);
                    } else if (!existingClient && wantCreateProfile) {
                        // Cliente novo e usuário quer criar perfil: cria e navega
                        try {
                            const autoName = detectedClientName || `Cliente ${pendingCustomer}`;
                            const newCodes = processed.map(i => i.code);
                            const docRef = await db.collection('clients').add({
                                name: autoName, code: pendingCustomer, phone: '', cnpj: '',
                                address: '', contactName: '', history: newCodes, rawData: orderText,
                                profile: { title: "Cadastro Automático", color: "bg-slate-100 text-slate-600" }
                            });
                            window.localStorage.setItem('friganso_open_client_id', docRef.id);
                            showMessage(`Perfil de ${autoName} criado! Abrindo no CRM...`, 'success');
                            setTimeout(() => setActiveRoute('clients'), 900);
                        } catch(e) { showMessage('Erro ao criar perfil.', 'error'); }
                    } else if (!existingClient && !wantCreateProfile && validItems.length > 0) {
                        // Não quer criar perfil mas tem itens: só mostra histórico prompt
                        setClientToSave({ code: pendingCustomer, isNew: true });
                        setShowHistoryPrompt(true);
                    }
                }
            };

            const handleSaveToHistory = async () => {
                if (!clientToSave) return;
                const newCodes = orderSummary.items.map(i => i.code);
                try {
                    if (clientToSave.isNew) {
                        const autoName = detectedClientName || `Cliente ${clientToSave.code}`;
                        const docRef = await db.collection('clients').add({ name: autoName, code: clientToSave.code, phone: '', cnpj: '', address: '', contactName: '', history: newCodes, rawData: orderText, profile: { title: "Cadastro Automático", color: "bg-slate-100 text-slate-600" } });
                        window.localStorage.setItem('friganso_open_client_id', docRef.id);
                        showMessage('Cliente criado! Abrindo perfil no CRM...', 'success');
                        setTimeout(() => setActiveRoute('clients'), 900);
                    } else {
                        const currentHistory = clientToSave.history || [];
                        const updatedHistory = [...new Set([...currentHistory, ...newCodes])];
                        await db.collection('clients').doc(clientToSave.id).update({ history: updatedHistory });
                        showMessage('Histórico do cliente atualizado!', 'success');
                    }
                    setShowHistoryPrompt(false);
                } catch (err) { showMessage('Erro ao salvar no histórico.', 'error'); }
            };

            // Clientes filtrados para busca manual
            const clientesParaHistorico = useMemo(() => {
                if (!manualSearch.trim()) return clients.slice(0, 8);
                const s = manualSearch.toLowerCase();
                return clients.filter(c =>
                    (c.name || '').toLowerCase().includes(s) || (c.code || '').includes(s)
                ).slice(0, 8);
            }, [clients, manualSearch]);

            const handleManualSave = async () => {
                if (!manualSelected || !orderSummary) return;
                const newCodes = orderSummary.items.map(i => i.code);
                try {
                    if (manualSelected.isNew) {
                        const docRef = await db.collection('clients').add({
                            name: `Cliente ${manualSelected.code}`, code: manualSelected.code,
                            phone: '', cnpj: '', address: '', contactName: '',
                            history: newCodes, rawData: orderText,
                            profile: { title: "Cadastro Automático", color: "bg-slate-100 text-slate-600" }
                        });
                        window.localStorage.setItem('friganso_open_client_id', docRef.id);
                        showMessage('Cliente criado! Abrindo perfil no CRM...', 'success');
                        setTimeout(() => setActiveRoute('clients'), 900);
                    } else {
                        const currentHistory = manualSelected.history || [];
                        const updatedHistory = [...new Set([...currentHistory, ...newCodes])];
                        await db.collection('clients').doc(manualSelected.id).update({ history: updatedHistory });
                        showMessage(`Histórico de ${manualSelected.name} atualizado!`, 'success');
                        setShowManualHistory(false);
                        setManualSelected(null);
                        setManualSearch('');
                    }
                } catch(err) { showMessage('Erro ao salvar no histórico.', 'error'); }
            };

            // 🔑 Reconsulta o item na Tabela do Dia (PDF) AGORA: nome e preço sempre iguais à tabela.
            const itemAtual = (it) => {
                const rp = products.find(p => String(p.code) === String(it.code));
                if (!rp) return { ...it, name: it.name, unitFinalPrice: it.unitFinalPrice || 0, naTabela: false };
                const { unitFinalPrice } = checkDiscountRules(rp.code, rp.name, rp.originalPrice);
                return { ...it, name: rp.name, unitFinalPrice: unitFinalPrice, naTabela: true };
            };

            const generateWhatsAppText = () => {
                if (!orderSummary) return '';
                let txt = '';
                if (orderSummary.customerCode) txt += `ID: ${orderSummary.customerCode}\n`;
                if (orderSummary.spamov) txt += `SPAmov: ${orderSummary.spamov}\n`;
                if (txt !== '') txt += '\n';
                orderSummary.items.forEach(it0 => {
                    const item = itemAtual(it0); // nome+preço da Tabela do Dia, na hora
                    const price = editedPrices[item.code] !== undefined ? editedPrices[item.code] : item.unitFinalPrice;
                    txt += `${item.code} - ${getQty(item)}x - ${formatPrice(price)}\n`;
                });
                return txt.trim();
            };

            return (
                <div className="animate-in fade-in space-y-6">
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[85vh] overflow-hidden">

                                {/* Cabeçalho: cliente detectado */}
                                <div className="p-5 border-b bg-slate-50">
                                    <h2 className="text-lg font-bold text-slate-800 mb-3">Resumo Detectado</h2>
                                    <div className="flex flex-wrap gap-2 mb-3">
                                        {pendingCustomer && <span className="text-sm font-black bg-slate-900 text-white px-3 py-1.5 rounded-lg">ID: {pendingCustomer}</span>}
                                        {detectedClientName && <span className="text-sm font-bold bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg border">{detectedClientName}</span>}
                                        {pendingSpamov && <span className="text-sm font-bold bg-rose-100 text-rose-700 px-3 py-1.5 rounded-lg border border-rose-200">SPAmov: {pendingSpamov}</span>}
                                        {pendingItems.length > 0 && <span className="text-sm font-bold bg-emerald-100 text-emerald-700 px-3 py-1.5 rounded-lg border border-emerald-200">{pendingItems.length} produto(s)</span>}
                                        {pendingItems.length === 0 && products.length === 0 && <span className="text-xs font-bold bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg border border-amber-200">⚠ Tabela não carregada</span>}
                                    </div>

                                    {/* Pergunta sobre perfil */}
                                    {pendingCustomer && (() => {
                                        const existingCli = clients.find(c => c.code === pendingCustomer);
                                        return existingCli ? (
                                            <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 flex items-center gap-2">
                                                <span className="text-emerald-600 text-lg">✓</span>
                                                <p className="text-sm font-bold text-emerald-800">Cliente já cadastrado: <span className="font-black">{existingCli.name}</span></p>
                                            </div>
                                        ) : (
                                            <div className="bg-blue-50 border border-blue-200 rounded-xl p-3">
                                                <p className="text-sm font-bold text-blue-800 mb-2">🆕 ID {pendingCustomer} não está no seu CRM</p>
                                                <label className="flex items-center gap-3 cursor-pointer">
                                                    <div onClick={() => setWantCreateProfile(!wantCreateProfile)} className={`w-12 h-6 rounded-full transition-colors relative flex-shrink-0 ${wantCreateProfile ? 'bg-blue-600' : 'bg-slate-300'}`}>
                                                        <div className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all ${wantCreateProfile ? 'left-6' : 'left-0.5'}`}></div>
                                                    </div>
                                                    <span className="text-sm font-bold text-blue-700">{wantCreateProfile ? 'Criar perfil no CRM ao confirmar' : 'Não criar perfil agora'}</span>
                                                </label>
                                            </div>
                                        );
                                    })()}
                                </div>

                                {/* Itens do pedido */}
                                {pendingItems.length > 0 ? (
                                    <>
                                        <div className="px-5 pt-4 pb-1 bg-white"><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Informe as quantidades</p></div>
                                        <div className="p-4 overflow-y-auto flex-1 space-y-3">
                                            {pendingItems.map((item, idx) => (
                                                <div key={idx} className="flex items-center justify-between p-4 rounded-xl border border-slate-200 bg-white hover:border-rose-200 transition-colors">
                                                    <div><span className="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">CÓD: {item.code}</span><p className="font-bold text-slate-800 mt-1 text-sm">{item.name}</p></div>
                                                    <input type="number" min="0" value={item.quantity} onChange={(e) => { const n = [...pendingItems]; n[idx].quantity = e.target.value; setPendingItems(n); }} className="w-24 p-3 text-center border border-slate-300 rounded-xl outline-none focus:border-rose-500 font-bold text-lg" placeholder="Qtd" autoFocus={idx===0}/>
                                                </div>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="p-6 flex-1 flex items-center justify-center text-center">
                                        <div>
                                            <p className="text-slate-500 text-sm font-medium mb-1">Nenhum produto encontrado no texto.</p>
                                            <p className="text-slate-400 text-xs">{products.length === 0 ? 'Baixe a Tabela do Dia para reconhecer os códigos.' : 'Os códigos do pedido não estão na tabela carregada.'}</p>
                                        </div>
                                    </div>
                                )}

                                <div className="p-5 border-t flex gap-3 justify-end bg-slate-50">
                                    <button onClick={() => setShowModal(false)} className="px-6 py-3 font-bold text-slate-600 hover:bg-slate-200 rounded-xl transition-colors">Cancelar</button>
                                    <button onClick={handleConfirmModal} className="px-6 py-3 font-bold bg-rose-700 hover:bg-rose-800 text-white rounded-xl shadow-lg transition-colors">
                                        {wantCreateProfile && pendingCustomer && !clients.find(c=>c.code===pendingCustomer) ? 'Confirmar e Criar Perfil' : 'Confirmar'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    <div className="bg-white rounded-3xl shadow-xl border border-slate-200 p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-xl font-bold text-rose-800 flex items-center gap-2"><div className="h-6 w-6"><IconReceipt /></div> Resumo de Pedido</h2>
                            <div className="flex items-center gap-2">
                                {products.length > 0

        const ClientsScreen = ({ products, showMessage, setActiveRoute }) => {

            const [rawProfileText, setRawProfileText] = useState('');
            const [importPreview, setImportPreview] = useState(null);
            const [importBusy, setImportBusy] = useState(false);
            const fileInputRef = useRef(null);
            const [historyPreview, setHistoryPreview] = useState(null);
            const histInputRef = useRef(null);
            const [clientSearch, setClientSearch] = useState('');

            // Filtra clientes por nome ou ID conforme a busca
            const filteredClients = useMemo(() => {
                const q = clientSearch.trim().toLowerCase();
                if (!q) return clients;
                return clients.filter(c =>

            useEffect(() => {
                const unsubscribe = db.collection('clients').onSnapshot(snap => setClients(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                return () => unsubscribe();
            }, []);

            // Detecta o tipo de negócio pelo nome para classificar o perfil automaticamente
            const inferProfileFromName = (name) => {
                const n = (name || '').toLowerCase();
                if (/(supermerc|mercad|mercear|minimerc|atacad|distribuidora|bebidas|aliment)/.test(n)) return { title: "Mercado / Mercearia", color: "bg-blue-100 text-blue-800" };
                if (/(restaurante|churrasc|lanchonete|petiscaria|espeto|gril|gourmet|confeitaria|bar |butecou|suisso|espa[cç]o)/.test(n)) return { title: "Restaurante / Food Service", color: "bg-orange-100 text-orange-800" };
                if (/(a[cç]ougue|carne|frigor)/.test(n)) return { title: "Açougue", color: "bg-red-100 text-red-800" };
                return { title: "Importado da Planilha", color: "bg-slate-100 text-slate-600" };
            };

            // Lê a planilha selecionada e monta o preview de importação
            const handleFileSelected = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                if (typeof XLSX === 'undefined') { showMessage('Biblioteca de planilha não carregou. Verifique a internet.', 'error'); return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
                        if (!rows.length) { showMessage('Planilha vazia.', 'error'); return; }

                        // Localiza a linha de cabeçalho e mapeia colunas por nome
                        let headerIdx = rows.findIndex(r => r.some(c => /c[oó]d|nome|raz[aã]o/i.test(String(c))));
                        if (headerIdx < 0) headerIdx = 0;
                        const header = rows[headerIdx].map(c => String(c).toLowerCase());
                        const col = (re) => header.findIndex(h => re.test(h));
                        const idxCidade = col(/cidade|munic/);
                        const idxCod = col(/c[oó]d|tipo/);
                        const idxNome = col(/nome|raz[aã]o/);
                        const idxBairro = col(/bairro/);
                        const idxEnd = col(/endere|rua|logra/);
                        const idxCep = col(/cep/);

                        const existingCodes = new Set(clients.map(c => String(c.code).trim()));
                        const parsed = [];
                        const seen = new Set();

                        for (let i = headerIdx + 1; i < rows.length; i++) {
                            const r = rows[i];
                            const rawCod = idxCod >= 0 ? String(r[idxCod] || '').trim() : '';
                            const nome = idxNome >= 0 ? String(r[idxNome] || '').trim() : '';
                            if (!rawCod && !nome) continue;

                            // "[j] 85777" -> tipo "j", code "85777"
                            const tipoMatch = rawCod.match(/\[([a-z])\]/i);
                            const tipo = tipoMatch ? tipoMatch[1].toLowerCase() : '';
                            const code = rawCod.replace(/^\s*\[[a-z]\]\s*/i, '').trim() || rawCod;
                            if (!code) continue;
                            if (seen.has(code)) continue;
                            seen.add(code);

                            const cidade = idxCidade >= 0 ? String(r[idxCidade] || '').trim() : '';
                            const bairro = idxBairro >= 0 ? String(r[idxBairro] || '').trim() : '';
                            const endereco = idxEnd >= 0 ? String(r[idxEnd] || '').trim() : '';
                            const cep = idxCep >= 0 ? String(r[idxCep] || '').trim() : '';
                            const addressFull = [endereco, bairro, cidade, cep].filter(Boolean).join(' - ');

                            parsed.push({
                                code,
                                name: nome || `Cliente ${code}`,
                                address: addressFull,
                                tipo: tipo === 'j' ? 'Pessoa Jurídica' : (tipo === 'f' ? 'Pessoa Física' : ''),
                                profile: inferProfileFromName(nome),
                                exists: existingCodes.has(code)
                            });
                        }

                        if (!parsed.length) { showMessage('Nenhum cliente reconhecido na planilha.', 'error'); return; }
                        setImportPreview(parsed);
                    } catch (err) {
                        showMessage('Erro ao ler a planilha: ' + err.message, 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = ''; // permite reimportar o mesmo arquivo
            };

            // Grava os clientes novos no Firestore em lote
            const handleConfirmImport = async () => {
                if (!importPreview) return;
                const novos = importPreview.filter(p => !p.exists);
                if (!novos.length) { showMessage('Todos os clientes já estão cadastrados.', 'info'); setImportPreview(null); return; }
                setImportBusy(true);
                try {
                    let batch = db.batch();
                    let count = 0;
                    for (const c of novos) {
                        const ref = db.collection('clients').doc();
                        batch.set(ref, {
                            name: c.name, code: c.code, phone: '', cnpj: '',
                            address: c.address, contactName: '', history: [],
                            tipo: c.tipo || '', profile: c.profile
                        });
                        count++;
                        // Firestore limita 500 operações por lote
                        if (count % 450 === 0) { await batch.commit(); batch = db.batch(); }
                    }
                    await batch.commit();
                    showMessage(`${novos.length} cliente(s) importado(s) com sucesso!`, 'success');
                    setImportPreview(null);
                } catch (err) {
                    showMessage('Erro ao salvar: ' + err.message, 'error');
                } finally { setImportBusy(false); }
            };

            // Normaliza um código para comparação (só dígitos, sem zeros à esquerda)
            const normCode = (v) => String(v).replace(/[^0-9a-z]/gi, '').replace(/^0+/, '').toLowerCase();

            // Monta a URL do mapa embutido a partir de endereço, coordenadas ou link do Google Maps
            const buildMapEmbed = (loc) => {
                const t = (loc || '').trim();
                if (!t) return '';
                if (/google\.[^/]+\/maps\/embed/i.test(t)) return t;            // já é um embed
                const at = t.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);                // link com @lat,lng
                if (at) return `https://www.google.com/maps?q=${at[1]},${at[2]}&z=16&output=embed`;
                const ll = t.match(/^\s*(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)\s*$/);   // "lat,lng"
                if (ll) return `https://www.google.com/maps?q=${ll[1]},${ll[2]}&z=16&output=embed`;
                return `https://www.google.com/maps?q=${encodeURIComponent(t)}&output=embed`; // endereço/texto
            };
            // Link para abrir no app/site do Google Maps
            const buildMapLink = (loc) => {
                const t = (loc || '').trim();
                if (!t) return '';
                if (/^https?:\/\//i.test(t)) return t;
                return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t)}`;
            };

            // Lê a planilha de histórico de compras e monta o preview
            const handleHistoryFileSelected = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                if (typeof XLSX === 'undefined') { showMessage('Biblioteca de planilha não carregou. Verifique a internet.', 'error'); return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
                        if (!rows.length) { showMessage('Planilha vazia.', 'error'); return; }

                        let headerIdx = rows.findIndex(r => r.some(c => /id|nome|produto/i.test(String(c))));
                        if (headerIdx < 0) headerIdx = 0;
                        const header = rows[headerIdx].map(c => String(c).toLowerCase().trim());
                        // Escolhe a coluna pela 1ª regex que casar (em ordem de prioridade)
                        const pick = (...res) => { for (const re of res) { const i = header.findIndex(h => re.test(h)); if (i >= 0) return i; } return -1; };
                        const idxId = pick(/id.*cliente/, /c[oó]d.*cliente/, /^id\b/, /\bid\b/);
                        const idxNome = pick(/nome.*(fantasia|raz[aã]o|cliente)/, /raz[aã]o\s*social/, /nome\s*do\s*cliente/, /^nome/);
                        // Coluna de CÓDIGO do produto (separada) tem prioridade
                        const idxProdCode = pick(/c[oó]d.*produto/, /c[oó]d.*item/, /^c[oó]digo$/, /^cod\b/);
                        // Coluna combinada "código - nome" (formato antigo)
                        const idxProdComb = pick(/produto\s*comprad/, /produto\s*adquir/, /^produto$/, /item\s*comprad/, /produto/);
                        if (idxId < 0 || (idxProdCode < 0 && idxProdComb < 0)) { showMessage('Não encontrei colunas de ID e Produto na planilha.', 'error'); return; }

                        // Mapa de produtos (por código exato e normalizado) para recuperar o código oficial
                        const prodExact = new Map();
                        const prodNorm = new Map();
                        (products || []).forEach(p => { prodExact.set(String(p.code).trim(), p.code); prodNorm.set(normCode(p.code), p.code); });
                        // Resolve o código bruto da planilha para o código oficial da tabela (corrige zeros à esquerda)
                        const resolveCode = (raw) => prodExact.get(raw) || prodNorm.get(normCode(raw)) || raw;

                        // Agrupa códigos de produto por ID de cliente
                        const grupos = new Map(); // id -> { id, nome, codes:Set }
                        for (let i = headerIdx + 1; i < rows.length; i++) {
                            const r = rows[i];
                            let rawId = r[idxId];
                            if (typeof rawId === 'number') rawId = String(Math.round(rawId));
                            rawId = String(rawId || '').trim();
                            if (!rawId) continue;
                            const nome = idxNome >= 0 ? String(r[idxNome] || '').trim() : '';

                            // Extrai o código do produto, lidando com os dois formatos:
                            let prodCode = '';
                            if (idxProdCode >= 0) {
                                let v = r[idxProdCode];
                                if (typeof v === 'number') v = String(Math.round(v)); // 12062.0 -> "12062"
                                prodCode = String(v || '').trim();
                                const pm = prodCode.match(/^\s*([0-9A-Za-z]+)\s*-/); // caso venha "12062 - NOME"
                                if (pm) prodCode = pm[1];
                            } else if (idxProdComb >= 0) {
                                const prod = String(r[idxProdComb] || '').trim();
                                const pm = prod.match(/^\s*([0-9A-Za-z]+)\s*-/);
                                prodCode = pm ? pm[1] : (typeof r[idxProdComb] === 'number' ? String(Math.round(r[idxProdComb])) : '');
                            }
                            if (!prodCode) continue;

                            prodCode = resolveCode(prodCode); // recupera código oficial com zeros à esquerda
                            if (!grupos.has(rawId)) grupos.set(rawId, { id: rawId, nome, codes: new Set() });
                            grupos.get(rawId).codes.add(prodCode);
                        }

                        if (!grupos.size) { showMessage('Nenhum produto reconhecido na planilha.', 'error'); return; }

                        // Mapa de clientes por código (exato e normalizado) para casar os IDs
                        const byExact = new Map();
                        const byNorm = new Map();
                        clients.forEach(c => {
                            byExact.set(String(c.code).trim(), c);
                            byNorm.set(normCode(c.code), c);
                        });

                        const preview = [];
                        grupos.forEach(g => {
                            const cli = byExact.get(g.id) || byNorm.get(normCode(g.id)) || null;
                            const codesArr = Array.from(g.codes);
                            let novos = codesArr;
                            if (cli) {
                                const atual = new Set((cli.history || []).map(String));
                                novos = codesArr.filter(c => !atual.has(String(c)));
                            }
                            preview.push({
                                id: g.id,
                                nome: cli ? cli.name : (g.nome || `Cliente ${g.id}`),
                                clientId: cli ? cli.id : null,
                                matched: !!cli,
                                totalCodes: codesArr.length,
                                novosCodes: novos,
                                novosCount: cli ? novos.length : codesArr.length,
                                allCodes: codesArr
                            });
                        });

                        preview.sort((a, b) => (a.matched === b.matched) ? 0 : (a.matched ? -1 : 1));
                        setHistoryPreview(preview);
                    } catch (err) {
                        showMessage('Erro ao ler a planilha: ' + err.message, 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };

            // Grava o histórico nos clientes correspondentes
            const handleConfirmHistoryImport = async () => {
                if (!historyPreview) return;

                if (!aplicar.length) { showMessage('Nada novo para adicionar ao histórico.', 'info'); setHistoryPreview(null); return; }
                setImportBusy(true);

                    let batch = db.batch();

                        batch.update(db.collection('clients').doc(p.clientId), { history: merged });
                        count++;

                    setHistoryPreview(null);

                    showMessage('Erro ao salvar: ' + err.message, 'error');

                    setRawProfileText('');
