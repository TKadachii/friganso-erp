        // ===== DISPAROS WHATSAPP: campanha clicar-e-enviar =====
        const DisparosScreen = ({ clients, products, user, showMessage, setActiveRoute }) => {
            const TEMPLATE_PADRAO = "🥩 *OFERTAS DO DIA*\n\n{ofertas}";
            const PRESETS_PADRAO = [
                { id: 'p_ofertas', nome: 'Ofertas do Dia', texto: '🥩 *OFERTAS DO DIA*\n\n{ofertas}' },
                { id: 'p_bomdia', nome: 'Saudação', texto: '{saudacao}, {contato}! 😊\n\nSeparei as ofertas de hoje pra você:\n{ofertas}\n\nQualquer coisa é só chamar! {vendedor}' },
                { id: 'p_novidades', nome: 'Novidades', texto: '✨ *NOVIDADES PRA VOCÊ!*\n\n{contato}, olha o que chegou:\n{ofertas}' },
            ];
            const presetsIniciais = (() => { try { const raw = window.localStorage.getItem('friganso_zap_presets'); const arr = raw ? JSON.parse(raw) : null; return (Array.isArray(arr) && arr.length) ? arr : PRESETS_PADRAO; } catch (e) { return PRESETS_PADRAO; } })();
            const [presets, setPresets] = useState(presetsIniciais);
            const [presetAtivo, setPresetAtivo] = useState(presetsIniciais[0] ? presetsIniciais[0].id : null);
            const [template, setTemplate] = useState(presetsIniciais[0] ? presetsIniciais[0].texto : TEMPLATE_PADRAO);
            // salva presets no aparelho
            useEffect(() => { try { window.localStorage.setItem('friganso_zap_presets', JSON.stringify(presets)); } catch (e) {} }, [presets]);
            // cada aba "lembra" o texto: o que você digita vai pro preset ativo
            useEffect(() => {
                if (!presetAtivo) return;
                setPresets(prev => prev.map(p => p.id === presetAtivo ? (p.texto === template ? p : { ...p, texto: template }) : p));
            }, [template]);
            const selecionarPreset = (p) => { setPresetAtivo(p.id); setTemplate(p.texto); };
            const novoPreset = () => { const nome = window.prompt('Nome do novo preset:'); if (!nome || !nome.trim()) return; const id = 'p_' + Date.now(); setPresets([...presets, { id, nome: nome.trim(), texto: template }]); setPresetAtivo(id); showMessage('Preset criado!', 'success'); };
            const renomearPreset = () => { if (!presetAtivo) return; const a = presets.find(p => p.id === presetAtivo); const nome = window.prompt('Novo nome do preset:', a ? a.nome : ''); if (!nome || !nome.trim()) return; setPresets(presets.map(p => p.id === presetAtivo ? { ...p, nome: nome.trim() } : p)); };
            const apagarPreset = () => { if (presets.length <= 1) { showMessage('Precisa ter ao menos 1 preset.', 'error'); return; } if (!window.confirm('Apagar este preset?')) return; const rest = presets.filter(p => p.id !== presetAtivo); setPresets(rest); setPresetAtivo(rest[0].id); setTemplate(rest[0].texto); };
            const [incluirProduto, setIncluirProduto] = useState(true);
            const [ofertaModo, setOfertaModo] = useState('historico'); // historico | novos
            const [qtdProdutos, setQtdProdutos] = useState(3); // 2..5 ou 'todos'
            const [saudacaoCustom, setSaudacaoCustom] = useState('');
            const [vendedorCustom, setVendedorCustom] = useState('');
            const [filtro, setFiltro] = useState('todos'); // todos | inativos | atencao | top | produto
            const [busca, setBusca] = useState('');
            const [produtosAlvo, setProdutosAlvo] = useState(new Set()); // códigos dos produtos p/ segmentar quem compra
            const [buscaProd, setBuscaProd] = useState('');
            const [selecionados, setSelecionados] = useState(new Set());
            const [emCampanha, setEmCampanha] = useState(false);
            const zapWvRef = useRef(null);      // webview do WhatsApp embutido (só Electron)
            const [enviando, setEnviando] = useState(false);
            const UA_CHROME = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36';
            const [idx, setIdx] = useState(0);
            const [enviados, setEnviados] = useState(new Set());
            const [phoneEditId, setPhoneEditId] = useState(null);
            const [phoneInput, setPhoneInput] = useState('');
            const [phoneSaving, setPhoneSaving] = useState(false);

            // Salva o telefone do cliente direto no Firestore
            const salvarTelefone = async (clientId) => {
                const tel = phoneInput.trim();
                if (!tel) { showMessage('Digite o telefone.', 'error'); return; }
                setPhoneSaving(true);
                try {
                    await db.collection('clients').doc(clientId).update({ phone: tel });
                    showMessage('Telefone salvo!', 'success');
                    setPhoneEditId(null); setPhoneInput('');
                } catch (e) { showMessage('Erro ao salvar telefone.', 'error'); }
                finally { setPhoneSaving(false); }
            };

            // --- helpers de categoria/recomendação (espelham o Radar) ---
            const CAT_RE = {
                acougue: /costela|alcatra|patinho|cox[aã]o|ac[eé]m|contra.?fil|dianteiro|traseiro|banda|pernil|barriga|toucinho|f[ií]gado|mocot|bucho|rabada|carne|fraldinha|maminha|picanha|cupim|lagarto|m[uú]sculo|peito\s*resf|carr[eé]|suin|bovin/i,
                mercado: /mussarela|queijo|presunto|pres\.|mortadela|mort\.|salsich|lingui|ling\.|bacon|margarina|hamburg|frios|requeij|leite|manteiga|nuggets|empanad|coxa|asa|frango/i,
                restaurante: /p[aã]o de alho|fil[eé] de peito|file de peito|frango temp|coalho|batata|grill|churrasc|espeto|picanha|alcatra|pizza/i
            };
            const profileCat = (title) => { const t = (title || '').toLowerCase(); if (/a[cç]ougue/.test(t)) return 'acougue'; if (/mercad|mercear/.test(t)) return 'mercado'; if (/restaurante|food/.test(t)) return 'restaurante'; return ''; };
            const nameCat = (name) => { const n = (name || '').toLowerCase(); if (/supermerc|mercad|mercear|minimerc|atacad|distribuidora|bebidas/.test(n)) return 'mercado'; if (/restaurante|churrasc|lanchonete|petiscaria|espeto|gril|pizza|confeitaria|bar\b|butecou/.test(n)) return 'restaurante'; if (/a[cç]ougue|carne/.test(n)) return 'acougue'; return ''; };
            const categoryForClient = (c) => profileCat(c.profile && c.profile.title) || nameCat(c.name) || 'geral';
            const hashStr = (s) => { let h = 0; const str = String(s || ''); for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) >>> 0; } return h; };
            // Descobre a categoria de um produto pelo nome
            const prodCategory = (name) => { for (const k of ['acougue', 'mercado', 'restaurante']) { if (CAT_RE[k].test(name || '')) return k; } return 'geral'; };

            // Recomenda produtos conforme o modo (histórico = já comprou / novos = ainda não comprou)
            const recomendarProdutos = (c, n) => {
                if (!products.length) return [];
                const histCodes = (c.history || []).map(String);
                const histSet = new Set(histCodes);
                let cands = [];

                // 📦 modo "os escolhidos": oferta exatamente o(s) produto(s) que você selecionou
                if (ofertaModo === 'selecionados') {
                    const sel = products.filter(p => produtosAlvo.has(String(p.code)));
                    const comprou = sel.filter(p => histSet.has(String(p.code)));
                    return comprou.length ? comprou : sel;
                }

                if (ofertaModo === 'novos') {
                    // produtos que ele ainda NÃO comprou, alinhados ao que ele costuma comprar / perfil
                    const histProds = histCodes.map(code => products.find(p => String(p.code) === code)).filter(Boolean);
                    let cats = new Set(histProds.map(p => prodCategory(p.name)).filter(k => k && k !== 'geral'));
                    if (!cats.size) { const pc = categoryForClient(c); if (pc !== 'geral') cats.add(pc); }
                    const seen = new Set();
                    const similares = products.filter(p => !histSet.has(String(p.code)) && cats.size && [...cats].some(cat => CAT_RE[cat] && CAT_RE[cat].test(p.name || '')));
                    for (const p of similares) { const k = String(p.code); if (!seen.has(k)) { seen.add(k); cands.push(p); } }
                    for (const p of products) { const k = String(p.code); if (!histSet.has(k) && !seen.has(k)) { seen.add(k); cands.push(p); } }
                } else {
                    // só o que ele JÁ comprou e ainda existe na tabela atual
                    cands = histCodes.map(code => products.find(p => String(p.code) === code)).filter(Boolean);
                }
                if (!cands.length) return [];

                // "todos" devolve a lista inteira; senão rotaciona uma janela de N pela data
                if (n === 'todos' || Number(n) >= cands.length) return cands;
                const num = Number(n);
                const today = new Date();
                const daySeed = Number(`${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`);
                const start = (daySeed + hashStr(c.code)) % cands.length;
                const out = [];
                for (let i = 0; i < num; i++) out.push(cands[(start + i) % cands.length]);
                return out;
            };

            // Monta o bloco de ofertas no formato do WhatsApp (preço riscado + desconto)
            const montarOfertas = (prods) => prods.map(p => {
                const { hasDiscount, origPrice, unitFinalPrice } = checkDiscountRules(p.code, p.name, p.originalPrice);
                let b = `Cod: ${p.code}\n\n${p.name}\n`;
                if (hasDiscount) b += `💰 Valor: ~${formatPrice(origPrice)}~ por *${formatPrice(unitFinalPrice)}/kg* 🔥 (Com 3% de Desconto)`;
                else b += `💰 Valor: *${formatPrice(origPrice)}/kg*`;
                return b;
            }).join('\n\n');

            // Saudação: usa o texto personalizado se houver, senão Bom dia/tarde/noite pela hora
            const saudacao = () => {
                if (saudacaoCustom.trim()) return saudacaoCustom;
                const h = new Date().getHours(); return h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
            };
            const nomeVendedor = () => vendedorCustom.trim() || ((user && user.name) ? user.name.split(' ')[0] : 'vendedor');
            const waNumber = (phone) => { let d = String(phone || '').replace(/\D/g, ''); if (!d) return ''; if (d.length <= 11) d = '55' + d; return d; };
            const personalizar = (c) => {
                const prods = incluirProduto ? recomendarProdutos(c, qtdProdutos) : [];
                const ofertas = prods.length ? montarOfertas(prods) : 'Confira nossos produtos!';
                const primeiro = prods.length ? `${prods[0].code} - ${prods[0].name}` : 'nossos produtos';
                return template
                    .replace(/\{nome\}/gi, c.name || '')
                    .replace(/\{contato\}/gi, c.contactName || c.name || 'tudo bem')
                    .replace(/\{saudacao\}/gi, saudacao())
                    .replace(/\{vendedor\}/gi, nomeVendedor())
                    .replace(/\{ofertas\}/gi, ofertas)
                    .replace(/\{produto\}/gi, primeiro);
            };
            const waLink = (c) => `https://wa.me/${waNumber(c.phone)}?text=${encodeURIComponent(personalizar(c))}`;

            // --- quantos clientes compram cada produto (pro filtro "Por produto") ---
            const clientesPorProduto = useMemo(() => {
                const m = {};
                clients.forEach(c => {
                    const visto = new Set();
                    (c.history || []).forEach(code => { const k = String(code); if (visto.has(k)) return; visto.add(k); m[k] = (m[k] || 0) + 1; });
                });
                return m;
            }, [clients]);
            // produtos ordenados pelos mais comprados (os que mais clientes têm aparecem em cima)
            const produtosOrdenados = useMemo(() =>
                [...products].sort((a, b) => (clientesPorProduto[String(b.code)] || 0) - (clientesPorProduto[String(a.code)] || 0)),
                [products, clientesPorProduto]);
            const toggleProd = (code) => {
                const s = new Set(produtosAlvo);
                s.has(code) ? s.delete(code) : s.add(code);
                setProdutosAlvo(s);
                // ao escolher um produto, a oferta já passa a ser esse produto
                if (s.size > 0) { setIncluirProduto(true); setOfertaModo('selecionados'); }
            };

            // --- audiência filtrada ---
            const lista = useMemo(() => {
                const lvl = (c) => (c.history || []).length;
                const temTel = (c) => { let d = String(c.phone || '').replace(/\D/g, ''); return d.length > 0; };
                let base = clients;
                if (filtro === 'inativos') base = clients.filter(c => lvl(c) === 0);
                else if (filtro === 'atencao') base = clients.filter(c => lvl(c) >= 1 && lvl(c) <= 3);
                else if (filtro === 'top') base = [...clients].filter(c => lvl(c) >= 4).sort((a, b) => lvl(b) - lvl(a));
                else if (filtro === 'comtel') base = clients.filter(c => temTel(c));
                else if (filtro === 'semtel') base = clients.filter(c => !temTel(c));
                else if (filtro === 'comhist') base = clients.filter(c => lvl(c) > 0);
                else if (filtro === 'produto') base = produtosAlvo.size === 0 ? [] : clients.filter(c => (c.history || []).some(code => produtosAlvo.has(String(code))));
                const q = busca.trim().toLowerCase();
                if (q) base = base.filter(c => (c.name || '').toLowerCase().includes(q) || String(c.code || '').toLowerCase().includes(q));
                return base;
            }, [clients, filtro, busca, produtosAlvo]);

            const toggle = (id) => { const s = new Set(selecionados); s.has(id) ? s.delete(id) : s.add(id); setSelecionados(s); };
            const marcarTodos = () => setSelecionados(new Set(lista.map(c => c.id)));
            const limparSel = () => setSelecionados(new Set());

            const alvos = clients.filter(c => selecionados.has(c.id));
            const comTelefone = alvos.filter(c => waNumber(c.phone));
            const semTelefone = alvos.filter(c => !waNumber(c.phone));

            const iniciar = () => {
                if (comTelefone.length === 0) { showMessage('Selecione ao menos 1 cliente com telefone cadastrado.', 'error'); return; }
                setIdx(0); setEnviados(new Set()); setEmCampanha(true);
            };
            const atual = comTelefone[idx];
            const avancar = (marcarEnviado) => {
                if (marcarEnviado && atual) { const s = new Set(enviados); s.add(atual.id); setEnviados(s); }
                if (idx + 1 >= comTelefone.length) { setEmCampanha(false); showMessage(`Campanha concluída! ${marcarEnviado ? enviados.size + 1 : enviados.size} enviada(s).`, 'success'); }
                else setIdx(idx + 1);
            };
            const voltar = () => { if (idx > 0) setIdx(idx - 1); };

            // Script injetado DENTRO do WhatsApp Web (embutido): espera a conversa carregar e clica em Enviar
            const SCRIPT_ENVIAR = `new Promise(function(resolve){
                var tries = 0;
                var iv = setInterval(function(){
                    tries++;
                    var icon = document.querySelector('button[aria-label="Enviar"], button[aria-label="Send"]') || document.querySelector('span[data-icon="send"]') || document.querySelector('[data-testid="send"]');
                    if (icon) {
                        var btn = icon; for (var i=0;i<4 && btn;i++){ if (btn.tagName==='BUTTON' || (btn.getAttribute && btn.getAttribute('role')==='button')) break; btn = btn.parentElement; }
                        try { (btn||icon).click(); } catch(e){}
                        clearInterval(iv); resolve('ok'); return;
                    }
                    if (tries > 60) { clearInterval(iv); resolve('timeout'); }
                }, 300);
            });`;

            // Envia AUTOMÁTICO pelo WhatsApp embutido (sempre montado no App) — só no programa de PC
            const enviarAutomatico = () => {
                if (!window.__frigZap) { showMessage('WhatsApp embutido indisponível.', 'error'); return; }
                const cli = atual;
                setEnviando(true);
                window.__frigZap.enviar(waNumber(cli.phone), personalizar(cli), (ok) => {
                    setEnviando(false);
                    if (ok) { avancar(true); }
                    else { showMessage('Não enviou. Abra o painel 💬 (canto inferior direito) e confira se o WhatsApp está conectado (QR).', 'error'); }
                });
            };

            // 🤖 Envio automático em sequência: manda pra um, espera confirmar, vai pro próximo sozinho.
            const [rodandoAuto, setRodandoAuto] = useState(false);
            const pararRef = useRef(false);
            const enviarIndice = (i) => new Promise(res => {
                const cli = comTelefone[i]; if (!cli || !window.__frigZap) { res(false); return; }
                window.__frigZap.enviar(waNumber(cli.phone), personalizar(cli), ok => res(ok));
            });
            const rodarAuto = async () => {
                if (rodandoAuto || comTelefone.length === 0) return;
                setRodandoAuto(true); pararRef.current = false;
                let i = idx, okCount = 0;
                while (i < comTelefone.length && !pararRef.current) {
                    setIdx(i); setEnviando(true);
                    const ok = await enviarIndice(i);
                    setEnviando(false);
                    if (ok) { okCount++; setEnviados(prev => { const s = new Set(prev); s.add(comTelefone[i].id); return s; }); }
                    i++;
                    if (i < comTelefone.length && !pararRef.current) await new Promise(r => setTimeout(r, 2000)); // respiro entre envios
                }
                setRodandoAuto(false);
                if (pararRef.current) showMessage('Envio automático pausado em ' + okCount + ' enviada(s).', 'success');
                else { setEmCampanha(false); showMessage('Campanha automática concluída! ' + okCount + ' enviada(s). 🎉', 'success'); }
            };
            const pararAuto = () => { pararRef.current = true; setRodandoAuto(false); };

            // ===== MODO CAMPANHA (passo a passo) =====
            if (emCampanha && atual) {
                const prodsRec = incluirProduto ? recomendarProdutos(atual, qtdProdutos) : [];
                return (
                    <div className="animate-in fade-in max-w-2xl mx-auto">
                        <div className="flex justify-between items-center mb-4">
                            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><div className="h-6 w-6 text-emerald-600"><IconWhatsApp/></div> Campanha em andamento</h2>
                            <button onClick={() => setEmCampanha(false)} className="text-slate-500 font-medium px-4 py-2 bg-slate-200 rounded-lg text-sm">Encerrar</button>
                        </div>
                        <div className="bg-slate-200 rounded-full h-2 mb-1 overflow-hidden"><div className="bg-emerald-500 h-full transition-all" style={{ width: `${((idx) / comTelefone.length) * 100}%` }}></div></div>
                        <p className="text-xs text-slate-500 mb-4 text-center">Cliente {idx + 1} de {comTelefone.length} · {enviados.size} enviada(s)</p>

                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="h-12 w-12 rounded-2xl bg-rose-700 text-white flex flex-col items-center justify-center font-bold leading-none flex-shrink-0"><span className="text-[8px] opacity-70">COD</span><span className="font-mono font-black text-base">{atual.code || '—'}</span></div>
                                <div className="min-w-0">
                                    <h3 className="font-bold text-slate-800 truncate">{atual.name}</h3>
                                    <p className="text-xs text-slate-500">📱 {atual.phone}</p>
                                </div>
                            </div>
                            {prodsRec.length > 0 && <div className="bg-rose-50 border border-rose-100 rounded-xl p-3 mb-3 text-xs text-rose-700"><span className="font-bold">{prodsRec.length} oferta(s) incluídas:</span> {prodsRec.map(p => p.code).join(', ')}</div>}
                            <div className="bg-[#e1ffc7] rounded-2xl p-4 border border-[#d3f4b8] mb-4">
                                <pre className="font-sans text-sm whitespace-pre-wrap text-slate-800">{personalizar(atual)}</pre>
                            </div>
                            {/* 🤖 Envio automático em sequência (só no programa de PC) */}
                            {isElectron && (rodandoAuto ? (
                                <button onClick={pararAuto} className="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-2xl shadow-md transition-colors flex items-center justify-center gap-2 mb-3 text-lg animate-pulse">
                                    ⏸ Parar envio automático ({enviados.size} enviada(s))
                                </button>
                            ) : (
                                <button onClick={rodarAuto} className="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-2xl shadow-md transition-colors flex items-center justify-center gap-2 mb-3 text-lg">
                                    🤖 Enviar todos sozinho ({comTelefone.length - idx} restante{comTelefone.length - idx > 1 ? 's' : ''})
                                </button>
                            ))}
                            <button disabled={enviando || rodandoAuto} onClick={() => {
                                if (isElectron) { enviarAutomatico(); return; } // auto-envio no programa de PC
                                // Fora do programa: abre o app do WhatsApp Desktop via protocolo
                                const a = document.createElement('a');
                                a.href = 'whatsapp://send?phone=' + waNumber(atual.phone) + '&text=' + encodeURIComponent(personalizar(atual));
                                document.body.appendChild(a);
                                a.click();
                                setTimeout(() => { try { a.remove(); } catch (e) {} }, 500);
                                avancar(true);
                            }} className="w-full bg-emerald-600 hover:bg-emerald-700 disabled:opacity-60 text-white font-bold py-4 rounded-2xl shadow-md transition-colors flex items-center justify-center gap-2 mb-3 text-lg">
                                <div className="h-6 w-6"><IconWhatsApp/></div> {enviando ? 'Enviando...' : (isElectron ? (rodandoAuto ? 'Enviando automático...' : 'Enviar só este ✨') : 'Abrir WhatsApp e Enviar')}
                            </button>
                            <div className="flex items-center gap-2">
                                <button onClick={voltar} disabled={idx === 0 || rodandoAuto} className="flex-1 py-3 bg-slate-100 hover:bg-slate-200 disabled:opacity-40 text-slate-600 font-black text-xl rounded-xl transition-colors flex items-center justify-center gap-2" title="Voltar">← <span className="text-sm font-bold">Voltar</span></button>
                                <span className="text-xs font-bold text-slate-400 px-1 flex-shrink-0">{idx + 1}/{comTelefone.length}</span>
                                <button onClick={() => avancar(false)} disabled={rodandoAuto} className="flex-1 py-3 bg-slate-800 hover:bg-slate-900 disabled:opacity-40 text-white font-black text-xl rounded-xl transition-colors flex items-center justify-center gap-2" title="Avançar (pular)"><span className="text-sm font-bold">Avançar</span> →</button>
                            </div>
                            {isElectron && (
                                <button onClick={() => window.__frigZap && window.__frigZap.abrir()} className="w-full mt-3 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-bold">💬 Abrir WhatsApp (conectar / ver QR)</button>
                            )}
                        </div>
                        <p className="text-center text-xs text-slate-400 mt-4">{isElectron ? <><b>🤖 Enviar todos sozinho</b> = dispara um por um sem você clicar (pode parar quando quiser). <b>Enviar só este</b> = manda só o atual.</> : <>Clica em <b>Abrir WhatsApp</b> → <b>Enter</b> no app. Usa as setas <b>← →</b> pra navegar.</>}</p>
                    </div>
                );
            }

            // ===== MODO CONFIGURAÇÃO =====
            return (
                <div className="animate-in fade-in space-y-6">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><div className="h-6 w-6 text-emerald-600"><IconWhatsApp/></div> Disparos WhatsApp</h2>
                        <p className="text-slate-500 text-sm">Monte uma campanha e envie cliente por cliente pelo seu WhatsApp Business.</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Composer */}
                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 space-y-4">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2"><div className="h-5 w-5 text-rose-600"><IconWand/></div> Mensagem</h3>
                            {/* Abinhas de presets */}
                            <div className="flex items-center gap-1 flex-wrap">
                                {presets.map(p => (
                                    <button key={p.id} onClick={() => selecionarPreset(p)} className={`text-xs font-bold px-3 py-1.5 rounded-lg transition-colors ${presetAtivo === p.id ? 'bg-emerald-600 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{p.nome}</button>
                                ))}
                                <button onClick={novoPreset} title="Criar novo preset" className="text-xs font-bold px-2.5 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200">+ Novo</button>
                            </div>
                            <textarea value={template} onChange={e => setTemplate(e.target.value)} rows="6" className="w-full p-3 bg-slate-50 border rounded-xl text-sm outline-none focus:border-emerald-500 resize-none font-mono"></textarea>
                            <div className="flex items-center gap-2 -mt-1">
                                <span className="text-[11px] text-slate-400">Preset atual: <b className="text-slate-600">{(presets.find(p => p.id === presetAtivo) || {}).nome || '—'}</b> (salva sozinho)</span>
                                <button onClick={renomearPreset} title="Renomear preset" className="ml-auto text-[11px] font-bold px-2 py-1 rounded-md bg-slate-100 text-slate-600 hover:bg-slate-200">✏️ Renomear</button>
                                <button onClick={apagarPreset} title="Apagar preset" className="text-[11px] font-bold px-2 py-1 rounded-md bg-red-50 text-red-600 hover:bg-red-100">🗑️</button>
                            </div>
                            <div className="flex flex-wrap gap-1.5">
                                {['{ofertas}', '{contato}', '{nome}', '{saudacao}', '{produto}', '{vendedor}'].map(v => (
                                    <button key={v} onClick={() => setTemplate(template + (v === '{ofertas}' ? '\n\n' : ' ') + v)} className={`text-[11px] font-mono font-bold px-2 py-1 rounded-md transition-colors ${v === '{ofertas}' ? 'bg-rose-100 hover:bg-rose-200 text-rose-700' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{v}</button>
                                ))}
                            </div>
                            {/* Personalizar textos das variáveis */}
                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                                <p className="text-xs font-bold text-slate-500">✏️ Personalizar variáveis</p>
                                <div>
                                    <label className="text-[11px] font-bold text-slate-500">Texto de <code className="text-rose-600">{'{saudacao}'}</code></label>
                                    <input type="text" value={saudacaoCustom} onChange={e => setSaudacaoCustom(e.target.value)} placeholder="Vazio = automático (Bom dia/Boa tarde/Boa noite)" className="w-full px-2.5 py-1.5 bg-white border border-slate-200 rounded-lg text-sm outline-none focus:border-emerald-500"/>
                                </div>
                                <div>
                                    <label className="text-[11px] font-bold text-slate-500">Texto de <code className="text-rose-600">{'{vendedor}'}</code></label>
                                    <input type="text" value={vendedorCustom} onChange={e => setVendedorCustom(e.target.value)} placeholder={`Vazio = ${(user && user.name) ? user.name.split(' ')[0] : 'seu nome'}`} className="w-full px-2.5 py-1.5 bg-white border border-slate-200 rounded-lg text-sm outline-none focus:border-emerald-500"/>
                                </div>
                            </div>

                            <div className="bg-rose-50 p-3 rounded-xl border border-rose-100 space-y-3">
                                <label className="flex items-center gap-3 cursor-pointer">
                                    <div onClick={() => setIncluirProduto(!incluirProduto)} className={`w-11 h-6 rounded-full transition-colors relative flex-shrink-0 ${incluirProduto ? 'bg-emerald-500' : 'bg-slate-300'}`}>
                                        <div className={`absolute top-0.5 w-5 h-5 rounded-full bg-white shadow transition-all ${incluirProduto ? 'left-5' : 'left-0.5'}`}></div>
                                    </div>
                                    <span className="text-sm font-bold text-slate-700">Incluir ofertas automáticas em <code className="text-rose-600">{'{ofertas}'}</code></span>
                                </label>
                                {incluirProduto && (
                                    <>
                                        <div className="pl-1">
                                            <span className="text-xs font-bold text-slate-500 block mb-1.5">O que ofertar:</span>
                                            <div className="flex gap-2">
                                                <button onClick={() => setOfertaModo('historico')} className={`flex-1 text-xs font-bold px-3 py-2 rounded-lg transition-colors ${ofertaModo === 'historico' ? 'bg-rose-700 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>🔁 Só o que já comprou</button>
                                                <button onClick={() => setOfertaModo('novos')} className={`flex-1 text-xs font-bold px-3 py-2 rounded-lg transition-colors ${ofertaModo === 'novos' ? 'bg-rose-700 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>✨ Novos produtos</button>
                                                {produtosAlvo.size > 0 && <button onClick={() => setOfertaModo('selecionados')} className={`flex-1 text-xs font-bold px-3 py-2 rounded-lg transition-colors ${ofertaModo === 'selecionados' ? 'bg-rose-700 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>📌 Os escolhidos ({produtosAlvo.size})</button>}
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 pl-1 flex-wrap">
                                            <span className="text-xs font-bold text-slate-500">Quantidade:</span>
                                            {[2, 3, 4, 5].map(n => (
                                                <button key={n} onClick={() => setQtdProdutos(n)} className={`h-7 w-7 rounded-lg text-xs font-bold transition-colors ${qtdProdutos === n ? 'bg-rose-700 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>{n}</button>
                                            ))}
                                            <button onClick={() => setQtdProdutos('todos')} className={`h-7 px-3 rounded-lg text-xs font-bold transition-colors ${qtdProdutos === 'todos' ? 'bg-rose-700 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>Todos</button>
                                        </div>
                                    </>
                                )}
                            </div>
                            {/* Pré-visualização da mensagem */}
                            {clients.length > 0 && (
                                <div>
                                    <p className="text-xs font-bold text-slate-400 mb-1">Prévia (1º cliente):</p>
                                    <div className="bg-[#e1ffc7] rounded-xl p-3 border border-[#d3f4b8] max-h-48 overflow-y-auto">
                                        <pre className="font-sans text-xs whitespace-pre-wrap text-slate-800">{personalizar(clients[0])}</pre>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Audiência */}
                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 flex flex-col">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-bold text-slate-800">Quem vai receber</h3>
                                <span className="text-xs font-bold text-emerald-600">{selecionados.size} selecionado(s)</span>
                            </div>
                            <div className="flex flex-wrap gap-1.5 mb-3">
                                {[['todos', 'Todos'], ['produto', '📦 Por produto'], ['top', '🔥 Compra mais'], ['comhist', '🛒 Com histórico'], ['atencao', '⚠️ Atenção'], ['inativos', '🚨 Inativos'], ['comtel', '📱 Com número'], ['semtel', '📵 Sem número']].map(([k, lbl]) => (
                                    <button key={k} onClick={() => setFiltro(k)} className={`text-xs font-bold px-3 py-1.5 rounded-lg transition-colors ${filtro === k ? 'bg-rose-700 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{lbl}</button>
                                ))}
                            </div>
                            {/* 📦 Seletor de produtos: escolhe um produto e o sistema lista quem já compra */}
                            {filtro === 'produto' && (
                                <div className="bg-rose-50 border border-rose-200 rounded-xl p-3 mb-3 space-y-2">
                                    <p className="text-xs font-bold text-rose-700">📦 Escolha o(s) produto(s) — eu acho quem já comprou e a oferta vai com esse produto</p>
                                    <input type="text" value={buscaProd} onChange={e => setBuscaProd(e.target.value)} placeholder="Buscar produto (ex: dianteiro)..." className="w-full px-2.5 py-1.5 bg-white border border-rose-200 rounded-lg text-sm outline-none focus:border-rose-400"/>
                                    {produtosAlvo.size > 0 && (
                                        <div className="flex flex-wrap gap-1">
                                            {[...produtosAlvo].map(code => { const p = products.find(x => String(x.code) === code); return (
                                                <span key={code} onClick={() => toggleProd(code)} title="Remover" className="cursor-pointer text-[10px] font-bold bg-rose-700 text-white px-2 py-1 rounded-full flex items-center gap-1 hover:bg-rose-800">{p ? p.name : code} ✕</span>
                                            ); })}
                                        </div>
                                    )}
                                    <div className="max-h-44 overflow-y-auto space-y-1 pr-1">
                                        {products.length === 0 && <p className="text-center text-slate-400 text-xs py-3">Importe a tabela de produtos primeiro.</p>}
                                        {produtosOrdenados.filter(p => { const q = buscaProd.trim().toLowerCase(); return !q || (p.name || '').toLowerCase().includes(q) || String(p.code).includes(q); }).slice(0, 80).map(p => {
                                            const code = String(p.code); const qtd = clientesPorProduto[code] || 0; const on = produtosAlvo.has(code);
                                            return (
                                                <div key={code} onClick={() => toggleProd(code)} className={`flex items-center gap-2 p-1.5 rounded-lg cursor-pointer border ${on ? 'bg-rose-100 border-rose-300' : 'bg-white border-slate-100 hover:border-rose-200'}`}>
                                                    <input type="checkbox" readOnly checked={on} className="h-3.5 w-3.5 rounded text-rose-600 flex-shrink-0 pointer-events-none"/>
                                                    <span className="bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono font-bold text-[10px] flex-shrink-0">{p.code}</span>
                                                    <span className="text-xs font-bold text-slate-700 truncate flex-1">{p.name}</span>
                                                    <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full flex-shrink-0 ${qtd > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-400'}`} title="Clientes que compram">{qtd} 👤</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                            <input type="text" value={busca} onChange={e => setBusca(e.target.value)} placeholder="Buscar nome ou ID..." className="w-full px-3 py-2 bg-slate-50 border rounded-xl text-sm outline-none focus:border-emerald-500 mb-2"/>
                            <div className="flex gap-2 mb-2">
                                <button onClick={marcarTodos} className="text-xs font-bold text-emerald-700 hover:bg-emerald-50 px-2 py-1 rounded-lg">Selecionar todos ({lista.length})</button>
                                <button onClick={limparSel} className="text-xs font-bold text-slate-500 hover:bg-slate-100 px-2 py-1 rounded-lg">Limpar</button>

            const setProducts = (newProducts) => {
                setProductsState(newProducts);
                window.localStorage.setItem('friganso_products', JSON.stringify(newProducts));
            };

            // 📲 Celular/aparelho novo: se não tem tabela local, baixa a última da nuvem sozinho
            useEffect(() => {
                if (products.length > 0) return;
                let cancel = false;
                db.collection('system_data').doc('shared_pdf').get()
                    .then(doc => { if (cancel || !doc.exists) return; const prods = doc.data().products; if (prods && prods.length) setProducts(prods); })
                    .catch(() => {});
                return () => { cancel = true; };
            }, []);

            const handleSetUser = (userData) => {
                if (userData) window.localStorage.setItem('friganso_loggedUser', JSON.stringify(userData));
                else { window.localStorage.removeItem('friganso_loggedUser'); auth.signOut(); }
                setUser(userData);
            };

            const showMessage = (message, type = 'info') => setMessageBox({ message, type });

            if (!user) {
                return (
                    <>
                        <LoginScreen onLogin={handleSetUser} showMessage={showMessage} />
                        {messageBox && <CustomMessageBox {...messageBox} onClose={() => setMessageBox(null)} />}
                    </>
                );
            }

            const renderContent = () => {
                switch(activeRoute) {
                    case 'dashboard': return <DashboardScreen user={user} />;
                    case 'clients': return <ClientsScreen products={products} showMessage={showMessage} setActiveRoute={setActiveRoute} />;
                    case 'radar': return <RadarScreen clients={clients} products={products} setActiveRoute={setActiveRoute} showMessage={showMessage} />;
                    case 'support': return <SupportScreen user={user} />;
                    case 'credits': return <CreditsScreen />;
                    case 'profile': return <ProfileAdminScreen user={user} showMessage={showMessage} setActiveRoute={setActiveRoute} />;
                    case 'pdf': return <PdfScreen user={user} products={products} setProducts={setProducts} showMessage={showMessage} />;
                    case 'resumo': return <ResumoScreen products={products} showMessage={showMessage} clients={clients} user={user} setActiveRoute={setActiveRoute} />;
                    case 'orcamentos': return <OrcamentosScreen products={products} showMessage={showMessage} activeRoute={activeRoute} />;
                    case 'disparos': return <DisparosScreen clients={clients} products={products} user={user} showMessage={showMessage} setActiveRoute={setActiveRoute} />;
                    case 'pedido': return <FazerPedidoScreen products={products} clients={clients} user={user} showMessage={showMessage} />;
                    case 'navegador': return isElectron ? null : <NavegadorScreen />;
                    case 'tutorial': return <TutorialScreen setActiveRoute={setActiveRoute} />;
                    case 'debug': return user.role === 'admin' ? <DebugScreen user={user} showMessage={showMessage} /> : <DashboardScreen user={user} />;
                    default: return <DashboardScreen user={user} />;
                }
            };

            const NavButton = ({ route, icon: Icon, label }) => (
                <button onClick={() => { setActiveRoute(route); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-bold transition-all duration-200 ${activeRoute === route ? 'bg-rose-800 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'}`}>
                    <div className="h-5 w-5"><Icon /></div> {label}
                </button>
            );

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden font-sans">
                    {messageBox && <CustomMessageBox {...messageBox} onClose={() => setMessageBox(null)} />}

                    {/* Modal de Configurações */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[90] animate-in fade-in" onClick={() => setShowSettings(false)}>
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in-95" onClick={e => e.stopPropagation()}>
                                <div className="p-5 border-b border-slate-200 flex justify-between items-center">
                                    <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2"><div className="h-5 w-5 text-slate-500"><IconSettings/></div> Configurações</h2>
                                    <button onClick={() => setShowSettings(false)} className="h-9 w-9 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center text-slate-500"><div className="h-4 w-4"><IconX/></div></button>
                                </div>
                                <div className="p-5 space-y-4">
                                    <div>
                                        <p className="text-sm font-bold text-slate-700 mb-1">Aparência</p>
                                        <p className="text-xs text-slate-400 mb-3">Escolha o tema do sistema. O modo escuro é mais suave aos olhos.</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => setTheme('light')} className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 ${theme === 'light' ? 'border-rose-500 bg-rose-50' : 'border-slate-200 hover:border-slate-300'}`}>
                                                <div className="h-12 w-full rounded-lg bg-gradient-to-br from-slate-50 to-white border border-slate-200 flex items-center justify-center text-2xl">☀️</div>
                                                <span className={`text-sm font-bold ${theme === 'light' ? 'text-rose-700' : 'text-slate-600'}`}>Claro</span>
                                            </button>
                                            <button onClick={() => setTheme('dark')} className={`p-4 rounded-2xl border-2 transition-all flex flex-col items-center gap-2 ${theme === 'dark' ? 'border-rose-500 bg-rose-50' : 'border-slate-200 hover:border-slate-300'}`}>
                                                <div className="h-12 w-full rounded-lg bg-gradient-to-br from-slate-800 to-slate-950 border border-slate-700 flex items-center justify-center text-2xl">🌙</div>
                                                <span className={`text-sm font-bold ${theme === 'dark' ? 'text-rose-700' : 'text-slate-600'}`}>Escuro</span>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 rounded-xl p-3 text-xs text-slate-400 text-center">A preferência fica salva neste dispositivo. 🦢</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Barra de topo do celular (cara de app) */}
                    <div className="md:hidden fixed top-0 inset-x-0 z-50 h-14 bg-slate-950 text-white flex items-center gap-3 px-3 shadow-lg">
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-1.5 rounded-lg hover:bg-slate-800 active:bg-slate-800">
                            <div className="h-6 w-6"><IconMenu/></div>
                        </button>
                        <FrigansoLogo className="h-8 w-8 rounded-lg bg-black/40 p-1 border border-slate-700" />
                        <span className="font-black tracking-tight text-base">FRIGANSO</span>
                    </div>

                    <div className={`fixed inset-y-0 left-0 z-40 w-72 bg-slate-950 text-slate-300 transform transition-transform duration-300 ease-in-out flex flex-col ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 md:static border-r border-slate-800 shadow-2xl`}>
                        <div className="p-6 border-b border-slate-800 flex items-center gap-4 bg-slate-900/50">
                            <FrigansoLogo className="h-12 w-12 rounded-xl bg-black/50 p-1.5 shadow-inner border border-slate-700" />
                            <div>
                                <h1 className="text-xl font-black text-white tracking-tight">FRIGANSO</h1>
                                <p className="text-[10px] text-rose-500 tracking-widest uppercase font-bold">Premium ERP</p>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-4 space-y-1 scrollbar-hide">
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-2 ml-2">Gestão Principal</p>
                            <NavButton route="dashboard" icon={IconDashboard} label="Painel (Dashboard)" />
                            <NavButton route="clients" icon={IconUsers} label="CRM & Rotas" />
                            <NavButton route="radar" icon={IconDashboard} label="Radar de Clientes" />
                            <NavButton route="profile" icon={IconSettings} label="Meu Perfil / Admin" />
                            
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-8 ml-2">Vendas Diárias</p>
                            <NavButton route="pdf" icon={IconFileText} label="Tabela do Dia (PDF)" />
                            <NavButton route="pedido" icon={IconReceipt} label="Fazer Pedido" />
                            {isElectron && <NavButton route="navegador" icon={IconWhatsApp} label="🌐 Navegador" />}
                            <NavButton route="resumo" icon={IconReceipt} label="Resumo de Pedido" />
                            <NavButton route="orcamentos" icon={IconWhatsApp} label="Gerador de Zap" />
                            <NavButton route="disparos" icon={IconWhatsApp} label="Disparos WhatsApp" />
                            
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 mt-8 ml-2">Sistema & Ajuda</p>
                            <NavButton route="tutorial" icon={IconBook} label="Tutorial" />
                            <NavButton route="support" icon={IconSupport} label="Suporte Técnico" />
                            <NavButton route="credits" icon={IconCode} label="Sobre o Desenvolvedor" />
                            {user.role === 'admin' && <NavButton route="debug" icon={IconSettings} label="🐞 Debug" />}
                        </div>

                        <div className="p-4 border-t border-slate-800 bg-slate-900/50">
                            <div className="p-3 rounded-xl mb-2 flex items-center gap-3 bg-slate-900 border border-slate-800 cursor-pointer hover:border-rose-700/50 transition-colors" onClick={() => setActiveRoute('profile')}>
                                <div className="h-10 w-10 rounded-xl bg-rose-800 text-white flex items-center justify-center font-bold text-sm shadow-md overflow-hidden border border-rose-600">
                                    {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover"/> : user.name.charAt(0)}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-bold text-white truncate">{user.name}</p>
                                    <p className="text-[10px] text-slate-400 truncate uppercase tracking-wider font-bold">CÓD: {user.code} • {user.role}</p>
                                </div>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 mb-2 text-sm font-bold text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors border border-slate-800">
                                <div className="h-4 w-4"><IconSettings/></div> Configurações
                            </button>
                            <button onClick={() => handleSetUser(null)} className="w-full flex items-center justify-center gap-2 px-4 py-3 text-sm font-bold text-red-400 hover:text-red-300 hover:bg-red-400/10 rounded-lg transition-colors border border-transparent hover:border-red-400/20">
                                <div className="h-4 w-4"><IconLogOut/></div> Sair da Conta
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto relative z-0 p-3 pt-[68px] sm:p-4 md:p-8 md:pt-8 bg-slate-100">
                        <div className="absolute inset-0 pointer-events-none opacity-[0.02]" style={{ backgroundImage: `url('${BG_IMAGE}')`, backgroundSize: 'cover', backgroundPosition: 'center' }}></div>
                        <div className="relative z-10 max-w-7xl mx-auto">
                            {renderContent()}
                        </div>

                        {/* 🌐 Navegador embutido SEMPRE montado (só Electron) — preserva a página ao trocar de aba */}
                        {isElectron && (
                            <div style={{ position: 'absolute', top: 0, right: 0, bottom: 0, left: 0, zIndex: activeRoute === 'navegador' ? 30 : -1, background: '#f1f5f9', display: 'flex', flexDirection: 'column', padding: '12px', visibility: activeRoute === 'navegador' ? 'visible' : 'hidden' }}>
                                <div className="flex items-center gap-2 mb-2 flex-wrap">
                                    <button onClick={navVoltar} title="Voltar" className="h-9 w-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold flex-shrink-0">←</button>
                                    <button onClick={navAvancar} title="Avançar" className="h-9 w-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold flex-shrink-0">→</button>
                                    <button onClick={navRecarregar} title="Recarregar" className="h-9 w-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold flex-shrink-0">{navCarregando ? '×' : '⟳'}</button>
                                    <input type="text" value={navBarra} onChange={e => setNavBarra(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') navIrPara(navBarra); }} className="flex-1 min-w-[200px] px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:border-rose-500" placeholder="Digite um endereço e Enter..." />
                                    <button onClick={() => navIrPara(navBarra)} className="px-3 py-2 bg-rose-700 hover:bg-rose-800 text-white rounded-lg text-sm font-bold">Ir</button>
                                </div>
                                <div className="flex items-center gap-2 mb-2 flex-wrap">
                                    <button onClick={() => navIrPara('http://spd1.friganso.com.br/rdm-business/')} className="text-xs font-bold px-3 py-1.5 rounded-lg bg-slate-800 text-white hover:bg-slate-900">🏢 SPAmov</button>
                                    <button onClick={() => navIrPara('https://web.whatsapp.com')} className="text-xs font-bold px-3 py-1.5 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700">💬 WhatsApp Web</button>
                                    {navCarregando && <span className="text-xs text-slate-400">carregando...</span>}
                                </div>
                                <div className="flex-1 rounded-2xl overflow-hidden border border-slate-200 bg-white">
                                    <webview ref={navWvRef} src={NAV_INICIAL} partition="persist:friganso-nav" useragent={NAV_UA} allowpopups="true" style={{ width: '100%', height: '100%', display: 'inline-flex' }}></webview>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 🔍 Zoom do layout (canto superior direito) — só no programa de PC */}
                    {isElectron && (
                        <div style={{ position: 'fixed', top: '8px', right: '12px', zIndex: 100, display: 'flex', alignItems: 'center', gap: '2px', background: 'rgba(15,23,42,.9)', borderRadius: '10px', padding: '3px 4px', boxShadow: '0 4px 14px rgba(0,0,0,.3)' }}>
                            <button onClick={() => mudarZoom(-0.1)} title="Diminuir layout" style={{ width: '26px', height: '26px', border: 'none', borderRadius: '7px', background: '#334155', color: '#fff', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer' }}>−</button>
                            <span style={{ color: '#fff', fontSize: '11px', fontWeight: 'bold', minWidth: '34px', textAlign: 'center' }}>{Math.round(zoom * 100)}%</span>
                            <button onClick={() => mudarZoom(0.1)} title="Aumentar layout" style={{ width: '26px', height: '26px', border: 'none', borderRadius: '7px', background: '#334155', color: '#fff', fontWeight: 'bold', fontSize: '16px', cursor: 'pointer' }}>+</button>
                            <button onClick={() => setZoom(1)} title="Resetar (100%)" style={{ height: '26px', padding: '0 6px', border: 'none', borderRadius: '7px', background: '#475569', color: '#fff', fontSize: '10px', fontWeight: 'bold', cursor: 'pointer' }}>⟲</button>
                        </div>
                    )}

                    {/* Overlay que captura o mouse por cima do WhatsApp enquanto redimensiona */}
                    {isElectron && resizandoZap && (
                        <div onMouseMove={onResizeMove} onMouseUp={onResizeUp} onMouseLeave={onResizeUp} style={{ position: 'fixed', inset: 0, zIndex: 9998, cursor: 'nwse-resize' }} />
                    )}

                    {/* 🟢 WhatsApp embutido SEMPRE montado (só Electron) — fica logado e nunca recarrega */}
                    {isElectron && (
                        <div style={{ position: 'fixed', zIndex: 95, bottom: '14px', right: zapAberto ? '14px' : '-4000px', width: zapW + 'px', height: zapH + 'px', maxWidth: '98vw', maxHeight: '94vh', boxShadow: '0 12px 48px rgba(0,0,0,.4)', borderRadius: '16px', overflow: 'hidden', background: '#fff', display: 'flex', flexDirection: 'column', transition: resizandoZap ? 'none' : 'right .2s' }}>
                            {/* alça de redimensionar — arraste o canto superior esquerdo */}
                            <div onMouseDown={onResizeDown} title="Arraste para redimensionar a janela" style={{ position: 'absolute', top: 0, left: 0, width: '22px', height: '22px', cursor: 'nwse-resize', zIndex: 6, background: 'linear-gradient(135deg, rgba(255,255,255,.9) 0 45%, transparent 45%)', borderTopLeftRadius: '16px' }} />
                            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 8px', background: '#075e54', color: '#fff' }}>
                                <span style={{ fontWeight: 'bold', fontSize: '12px', flex: 1, paddingLeft: '16px' }}>💬 WhatsApp</span>
                                <button onClick={() => mudarZap(-80, -80)} title="Diminuir janela" style={{ width: '24px', height: '24px', border: 'none', borderRadius: '6px', background: 'rgba(255,255,255,.2)', color: '#fff', fontWeight: 'bold', fontSize: '15px', cursor: 'pointer', marginRight: '3px' }}>−</button>
                                <button onClick={() => mudarZap(80, 80)} title="Aumentar janela" style={{ width: '24px', height: '24px', border: 'none', borderRadius: '6px', background: 'rgba(255,255,255,.2)', color: '#fff', fontWeight: 'bold', fontSize: '15px', cursor: 'pointer', marginRight: '8px' }}>+</button>
                                <button onClick={() => setZapAberto(false)} title="Fechar" style={{ color: '#fff', background: 'transparent', border: 'none', cursor: 'pointer', fontSize: '18px', lineHeight: 1 }}>✕</button>
                            </div>
                            <webview ref={appZapRef} src="https://web.whatsapp.com" partition="persist:friganso-nav" useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" allowpopups="true" style={{ flex: 1, width: '100%', border: 'none' }}></webview>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- PWA: Service Worker + Deep Link -->
    <script>
        // Captura ?route= dos atalhos do manifest antes do React inicializar
        (function() {
            const p = new URLSearchParams(window.location.search);
            const r = p.get('route');
            if (r) window.sessionStorage.setItem('friganso_initial_route', r);
            // Pedido vindo da extensão do Chrome (lê a tela do SPAmov)
            const pedJson = p.get('pedidojson');
            const ped = p.get('pedido');
            if (pedJson) {
                try { window.sessionStorage.setItem('friganso_pedido_json', decodeURIComponent(escape(atob(pedJson)))); } catch (e) { window.sessionStorage.setItem('friganso_pedido_json', pedJson); }
                window.sessionStorage.setItem('friganso_initial_route', 'resumo');
                if (window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
            } else if (ped) {
                try { window.sessionStorage.setItem('friganso_pedido_texto', decodeURIComponent(escape(atob(ped)))); } catch (e) { window.sessionStorage.setItem('friganso_pedido_texto', ped); }
                window.sessionStorage.setItem('friganso_initial_route', 'resumo');
                if (window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
            }
        })();

        // Captura o prompt de instalação do PWA para usar no botão do Perfil
        window.__pwaInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__pwaInstallPrompt = e;
            window.dispatchEvent(new Event('pwaInstallReady'));
        });
        window.addEventListener('appinstalled', () => {
            window.__pwaInstallPrompt = null;
            window.dispatchEvent(new Event('pwaAppInstalled'));
        });

        // Registra o Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[SW] Registrado:', reg.scope))
                    .catch(err => console.warn('[SW] Falhou:', err));
            });
        }
    </script>
</body>
</html>
