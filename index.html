                                                                <button key={c.id} onClick={() => setManualSelected(c)} className="w-full text-left px-3 py-2.5 bg-white hover:bg-blue-100 rounded-xl text-sm transition-colors border border-transparent hover:border-blue-200 flex items-center gap-2">
                                                                    <span className="bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-black text-xs flex-shrink-0">{c.code}</span>
                                                                    <span className="font-semibold text-slate-700 flex-1 truncate">{c.name}</span>
                                                                </button>
                                                            ))}
                                                            {manualSearch.trim() && clientesParaHistorico.length === 0 && (
                                                                <button onClick={() => setManualSelected({ code: manualSearch.trim(), isNew: true })} className="w-full text-left px-3 py-2.5 bg-emerald-50 hover:bg-emerald-100 rounded-xl text-sm border border-emerald-200 flex items-center gap-2 transition-colors">
                                                                    <span className="text-emerald-700 font-bold">+ Criar cliente</span>
                                                                    <span className="text-slate-500">com código "{manualSearch.trim()}"</span>
                                                                </button>
                                                            )}
                                                            {!manualSearch.trim() && clients.length === 0 && (
                                                                <p className="text-xs text-slate-400 text-center py-2">Nenhum cliente no CRM ainda.</p>
                                                            )}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                            
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                                <div className="p-4 border-b bg-slate-50 flex justify-between items-center">
                                    <h3 className="font-semibold text-slate-700 flex items-center gap-2"><div className="h-5 w-5 text-emerald-600"><IconWhatsApp /></div> Resumo WhatsApp</h3>
                                    <button onClick={() => {
                                        // ⚠️ Se a condição atual for diferente da ÚLTIMA compra desse cliente, confirma antes.
                                        if (condicaoAtual && condicaoHistorico && condicaoHistorico.ultimaCondicaoRaw) {
                                            const catAtual = normalizarCondicaoPagamento(condicaoAtual);
                                            if (catAtual && catAtual !== condicaoHistorico.ultimaCondicaoCat) {
                                                const nomeAtual = LABEL_CONDICAO[catAtual] || condicaoAtual;
                                                const ok = window.confirm(`A última compra desse cliente foi em "${condicaoHistorico.ultimaCondicaoRaw}", mas esse pedido está como ${nomeAtual} (${condicaoAtual}). Confirma que está certo?`);
                                                if (!ok) return;
                                            }
                                        }
                                        navigator.clipboard.writeText(generateWhatsAppText());
                                        // 🧾 Grava na ficha do cliente (todo pedido confirmado passa por aqui)
                                        if (orderSummary && orderSummary.customerCode) {
                                            const itens = (orderSummary.items || []).map(it => { const a = itemAtual(it); return { code: a.code, name: a.name, qty: Number(getQty(it)), peso: Number(a.peso) || 0, valorKg: Number(a.valorKg) || 0 }; });
                                            registrarCompra(orderSummary.customerCode, itens, null, 'resumo', clients, user, orderSummary.spamov, condicaoAtual);
                                        }
                                        showMessage('Copiado pro Zap e salvo na ficha do cliente! 🧾', 'success');
                                    }} className="bg-emerald-100 hover:bg-emerald-200 text-emerald-800 px-4 py-2 rounded-xl text-sm font-bold transition-colors">Copiar Resumo</button>
                                </div>
                                <div className="p-6 bg-slate-100 flex-1 overflow-y-auto" style={{backgroundImage: "url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')", backgroundSize: 'cover', backgroundPosition: 'center'}}>
                                    <div className="bg-[#e1ffc7] p-3 rounded-xl shadow-sm border border-[#d3f4b8] inline-block text-left relative min-w-[200px] max-w-full">
                                        <pre className="font-mono text-sm whitespace-pre-wrap text-slate-800 font-medium">{generateWhatsAppText()}</pre>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const OrcamentosScreen = ({ products, showMessage, activeRoute, listaNegra }) => {
            const lnSet = new Set((listaNegra || []).map(String)); // 🚫 lista negra: não aparece nem é ofertado
            const [search, setSearch] = useState('');
            const [selectedCodes, setSelectedCodes] = useState(new Set());
            const [estiloZap, setEstiloZap] = useState(getEstiloZapSalvo());
            useEffect(() => { try { window.localStorage.setItem(ESTILO_ZAP_KEY, estiloZap); } catch (e) {} }, [estiloZap]);

            useEffect(() => {
                const offerCodes = window.localStorage.getItem('friganso_offer_codes');
                if (offerCodes && activeRoute === 'orcamentos') {
                    try { setSelectedCodes(new Set(JSON.parse(offerCodes))); window.localStorage.removeItem('friganso_offer_codes'); showMessage('Itens do histórico carregados na oferta.', 'success'); } catch(e) {}
                }
            }, [activeRoute]);

            const filtered = useMemo(() => {
                const semBanidos = (arr) => arr.filter(p => !lnSet.has(String(p.code)));
                if (!search.trim() && selectedCodes.size > 0) return semBanidos(products.filter(p => selectedCodes.has(p.code)));
                if (!search.trim()) return []; return semBanidos(products.filter(p => matchProduto(p, search.trim())));
            }, [products, search, selectedCodes, listaNegra]);

            const toggleCode = code => { const s = new Set(selectedCodes); s.has(code) ? s.delete(code) : s.add(code); setSelectedCodes(s); };
            
            const generateText = () => {
                if(selectedCodes.size === 0) return '';
                const lista = products.filter(p => selectedCodes.has(p.code) && !lnSet.has(String(p.code)));
                if (estiloZap === 'antigo') {
                    let txt = `🥩 *ORÇAMENTO*\n\n`;
                    lista.forEach(p => { txt += montarBlocoProdutoZap(p, 'antigo') + '\n'; });
                    return txt.trim();
                }
                const blocos = lista.map(p => montarBlocoProdutoZap(p).trim());
                return `🥩 *ORÇAMENTO*\n\n` + blocos.join(`\n${SEPARADOR_ZAP}\n`);
            };

            return (
                <div className="animate-in fade-in space-y-6">
                    <header className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <div className="flex flex-wrap items-center justify-between gap-2 mb-4">
                            <h1 className="text-2xl font-bold text-rose-800 flex items-center gap-2"><div className="h-6 w-6"><IconTag /></div> Gerador de Zap</h1>
                            <SeletorEstiloZap estilo={estiloZap} setEstilo={setEstiloZap} />
                        </div>
                        <input type="text" placeholder="Digite Picanha, Costela..." value={search} onChange={e=>setSearch(e.target.value)} disabled={products.length===0} className="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-rose-500 font-bold bg-slate-50"/>
                    </header>
                    {(search || selectedCodes.size > 0) && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-4 bg-white rounded-3xl border border-slate-200 flex flex-col h-[600px] overflow-hidden">
                                <div className="p-4 border-b bg-slate-50 flex justify-between items-center font-bold text-slate-700">
                                    <span>Produtos</span> 
                                    <div className="flex gap-2">
                                        {selectedCodes.size > 0 && <button onClick={() => setSelectedCodes(new Set())} className="text-xs bg-rose-100 hover:bg-rose-200 text-rose-700 px-3 py-1.5 rounded-lg font-bold shadow-sm">Desmarcar</button>}
                                        <button onClick={() => setSelectedCodes(new Set(filtered.map(f=>f.code)))} className="text-xs bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg font-bold shadow-sm">Marcar Todos</button>
                                    </div>
                                </div>
                                <div className="overflow-y-auto p-2 space-y-1">
                                    {filtered.map(p => (
                                        <label key={p.code} className={`flex items-start gap-3 p-4 rounded-xl cursor-pointer border-2 transition-all ${selectedCodes.has(p.code) ? 'border-rose-500 bg-rose-50 shadow-sm' : 'border-transparent hover:bg-slate-50'}`}>
                                            <input type="checkbox" checked={selectedCodes.has(p.code)} onChange={()=>toggleCode(p.code)} className="mt-1 h-5 w-5 text-rose-700 rounded flex-shrink-0"/>
                                            <div className="flex-1">
                                                <span className="text-[10px] font-bold text-slate-500 bg-slate-200/50 px-2 py-0.5 rounded-full inline-block mb-1 border border-slate-200">Cód: {p.code}</span>
                                                <p className="font-bold text-slate-800 text-sm leading-tight">{p.name}</p>
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="lg:col-span-8 bg-white rounded-3xl border border-slate-200 flex flex-col h-[600px] overflow-hidden">
                                <div className="p-4 border-b bg-slate-50 flex justify-between items-center font-bold text-slate-700">
                                    <span className="flex items-center gap-2"><div className="h-5 w-5 text-emerald-600"><IconWhatsApp/></div> Preview Zap</span>
                                    <button onClick={() => { navigator.clipboard.writeText(generateText()); showMessage('Copiado para o Zap!', 'success'); }} className="bg-rose-700 hover:bg-rose-800 transition-colors text-white px-5 py-2.5 rounded-xl text-sm shadow-md">Copiar Orçamento</button>
                                </div>
                                <div className="p-6 bg-slate-100 flex-1 overflow-y-auto" style={{backgroundImage: "url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')", backgroundSize: 'cover', backgroundPosition: 'center'}}>
                                    {selectedCodes.size > 0 ? (
                                        <div className="bg-[#e1ffc7] p-5 rounded-2xl shadow-sm border border-[#d3f4b8] relative inline-block min-w-[300px] max-w-full">
                                            <pre className="font-mono text-sm whitespace-pre-wrap text-slate-800 font-medium">{generateText()}</pre>
                                        </div>
                                    ) : (
                                        <div className="h-full flex items-center justify-center text-center"><div className="bg-white/95 p-4 rounded-xl shadow-sm border border-slate-200"><p className="text-slate-600 font-medium">Selecione produtos na lista ao lado.</p></div></div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // 🎯 SPIN Selling — em vez de despejar catálogo/preço de cara, a abordagem certa é puxar o
        // cliente a falar do problema dele primeiro (Situação → Problema → Implicação → Necessidade).
        // Usado tanto na mensagem de abertura do Portfólio quanto no Roteiro de cada lead em Cadastros.
        const SPIN_ABERTURAS_INTRO = [
            'Oi! Me chamo {nome}, sou {cargo} aqui na Friganso 🥩 Posso te fazer uma pergunta rápida?',
            'Oi, tudo bem? Me chamo {nome}, trabalho na Friganso como {cargo}. Posso roubar 1 minutinho seu?',
            'Opa! Sou {nome}, da Friganso 🥩 Rapidinho:',
        ];
        const SPIN_PERGUNTAS_SITUACAO = [
            'Hoje vocês compram direto de distribuidor ou já tem um fornecedor fixo de carnes e congelados?',
            'Como funciona hoje a compra de carnes/congelados aí no seu estabelecimento?',
            'Vocês já trabalham com algum distribuidor fixo, ou compram avulso conforme a necessidade?',
        ];
        const ROTEIRO_SPIN = [
            { fase: 'Situação', emoji: '🔎', cor: 'bg-sky-50 border-sky-200 text-sky-700', perguntas: [
                'Hoje vocês compram direto de distribuidor ou já tem um fornecedor fixo de carnes/congelados?',
                'Como funciona hoje a compra — é semanal, quinzenal?',
            ]},
            { fase: 'Problema', emoji: '⚠️', cor: 'bg-amber-50 border-amber-200 text-amber-700', perguntas: [
                'Já aconteceu de faltar algum corte ou produto no meio da semana?',
                'O preço que você compra hoje varia muito de fornecedor pra fornecedor?',
            ]},
            { fase: 'Implicação', emoji: '📉', cor: 'bg-orange-50 border-orange-200 text-orange-700', perguntas: [
                'Quando falta um produto, vocês tiram prato do cardápio ou compram mais caro na correria?',
                'Isso acaba pesando no seu custo no fim do mês?',
            ]},
            { fase: 'Necessidade', emoji: '✅', cor: 'bg-emerald-50 border-emerald-200 text-emerald-700', perguntas: [
                'Se você tivesse entrega certa e preço travado, ajudaria a planejar melhor sua compra?',
                'Faz sentido eu te mandar nosso catálogo com as condições pra gente conversar melhor?',
            ]},
        ];

        // 📋 Cadastros em Processo — lista pessoal do vendedor com os clientes que ele está tentando
        // cadastrar, o que já recebeu de cada um e uma mensagem simpática pronta pra cutucar o resto.
        const CADASTRO_TIPOS = {
            cpf: { label: 'CPF', itens: ['Foto da identidade', 'CPF', 'Comprovante de residência', 'Email'] },
            cnpj: { label: 'CNPJ', itens: ['Número do CNPJ', 'Email'] },
            cnpj_mei: { label: 'CNPJ MEI', itens: ['Número do CNPJ', 'Email', 'Foto da identidade do titular', 'CPF do titular', 'Comprovante de residência (endereço do CNPJ)'] },
        };
        // 🔍 Consulta pública de CNPJ (BrasilAPI, espelha dados da Receita Federal) — poupa o vendedor
        // de digitar razão social/endereço na mão quando já tem o número do CNPJ do cliente.
        const formatarCNPJ = (v) => (v || '').replace(/\D/g, '').slice(0, 14).replace(/^(\d{2})(\d)/, '$1.$2').replace(/^(\d{2}\.\d{3})(\d)/, '$1.$2').replace(/^(\d{2}\.\d{3}\.\d{3})(\d)/, '$1/$2').replace(/^(\d{2}\.\d{3}\.\d{3}\/\d{4})(\d)/, '$1-$2');
        const buscarCnpjNaReceita = async (cnpj) => {
            const digitos = (cnpj || '').replace(/\D/g, '');
            if (digitos.length !== 14) throw new Error('CNPJ precisa ter 14 dígitos.');
            const resp = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${digitos}`);
            if (!resp.ok) throw new Error(resp.status === 404 ? 'CNPJ não encontrado.' : 'Falha na consulta (status ' + resp.status + ').');
            const d = await resp.json();
            const logradouroCompleto = [d.descricao_tipo_de_logradouro, d.logradouro].filter(Boolean).join(' ');
            const enderecoPartes = [logradouroCompleto, d.numero, d.complemento, d.bairro, d.municipio, d.uf, d.cep].filter(Boolean);
            return {
                razaoSocial: d.razao_social || '',
                nomeFantasia: d.nome_fantasia || '',
                endereco: enderecoPartes.join(', '),
                // 📋 Campos separados (não só o endereço concatenado) — pra poder copiar um por um
                // direto pros campos individuais do formulário oficial de cadastro (CEP, Rua, Número...).
                cep: d.cep || '',
                logradouro: logradouroCompleto,
                numero: d.numero || '',
                complemento: d.complemento || '',
                bairro: d.bairro || '',
                municipio: d.municipio || '',
                uf: d.uf || '',
                situacaoCadastral: d.descricao_situacao_cadastral || '',
                naturezaJuridica: d.natureza_juridica || '',
                telefone: d.ddd_telefone_1 ? d.ddd_telefone_1.replace(/^(\d{2})(\d)/, '($1) $2') : '',
                email: d.email || '',
            };
        };
        const CADASTRO_ABERTURAS = [
            'Oi, {nome}! Tudo bem? 😊',
            'Opa, {nome}! Passando aqui rapidinho.',
            'Oi, {nome}, tudo certo por aí?',
            'E aí, {nome}! Beleza?',
        ];
        // Fechos genéricos — usados só quando o lead não tem uma "dor" anotada (ver campo dorPrincipal).
        const CADASTRO_FECHOS = [
            'Assim que fechamos o cadastro já te mostro nossas ofertas da semana e libero sua primeira entrega rapidinho! 🚚🔥',
            'Fechando esses detalhes, já libero acesso às nossas promoções e você já começa a economizar nas compras! 💰',
            'Com o cadastro prontinho, já te passo as melhores condições e uma oferta especial de boas-vindas! 🎉',
            'Resolvendo isso, te coloco na nossa lista de ofertas exclusivas — tem coisa boa chegando essa semana! 😉',
        ];
        const itensFaltantesCadastro = (lead) => {
            const tipo = CADASTRO_TIPOS[lead.tipoCadastro] || CADASTRO_TIPOS.cpf;
            return tipo.itens.filter(i => !(lead.itensRecebidos || []).includes(i));
        };
        const gerarMensagemCadastro = (lead) => {
            const primeiroNome = (lead.nome || '').split(' ')[0] || 'tudo bem';
            const abertura = CADASTRO_ABERTURAS[Math.floor(Math.random() * CADASTRO_ABERTURAS.length)].replace('{nome}', primeiroNome);
            const faltando = itensFaltantesCadastro(lead);
            if (faltando.length === 0) {
                return `${abertura}\n\nSó pra confirmar: já está tudo certinho com seus documentos por aqui! Assim que eu finalizar aqui do meu lado já te aviso. 😉`;
            }
            // 🎯 Se o vendedor anotou a dor real do cliente, o fecho cita ela em vez de uma oferta genérica
            // (técnica SPIN: liga o pedido de documento à necessidade que o próprio cliente já admitiu).
            const fecho = lead.dorPrincipal
                ? `Assim que finalizarmos, já resolvemos de vez aquilo que você me falou sobre ${lead.dorPrincipal} — combinado? 😉`
                : CADASTRO_FECHOS[Math.floor(Math.random() * CADASTRO_FECHOS.length)];
            const lista = faltando.map(i => `• ${i}`).join('\n');
            return `${abertura}\n\nPra eu finalizar seu cadastro na Friganso, ainda preciso de mais esses detalhes:\n\n${lista}\n\n${fecho}`;
        };
        // 📋 Monta a lista de campos, na mesma ordem do formulário oficial de "Requisição de análise de
        // crédito e cadastro", só com o que o app já sabe — pra copiar e colar em vez de digitar de novo.
        // Não inclui uploads de foto/documento (isso o formulário não deixa preencher por link mesmo).
        const camposFormularioCadastro = (lead, user) => {
            const campos = [
                { label: 'Código de Vendedor/Representante', valor: user.code },
                { label: 'Razão Social', valor: lead.nome },
                { label: 'CNPJ', valor: lead.cnpj },
                { label: 'CEP', valor: lead.cepCnpj },
                { label: 'Rua/Avenida/Travessa', valor: lead.logradouroCnpj },
                { label: 'Número do estabelecimento', valor: lead.numeroCnpj },
                { label: 'Complemento', valor: lead.complementoCnpj },
                { label: 'Bairro', valor: lead.bairroCnpj },
                { label: 'Cidade', valor: lead.municipioCnpj },
                { label: 'Telefone 1', valor: lead.contato },
            ];
            return campos.filter(c => c.valor);
        };

        // 🏠 O endereço desse comprovante vem tudo junto num texto só, tipo:
        // "RUA VEREADOR JUAREZ MALHEIROS CHALOUB, 371 Costa do Sol - MACAÉ RJ 27.923-240"
        // Padrão: Rua, Número Bairro - Cidade UF CEP. Se não bater o padrão, devolve tudo vazio
        // (quem chama já sabe mostrar o texto original inteiro nesse caso).
        const separarEnderecoSefaz = (endereco) => {
            const m = (endereco || '').match(/^(.+?),\s*(\d+)\s+(.+?)\s*-\s*(.+?)\s+([A-Z]{2})\s+([\d.\-]+)$/);
            if (!m) return { rua: '', numero: '', bairro: '', cidade: '', uf: '', cep: '' };
            return { rua: m[1].trim(), numero: m[2].trim(), bairro: m[3].trim(), cidade: m[4].trim(), uf: m[5].trim(), cep: m[6].trim() };
        };

        // 📄 Lê o PDF de "Comprovante de Inscrição e Situação Cadastral" (Sintegra/SEFAZ estadual) e tenta
        // achar a Inscrição Estadual e a situação — não tem API pública gratuita pra isso (é por estado),
        // então a saída é ler o PDF que o próprio vendedor já baixa do site da Fazenda.
        // Esse comprovante é uma tabela: uma linha com os RÓTULOS das colunas, e a linha logo abaixo com
        // os VALORES na mesma posição X (testado com o PDF real do SEFAZ-RJ). Por isso a extração busca
        // por coluna (posição X do rótulo → item mais próximo dessa mesma posição X na linha de baixo),
        // e não "o primeiro número da linha seguinte" (isso pegava o CNPJ em vez da Inscrição Estadual,
        // já que os dois ficam na mesma linha de valores, um do lado do outro).
        const extrairDadosSefazPdf = async (file) => {
            if (!window.pdfjsLib) throw new Error('Leitor de PDF ainda não carregou — espera alguns segundos e tenta de novo.');
            if (window.pdfjsLib.GlobalWorkerOptions && !window.pdfjsLib.GlobalWorkerOptions.workerSrc) {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            const linhas = []; // [{ y, items: [{x, str}], text }]
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const linesMap = new Map();
                textContent.items.forEach(item => {
                    const y = Math.round(item.transform[5] / 6) * 6;
                    if (!linesMap.has(y)) linesMap.set(y, []);
                    linesMap.get(y).push({ x: item.transform[4], str: item.str });
                });
                Array.from(linesMap.keys()).sort((a, b) => b - a).forEach(y => {
                    const items = linesMap.get(y).filter(it => it.str && it.str.trim()).sort((a, b) => a.x - b.x);
                    const text = items.map(it => it.str).join(' ').replace(/\s+/g, ' ').trim();
                    if (text) linhas.push({ y, items, text });
                });
            }
            // Acha o rótulo, pega a posição X dele, e busca na linha de baixo o item cujo X é mais
            // próximo — é assim que colunas de tabela se alinham nesse tipo de comprovante. Quando o
            // campo não tem valor (célula em branco), o PDF simplesmente não gera nenhum item pra ela,
            // então "a linha de baixo" acaba sendo o próximo RÓTULO em vez de um valor — por isso
            // rejeita a "linha de baixo" se ela também bater com algum outro rótulo conhecido.
            const TODOS_OS_ROTULOS_SEFAZ = /CNPJ\/CPF|Inscri[çc][ãa]o Estadual|Data da concess[ãa]o|Nome empresarial|T[íi]tulo do estabelecimento|Natureza Jur[íi]dica|Tipo de unidade principal|Regime de apura[çc][ãa]o|Endere[çc]o do estabelecimento|Situa[çc][ãa]o cadastral|Data da situa[çc][ãa]o cadastral|Atividades econ[ôo]micas/i;
            const acharValorPorColuna = (rotulo) => {
                const re = new RegExp(rotulo, 'i');
                for (let i = 0; i < linhas.length; i++) {
                    const itemRotulo = linhas[i].items.find(it => re.test(it.str));
                    if (!itemRotulo || !linhas[i + 1]) continue;
                    if (TODOS_OS_ROTULOS_SEFAZ.test(linhas[i + 1].text)) continue;
                    const candidatos = linhas[i + 1].items;
                    if (!candidatos.length) continue;
                    const maisProximo = candidatos.reduce((melhor, it) => Math.abs(it.x - itemRotulo.x) < Math.abs(melhor.x - itemRotulo.x) ? it : melhor);
                    if (Math.abs(maisProximo.x - itemRotulo.x) < 30) return maisProximo.str.trim();
                }
                return '';
            };
            const enderecoIE = acharValorPorColuna('Endere[çc]o do estabelecimento');
            return {
                cnpj: acharValorPorColuna('CNPJ\\/CPF'),
                inscricaoEstadual: acharValorPorColuna('Inscri[çc][ãa]o Estadual'),
                situacaoCadastralIE: acharValorPorColuna('Situa[çc][ãa]o cadastral'),
                dataSituacaoIE: acharValorPorColuna('Data da situa[çc][ãa]o cadastral'),
                razaoSocialIE: acharValorPorColuna('Nome empresarial'),
                nomeFantasiaIE: acharValorPorColuna('T[íi]tulo do estabelecimento'),
                naturezaJuridicaIE: acharValorPorColuna('Natureza Jur[íi]dica'),
                enderecoIE,
                ...separarEnderecoSefaz(enderecoIE),
                textoCompleto: linhas.map(l => l.text).join('\n'),
            };
        };

        // 🔍 Consulta CNPJ avulsa — igual a busca de dentro do Cadastro em Processo, mas sem precisar
        // criar um cliente antes. Útil só pra conferir um CNPJ rapidinho.
        const ConsultaCnpjScreen = ({ showMessage }) => {
            const [cnpj, setCnpj] = useState('');
            const [buscando, setBuscando] = useState(false);
            const [resultado, setResultado] = useState(null);
            const [erro, setErro] = useState(null);
            const [lendoPdf, setLendoPdf] = useState(false);
            const [dadosIE, setDadosIE] = useState(null);
            const [erroIE, setErroIE] = useState(null);
            const [mostrarTextoIE, setMostrarTextoIE] = useState(false);

            const buscar = async () => {
                setBuscando(true); setErro(null); setResultado(null);
                try {
                    const dados = await buscarCnpjNaReceita(cnpj);
                    setResultado(dados);
                } catch (e) { setErro(e.message || 'Erro ao consultar o CNPJ.'); } finally { setBuscando(false); }
            };
            const copiar = (label, valor) => { navigator.clipboard.writeText(valor); showMessage(`"${label}" copiado!`, 'success'); };
            const lerPdfIE = async (e) => {
                const file = e.target.files[0];
                e.target.value = ''; // deixa selecionar o mesmo arquivo de novo se precisar
                if (!file || file.type !== 'application/pdf') { showMessage('Selecione um PDF válido.', 'error'); return; }
                setLendoPdf(true); setErroIE(null); setDadosIE(null); setMostrarTextoIE(false);
                try {
                    const dados = await extrairDadosSefazPdf(file);
                    if (!dados.inscricaoEstadual) {
                        setErroIE('Não consegui achar a Inscrição Estadual automaticamente nesse PDF — confere o texto extraído abaixo.');
                    }
                    setDadosIE(dados);
                } catch (e) { setErroIE(e.message || 'Erro ao ler o PDF.'); } finally { setLendoPdf(false); }
            };

            return (
                <div className="animate-in fade-in space-y-6">
                    <header className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <h1 className="text-2xl font-bold text-rose-800 flex items-center gap-2"><div className="h-6 w-6"><IconSearch /></div> Consulta CNPJ</h1>
                        <p className="text-slate-500 text-sm mt-1 mb-4">Digita o CNPJ e o app busca razão social, endereço e situação cadastral na Receita Federal — de graça, sem precisar criar um cadastro.</p>
                        <div className="flex gap-2">
                            <input type="text" value={cnpj} onChange={e => setCnpj(formatarCNPJ(e.target.value))} onKeyDown={e => e.key === 'Enter' && cnpj.replace(/\D/g, '').length === 14 && buscar()} placeholder="00.000.000/0000-00" className="flex-1 px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-rose-500 text-sm" />
                            <button onClick={buscar} disabled={buscando || cnpj.replace(/\D/g, '').length !== 14} className="bg-rose-700 hover:bg-rose-800 disabled:opacity-40 text-white font-bold px-6 rounded-xl text-sm transition-colors shrink-0">{buscando ? '...' : '🔍 Buscar'}</button>
                        </div>
                    </header>

                    {erro && <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-amber-700 text-sm font-semibold">⚠️ {erro}</div>}

                    {resultado && (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                            <div className={`rounded-xl px-4 py-3 mb-4 text-sm ${resultado.situacaoCadastral === 'ATIVA' ? 'bg-emerald-50 border border-emerald-200 text-emerald-700 font-semibold' : 'bg-red-50 border border-red-200 text-red-700 font-bold'}`}>
                                {resultado.situacaoCadastral === 'ATIVA' ? '✅' : '⚠️'} Situação cadastral (Receita Federal): {resultado.situacaoCadastral || 'não informada'}
                            </div>
                            <div className="space-y-1.5">
                                {[
                                    ['Razão Social', resultado.razaoSocial],
                                    ['Nome Fantasia', resultado.nomeFantasia],
                                    ['Natureza Jurídica', resultado.naturezaJuridica],
                                    ['CEP', resultado.cep],
                                    ['Rua/Avenida/Travessa', resultado.logradouro],
                                    ['Número', resultado.numero],
                                    ['Complemento', resultado.complemento],
                                    ['Bairro', resultado.bairro],
                                    ['Cidade', resultado.municipio],
                                    ['UF', resultado.uf],
                                    ['Telefone', resultado.telefone],
                                    ['Email', resultado.email],
                                ].filter(([, v]) => v).map(([label, valor]) => (
                                    <button key={label} onClick={() => copiar(label, valor)} className="w-full text-left bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 transition-colors flex items-center justify-between gap-2">
                                        <span className="min-w-0">
                                            <span className="block text-[10px] font-bold text-slate-400 uppercase tracking-wide">{label}</span>
                                            <span className="block text-sm text-slate-800 truncate">{valor}</span>
                                        </span>
                                        <span className="text-sm shrink-0">📋</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* 📄 Inscrição Estadual não tem API pública gratuita (é por estado) — lê do PDF que o
                        vendedor já baixa do site da Fazenda/Sintegra. */}
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <h3 className="font-bold text-slate-800 flex items-center gap-2 mb-1"><span>📄</span> Inscrição Estadual (via PDF)</h3>
                        <p className="text-xs text-slate-500 mb-3">Não existe consulta gratuita unificada de Inscrição Estadual entre estados. Mas se você já baixa o "Comprovante de Inscrição e Situação Cadastral" (Sintegra/SEFAZ) do cliente, sobe o PDF aqui que eu leio pra você.</p>
                        <label className="block w-full">
                            <input type="file" accept="application/pdf" onChange={lerPdfIE} className="hidden" />
                            <span className="block text-center bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl text-sm transition-colors cursor-pointer">{lendoPdf ? 'Lendo PDF...' : '📎 Selecionar PDF da Inscrição Estadual'}</span>
                        </label>

                        {erroIE && <p className="text-amber-700 bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 text-xs mt-3">⚠️ {erroIE}</p>}

                        {dadosIE && (dadosIE.inscricaoEstadual || dadosIE.razaoSocialIE || dadosIE.enderecoIE) && (
                            <div className="mt-3">
                                {dadosIE.situacaoCadastralIE && (
                                    <div className={`rounded-xl px-4 py-3 mb-2 text-sm ${/ativ/i.test(dadosIE.situacaoCadastralIE) ? 'bg-emerald-50 border border-emerald-200 text-emerald-700 font-semibold' : 'bg-red-50 border border-red-200 text-red-700 font-bold'}`}>
                                        {/ativ/i.test(dadosIE.situacaoCadastralIE) ? '✅' : '⚠️'} Situação da Inscrição Estadual: {dadosIE.situacaoCadastralIE}{dadosIE.dataSituacaoIE && ` (desde ${dadosIE.dataSituacaoIE})`}
                                    </div>
                                )}
                                <div className="space-y-1.5">
                                    {[
                                        ['Razão Social', dadosIE.razaoSocialIE],
                                        ['Nome Fantasia', dadosIE.nomeFantasiaIE],
                                        ['CNPJ', dadosIE.cnpj],
                                        ['Inscrição Estadual', dadosIE.inscricaoEstadual],
                                        ['Natureza Jurídica', dadosIE.naturezaJuridicaIE],
                                        // Endereço separado em campos (CEP, Rua, Número...) quando dá pra quebrar o
                                        // texto do PDF nesse padrão; senão cai no texto inteiro como fallback.
                                        ...(dadosIE.rua ? [
                                            ['CEP', dadosIE.cep],
                                            ['Rua/Avenida/Travessa', dadosIE.rua],
                                            ['Número', dadosIE.numero],
                                            ['Bairro', dadosIE.bairro],
                                            ['Cidade', dadosIE.cidade],
                                            ['UF', dadosIE.uf],
                                        ] : [['Endereço', dadosIE.enderecoIE]]),
                                    ].filter(([, v]) => v).map(([label, valor]) => (
                                        <button key={label} onClick={() => copiar(label, valor)} className="w-full text-left bg-slate-50 hover:bg-slate-100 border border-slate-200 rounded-xl px-3 py-2.5 transition-colors flex items-center justify-between gap-2">
                                            <span className="min-w-0">
                                                <span className="block text-[10px] font-bold text-slate-400 uppercase tracking-wide">{label}</span>
                                                <span className="block text-sm text-slate-800 truncate">{valor}</span>
                                            </span>
                                            <span className="text-sm shrink-0">📋</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {dadosIE && dadosIE.textoCompleto && (
                            <div className="mt-3">
                                <button onClick={() => setMostrarTextoIE(v => !v)} className="text-xs font-bold text-rose-700 hover:text-rose-800">{mostrarTextoIE ? '▲ Esconder' : '▼ Ver'} texto completo extraído do PDF</button>
                                {mostrarTextoIE && <pre className="mt-2 bg-slate-50 border border-slate-200 rounded-xl p-3 text-[11px] text-slate-600 whitespace-pre-wrap max-h-64 overflow-y-auto">{dadosIE.textoCompleto}</pre>}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 🧭 Perto de Mim — usa a localização do navegador + OpenStreetMap (Overpass API, gratuita e
        // sem chave) pra sugerir mercados/restaurantes/açougues perto do vendedor que ainda não são
        // clientes, com um botão pra já mandar direto pros Cadastros em Processo.
        const OSM_CATEGORIAS = {
            restaurant: { label: 'Restaurante', emoji: '🍽️' },
            fast_food: { label: 'Lanchonete', emoji: '🍔' },
            butcher: { label: 'Açougue', emoji: '🥩' },
            supermarket: { label: 'Mercado', emoji: '🛒' },
            convenience: { label: 'Conveniência', emoji: '🏪' },
            bakery: { label: 'Padaria', emoji: '🥐' },
            grocery: { label: 'Mercadinho', emoji: '🧺' },
            greengrocer: { label: 'Hortifruti', emoji: '🥬' },
        };
        const distanciaKm = (lat1, lon1, lat2, lon2) => {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        };
        const normalizarNomeEstab = (s) => (s || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9 ]/g, '').trim();
        const pareceClienteExistente = (nomeOsm, clients) => {
            const n = normalizarNomeEstab(nomeOsm);
            if (!n || !clients || !clients.length) return false;
            return clients.some(c => { const cn = normalizarNomeEstab(c.name); return cn && cn.length > 2 && (n.includes(cn) || cn.includes(n)); });
        };
        // 🗺️ Planejamento de rota — ordena os pontos escolhidos pelo "vizinho mais próximo": sempre pula
        // pro ponto não visitado mais perto de onde está agora. Não é o trajeto matematicamente ótimo,
        // mas é simples, rápido e dá uma rota bem razoável pra visitar poucos estabelecimentos.
        const MAX_PARADAS_ROTA = 9; // limite prático do link de rota do Google Maps sem API paga
        const calcularOrdemRota = (origem, pontos) => {
            const restantes = [...pontos];
            const ordem = [];
            let atual = origem;
            while (restantes.length) {
                let idxMaisPerto = 0, menorDist = Infinity;
                restantes.forEach((p, i) => {
                    const d = distanciaKm(atual.lat, atual.lng, p.lat, p.lng);
                    if (d < menorDist) { menorDist = d; idxMaisPerto = i; }
                });
                const [proximo] = restantes.splice(idxMaisPerto, 1);
                ordem.push({ ...proximo, distDoAnterior: menorDist });
                atual = { lat: proximo.lat, lng: proximo.lng };
            }
            return ordem;
        };
        const gerarLinkRotaMaps = (origem, ordem) => {
            const ultimo = ordem[ordem.length - 1];
            const meio = ordem.slice(0, -1);
            let url = `https://www.google.com/maps/dir/?api=1&origin=${origem.lat},${origem.lng}&destination=${ultimo.lat},${ultimo.lng}&travelmode=driving`;
            if (meio.length) url += `&waypoints=${encodeURIComponent(meio.map(p => `${p.lat},${p.lng}`).join('|'))}`;
            return url;
        };

        const ProspeccaoScreen = ({ user, clients, showMessage }) => {
            const [buscando, setBuscando] = useState(false);
            const [resultados, setResultados] = useState(null); // null = ainda não buscou
            const [erro, setErro] = useState(null);
            const [raioKm, setRaioKm] = useState(3);
            const [filtroCategoria, setFiltroCategoria] = useState('todos');
            const [adicionando, setAdicionando] = useState({});
            const [adicionados, setAdicionados] = useState({});
            const [minhaPos, setMinhaPos] = useState(null);
            const [modoRota, setModoRota] = useState(false);
            const [selecionadosRota, setSelecionadosRota] = useState(new Set());
            const [rotaCalculada, setRotaCalculada] = useState(null);
            const [visitados, setVisitados] = useState({}); // { osmId: timestamp } — persiste quem já foi visitado

            // ✅ Carrega a lista de "já visitei" desse vendedor, pra lembrar entre buscas e sessões.
            useEffect(() => {
                if (!user.id) return;
                const unsubscribe = db.collection('locais_visitados').where('vendedorId', '==', user.id).onSnapshot(snap => {
                    const mapa = {};
                    snap.docs.forEach(doc => { const d = doc.data(); mapa[d.osmId] = d.visitadoEm; });
                    setVisitados(mapa);
                }, err => console.error(err));
                return () => unsubscribe();
            }, [user.id]);

            const toggleVisitado = async (lugar) => {
                const docId = `${user.id}_${lugar.id}`;
                try {
                    if (visitados[lugar.id]) {
                        await db.collection('locais_visitados').doc(docId).delete();
                    } else {
                        await db.collection('locais_visitados').doc(docId).set({ vendedorId: user.id, osmId: lugar.id, nome: lugar.nome, visitadoEm: Date.now() });
                    }
                } catch (e) { showMessage('Erro ao atualizar.', 'error'); }
            };

            const buscarPerto = () => {
                if (!navigator.geolocation) { setErro('Seu navegador não suporta localização.'); return; }
                setBuscando(true); setErro(null); setResultados(null); setRotaCalculada(null); setModoRota(false); setSelecionadosRota(new Set());
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    setMinhaPos({ lat: latitude, lng: longitude });
                    try {
                        const raioM = raioKm * 1000;
                        const filtros = ['amenity=restaurant', 'amenity=fast_food', 'shop=butcher', 'shop=supermarket', 'shop=convenience', 'shop=bakery', 'shop=grocery', 'shop=greengrocer'];
                        const query = `[out:json][timeout:25];(${filtros.map(f => { const [k, v] = f.split('='); return `node["${k}"="${v}"](around:${raioM},${latitude},${longitude});`; }).join('')});out body;`;
                        // 🔁 A instância principal da Overpass às vezes bloqueia/rejeita algumas redes — tenta
                        // um espelho alternativo antes de desistir.
                        const espelhos = ['https://overpass-api.de/api/interpreter', 'https://overpass.kumi.systems/api/interpreter'];
                        let data = null, ultimoErro = null;
                        for (const url of espelhos) {
                            try {
                                const resp = await fetch(url, { method: 'POST', body: 'data=' + encodeURIComponent(query) });
                                if (!resp.ok) throw new Error('status ' + resp.status);
                                data = await resp.json();
                                break;
                            } catch (e) { ultimoErro = e; }
                        }
                        if (!data) throw ultimoErro || new Error('falha nos dois espelhos');
                        const lugares = (data.elements || [])
                            .filter(el => el.tags && el.tags.name && el.lat && el.lon)
                            .map(el => {
                                const categoria = el.tags.amenity === 'restaurant' ? 'restaurant' : el.tags.amenity === 'fast_food' ? 'fast_food' : (el.tags.shop || 'outro');
                                const enderecoPartes = [el.tags['addr:street'], el.tags['addr:housenumber'], el.tags['addr:suburb'] || el.tags['addr:city']].filter(Boolean);
                                return {
                                    id: el.id,
                                    nome: el.tags.name,
                                    categoria,
                                    endereco: enderecoPartes.join(', ') || null,
                                    lat: el.lat, lng: el.lon,
                                    distKm: distanciaKm(latitude, longitude, el.lat, el.lon),
                                    jaCliente: pareceClienteExistente(el.tags.name, clients),
                                };
                            })
                            .sort((a, b) => a.distKm - b.distKm);
                        setResultados(lugares);
                    } catch (e) { setErro('Não consegui buscar agora. Verifica sua internet e tenta de novo.'); }
                    finally { setBuscando(false); }
                }, () => { setErro('Não consegui acessar sua localização — verifica se você liberou a permissão pro navegador.'); setBuscando(false); }, { enableHighAccuracy: true, timeout: 10000 });
            };

            const adicionarComoLead = async (lugar) => {
                if (!user.id) { showMessage('Não consegui identificar sua conta.', 'error'); return; }
                setAdicionando(a => ({ ...a, [lugar.id]: true }));
                try {
                    await db.collection('cadastros_processo').add({
                        nome: lugar.nome,
                        contato: '',
                        tipoCadastro: 'cpf',
                        itensRecebidos: [],
                        dorPrincipal: '',
                        observacoes: `Encontrado via "Perto de Mim"${lugar.endereco ? ' — ' + lugar.endereco : ''}.`,
                        vendedorId: user.id,
                        criadoEm: Date.now(),
                        atualizadoEm: Date.now(),
                    });
                    setAdicionados(a => ({ ...a, [lugar.id]: true }));
                    showMessage('Adicionado aos Cadastros em Processo!', 'success');
                } catch (e) { showMessage('Erro ao adicionar.', 'error'); } finally { setAdicionando(a => ({ ...a, [lugar.id]: false })); }
            };

            const toggleModoRota = () => {
                setModoRota(v => !v);
                setSelecionadosRota(new Set());
                setRotaCalculada(null);
            };
            const toggleSelecaoRota = (id) => {
                setSelecionadosRota(prev => {
                    const novo = new Set(prev);
                    if (novo.has(id)) novo.delete(id);
                    else { if (novo.size >= MAX_PARADAS_ROTA) { showMessage(`Máximo de ${MAX_PARADAS_ROTA} paradas por rota.`, 'error'); return prev; } novo.add(id); }
                    return novo;
                });
            };
            const calcularRota = () => {
                if (!minhaPos) { showMessage('Preciso saber sua localização primeiro.', 'error'); return; }
                const pontos = (resultados || []).filter(r => selecionadosRota.has(r.id));
                if (pontos.length < 2) { showMessage('Selecione pelo menos 2 estabelecimentos.', 'error'); return; }
                setRotaCalculada(calcularOrdemRota(minhaPos, pontos));
            };

            const resultadosFiltrados = (resultados || []).filter(r => filtroCategoria === 'todos' || r.categoria === filtroCategoria);

            return (
                <div className="animate-in fade-in space-y-6">
                    <header className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <h1 className="text-2xl font-bold text-rose-800 flex items-center gap-2"><div className="h-6 w-6"><IconMapPin /></div> Perto de Mim</h1>
                        <p className="text-slate-500 text-sm mt-1 mb-4">Descubra mercados, mercadinhos, padarias, restaurantes e açougues perto de você que ainda não são clientes.</p>
                        <div className="flex flex-wrap items-center gap-2 mb-3">
                            <span className="text-xs font-bold text-slate-500">Raio de busca:</span>
                            {[1, 3, 5, 10].map(r => (
                                <button key={r} onClick={() => setRaioKm(r)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${raioKm === r ? 'bg-rose-700 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{r} km</button>
                            ))}
                        </div>
                        <div className="flex flex-wrap gap-2">
                            <button onClick={buscarPerto} disabled={buscando} className="flex-1 sm:flex-none bg-rose-700 hover:bg-rose-800 disabled:opacity-50 text-white font-bold py-3 px-6 rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
                                {buscando ? <><div className="h-4 w-4"><IconLoader2 /></div> Buscando...</> : <>📍 Buscar perto de mim</>}
                            </button>
                            {resultados && resultados.length > 0 && (
                                <button onClick={toggleModoRota} className={`flex-1 sm:flex-none px-6 py-3 rounded-xl font-bold text-sm transition-colors ${modoRota ? 'bg-slate-900 text-white' : 'bg-sky-50 text-sky-700 border border-sky-200 hover:bg-sky-100'}`}>
                                    {modoRota ? '✕ Cancelar seleção' : '🗺️ Planejar Rota'}
                                </button>
                            )}
                        </div>
                    </header>

                    {erro && <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-amber-700 text-sm font-semibold">⚠️ {erro}</div>}

                    {modoRota && (
                        <div className="bg-sky-50 border border-sky-200 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-3">
                            <div>
                                <p className="text-sm font-bold text-sky-800">Toque nos estabelecimentos que quer visitar hoje</p>
                                <p className="text-xs text-sky-600">{selecionadosRota.size} selecionado(s) — máximo {MAX_PARADAS_ROTA}</p>
                            </div>
                            <button onClick={calcularRota} disabled={selecionadosRota.size < 2} className="bg-sky-700 hover:bg-sky-800 disabled:opacity-40 text-white font-bold py-2.5 px-5 rounded-xl text-sm transition-colors">Traçar Rota</button>
                        </div>
                    )}

                    {rotaCalculada && (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
                                <div>
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2"><span>🧭</span> Sua rota de visitas</h3>
                                    <p className="text-xs text-slate-500 mt-0.5">{rotaCalculada.length} paradas · {rotaCalculada.reduce((a, p) => a + p.distDoAnterior, 0).toFixed(1)} km no total, saindo de onde você está</p>
                                </div>
                                <a href={gerarLinkRotaMaps(minhaPos, rotaCalculada)} target="_blank" rel="noopener noreferrer" className="bg-rose-700 hover:bg-rose-800 text-white font-bold py-2.5 px-5 rounded-xl text-sm transition-colors">🗺️ Abrir rota no Google Maps</a>
                            </div>
                            <div className="space-y-2">
                                {rotaCalculada.map((p, i) => {
                                    const cat = OSM_CATEGORIAS[p.categoria] || { label: p.categoria, emoji: '📍' };
                                    return (
                                        <div key={p.id} className="flex items-center gap-3 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5">
                                            <div className="h-7 w-7 rounded-full bg-rose-700 text-white flex items-center justify-center font-bold text-xs shrink-0">{i + 1}</div>
                                            <div className="min-w-0 flex-1">
                                                <p className="font-bold text-slate-800 text-sm truncate">{cat.emoji} {p.nome} {visitados[p.id] && '✅'}</p>
                                                <p className="text-xs text-slate-500 truncate">{p.endereco || 'Endereço não informado'}</p>
                                            </div>
                                            <p className="text-xs text-slate-400 shrink-0">+{p.distDoAnterior < 1 ? Math.round(p.distDoAnterior * 1000) + ' m' : p.distDoAnterior.toFixed(1) + ' km'}</p>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {resultados && resultados.length > 0 && (
                        <div className="flex flex-wrap gap-2">
                            <button onClick={() => setFiltroCategoria('todos')} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${filtroCategoria === 'todos' ? 'bg-slate-800 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>Todos ({resultados.length})</button>
                            {Object.entries(OSM_CATEGORIAS).map(([key, c]) => {
                                const qtd = resultados.filter(r => r.categoria === key).length;
                                if (qtd === 0) return null;
                                return <button key={key} onClick={() => setFiltroCategoria(key)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${filtroCategoria === key ? 'bg-slate-800 text-white' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-100'}`}>{c.emoji} {c.label} ({qtd})</button>;
                            })}
                        </div>
                    )}

                    {resultados === null && !buscando && !erro && (
                        <div className="bg-white rounded-3xl border border-slate-200 p-10 text-center text-slate-400">
                            <p className="text-lg font-bold">Toque em "Buscar perto de mim" pra começar.</p>
                            <p className="text-sm mt-1">Vamos pedir permissão de localização ao navegador. 📍</p>
                        </div>
                    )}

                    {resultados && resultados.length === 0 && (
                        <div className="bg-white rounded-3xl border border-slate-200 p-10 text-center text-slate-400">
                            <p className="text-lg font-bold">Nenhum estabelecimento encontrado nesse raio.</p>
                            <p className="text-sm mt-1">Tenta aumentar o raio de busca. 🔍</p>
                        </div>
                    )}

                    {resultadosFiltrados.length > 0 && (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            {resultadosFiltrados.map(lugar => {
                                const cat = OSM_CATEGORIAS[lugar.categoria] || { label: lugar.categoria, emoji: '📍' };
                                const jaAdicionado = adicionados[lugar.id];
                                const selecionado = selecionadosRota.has(lugar.id);
                                const visitado = !!visitados[lugar.id];
                                return (
                                    <div key={lugar.id} onClick={modoRota ? () => toggleSelecaoRota(lugar.id) : undefined} className={`bg-white rounded-2xl p-4 shadow-sm border relative ${modoRota ? 'cursor-pointer' : ''} ${visitado ? 'opacity-60' : ''} ${selecionado ? 'border-sky-500 ring-2 ring-sky-200' : 'border-slate-200'}`}>
                                        {modoRota && (
                                            <div className={`absolute top-3 right-3 h-6 w-6 rounded-full border-2 flex items-center justify-center text-xs font-bold ${selecionado ? 'bg-sky-600 border-sky-600 text-white' : 'bg-white border-slate-300 text-transparent'}`}>✓</div>
                                        )}
                                        <div className="flex justify-between items-start gap-2 pr-6">
                                            <div className="min-w-0">
                                                <p className="font-bold text-slate-800 truncate">{lugar.nome}</p>
                                                <p className="text-xs text-slate-500 truncate">{lugar.endereco || 'Endereço não informado'}</p>
                                            </div>
                                            {!modoRota && <span className="text-[10px] font-bold px-2 py-1 rounded-full bg-rose-50 text-rose-700 border border-rose-200 shrink-0">{cat.emoji} {cat.label}</span>}
                                        </div>
                                        <p className="text-xs text-slate-400 mt-2">📏 {lugar.distKm < 1 ? Math.round(lugar.distKm * 1000) + ' m' : lugar.distKm.toFixed(1) + ' km'} de você</p>
                                        {lugar.jaCliente && <p className="text-xs text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-2 py-1 mt-2">✅ Parece que já é cliente</p>}
                                        {!modoRota && (
                                            <>
                                                <label className="flex items-center gap-2 mt-3 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs font-bold text-slate-600 cursor-pointer">
                                                    <input type="checkbox" checked={visitado} onChange={() => toggleVisitado(lugar)} className="w-4 h-4 accent-emerald-600" />
                                                    {visitado ? `✅ Visitado em ${new Date(visitados[lugar.id]).toLocaleDateString('pt-BR')}` : 'Já visitei este local'}
                                                </label>
                                                <div className="flex gap-2 mt-2">
                                                    <a href={`https://www.google.com/maps/search/?api=1&query=${lugar.lat},${lugar.lng}`} target="_blank" rel="noopener noreferrer" className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 rounded-lg text-xs transition-colors text-center">🗺️ Ver no Maps</a>
                                                    {!lugar.jaCliente && (
                                                        <button onClick={() => adicionarComoLead(lugar)} disabled={adicionando[lugar.id] || jaAdicionado} className="flex-1 bg-emerald-50 hover:bg-emerald-100 disabled:opacity-50 text-emerald-700 font-bold py-2 rounded-lg text-xs transition-colors">
                                                            {jaAdicionado ? '✅ Adicionado' : adicionando[lugar.id] ? 'Add...' : '➕ Add em Cadastros'}
                                                        </button>
                                                    )}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const CadastrosProcessoScreen = ({ user, showMessage }) => {
            const [leads, setLeads] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [form, setForm] = useState({ nome: '', contato: '', tipoCadastro: 'cpf', itensRecebidos: [], observacoes: '', dorPrincipal: '', cnpj: '', enderecoCnpj: '', situacaoCadastralCnpj: '', naturezaJuridicaCnpj: '', cepCnpj: '', logradouroCnpj: '', numeroCnpj: '', complementoCnpj: '', bairroCnpj: '', municipioCnpj: '' });
            const [salvando, setSalvando] = useState(false);
            const [mensagemLead, setMensagemLead] = useState(null);
            const [mensagemTexto, setMensagemTexto] = useState('');
            const [roteiroLead, setRoteiroLead] = useState(null);
            const [buscandoCnpj, setBuscandoCnpj] = useState(false);
            const [formularioLead, setFormularioLead] = useState(null);

            useEffect(() => {
                if (!user.id) return;
                const unsubscribe = db.collection('cadastros_processo').where('vendedorId', '==', user.id).onSnapshot(snap => {
                    const lista = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    lista.sort((a, b) => (b.atualizadoEm || 0) - (a.atualizadoEm || 0));
                    setLeads(lista);
                    setLoading(false);
                }, err => { console.error(err); setLoading(false); });
                return () => unsubscribe();
            }, [user.id]);

            const abrirNovo = () => {
                setEditingId(null);
                setForm({ nome: '', contato: '', tipoCadastro: 'cpf', itensRecebidos: [], observacoes: '', dorPrincipal: '', cnpj: '', enderecoCnpj: '', situacaoCadastralCnpj: '', naturezaJuridicaCnpj: '', cepCnpj: '', logradouroCnpj: '', numeroCnpj: '', complementoCnpj: '', bairroCnpj: '', municipioCnpj: '' });
                setShowForm(true);
            };
            const abrirEditar = (lead) => {
                setEditingId(lead.id);
                setForm({ nome: lead.nome || '', contato: lead.contato || '', tipoCadastro: lead.tipoCadastro || 'cpf', itensRecebidos: lead.itensRecebidos || [], observacoes: lead.observacoes || '', dorPrincipal: lead.dorPrincipal || '', cnpj: lead.cnpj || '', enderecoCnpj: lead.enderecoCnpj || '', situacaoCadastralCnpj: lead.situacaoCadastralCnpj || '', naturezaJuridicaCnpj: lead.naturezaJuridicaCnpj || '', cepCnpj: lead.cepCnpj || '', logradouroCnpj: lead.logradouroCnpj || '', numeroCnpj: lead.numeroCnpj || '', complementoCnpj: lead.complementoCnpj || '', bairroCnpj: lead.bairroCnpj || '', municipioCnpj: lead.municipioCnpj || '' });
                setShowForm(true);
            };
            const buscarDadosCnpj = async () => {
                setBuscandoCnpj(true);
                try {
                    const dados = await buscarCnpjNaReceita(form.cnpj);
                    setForm(f => ({
                        ...f,
                        nome: dados.razaoSocial || f.nome,
                        enderecoCnpj: dados.endereco,
                        situacaoCadastralCnpj: dados.situacaoCadastral,
                        naturezaJuridicaCnpj: dados.naturezaJuridica,
                        contato: f.contato || dados.telefone,
                        cepCnpj: dados.cep,
                        logradouroCnpj: dados.logradouro,
                        numeroCnpj: dados.numero,
                        complementoCnpj: dados.complemento,
                        bairroCnpj: dados.bairro,
                        municipioCnpj: dados.municipio,
                    }));
                    if (dados.situacaoCadastral && dados.situacaoCadastral !== 'ATIVA') {
                        showMessage(`Atenção: situação cadastral desse CNPJ é "${dados.situacaoCadastral}" (não ativa)!`, 'error');
                    } else {
                        showMessage('Dados do CNPJ preenchidos!', 'success');
                    }
                } catch (e) { showMessage(e.message || 'Erro ao consultar o CNPJ.', 'error'); } finally { setBuscandoCnpj(false); }
            };
            const toggleItem = (item) => {
                setForm(f => ({ ...f, itensRecebidos: f.itensRecebidos.includes(item) ? f.itensRecebidos.filter(i => i !== item) : [...f.itensRecebidos, item] }));
            };
            const salvarLead = async () => {
                if (!form.nome.trim()) { showMessage('Coloca ao menos o nome do cliente.', 'error'); return; }
                setSalvando(true);
                try {
                    const dados = { ...form, vendedorId: user.id, atualizadoEm: Date.now() };
                    if (editingId) {
                        await db.collection('cadastros_processo').doc(editingId).update(dados);
                    } else {
                        await db.collection('cadastros_processo').add({ ...dados, criadoEm: Date.now() });
                    }
                    showMessage('Salvo!', 'success');
                    setShowForm(false);
                } catch (e) { showMessage('Erro ao salvar.', 'error'); } finally { setSalvando(false); }
            };
            const excluirLead = async (id) => {
                if (!window.confirm('Remover esse cadastro da lista?')) return;
                try { await db.collection('cadastros_processo').doc(id).delete(); showMessage('Removido.', 'success'); }
                catch (e) { showMessage('Erro ao remover.', 'error'); }
            };
            const abrirMensagem = (lead) => { setMensagemLead(lead); setMensagemTexto(gerarMensagemCadastro(lead)); };

            return (
                <div className="animate-in fade-in space-y-6">
                    <header className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <div className="flex flex-wrap items-center justify-between gap-3 mb-1">
                            <h1 className="text-2xl font-bold text-rose-800 flex items-center gap-2"><div className="h-6 w-6"><IconFileText /></div> Cadastros em Processo</h1>
                            <button onClick={abrirNovo} className="bg-rose-700 hover:bg-rose-800 text-white font-bold py-2.5 px-4 rounded-xl text-sm transition-colors shrink-0 flex items-center gap-1.5"><div className="h-4 w-4"><IconPlus /></div> Novo cadastro</button>
                        </div>
                        <p className="text-slate-500 text-sm">Sua lista pessoal de clientes que você está tentando cadastrar — só você vê.</p>
                    </header>

                    {loading ? (
                        <div className="flex justify-center py-12"><div className="h-6 w-6 text-rose-600"><IconLoader2 /></div></div>
                    ) : leads.length === 0 ? (
                        <div className="bg-white rounded-3xl border border-slate-200 p-10 text-center text-slate-400">
                            <p className="text-lg font-bold">Nenhum cadastro em processo ainda.</p>
                            <p className="text-sm mt-1">Toque em <b>"Novo cadastro"</b> pra começar a acompanhar um cliente. 📋</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            {leads.map(lead => {
                                const tipo = CADASTRO_TIPOS[lead.tipoCadastro] || CADASTRO_TIPOS.cpf;
                                const total = tipo.itens.length;
                                const recebidos = (lead.itensRecebidos || []).length;
                                const completo = recebidos >= total;
                                const pct = Math.round((recebidos / total) * 100);
                                return (
                                    <div key={lead.id} className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                                        <div className="flex justify-between items-start gap-2">
                                            <div className="min-w-0">
                                                <p className="font-bold text-slate-800 truncate">{lead.nome}</p>
                                                {lead.contato && <p className="text-xs text-slate-500 truncate">{lead.contato}</p>}
                                            </div>
                                            <span className="text-[10px] font-bold uppercase tracking-wide px-2 py-1 rounded-full bg-rose-50 text-rose-700 border border-rose-200 shrink-0">{tipo.label}</span>
                                        </div>
                                        <div className="mt-3">
                                            <div className="flex justify-between text-xs text-slate-500 mb-1">
                                                <span>{recebidos}/{total} itens</span>
                                                {completo && <span className="text-emerald-600 font-bold">✅ Completo!</span>}
                                            </div>
                                            <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                                                <div className={`h-full ${completo ? 'bg-emerald-500' : 'bg-rose-600'}`} style={{ width: pct + '%' }} />
                                            </div>
                                        </div>
                                        {lead.situacaoCadastralCnpj && lead.situacaoCadastralCnpj !== 'ATIVA' && <p className="text-xs text-red-700 bg-red-50 border border-red-200 rounded-lg px-2 py-1 mt-2 font-bold">⚠️ CNPJ {lead.situacaoCadastralCnpj}</p>}
                                        {lead.dorPrincipal && <p className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-2 py-1 mt-2">⚠️ Dor: {lead.dorPrincipal}</p>}
                                        {lead.observacoes && <p className="text-xs text-slate-500 mt-2 line-clamp-2">{lead.observacoes}</p>}
                                        <button onClick={() => setRoteiroLead(lead)} className="w-full mt-3 bg-sky-50 hover:bg-sky-100 text-sky-700 border border-sky-200 font-bold py-2 rounded-lg text-xs transition-colors">🎯 Roteiro de conversa (SPIN)</button>
                                        {camposFormularioCadastro(lead, user).length > 0 && (
                                            <button onClick={() => setFormularioLead(lead)} className="w-full mt-2 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-200 font-bold py-2 rounded-lg text-xs transition-colors">📋 Copiar pro formulário de cadastro</button>
                                        )}
                                        <div className="flex gap-2 mt-2">
                                            <button onClick={() => abrirEditar(lead)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-2 rounded-lg text-xs transition-colors">✏️ Editar</button>
                                            <button onClick={() => abrirMensagem(lead)} className="flex-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold py-2 rounded-lg text-xs transition-colors">💬 Mensagem</button>
                                            <button onClick={() => excluirLead(lead.id)} className="bg-slate-100 hover:bg-red-100 text-slate-500 hover:text-red-600 font-bold py-2 px-3 rounded-lg text-xs transition-colors">🗑️</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {showForm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-[999]">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 max-h-[92vh] overflow-y-auto">
                                <h3 className="font-bold text-slate-800 text-lg mb-4">{editingId ? 'Editar cadastro' : 'Novo cadastro'}</h3>
                                <div className="space-y-3">
                                    <div>
                                        <label className="text-xs font-bold text-slate-500">Nome do cliente</label>
                                        <input type="text" value={form.nome} onChange={e => setForm(f => ({ ...f, nome: e.target.value }))} placeholder="Nome do cliente ou do negócio" className="w-full mt-1 px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-rose-500 text-sm" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500">Contato (WhatsApp)</label>
                                        <input type="text" value={form.contato} onChange={e => setForm(f => ({ ...f, contato: e.target.value }))} placeholder="(21) 99999-9999" className="w-full mt-1 px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-rose-500 text-sm" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500">Tipo de cadastro</label>
                                        <select value={form.tipoCadastro} onChange={e => setForm(f => ({ ...f, tipoCadastro: e.target.value, itensRecebidos: [] }))} className="w-full mt-1 px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-rose-500 text-sm">
                                            {Object.entries(CADASTRO_TIPOS).map(([key, t]) => <option key={key} value={key}>{t.label}</option>)}
                                        </select>
                                    </div>
                                    {(form.tipoCadastro === 'cnpj' || form.tipoCadastro === 'cnpj_mei') && (
                                        <div>
                                            <label className="text-xs font-bold text-slate-500">CNPJ — busca razão social e endereço sozinho</label>
