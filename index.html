        const ClientsScreen = ({ products, showMessage, setActiveRoute }) => {
            const [clients, setClients] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [rawClientText, setRawClientText] = useState('');
            const [selectedClient, setSelectedClient] = useState(null);
            const [editForm, setEditForm] = useState({});
            const [rawHistoryText, setRawHistoryText] = useState('');
            const [isExtractingHistory, setIsExtractingHistory] = useState(false);
            const [selectedHistoryCodes, setSelectedHistoryCodes] = useState(new Set());
            const [rawProfileText, setRawProfileText] = useState('');
            const [importPreview, setImportPreview] = useState(null);
            const [importBusy, setImportBusy] = useState(false);
            const fileInputRef = useRef(null);
            const [historyPreview, setHistoryPreview] = useState(null);
            const histInputRef = useRef(null);
            const [clientSearch, setClientSearch] = useState('');

            // Filtra clientes por nome ou ID conforme a busca
            const filteredClients = useMemo(() => {
                const q = clientSearch.trim().toLowerCase();
                if (!q) return clients;
                return clients.filter(c =>
                    (c.name || '').toLowerCase().includes(q) ||
                    String(c.code || '').toLowerCase().includes(q) ||
                    (c.contactName || '').toLowerCase().includes(q)
                );
            }, [clients, clientSearch]);

            useEffect(() => {
                const unsubscribe = db.collection('clients').onSnapshot(snap => setClients(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                return () => unsubscribe();
            }, []);

            // Detecta o tipo de negócio pelo nome para classificar o perfil automaticamente
            const inferProfileFromName = (name) => {
                const n = (name || '').toLowerCase();
                if (/(supermerc|mercad|mercear|minimerc|atacad|distribuidora|bebidas|aliment)/.test(n)) return { title: "Mercado / Mercearia", color: "bg-blue-100 text-blue-800" };
                if (/(restaurante|churrasc|lanchonete|petiscaria|espeto|gril|gourmet|confeitaria|bar |butecou|suisso|espa[cç]o)/.test(n)) return { title: "Restaurante / Food Service", color: "bg-orange-100 text-orange-800" };
                if (/(a[cç]ougue|carne|frigor)/.test(n)) return { title: "Açougue", color: "bg-red-100 text-red-800" };
                return { title: "Importado da Planilha", color: "bg-slate-100 text-slate-600" };
            };

            // Lê a planilha selecionada e monta o preview de importação
            const handleFileSelected = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                if (typeof XLSX === 'undefined') { showMessage('Biblioteca de planilha não carregou. Verifique a internet.', 'error'); return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
                        if (!rows.length) { showMessage('Planilha vazia.', 'error'); return; }

                        // Localiza a linha de cabeçalho e mapeia colunas por nome
                        let headerIdx = rows.findIndex(r => r.some(c => /c[oó]d|nome|raz[aã]o/i.test(String(c))));
                        if (headerIdx < 0) headerIdx = 0;
                        const header = rows[headerIdx].map(c => String(c).toLowerCase());
                        const col = (re) => header.findIndex(h => re.test(h));
                        const idxCidade = col(/cidade|munic/);
                        const idxCod = col(/c[oó]d|tipo/);
                        const idxNome = col(/nome|raz[aã]o/);
                        const idxBairro = col(/bairro/);
                        const idxEnd = col(/endere|rua|logra/);
                        const idxCep = col(/cep/);

                        const existingCodes = new Set(clients.map(c => String(c.code).trim()));
                        const parsed = [];
                        const seen = new Set();

                        for (let i = headerIdx + 1; i < rows.length; i++) {
                            const r = rows[i];
                            const rawCod = idxCod >= 0 ? String(r[idxCod] || '').trim() : '';
                            const nome = idxNome >= 0 ? String(r[idxNome] || '').trim() : '';
                            if (!rawCod && !nome) continue;

                            // "[j] 85777" -> tipo "j", code "85777"
                            const tipoMatch = rawCod.match(/\[([a-z])\]/i);
                            const tipo = tipoMatch ? tipoMatch[1].toLowerCase() : '';
                            const code = rawCod.replace(/^\s*\[[a-z]\]\s*/i, '').trim() || rawCod;
                            if (!code) continue;
                            if (seen.has(code)) continue;
                            seen.add(code);

                            const cidade = idxCidade >= 0 ? String(r[idxCidade] || '').trim() : '';
                            const bairro = idxBairro >= 0 ? String(r[idxBairro] || '').trim() : '';
                            const endereco = idxEnd >= 0 ? String(r[idxEnd] || '').trim() : '';
                            const cep = idxCep >= 0 ? String(r[idxCep] || '').trim() : '';
                            const addressFull = [endereco, bairro, cidade, cep].filter(Boolean).join(' - ');

                            parsed.push({
                                code,
                                name: nome || `Cliente ${code}`,
                                address: addressFull,
                                tipo: tipo === 'j' ? 'Pessoa Jurídica' : (tipo === 'f' ? 'Pessoa Física' : ''),
                                profile: inferProfileFromName(nome),
                                exists: existingCodes.has(code)
                            });
                        }

                        if (!parsed.length) { showMessage('Nenhum cliente reconhecido na planilha.', 'error'); return; }
                        setImportPreview(parsed);
                    } catch (err) {
                        showMessage('Erro ao ler a planilha: ' + err.message, 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = ''; // permite reimportar o mesmo arquivo
            };

            // Grava os clientes novos no Firestore em lote
            const handleConfirmImport = async () => {
                if (!importPreview) return;
                const novos = importPreview.filter(p => !p.exists);
                if (!novos.length) { showMessage('Todos os clientes já estão cadastrados.', 'info'); setImportPreview(null); return; }
                setImportBusy(true);
                try {
                    let batch = db.batch();
                    let count = 0;
                    for (const c of novos) {
                        const ref = db.collection('clients').doc();
                        batch.set(ref, {
                            name: c.name, code: c.code, phone: '', cnpj: '',
                            address: c.address, contactName: '', history: [],
                            tipo: c.tipo || '', profile: c.profile
                        });
                        count++;
                        // Firestore limita 500 operações por lote
                        if (count % 450 === 0) { await batch.commit(); batch = db.batch(); }
                    }
                    await batch.commit();
                    showMessage(`${novos.length} cliente(s) importado(s) com sucesso!`, 'success');
                    setImportPreview(null);
                } catch (err) {
                    showMessage('Erro ao salvar: ' + err.message, 'error');
                } finally { setImportBusy(false); }
            };

            // Normaliza um código para comparação (só dígitos, sem zeros à esquerda)
            const normCode = (v) => String(v).replace(/[^0-9a-z]/gi, '').replace(/^0+/, '').toLowerCase();

            // Monta a URL do mapa embutido a partir de endereço, coordenadas ou link do Google Maps
            const buildMapEmbed = (loc) => {
                const t = (loc || '').trim();
                if (!t) return '';
                if (/google\.[^/]+\/maps\/embed/i.test(t)) return t;            // já é um embed
                const at = t.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);                // link com @lat,lng
                if (at) return `https://www.google.com/maps?q=${at[1]},${at[2]}&z=16&output=embed`;
                const ll = t.match(/^\s*(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)\s*$/);   // "lat,lng"
                if (ll) return `https://www.google.com/maps?q=${ll[1]},${ll[2]}&z=16&output=embed`;
                return `https://www.google.com/maps?q=${encodeURIComponent(t)}&output=embed`; // endereço/texto
            };
            // Link para abrir no app/site do Google Maps
            const buildMapLink = (loc) => {
                const t = (loc || '').trim();
                if (!t) return '';
                if (/^https?:\/\//i.test(t)) return t;
                return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(t)}`;
            };

            // Lê a planilha de histórico de compras e monta o preview
            const handleHistoryFileSelected = (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                if (typeof XLSX === 'undefined') { showMessage('Biblioteca de planilha não carregou. Verifique a internet.', 'error'); return; }
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                        const ws = wb.Sheets[wb.SheetNames[0]];
                        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '', blankrows: false });
                        if (!rows.length) { showMessage('Planilha vazia.', 'error'); return; }

                        let headerIdx = rows.findIndex(r => r.some(c => /id|nome|produto/i.test(String(c))));
                        if (headerIdx < 0) headerIdx = 0;
                        const header = rows[headerIdx].map(c => String(c).toLowerCase().trim());
                        // Escolhe a coluna pela 1ª regex que casar (em ordem de prioridade)
                        const pick = (...res) => { for (const re of res) { const i = header.findIndex(h => re.test(h)); if (i >= 0) return i; } return -1; };
                        const idxId = pick(/id.*cliente/, /c[oó]d.*cliente/, /^id\b/, /\bid\b/);
                        const idxNome = pick(/nome.*(fantasia|raz[aã]o|cliente)/, /raz[aã]o\s*social/, /nome\s*do\s*cliente/, /^nome/);
                        // Coluna de CÓDIGO do produto (separada) tem prioridade
                        const idxProdCode = pick(/c[oó]d.*produto/, /c[oó]d.*item/, /^c[oó]digo$/, /^cod\b/);
                        // Coluna combinada "código - nome" (formato antigo)
                        const idxProdComb = pick(/produto\s*comprad/, /produto\s*adquir/, /^produto$/, /item\s*comprad/, /produto/);
                        if (idxId < 0 || (idxProdCode < 0 && idxProdComb < 0)) { showMessage('Não encontrei colunas de ID e Produto na planilha.', 'error'); return; }

                        // Mapa de produtos (por código exato e normalizado) para recuperar o código oficial
                        const prodExact = new Map();
                        const prodNorm = new Map();
                        (products || []).forEach(p => { prodExact.set(String(p.code).trim(), p.code); prodNorm.set(normCode(p.code), p.code); });
                        // Resolve o código bruto da planilha para o código oficial da tabela (corrige zeros à esquerda)
                        const resolveCode = (raw) => prodExact.get(raw) || prodNorm.get(normCode(raw)) || raw;

                        // Agrupa códigos de produto por ID de cliente
                        const grupos = new Map(); // id -> { id, nome, codes:Set }
                        for (let i = headerIdx + 1; i < rows.length; i++) {
                            const r = rows[i];
                            let rawId = r[idxId];
                            if (typeof rawId === 'number') rawId = String(Math.round(rawId));
                            rawId = String(rawId || '').trim();
                            if (!rawId) continue;
                            const nome = idxNome >= 0 ? String(r[idxNome] || '').trim() : '';

                            // Extrai o código do produto, lidando com os dois formatos:
                            let prodCode = '';
                            if (idxProdCode >= 0) {
                                let v = r[idxProdCode];
                                if (typeof v === 'number') v = String(Math.round(v)); // 12062.0 -> "12062"
                                prodCode = String(v || '').trim();
                                const pm = prodCode.match(/^\s*([0-9A-Za-z]+)\s*-/); // caso venha "12062 - NOME"
                                if (pm) prodCode = pm[1];
                            } else if (idxProdComb >= 0) {
                                const prod = String(r[idxProdComb] || '').trim();
                                const pm = prod.match(/^\s*([0-9A-Za-z]+)\s*-/);
                                prodCode = pm ? pm[1] : (typeof r[idxProdComb] === 'number' ? String(Math.round(r[idxProdComb])) : '');
                            }
                            if (!prodCode) continue;

                            prodCode = resolveCode(prodCode); // recupera código oficial com zeros à esquerda
                            if (!grupos.has(rawId)) grupos.set(rawId, { id: rawId, nome, codes: new Set() });
                            grupos.get(rawId).codes.add(prodCode);
                        }

                        if (!grupos.size) { showMessage('Nenhum produto reconhecido na planilha.', 'error'); return; }

                        // Mapa de clientes por código (exato e normalizado) para casar os IDs
                        const byExact = new Map();
                        const byNorm = new Map();
                        clients.forEach(c => {
                            byExact.set(String(c.code).trim(), c);
                            byNorm.set(normCode(c.code), c);
                        });

                        const preview = [];
                        grupos.forEach(g => {
                            const cli = byExact.get(g.id) || byNorm.get(normCode(g.id)) || null;
                            const codesArr = Array.from(g.codes);
                            let novos = codesArr;
                            if (cli) {
                                const atual = new Set((cli.history || []).map(String));
                                novos = codesArr.filter(c => !atual.has(String(c)));
                            }
                            preview.push({
                                id: g.id,
                                nome: cli ? cli.name : (g.nome || `Cliente ${g.id}`),
                                clientId: cli ? cli.id : null,
                                matched: !!cli,
                                totalCodes: codesArr.length,
                                novosCodes: novos,
                                novosCount: cli ? novos.length : codesArr.length,
                                allCodes: codesArr
                            });
                        });

                        preview.sort((a, b) => (a.matched === b.matched) ? 0 : (a.matched ? -1 : 1));
                        setHistoryPreview(preview);
                    } catch (err) {
                        showMessage('Erro ao ler a planilha: ' + err.message, 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = '';
            };

            // Grava o histórico nos clientes correspondentes
            const handleConfirmHistoryImport = async () => {
                if (!historyPreview) return;
                const aplicar = historyPreview.filter(p => p.matched && p.novosCount > 0);
                if (!aplicar.length) { showMessage('Nada novo para adicionar ao histórico.', 'info'); setHistoryPreview(null); return; }
                setImportBusy(true);
                try {
                    let batch = db.batch();
                    let count = 0;
                    for (const p of aplicar) {
                        const cli = clients.find(c => c.id === p.clientId);
                        const atual = (cli && cli.history) ? cli.history : [];
                        const merged = [...new Set([...atual.map(String), ...p.allCodes.map(String)])];
                        batch.update(db.collection('clients').doc(p.clientId), { history: merged });
                        count++;
                        if (count % 450 === 0) { await batch.commit(); batch = db.batch(); }
                    }
                    await batch.commit();
                    showMessage(`Histórico atualizado em ${aplicar.length} cliente(s)!`, 'success');
                    setHistoryPreview(null);
                } catch (err) {
                    showMessage('Erro ao salvar: ' + err.message, 'error');
                } finally { setImportBusy(false); }
            };

                if (pendingId && clients.length > 0) {

                        window.localStorage.removeItem('friganso_open_client_id');

                    }

            useEffect(() => {

                    if (current) setEditForm(current);
                }
            }, [selectedClient, clients]);

            useEffect(() => {

                    const current = clients.find(c => c.id === selectedClient.id);

            const questionsDefinition = [{ id: 'q1', text: '1. Possui açougue interno e desossa carnes?' }, { id: 'q2', text: '2. Compra peças inteiras no osso (Dianteiro/Banda)?' }, { id: 'q3', text: '3. Prefere caixarias já limpas/porcionadas?' }, { id: 'q4', text: '4. Alta demanda por carnes resfriadas (não congeladas)?' }, { id: 'q5', text: '5. Possui setor de frios fatiados na hora?' }, { id: 'q6', text: '6. Compra grande volume de embutidos (Mortadela)?' }, { id: 'q7', text: '7. Serve refeições prontas (Restaurante)?' }, { id: 'q8', text: '8. Preferência por laticínios (Mussarela, Prato)?' }, { id: 'q9', text: '9. Fatia bifes para exposição em balcão?' }, { id: 'q10', text: '10. Busca padronização extrema nos cortes?' }, { id: 'q11', text: '11. Processa carne moída no estabelecimento?' }, { id: 'q12', text: '12. Possui câmara fria para estocagem?' }, { id: 'q13', text: '13. Preferência por produtos de giro rápido/validade curta?' }, { id: 'q14', text: '14. Compra complementos (Pão de alho, Batata)?' }, { id: 'q15', text: '15. Variedade grande de itens (mix amplo)?' }, { id: 'q16', text: '16. Concentra pedidos em poucos itens de volume altíssimo?' }, { id: 'q17', text: '17. Forte foco em churrasco (Picanha, Costela)?' }, { id: 'q18', text: '18. Demanda constante por miúdos/ossos?' }, { id: 'q19', text: '19. Decide compra baseado no menor preço?' }, { id: 'q20', text: '20. Exige marcas específicas para prateleira?' }];
            const initialFormState = { name: '', contactName: '', phone: '', code: '', cnpj: '', address: '' }; questionsDefinition.forEach(q => initialFormState[q.id] = 0);
            const [formData, setFormData] = useState(initialFormState);

            const calculateClientProfile = (data) => {
                const acougueScore = data.q1 + data.q2 + data.q4 + data.q9 + data.q11 + data.q18; const mercadoScore = data.q5 + data.q6 + data.q8 + data.q12 + data.q13 + data.q15 + data.q20; const restauranteScore = data.q3 + data.q7 + data.q10 + data.q14 + data.q16;
                const pAcougue = acougueScore / 30, pMercado = mercadoScore / 35, pRestaurante = restauranteScore / 25; const maxScore = Math.max(pAcougue, pMercado, pRestaurante);
                if (maxScore === 0) return { title: "Cadastro Inicial", color: "bg-slate-100 text-slate-600" };
                if (maxScore === pAcougue) return { title: data.q2 >= 4 ? "Açougue Bruto (Osso)" : "Açougue Padrão", color: "bg-red-100 text-red-800" };
                if (maxScore === pMercado) return { title: "Mercado / Mercearia", color: "bg-blue-100 text-blue-800" };
                return { title: "Restaurante / Food Service", color: "bg-orange-100 text-orange-800" };
            };

            const handleExtractClientData = () => {
                if (!rawClientText.trim()) { showMessage('Cole o texto primeiro.', 'error'); return; }
                try {
                    let extracted = { ...formData };
                    const clienteMatch = rawClientText.match(/CLIENTE\s*\[f\]\s*(\d+)/i) || rawClientText.match(/ID:\s*(\d+)/i);
                    if (clienteMatch) extracted.code = clienteMatch[1].trim();
                    const cnpjMatch = rawClientText.match(/CNPJ\s*\(\s*([\d.\-\/]+)\s*\)/i);
                    if (cnpjMatch) extracted.cnpj = cnpjMatch[1].trim();
                    const nameMatch = rawClientText.match(/(?:SUPERMERCADO|MERCADO|AÇOUGUE|RESTAURANTE)[\s\S]*?(?=\n|CNPJ)/i);
                    if (nameMatch) {
                        let cleanName = nameMatch[0].replace(/SUPERMERCADO OPCAO DO BAIRRO LTDA\/MERCADO OPCAO-\s*/i, '').trim();
                        extracted.name = cleanName.substring(0, 40); 
                    }
                    const cepMatch = rawClientText.match(/\b\d{5}-\d{3}\b/);
                    if (cepMatch) extracted.address = cepMatch[0];
                    setFormData(extracted); showMessage('Dados extraídos com inteligência!', 'success');
                } catch (e) { showMessage('Erro na extração dos dados.', 'error'); }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if(questionsDefinition.filter(q => formData[q.id] > 0).length < 5) { showMessage("Responda pelo menos 5 perguntas para mapeamento.", 'error'); return; }
                const profileData = calculateClientProfile(formData);
                try { await db.collection('clients').add({ ...formData, profile: profileData, history: [] }); showMessage("Cliente salvo na nuvem!", 'success'); setIsAdding(false); setFormData(initialFormState); setRawClientText(''); } catch(err) { showMessage("Erro ao salvar cliente", 'error'); }
            };

            const handleUpdateClient = async () => {
                if(!editForm.code) { showMessage("O ID não pode ficar vazio.", "error"); return; }
                try {
                    await db.collection('clients').doc(selectedClient.id).update({ name: editForm.name, contactName: editForm.contactName || '', code: editForm.code, cnpj: editForm.cnpj || '', phone: editForm.phone || '', address: editForm.address || '', mapLocation: editForm.mapLocation || '' });
                    showMessage("Alterações salvas!", "success");
                } catch(e) { showMessage("Erro ao atualizar.", "error"); }
            };

            const handleExtractHistory = async () => {
                if (!rawHistoryText.trim()) return;
                setIsExtractingHistory(true);
                try {
                    const matches = [...rawHistoryText.matchAll(/\d*S(\d{4,7})/g)];
                    let foundCodes = matches.map(m => m[1]);
                    if (foundCodes.length === 0) {
                        products.forEach(p => { if (rawHistoryText.includes(p.code)) foundCodes.push(p.code); });
                    }
                    const validCodes = [...new Set(foundCodes)].filter(code => products.some(p => p.code === code));
                    if (validCodes.length === 0) { showMessage('Nenhum código reconhecido.', 'error'); setIsExtractingHistory(false); return; }
                    
                    const currentHistory = editForm.history || [];
                    const newHistory = [...new Set([...currentHistory, ...validCodes])];
                    await db.collection('clients').doc(selectedClient.id).update({ history: newHistory });
                    setRawHistoryText('');
                    showMessage(`${validCodes.length} produtos adicionados ao histórico!`, 'success');
                } catch (e) { showMessage('Erro ao salvar.', 'error'); } finally { setIsExtractingHistory(false); }
            };

            const handleExtractProfileData = () => {
                if (!rawProfileText.trim()) { showMessage('Cole o texto primeiro.', 'error'); return; }
                try {
                    let updates = {};
                    const clienteMatch = rawProfileText.match(/CLIENTE\s*\[f\]\s*(\d+)/i) || rawProfileText.match(/ID:\s*(\d+)/i);
                    if (clienteMatch) updates.code = clienteMatch[1].trim();
                    const cnpjMatch = rawProfileText.match(/CNPJ\s*\(\s*([\d.\-\/]+)\s*\)/i);
                    if (cnpjMatch) updates.cnpj = cnpjMatch[1].trim();
                    const nameMatch = rawProfileText.match(/(?:SUPERMERCADO|MERCADO|AÇOUGUE|RESTAURANTE|MERCEARIA)[\s\S]*?(?=\n|CNPJ)/i);
                    if (nameMatch) { let n = nameMatch[0].trim(); updates.name = n.substring(0, 40); }
                    const phoneMatch = rawProfileText.match(/(?:FONE|TEL|WHATSAPP|ZAP|CEL)[:\s]*(\(?\d{2}\)?\s*\d{4,5}[-\s]?\d{4})/i);
                    if (phoneMatch) updates.phone = phoneMatch[1].trim();
                    const cepMatch = rawProfileText.match(/\b\d{5}-\d{3}\b/);
                    if (cepMatch) updates.address = cepMatch[0];
                    setEditForm(prev => ({...prev, ...updates}));
                    showMessage('Dados extraídos com sucesso!', 'success');
                    setRawProfileText('');
                } catch (e) { showMessage('Erro na extração dos dados.', 'error'); }
            };

            if (isAdding) return (
                <div className="animate-in fade-in">

                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 mb-6">
                        <h3 className="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2"><div className="h-5 w-5 text-rose-600"><IconWand/></div> Leitor de Cadastro Inteligente</h3>
                        <textarea value={rawClientText} onChange={e => setRawClientText(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-rose-500 text-xs font-mono h-24 mb-3 resize-none" placeholder="Cole o bloco do ERP aqui..."></textarea>
                        <button type="button" onClick={handleExtractClientData} className="bg-slate-800 hover:bg-slate-900 text-white font-bold py-2.5 px-6 rounded-xl shadow-md transition-all text-sm">Extrair Dados</button>
                    </div>
                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <form onSubmit={handleSave}>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
                                <div><label className="block text-xs font-bold text-slate-500 mb-1">Nome Fantasia</label><input type="text" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg focus:border-rose-500 outline-none"/></div>
                                <div><label className="block text-xs font-bold text-slate-500 mb-1">Nome do Contato / Dono</label><input type="text" value={formData.contactName} onChange={e=>setFormData({...formData, contactName: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg focus:border-rose-500 outline-none"/></div>
                                <div><label className="block text-xs font-bold text-slate-500 mb-1">ID Cliente (Obrigatório)*</label><input type="text" required value={formData.code} onChange={e=>setFormData({...formData, code: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg focus:border-rose-500 outline-none"/></div>
                                <div><label className="block text-xs font-bold text-slate-500 mb-1">CNPJ</label><input type="text" value={formData.cnpj} onChange={e=>setFormData({...formData, cnpj: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg focus:border-rose-500 outline-none"/></div>
                                <div><label className="block text-xs font-bold text-slate-500 mb-1">Telefone</label><input type="text" value={formData.phone} onChange={e=>setFormData({...formData, phone: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg focus:border-rose-500 outline-none"/></div>
                                <div><label className="block text-xs font-bold text-slate-500 mb-1">Endereço</label><input type="text" value={formData.address} onChange={e=>setFormData({...formData, address: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg focus:border-rose-500 outline-none"/></div>
                            </div>
                            <div className="bg-rose-50 rounded-xl p-4 mb-6 border border-rose-100"><h3 className="text-lg font-bold text-rose-800">Mapeamento de Perfil (CRM)</h3></div>
                            <div className="grid grid-cols-1 xl:grid-cols-2 gap-x-6">{questionsDefinition.map((q) => (<LikertScale key={q.id} question={q.text} value={formData[q.id]} onChange={(val) => setFormData({...formData, [q.id]: val})} />))}</div>
                            <div className="mt-8 flex justify-end"><button type="submit" className="bg-rose-700 text-white font-bold py-4 px-10 rounded-xl shadow-lg">Salvar Cliente</button></div>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="animate-in fade-in relative">
                    {selectedClient && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-50 rounded-3xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95">
                                <div className="p-6 border-b border-slate-200 bg-white flex justify-between items-center shadow-sm z-10">
                                    <div className="flex items-center gap-4">
                                        <div className="h-14 w-14 rounded-2xl bg-rose-700 text-white flex flex-col items-center justify-center font-bold leading-none shadow-sm"><span className="text-[8px] font-bold opacity-70">COD</span><span className="font-mono font-black text-lg">{editForm.code || '—'}</span></div>
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-800 leading-none">{editForm.name || 'Empresa'}</h2>
                                            <p className="text-xs font-bold text-rose-600 mt-1">Cód. {editForm.code || '—'}{editForm.contactName && <span className="text-slate-400 uppercase ml-2">· Contato: <span className="text-slate-600">{editForm.contactName}</span></span>}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedClient(null)} className="h-10 w-10 bg-slate-100 hover:bg-slate-200 rounded-full flex items-center justify-center text-slate-500 transition-colors"><IconX/></button>
                                </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
                                            <h3 className="font-bold text-slate-800 border-b border-slate-100 pb-2 flex items-center gap-2"><div className="h-5 w-5 text-blue-500"><IconUser/></div> Dados Cadastrais</h3>
                                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-200">
                                                <label className="block text-xs font-bold text-slate-600 mb-1 flex items-center gap-1"><div className="h-3.5 w-3.5 text-rose-600 inline-block"><IconWand/></div> Leitor de Cadastro Inteligente</label>
                                                <textarea value={rawProfileText} onChange={e => setRawProfileText(e.target.value)} placeholder="Cole o bloco do ERP para extrair dados..." className="w-full h-14 p-2 bg-white border rounded-lg outline-none text-xs font-mono resize-none mb-2"/>
                                                <button type="button" onClick={handleExtractProfileData} className="text-xs bg-slate-800 hover:bg-slate-900 text-white px-3 py-1.5 rounded-lg font-bold transition-colors">Extrair Dados</button>
                                            </div>
                                            <div className="space-y-3">
                                                <div><label className="text-xs font-bold text-slate-500">Nome Fantasia</label><input type="text" value={editForm.name || ''} onChange={e => setEditForm({...editForm, name: e.target.value})} className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm font-bold outline-none focus:border-rose-500"/></div>
                                                <div><label className="text-xs font-bold text-slate-500">Contato / Proprietário</label><input type="text" value={editForm.contactName || ''} onChange={e => setEditForm({...editForm, contactName: e.target.value})} className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm outline-none focus:border-rose-500"/></div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <div><label className="text-xs font-bold text-slate-500">ID Cliente</label><input type="text" value={editForm.code || ''} onChange={e => setEditForm({...editForm, code: e.target.value})} className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm outline-none focus:border-rose-500"/></div>
                                                    <div><label className="text-xs font-bold text-slate-500">CNPJ</label><input type="text" value={editForm.cnpj || ''} onChange={e => setEditForm({...editForm, cnpj: e.target.value})} className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm outline-none focus:border-rose-500"/></div>
                                                </div>
                                                <div><label className="text-xs font-bold text-slate-500">WhatsApp</label><input type="text" value={editForm.phone || ''} onChange={e => setEditForm({...editForm, phone: e.target.value})} className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm outline-none focus:border-rose-500"/></div>
                                                <div><label className="text-xs font-bold text-slate-500">Endereço</label><textarea value={editForm.address || ''} onChange={e => setEditForm({...editForm, address: e.target.value})} className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm resize-none outline-none focus:border-rose-500" rows="2"></textarea></div>
                                                <div>
                                                    <label className="text-xs font-bold text-slate-500 flex items-center gap-1">📍 Localização no Mapa</label>
                                                    <input type="text" value={editForm.mapLocation || ''} onChange={e => setEditForm({...editForm, mapLocation: e.target.value})} placeholder="Endereço, coordenadas (lat,lng) ou link do Google Maps" className="w-full p-2.5 bg-slate-50 border rounded-lg text-sm outline-none focus:border-rose-500"/>
                                                    <p className="text-[10px] text-slate-400 mt-1">Deixe vazio para usar o Endereço acima. Dica: no Google Maps, clique com o botão direito no local e copie as coordenadas.</p>
                                                </div>
                                                <button onClick={handleUpdateClient} className="w-full py-3 bg-slate-800 hover:bg-slate-900 text-white rounded-xl text-sm font-bold shadow-md transition-colors">Salvar Alterações</button>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                            <h3 className="font-bold text-slate-800 border-b border-slate-100 pb-2 mb-4 flex items-center gap-2"><div className="h-5 w-5 text-rose-600"><IconHistory/></div> Histórico de Compras</h3>
                                            <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 mb-4">
                                                <label className="block text-xs font-bold text-slate-600 mb-2">Colar Tabela ERP para atualizar</label>
                                                <textarea value={rawHistoryText} onChange={e => setRawHistoryText(e.target.value)} placeholder="Cole o histórico daqui..." className="w-full h-16 p-2 bg-white border rounded-lg outline-none text-xs font-mono resize-none"></textarea>
                                                <div className="mt-2 flex justify-end">
                                                    <button onClick={handleExtractHistory} disabled={isExtractingHistory} className="bg-rose-700 hover:bg-rose-800 text-white px-4 py-1.5 rounded-lg font-bold text-xs shadow-sm transition-all flex items-center gap-1">
                                                        {isExtractingHistory ? <IconLoader2/> : <IconPlus/>} Adicionar ao Histórico
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="flex-1 overflow-y-auto pr-1">
                                                {(!editForm.history || editForm.history.length === 0) ? (
                                                    <div className="h-full flex items-center justify-center text-slate-400 text-sm font-medium italic">Nenhum histórico registrado.</div>
                                                ) : (
                                                    <div className="space-y-2 relative">
                                                        <div className="flex justify-between items-center mb-2 sticky top-0 bg-white pb-2 z-10">
                                                            <div className="flex gap-1.5">
                                                                <button onClick={() => setSelectedHistoryCodes(new Set(editForm.history || []))} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded-lg font-bold transition-colors">Todos</button>
                                                                <button onClick={() => setSelectedHistoryCodes(new Set())} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded-lg font-bold transition-colors">Nenhum</button>
                                                            </div>
                                                            <button
                                                                disabled={selectedHistoryCodes.size === 0}
                                                                onClick={() => { window.localStorage.setItem('friganso_offer_codes', JSON.stringify([...selectedHistoryCodes])); setSelectedClient(null); setActiveRoute('orcamentos'); }}
                                                                className="bg-emerald-100 hover:bg-emerald-200 disabled:opacity-40 text-emerald-800 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors flex items-center gap-1.5">
                                                                <div className="h-3 w-3"><IconWhatsApp/></div> Enviar Oferta ({selectedHistoryCodes.size})
                                                            </button>
                                                        </div>
                                                        {editForm.history.map(code => {
                                                            const p = products.find(prod => prod.code === code);
                                                            const isChecked = selectedHistoryCodes.has(code);
                                                            return (
                                                                <label key={code} className={`p-2.5 rounded-lg flex items-center gap-3 shadow-sm transition-colors cursor-pointer border ${isChecked ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-100 hover:border-rose-200'}`}>
                                                                    <input type="checkbox" checked={isChecked} onChange={() => { const s = new Set(selectedHistoryCodes); s.has(code) ? s.delete(code) : s.add(code); setSelectedHistoryCodes(s); }} className="h-4 w-4 rounded text-emerald-600 flex-shrink-0 cursor-pointer"/>
                                                                    <span className="bg-rose-100 text-rose-700 px-2 py-1 rounded text-xs font-black">{code}</span>
                                                                    <span className="text-xs font-medium text-slate-700 leading-tight flex-1">{p ? p.name : 'Produto Arquivado'}</span>
                                                                </label>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Mapa da localização da loja */}
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center border-b border-slate-100 pb-2 mb-4">
                                            <h3 className="font-bold text-slate-800 flex items-center gap-2"><span className="text-lg">📍</span> Localização da Loja</h3>
                                            {(editForm.mapLocation || editForm.address) && (
                                                <a href={buildMapLink(editForm.mapLocation || editForm.address)} target="_blank" rel="noopener noreferrer" className="text-xs font-bold bg-blue-50 hover:bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">Abrir no Google Maps ↗</a>
                                            )}
                                        </div>
                                        {(editForm.mapLocation || editForm.address) ? (
                                            <div className="rounded-xl overflow-hidden border border-slate-200 bg-slate-100">
                                                <iframe
                                                    title="Mapa da loja"
                                                    src={buildMapEmbed(editForm.mapLocation || editForm.address)}
                                                    className="w-full"
                                                    style={{ height: '320px', border: 0 }}
                                                    loading="lazy"
                                                    referrerPolicy="no-referrer-when-downgrade"
                                                    allowFullScreen
                                                ></iframe>
                                            </div>
                                        ) : (
                                            <div className="h-40 flex flex-col items-center justify-center text-slate-400 text-sm bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                                <span className="text-2xl mb-2">🗺️</span>
                                                Preencha o Endereço ou a Localização no Mapa para ver aqui.
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

        ];
        const AREA_INFO = {

        const AtualizacoesScreen = () => (
            <div className="animate-in fade-in max-w-3xl mx-auto space-y-6">
