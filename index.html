        // 🖼️ Miniatura em base64 (data URL) a partir de um Blob — usada SÓ pro Gerador de Catálogo, porque
        // desenhar a foto do Storage direto num <canvas> exige CORS configurado no bucket (o que o Firebase
        // não vem com por padrão), e sem isso a imagem simplesmente não aparecia no catálogo gerado. Um
        // data URL nunca tem problema de CORS, então essa miniatura contorna isso sem mexer em infra.
        const gerarThumbBase64 = (blob, maxDim = 160, qualidade = 0.55) => new Promise((resolve, reject) => {
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
                URL.revokeObjectURL(url);
                const s = Math.min(1, maxDim / Math.max(img.width, img.height));
                const canvas = document.createElement('canvas');
                canvas.width = Math.round(img.width * s); canvas.height = Math.round(img.height * s);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', qualidade));
            };
            img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('falha ao gerar miniatura')); };
            img.src = url;
        });
        // 📤 Sobe um blob (já cortado/comprimido pelo CropFotoModal) pro Firebase Storage (foto grande, pra
        // exibir normal) e salva também uma miniatura base64 num doc por produto (só pro catálogo).
        const subirFotoBlob = async (code, blob) => {
            const ref = storage.ref().child('produto-fotos/' + code + '.jpg');
            await ref.put(blob, { contentType: 'image/jpeg' });
            const url = await ref.getDownloadURL();
            await db.collection('system_data').doc('produto_fotos').set({ fotos: { [code]: url } }, { merge: true });
            try {
                const thumb = await gerarThumbBase64(blob);
                await db.collection('produto_fotos_thumbs').doc(String(code)).set({ thumb });
            } catch (e) { /* catálogo só mostra placeholder se isso falhar — a foto normal continua ok */ }
            return url;
        };
        const removerFotoProduto = async (code) => {
            try { await storage.ref().child('produto-fotos/' + code + '.jpg').delete(); } catch (e) {}
            await db.collection('system_data').doc('produto_fotos').update({ ['fotos.' + code]: firebase.firestore.FieldValue.delete() }).catch(() => {});
            await db.collection('produto_fotos_thumbs').doc(String(code)).delete().catch(() => {});
        };

        // ✂️ Recorte de foto estilo WhatsApp/Instagram: arrasta pra posicionar, controle deslizante pra
        // dar zoom, sempre corta um quadrado. Sai já como Blob JPEG comprimido (640x640), pronto pra subir.
        const CropFotoModal = ({ file, onCancel, onConfirm }) => {
            const V = 300; // tamanho do viewport quadrado (px)
            const [zoom, setZoom] = useState(1);
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const [imgEl, setImgEl] = useState(null);
            const [baseScale, setBaseScale] = useState(1);
            const [enviando, setEnviando] = useState(false);
            const dragRef = useRef(null);

            useEffect(() => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    const bs = V / Math.min(img.naturalWidth, img.naturalHeight);
                    const dw = img.naturalWidth * bs, dh = img.naturalHeight * bs;
                    setBaseScale(bs);
                    setOffset({ x: (V - dw) / 2, y: (V - dh) / 2 });
                    setImgEl(img);
                };
                img.src = url;
                return () => URL.revokeObjectURL(url);
            }, [file]);

            const displayScale = baseScale * zoom;
            const dispW = imgEl ? imgEl.naturalWidth * displayScale : 0;
            const dispH = imgEl ? imgEl.naturalHeight * displayScale : 0;
            const clamp = (o, dw, dh) => ({ x: Math.min(0, Math.max(V - dw, o.x)), y: Math.min(0, Math.max(V - dh, o.y)) });

            useEffect(() => { if (imgEl) setOffset(o => clamp(o, dispW, dispH)); }, [zoom, imgEl]);

            const onDown = (e) => { const p = e.touches ? e.touches[0] : e; dragRef.current = { sx: p.clientX, sy: p.clientY, ox: offset.x, oy: offset.y }; };
            const onMove = (e) => {
                if (!dragRef.current) return;
                const p = e.touches ? e.touches[0] : e;
                const dx = p.clientX - dragRef.current.sx, dy = p.clientY - dragRef.current.sy;
                setOffset(clamp({ x: dragRef.current.ox + dx, y: dragRef.current.oy + dy }, dispW, dispH));
            };
            const onUp = () => { dragRef.current = null; };

            const confirmar = () => {
                setEnviando(true);
                const OUT = 640;
                const canvas = document.createElement('canvas');
                canvas.width = OUT; canvas.height = OUT;
                const ctx = canvas.getContext('2d');
                const cropX = -offset.x / displayScale, cropY = -offset.y / displayScale, cropSize = V / displayScale;
                ctx.drawImage(imgEl, cropX, cropY, cropSize, cropSize, 0, 0, OUT, OUT);
                canvas.toBlob(blob => { if (blob) onConfirm(blob); else setEnviando(false); }, 'image/jpeg', 0.82);
            };

            return (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-[999]">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-5 flex flex-col items-center">
                        <h3 className="font-bold text-slate-800 mb-3">Ajustar foto</h3>
                        <div
                            className="relative rounded-2xl overflow-hidden bg-slate-200 touch-none select-none"
                            style={{ width: V, height: V, cursor: 'grab' }}
                            onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
                            onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}
                        >
                            {imgEl && (
                                <img src={imgEl.src} draggable={false} alt="" className="absolute top-0 left-0 pointer-events-none max-w-none"
                                    style={{ width: dispW, height: dispH, transform: `translate(${offset.x}px, ${offset.y}px)` }} />
                            )}
                        </div>
                        <div className="w-full flex items-center gap-2 mt-4">
                            <span className="text-xs text-slate-400">🔍</span>
                            <input type="range" min="1" max="3" step="0.01" value={zoom} onChange={e => setZoom(parseFloat(e.target.value))} className="flex-1" />
                        </div>
                        <p className="text-[11px] text-slate-400 mt-1">Arraste a foto pra posicionar, use o controle pra dar zoom.</p>
                        <div className="flex gap-3 w-full mt-4">
                            <button onClick={onCancel} disabled={enviando} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-colors">Cancelar</button>
                            <button onClick={confirmar} disabled={!imgEl || enviando} className="flex-1 bg-rose-700 hover:bg-rose-800 disabled:opacity-60 text-white font-bold py-3 rounded-xl transition-colors">{enviando ? 'Enviando...' : 'Usar foto'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        // 🖼️ Gerador de Catálogo — monta uma imagem tipo panfleto de "Ofertas do Dia" com os produtos
        // escolhidos (foto do Cardápio + nome + preço), pronta pra baixar e postar. Tudo automático:
        // rodapé/logo fixos, validade calculada pro dia seguinte (preço muda todo dia).
        const roundRectPath = (ctx, x, y, w, h, r) => {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        };
        const carregarImagemCanvas = (src, cors) => new Promise((resolve, reject) => {
            const img = new Image();
            if (cors) img.crossOrigin = 'anonymous';
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = src;
        });
        // Quebra texto em várias linhas dentro de maxWidth; devolve o Y depois da última linha.
        const quebrarTexto = (ctx, texto, x, y, maxWidth, lineHeight, maxLinhas) => {
            const palavras = texto.split(' ');
            let linha = '', linhas = 0;
            for (let i = 0; i < palavras.length; i++) {
                const teste = linha ? linha + ' ' + palavras[i] : palavras[i];
                if (ctx.measureText(teste).width > maxWidth && linha) {
                    ctx.fillText(linha, x, y);
                    linha = palavras[i]; y += lineHeight; linhas++;
                    if (maxLinhas && linhas >= maxLinhas - 1) { linha += (i < palavras.length - 1 ? '…' : ''); break; }
                } else linha = teste;
            }
            ctx.fillText(linha, x, y);
            return y + lineHeight;
        };
        const FRIGANSO_RED = '#FB4B3A'; // mesma cor do logo/marca usada no resto do app
        // 📱 Presets de quantidade — pensado pra Status do WhatsApp: imagem sempre 9:16 (Full HD celular,
        // 1080x1920), então quanto mais itens no preset, menor cada célula da grade fica.
        const CATALOGO_PRESETS = [
            { id: 4, label: '4 itens', cols: 2, rows: 2 },
            { id: 8, label: '8 itens', cols: 2, rows: 4 },
            { id: 16, label: '16 itens', cols: 4, rows: 4 },
            { id: 32, label: '32 itens', cols: 4, rows: 8 },
        ];
        // Gera UMA página (imagem 1080x1920). Se produtosSelecionados tiver mais itens que o preset
        // comporta, quem chama (gerarCatalogo no CardapioScreen) já divide em várias páginas antes.
        const gerarCatalogoImagem = async (produtosPagina, thumbsMap, contatos, preset, paginaInfo) => {
            const W = 1080, H = 1920, PAD = 32;
            const HEADER_H = 170, FOOTER_H = 110, DISCLAIMER_H = 46;
            const { cols, rows } = preset;
            const gridX = PAD, gridY = HEADER_H;
            const gridW = W - PAD * 2, gridH = H - HEADER_H - FOOTER_H - DISCLAIMER_H;
            const cellW = gridW / cols, cellH = gridH / rows;

            const canvas = document.createElement('canvas');
            canvas.width = W; canvas.height = H;
            const ctx = canvas.getContext('2d');

            // fundo — tema Friganso (vermelho/rosa da marca, clareando pro branco)
            const bgGrad = ctx.createLinearGradient(0, 0, W, H);
            bgGrad.addColorStop(0, '#fde4e0'); bgGrad.addColorStop(1, '#f7b8ae');
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

            // cabeçalho: selo "OFERTAS DO DIA" + validade (dia seguinte, já que o preço muda todo dia)
            ctx.fillStyle = FRIGANSO_RED;
            roundRectPath(ctx, PAD - 8, 22, 300, 58, 16); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 26px system-ui, sans-serif'; ctx.textAlign = 'left';
            ctx.fillText('🔥 OFERTAS DO DIA', PAD + 10, 60);
            const amanha = new Date(Date.now() + 86400000);
            ctx.fillStyle = '#7f1d1d'; ctx.font = 'bold 16px system-ui, sans-serif';
            let linhaInfo = 'Válido para ' + amanha.toLocaleDateString('pt-BR');
            if (paginaInfo && paginaInfo.total > 1) linhaInfo += `   ·   página ${paginaInfo.atual}/${paginaInfo.total}`;
            ctx.fillText(linhaInfo, PAD, 108);

            // logo oficial da Friganso (canto direito) — já vem com o nome escrito, então não precisa de texto ao lado
            {
                const logoH = 66, logoW = logoH * (112 / 98);
                try {
                    const logo = await carregarImagemCanvas(FRIGANSO_LOGO_DATA_URI);
                    ctx.drawImage(logo, W - PAD - logoW, 18, logoW, logoH);
                } catch (e) {}
            }

            // cartão branco atrás da grade de produtos
            roundRectPath(ctx, gridX - 14, gridY - 14, gridW + 28, gridH + 28, 22);
            ctx.fillStyle = '#ffffff'; ctx.fill();

            const fotoSize = Math.max(30, Math.min(cellW - 14, cellH * 0.6));
            const fontNome = Math.max(10, Math.min(16, cellW / 15));
            const fontPreco = Math.max(11, Math.min(18, cellW / 13));
            for (let i = 0; i < produtosPagina.length && i < cols * rows; i++) {
                const p = produtosPagina[i];
                const col = i % cols, row = Math.floor(i / cols);
                const cx = gridX + col * cellW, cy = gridY + row * cellH;
                const fx = cx + (cellW - fotoSize) / 2, fy = cy + 8;
                const thumb = thumbsMap && thumbsMap[String(p.code)];
                roundRectPath(ctx, fx, fy, fotoSize, fotoSize, 10);
                ctx.fillStyle = '#f1f5f9'; ctx.fill();
                if (thumb) {
                    try {
                        const img = await carregarImagemCanvas(thumb); // data URL — nunca dá problema de CORS
                        ctx.save(); roundRectPath(ctx, fx, fy, fotoSize, fotoSize, 10); ctx.clip();
                        const s = Math.max(fotoSize / img.width, fotoSize / img.height);
                        const dw = img.width * s, dh = img.height * s;
                        ctx.drawImage(img, fx + (fotoSize - dw) / 2, fy + (fotoSize - dh) / 2, dw, dh);
                        ctx.restore();
                    } catch (e) { /* mantém o placeholder cinza */ }
                } else {
                    ctx.fillStyle = '#94a3b8'; ctx.font = `${Math.round(fotoSize * 0.32)}px system-ui, sans-serif`; ctx.textAlign = 'center';
                    ctx.fillText('🍖', fx + fotoSize / 2, fy + fotoSize / 2 + fotoSize * 0.11); ctx.textAlign = 'left';
                }
                // nome (1 linha, corta com "…" se não couber — célula pequena demais pra quebrar linha nos presets maiores)
                ctx.textAlign = 'center';
                let nome = (p.name || '').toUpperCase();
                ctx.font = `bold ${fontNome}px system-ui, sans-serif`;
                while (ctx.measureText(nome).width > cellW - 6 && nome.length > 3) nome = nome.slice(0, -2) + '…';
                const nomeY = fy + fotoSize + fontNome + 4;
                ctx.fillStyle = '#0f172a'; ctx.fillText(nome, cx + cellW / 2, nomeY);
                const { unitFinalPrice } = checkDiscountRules(p.code, p.name, p.originalPrice);
                ctx.fillStyle = FRIGANSO_RED; ctx.font = `bold ${fontPreco}px system-ui, sans-serif`;
                ctx.fillText(formatPrice(unitFinalPrice) + '/kg', cx + cellW / 2, nomeY + fontPreco + 2);
                ctx.textAlign = 'left';
            }

            // avisinho — preço muda todo dia
            ctx.fillStyle = '#78350f'; ctx.font = '13px system-ui, sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('*Preços sujeitos a alteração diária. Confirme com seu vendedor.', W / 2, gridY + gridH + 28);
            ctx.textAlign = 'left';

            // rodapé fixo (contato)
            const footerY = H - FOOTER_H;
            ctx.fillStyle = FRIGANSO_RED; ctx.fillRect(0, footerY, W, FOOTER_H);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 15px system-ui, sans-serif'; ctx.textAlign = 'left';
            const linhaContatos = (contatos && contatos.length ? contatos : []).map(c => `${c.icone} ${c.texto}`).join('   ');
            quebrarTexto(ctx, linhaContatos, PAD, footerY + 32, W - PAD * 2, 22, 3);

            return canvas;
        };

        // 📇 Cartão/portfólio do vendedor — imagem 9:16 (mesmo formato do Catálogo) pra mandar pro
        // cliente se apresentar: foto, nome, cargo, tempo de casa e especialidades.
        const gerarPortfolioImagem = async (user, dados) => {
            const W = 1080, H = 1920, PAD = 60;
            const canvas = document.createElement('canvas');
            canvas.width = W; canvas.height = H;
            const ctx = canvas.getContext('2d');

            // fundo — vermelho da marca, mais forte que o do Catálogo (cara de "cartão de visita")
            const bgGrad = ctx.createLinearGradient(0, 0, W, H);
            bgGrad.addColorStop(0, '#C81E1E'); bgGrad.addColorStop(1, '#7f1d1d');
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, W, H);

            // logo oficial no topo — dentro de um selo branco pra manter contraste sobre o fundo vermelho
            {
                const logoH = 78, logoW = logoH * (112 / 98);
                const seloW = logoW + 56, seloH = logoH + 40;
                const seloX = W / 2 - seloW / 2, seloY = 60;
                roundRectPath(ctx, seloX, seloY, seloW, seloH, 20);
                ctx.fillStyle = '#ffffff'; ctx.fill();
                try {
                    const logo = await carregarImagemCanvas(FRIGANSO_LOGO_DATA_URI);
                    ctx.drawImage(logo, W / 2 - logoW / 2, seloY + 20, logoW, logoH);
                } catch (e) {}
            }

            // foto de perfil (redonda)
            const fotoR = 190, fotoCx = W / 2, fotoCy = 460;
            ctx.save();
            ctx.beginPath(); ctx.arc(fotoCx, fotoCy, fotoR, 0, Math.PI * 2); ctx.closePath();
            ctx.fillStyle = '#fff'; ctx.fill();
            ctx.clip();
            if (user.avatar) {
                try {
                    const img = await carregarImagemCanvas(user.avatar, true);
                    const s = Math.max((fotoR * 2) / img.width, (fotoR * 2) / img.height);
                    const dw = img.width * s, dh = img.height * s;
                    ctx.drawImage(img, fotoCx - dw / 2, fotoCy - dh / 2, dw, dh);
                } catch (e) {
                    ctx.fillStyle = '#fecaca'; ctx.font = 'bold 140px system-ui, sans-serif'; ctx.textAlign = 'center';
                    ctx.fillText((user.name || '?').charAt(0).toUpperCase(), fotoCx, fotoCy + 48);
                }
            } else {
                ctx.fillStyle = '#fecaca'; ctx.font = 'bold 140px system-ui, sans-serif'; ctx.textAlign = 'center';
                ctx.fillText((user.name || '?').charAt(0).toUpperCase(), fotoCx, fotoCy + 48);
            }
            ctx.restore();
            ctx.lineWidth = 6; ctx.strokeStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(fotoCx, fotoCy, fotoR, 0, Math.PI * 2); ctx.stroke();

            // nome + cargo
            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 52px system-ui, sans-serif';
            ctx.fillText(user.name || '', W / 2, 750);
            ctx.fillStyle = FRIGANSO_RED;
            roundRectPath(ctx, W / 2 - 190, 780, 380, 56, 28); ctx.fillStyle = '#fff'; ctx.fill();
            ctx.fillStyle = '#7f1d1d'; ctx.font = 'bold 24px system-ui, sans-serif';
            ctx.fillText((dados.cargo || 'Vendedor Friganso').toUpperCase(), W / 2, 817);

            // tempo de casa (calculado a partir de "desde")
            let y = 900;
            if (dados.desde) {
                const anos = Math.max(0, Math.floor((Date.now() - new Date(dados.desde + 'T00:00:00').getTime()) / (365.25 * 86400000)));
                ctx.fillStyle = '#fecaca'; ctx.font = '26px system-ui, sans-serif';
                ctx.fillText(anos >= 1 ? `Há ${anos} ano${anos > 1 ? 's' : ''} atendendo você` : 'Novo(a) na equipe Friganso', W / 2, y);
                y += 60;
            }

            // especialidades (pills)
            const tags = (dados.especialidades || '').split(',').map(t => t.trim()).filter(Boolean);
            if (tags.length) {
                ctx.font = 'bold 22px system-ui, sans-serif';
                const espacamento = 16;
                const larguras = tags.map(t => ctx.measureText(t).width + 40);
                const totalW = larguras.reduce((a, b) => a + b, 0) + espacamento * (tags.length - 1);
                let tx = W / 2 - totalW / 2;
                tags.forEach((t, i) => {
                    const w = larguras[i];
                    roundRectPath(ctx, tx, y, w, 46, 23);
                    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                    ctx.fillText(t, tx + w / 2, y + 31);
                    tx += w + espacamento;
                });
                y += 90;
            }
            ctx.textAlign = 'left';

            // rodapé: contato pessoal do vendedor
            const footerY = H - 200;
            roundRectPath(ctx, PAD, footerY, W - PAD * 2, 130, 20);
            ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 28px system-ui, sans-serif'; ctx.textAlign = 'center';
            if (dados.whatsapp) ctx.fillText('📱 ' + dados.whatsapp, W / 2, footerY + 55);
            ctx.font = '20px system-ui, sans-serif'; ctx.fillStyle = '#fecaca';
            ctx.fillText('Fale comigo pra fazer seu pedido!', W / 2, footerY + 95);
            ctx.textAlign = 'left';

            return canvas;
        };

        // 🍽️ Cardápio: cada produto pode ter uma foto, compartilhada com todo mundo que usa o sistema.
        const CardapioScreen = ({ products, produtoFotos, showMessage, catalogoContatos, salvarCatalogoContatos }) => {
            const [editandoRodape, setEditandoRodape] = useState(false);
            const [rodapeRascunho, setRodapeRascunho] = useState(catalogoContatos || []);
            useEffect(() => { if (!editandoRodape) setRodapeRascunho(catalogoContatos || []); }, [catalogoContatos, editandoRodape]);
            const [busca, setBusca] = useState('');
            const [enviando, setEnviando] = useState({}); // { [code]: true } enquanto sobe a foto
            const [crop, setCrop] = useState(null); // { code, file } enquanto o modal de recorte está aberto
            // 🖼️ Modo "montar catálogo": toca no card pra marcar/desmarcar em vez de trocar a foto.
            const [modoCatalogo, setModoCatalogo] = useState(false);
            const [selecionados, setSelecionados] = useState(new Set());
            const [gerando, setGerando] = useState(false);
            const [posterUrls, setPosterUrls] = useState(null); // array de URLs, uma por página
            const [paginaAtual, setPaginaAtual] = useState(0);
            const [presetId, setPresetId] = useState(8);
            const resultados = useMemo(() => {
                const q = busca.trim();
                const ativos = (products || []).filter(p => p.ativo !== false);
                if (!q) return ativos.slice(0, 60);
                return ativos.filter(p => matchProduto(p, q)).slice(0, 60);
            }, [products, busca]);

            const toggleSelecionado = (code) => setSelecionados(prev => { const n = new Set(prev); n.has(code) ? n.delete(code) : n.add(code); return n; });
            const gerarCatalogo = async () => {
                const lista = products.filter(p => selecionados.has(String(p.code)));
                if (!lista.length) { showMessage('Escolha pelo menos 1 produto.', 'error'); return; }
                setGerando(true);
                try {
                    const preset = CATALOGO_PRESETS.find(p => p.id === presetId) || CATALOGO_PRESETS[1];
                    const porPagina = preset.cols * preset.rows;
                    // busca a miniatura de cada produto selecionado (só quem tem foto) — evita o problema
                    // de CORS que a URL grande do Storage dá quando desenhada direto no canvas.
                    const comFoto = lista.filter(p => produtoFotos && produtoFotos[String(p.code)]);
                    const pares = await Promise.all(comFoto.map(p =>
                        db.collection('produto_fotos_thumbs').doc(String(p.code)).get()
                            .then(d => [String(p.code), d.exists ? d.data().thumb : null])
                            .catch(() => [String(p.code), null])
                    ));
                    const thumbsMap = Object.fromEntries(pares);
                    // 🧩 se passar da capacidade do preset, divide em várias páginas (imagens separadas)
                    const totalPaginas = Math.ceil(lista.length / porPagina);
                    const urls = [];
                    for (let pg = 0; pg < totalPaginas; pg++) {
                        const fatia = lista.slice(pg * porPagina, (pg + 1) * porPagina);
                        const canvas = await gerarCatalogoImagem(fatia, thumbsMap, catalogoContatos, preset, { atual: pg + 1, total: totalPaginas });
                        const url = await new Promise(res => canvas.toBlob(b => res(b ? URL.createObjectURL(b) : null), 'image/png'));
                        if (url) urls.push(url);
                    }
                    if (!urls.length) { showMessage('Erro ao gerar o catálogo.', 'error'); return; }
                    setPosterUrls(urls); setPaginaAtual(0);
                } catch (e) { showMessage('Erro ao gerar o catálogo.', 'error'); }
                finally { setGerando(false); }
            };

            // ⚙️ Editor do rodapé (mudar/excluir/adicionar linhas de contato) — salva compartilhado na nuvem.
            const mudarLinhaRodape = (i, campo, valor) => setRodapeRascunho(prev => prev.map((c, idx) => idx === i ? { ...c, [campo]: valor } : c));
            const removerLinhaRodape = (i) => setRodapeRascunho(prev => prev.filter((_, idx) => idx !== i));
            const addLinhaRodape = () => setRodapeRascunho(prev => [...prev, { icone: '📌', texto: '' }]);
            const salvarRodape = async () => {
                const limpo = rodapeRascunho.map(c => ({ icone: (c.icone || '').trim() || '📌', texto: (c.texto || '').trim() })).filter(c => c.texto);
                await salvarCatalogoContatos(limpo);
                setEditandoRodape(false);
                showMessage('Rodapé atualizado!', 'success');
            };

            // Só ESCOLHE o arquivo aqui — quem faz o recorte (arrastar/zoom, estilo WhatsApp) é o CropFotoModal.
            const escolherFoto = (code) => {
                const input = document.createElement('input');
                input.type = 'file'; input.accept = 'image/*';
                input.onchange = () => {
                    const file = input.files && input.files[0];
                    if (file) setCrop({ code, file });
                };
                input.click();
            };
            const confirmarCrop = async (blob) => {
                const code = crop.code;
                setCrop(null);
                setEnviando(prev => ({ ...prev, [code]: true }));
                try {
                    await subirFotoBlob(code, blob);
                    showMessage('Foto atualizada! Todo mundo já vê. 📸', 'success');
                } catch (e) { showMessage('Erro ao enviar a foto.', 'error'); }
                finally { setEnviando(prev => { const n = { ...prev }; delete n[code]; return n; }); }
            };
            const apagarFoto = async (code) => {
                if (!window.confirm('Remover a foto desse produto?')) return;
                setEnviando(prev => ({ ...prev, [code]: true }));
                try { await removerFotoProduto(code); showMessage('Foto removida.', 'success'); }
                catch (e) { showMessage('Erro ao remover a foto.', 'error'); }
                finally { setEnviando(prev => { const n = { ...prev }; delete n[code]; return n; }); }
            };

            return (
                <div className="animate-in fade-in space-y-6">
                    {crop && <CropFotoModal file={crop.file} onCancel={() => setCrop(null)} onConfirm={confirmarCrop} />}
                    {editandoRodape && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-[999]">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md p-5 flex flex-col max-h-[85vh]">
                                <h3 className="font-bold text-slate-800 mb-1">⚙️ Rodapé do Catálogo</h3>
                                <p className="text-xs text-slate-400 mb-3">Aparece em todo catálogo gerado, pra qualquer conta. Muda, apaga ou adiciona linhas.</p>
                                <div className="space-y-2 overflow-y-auto flex-1">
                                    {rodapeRascunho.map((c, i) => (
                                        <div key={i} className="flex items-center gap-2">
                                            <input type="text" value={c.icone} onChange={e => mudarLinhaRodape(i, 'icone', e.target.value)} maxLength={2} className="w-12 text-center px-2 py-2 border border-slate-200 rounded-lg outline-none focus:border-rose-500" />
                                            <input type="text" value={c.texto} onChange={e => mudarLinhaRodape(i, 'texto', e.target.value)} placeholder="Ex: www.friganso.com.br" className="flex-1 px-3 py-2 border border-slate-200 rounded-lg outline-none focus:border-rose-500 text-sm" />
                                            <button onClick={() => removerLinhaRodape(i)} className="h-9 w-9 flex-shrink-0 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-600"><div className="h-4 w-4"><IconX/></div></button>
                                        </div>
                                    ))}
                                    {rodapeRascunho.length === 0 && <p className="text-xs text-slate-400 text-center py-3">Nenhuma linha — adicione pelo menos uma.</p>}
                                </div>
                                <button onClick={addLinhaRodape} className="mt-2 text-sm font-bold text-rose-700 hover:text-rose-800 text-left">+ Adicionar linha</button>
                                <div className="flex gap-3 w-full mt-4">
                                    <button onClick={() => setEditandoRodape(false)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-colors">Cancelar</button>
                                    <button onClick={salvarRodape} className="flex-1 bg-rose-700 hover:bg-rose-800 text-white font-bold py-3 rounded-xl transition-colors">Salvar</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {posterUrls && posterUrls.length > 0 && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-[999]">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-5 flex flex-col items-center max-h-[92vh]">
                                <h3 className="font-bold text-slate-800 mb-1">Catálogo pronto! 🎉</h3>
                                {posterUrls.length > 1 && <p className="text-xs text-slate-400 mb-2">Página {paginaAtual + 1} de {posterUrls.length}</p>}
                                <img src={posterUrls[paginaAtual]} alt={`Catálogo página ${paginaAtual + 1}`} className="rounded-xl border border-slate-200 max-h-[62vh] object-contain" />
                                {posterUrls.length > 1 && (
                                    <div className="flex items-center gap-3 mt-3">
                                        <button onClick={() => setPaginaAtual(p => Math.max(0, p - 1))} disabled={paginaAtual === 0} className="h-9 w-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-40 font-bold">‹</button>
                                        <div className="flex gap-1.5">
                                            {posterUrls.map((_, i) => <button key={i} onClick={() => setPaginaAtual(i)} className={`h-2.5 w-2.5 rounded-full ${i === paginaAtual ? 'bg-rose-700' : 'bg-slate-200'}`} />)}
                                        </div>
                                        <button onClick={() => setPaginaAtual(p => Math.min(posterUrls.length - 1, p + 1))} disabled={paginaAtual === posterUrls.length - 1} className="h-9 w-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 disabled:opacity-40 font-bold">›</button>
                                    </div>
                                )}
                                <div className="flex gap-3 w-full mt-4">
                                    <button onClick={() => setPosterUrls(null)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-colors">Fechar</button>
                                    <a href={posterUrls[paginaAtual]} download={`friganso-ofertas-${diaStrGlobal(new Date())}-${paginaAtual + 1}.png`} className="flex-1 bg-rose-700 hover:bg-rose-800 text-white font-bold py-3 rounded-xl transition-colors text-center">⬇️ Baixar {posterUrls.length > 1 ? 'esta' : ''}</a>
                                </div>
                                {posterUrls.length > 1 && (
                                    <button onClick={() => posterUrls.forEach((u, i) => { const a = document.createElement('a'); a.href = u; a.download = `friganso-ofertas-${diaStrGlobal(new Date())}-${i + 1}.png`; a.click(); })} className="w-full mt-2 text-xs font-bold text-rose-700 hover:text-rose-800">⬇️ Baixar todas as {posterUrls.length} páginas</button>
                                )}
                            </div>
                        </div>
                    )}
                    <header className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                        <div className="flex flex-wrap items-center justify-between gap-2 mb-1">
                            <h1 className="text-2xl font-bold text-rose-800 flex items-center gap-2"><span>🍽️</span> Cardápio</h1>
                            <button onClick={() => { setModoCatalogo(v => !v); setSelecionados(new Set()); }} className={`px-4 py-2 rounded-xl font-bold text-sm transition-colors ${modoCatalogo ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>
                                {modoCatalogo ? '✕ Cancelar seleção' : '🖼️ Montar Catálogo'}
                            </button>
                        </div>
                        <p className="text-slate-500 text-sm mb-4">{modoCatalogo ? 'Toque nos produtos que quer colocar no catálogo de ofertas.' : 'Foto de cada produto — qualquer conta pode subir ou trocar, e todo mundo vê.'}</p>
                        <input type="text" placeholder="Buscar por código ou nome..." value={busca} onChange={e => setBusca(e.target.value)} className="w-full p-4 rounded-xl border border-slate-200 outline-none focus:border-rose-500 font-bold bg-slate-50" />
                        {modoCatalogo && (
                            <div className="mt-3 bg-rose-50 border border-rose-200 rounded-xl p-3 space-y-3">
                                <div className="flex flex-wrap items-center justify-between gap-2">
                                    <span className="text-sm font-bold text-rose-800">{selecionados.size} produto(s) selecionado(s)</span>
                                    <button onClick={() => setEditandoRodape(true)} className="bg-white border border-rose-200 hover:bg-rose-100 text-rose-700 px-3 py-2 rounded-lg font-bold text-xs transition-colors">⚙️ Editar rodapé</button>
                                </div>
                                <div className="flex flex-wrap items-center gap-2">
                                    <span className="text-xs font-bold text-rose-700">Itens por imagem:</span>
                                    {CATALOGO_PRESETS.map(pr => (
                                        <button key={pr.id} onClick={() => setPresetId(pr.id)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-colors ${presetId === pr.id ? 'bg-rose-700 text-white' : 'bg-white border border-rose-200 text-rose-700 hover:bg-rose-100'}`}>{pr.label}</button>
                                    ))}
                                </div>
                                {selecionados.size > (CATALOGO_PRESETS.find(p => p.id === presetId) || {}).cols * (CATALOGO_PRESETS.find(p => p.id === presetId) || {}).rows && (
                                    <p className="text-[11px] text-amber-700">Passou do preset — vai gerar {Math.ceil(selecionados.size / presetId)} imagens (páginas) automaticamente.</p>
                                )}
                                <button onClick={gerarCatalogo} disabled={selecionados.size === 0 || gerando} className="w-full bg-rose-700 hover:bg-rose-800 disabled:opacity-50 text-white px-4 py-2.5 rounded-lg font-bold text-sm transition-colors">{gerando ? 'Gerando...' : '🖼️ Gerar Catálogo'}</button>
                            </div>
                        )}
                    </header>
                    {products.length === 0 ? (
                        <div className="bg-white rounded-3xl border border-slate-200 p-10 text-center text-slate-400">Carregue a Tabela do Dia primeiro pra ver os produtos aqui.</div>
                    ) : (
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            {resultados.map(p => {
                                const foto = produtoFotos && produtoFotos[String(p.code)];
                                const subindo = !!enviando[String(p.code)];
                                const marcado = selecionados.has(String(p.code));
                                return (
                                    <div key={p.code} className={`bg-white rounded-2xl border shadow-sm overflow-hidden flex flex-col ${marcado ? 'border-rose-500 ring-2 ring-rose-200' : 'border-slate-200'}`}>
                                        <button onClick={() => modoCatalogo ? toggleSelecionado(String(p.code)) : escolherFoto(p.code)} disabled={subindo} className="relative aspect-square bg-slate-100 flex items-center justify-center overflow-hidden group">
                                            {foto ? <img src={foto} alt={p.name} className="w-full h-full object-cover" /> : <span className="text-3xl text-slate-300">🍖</span>}
                                            {modoCatalogo ? (
                                                <div className={`absolute top-2 right-2 h-6 w-6 rounded-full border-2 flex items-center justify-center text-xs font-bold ${marcado ? 'bg-rose-600 border-rose-600 text-white' : 'bg-white/80 border-slate-300 text-transparent'}`}>✓</div>
                                            ) : (
                                                <div className="absolute inset-0 bg-slate-900/0 group-hover:bg-slate-900/40 transition-colors flex items-center justify-center">
                                                    <span className="opacity-0 group-hover:opacity-100 text-white text-xs font-bold transition-opacity">{subindo ? 'Enviando...' : (foto ? '📷 Trocar foto' : '📷 Adicionar foto')}</span>
                                                </div>
                                            )}
                                        </button>
                                        <div className="p-3 flex-1 flex flex-col">
                                            <span className="text-[10px] font-mono font-bold text-slate-400">{p.code}</span>
                                            <p className="text-xs font-bold text-slate-700 leading-tight flex-1">{p.name}</p>
                                            {!modoCatalogo && foto && <button onClick={() => apagarFoto(p.code)} disabled={subindo} className="text-[10px] text-red-500 hover:text-red-700 font-bold mt-1 text-left">🗑️ remover foto</button>}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        };

        const CreditsScreen = () => (
            <div className="animate-in fade-in flex items-center justify-center min-h-[70vh]">
                <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden max-w-lg w-full text-center relative">
                    <div className="h-32 bg-slate-900 relative overflow-hidden"><img src={BG_IMAGE} className="absolute inset-0 w-full h-full object-cover opacity-30 mix-blend-overlay" /></div>
                    <div className="px-8 pb-8 relative">
                        <div className="w-24 h-24 bg-white rounded-2xl shadow-lg border-4 border-white mx-auto -mt-12 mb-4 overflow-hidden relative z-10 flex items-center justify-center"><FrigansoLogo className="w-16 h-16 object-contain" /></div>
                        <h2 className="text-2xl font-black text-slate-800 mb-1">Sistema Friganso Premium ERP</h2>
                        <p className="text-slate-500 font-medium mb-6">Versão Cloud - Inteligência & CRM</p>
                        <div className="bg-slate-50 rounded-2xl p-6 border border-slate-100 text-left mb-6">
                            <p className="text-sm text-slate-500 mb-1 uppercase tracking-wider font-bold">Desenvolvedor Oficial e CEO</p>
                            <p className="text-xl font-bold text-rose-800 mb-4 flex items-center flex-wrap gap-2">
                                Bruno Moura 
                                <span className="bg-rose-100 text-rose-700 border border-rose-200 px-2 py-0.5 rounded-md text-[10px] uppercase tracking-widest font-black">ID Admin Oficial: 99206</span>
                            </p>
                            <p className="text-sm text-slate-500 mb-1 uppercase tracking-wider font-bold">Contato Direto</p>
                            <a href="mailto:bruno.moura.f.silva@gmail.com" className="text-blue-600 font-medium flex items-center gap-2 hover:underline"><div className="h-4 w-4"><IconMail/></div> bruno.moura.f.silva@gmail.com</a>
                        </div>
                    </div>
                </div>
            </div>
        );

        // ===== RADAR DE CLIENTES: controle situacional + recomendações diárias =====
        const RadarScreen = ({ clients, products, setActiveRoute, showMessage }) => {
            // Categoria do produto por palavras-chave do nome
            const CAT_RE = {
                acougue: /costela|alcatra|patinho|cox[aã]o|ac[eé]m|contra.?fil|dianteiro|traseiro|banda|pernil|barriga|toucinho|f[ií]gado|mocot|bucho|rabada|carne|fraldinha|maminha|picanha|cupim|lagarto|m[uú]sculo|peito\s*resf|carr[eé]|suin|bovin/i,
                mercado: /mussarela|queijo|presunto|pres\.|mortadela|mort\.|salsich|lingui|ling\.|bacon|margarina|hamburg|frios|requeij|leite|manteiga|nuggets|empanad|pres\s|coxa|asa|frango|salsich[aã]o/i,
                restaurante: /p[aã]o de alho|fil[eé] de peito|file de peito|frango temp|coalho|batata|grill|churrasc|espeto|picanha|alcatra|costela.*grill|pizza/i
            };
            const profileCat = (title) => {
                const t = (title || '').toLowerCase();
                if (/a[cç]ougue/.test(t)) return 'acougue';
                if (/mercad|mercear/.test(t)) return 'mercado';
                if (/restaurante|food/.test(t)) return 'restaurante';
                return '';
            };
            const nameCat = (name) => {
                const n = (name || '').toLowerCase();
                if (/supermerc|mercad|mercear|minimerc|atacad|distribuidora|bebidas/.test(n)) return 'mercado';
                if (/restaurante|churrasc|lanchonete|petiscaria|espeto|gril|pizza|confeitaria|bar\b|butecou/.test(n)) return 'restaurante';
                if (/a[cç]ougue|carne/.test(n)) return 'acougue';
                return '';
            };
            const categoryForClient = (c) => profileCat(c.profile && c.profile.title) || nameCat(c.name) || 'geral';
            const matchesCategory = (name, cat) => cat === 'geral' ? true : (CAT_RE[cat] ? CAT_RE[cat].test(name || '') : true);
            const hashStr = (s) => { let h = 0; const str = String(s || ''); for (let i = 0; i < str.length; i++) { h = (h * 31 + str.charCodeAt(i)) >>> 0; } return h; };

            const catLabel = { acougue: '🥩 Açougue', mercado: '🛒 Mercado', restaurante: '🍽️ Restaurante', geral: '📦 Geral' };

            // Classificação situacional por nº de produtos diferentes já comprados
            const stats = useMemo(() => {
                const lvl = (c) => (c.history || []).length;
                const inativos = clients.filter(c => lvl(c) === 0);
                const atencao = clients.filter(c => lvl(c) >= 1 && lvl(c) <= 3);
                const medios = clients.filter(c => lvl(c) >= 4 && lvl(c) <= 8);
                const top = clients.filter(c => lvl(c) >= 9);
                const ranking = [...clients].sort((a, b) => lvl(b) - lvl(a));
                return { inativos, atencao, medios, top, ranking, total: clients.length };
            }, [clients]);

            // Recomendações do dia (rotaciona pela data, prioriza quem precisa de atenção)
            const recs = useMemo(() => {
                if (!clients.length || !products.length) return [];
                const today = new Date();
                const daySeed = Number(`${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`);
                const out = [];
                clients.forEach(c => {
                    const cat = categoryForClient(c);
                    const bought = new Set((c.history || []).map(String));
                    let cands = products.filter(p => !bought.has(String(p.code)) && matchesCategory(p.name, cat));
                    if (!cands.length) cands = products.filter(p => !bought.has(String(p.code)));
                    if (!cands.length) return;
                    const idx = (daySeed + hashStr(c.code)) % cands.length;
                    out.push({ client: c, product: cands[idx], cat, hist: (c.history || []).length });
                });
                // prioriza menos histórico (atenção); desempate rotativo pelo dia
                out.sort((a, b) => (a.hist - b.hist) || ((hashStr(a.client.code) + daySeed) % 100) - ((hashStr(b.client.code) + daySeed) % 100));
                return out;
            }, [clients, products]);

            const abrirCliente = (c) => { window.localStorage.setItem('friganso_open_client_id', c.id); setActiveRoute('clients'); };
            const gerarOferta = (productCode) => {
                window.localStorage.setItem('friganso_offer_codes', JSON.stringify([String(productCode)]));
                setActiveRoute('orcamentos');
            };

            const StatCard = ({ emoji, label, value, sub, color }) => (
                <div className={`bg-white rounded-2xl p-5 border shadow-sm ${color}`}>
                    <div className="flex items-center justify-between"><span className="text-2xl">{emoji}</span><span className="text-3xl font-black text-slate-800">{value}</span></div>
                    <p className="text-sm font-bold text-slate-700 mt-2">{label}</p>
                    <p className="text-xs text-slate-400">{sub}</p>
                </div>
            );

            const destaque = recs[0];

            return (
                <div className="animate-in fade-in space-y-6">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><span>🎯</span> Radar de Clientes</h2>
                        <p className="text-slate-500 text-sm">Controle situacional e recomendações inteligentes por perfil.</p>
                    </div>

                    {products.length === 0 && (
                        <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-amber-700 text-sm font-medium">
                            ⚠️ Carregue a <b>Tabela do Dia (PDF)</b> para liberar as recomendações de produtos.
                        </div>
                    )}

                    {/* Cards de situação */}
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        <StatCard emoji="🔥" label="Top Compradores" value={stats.top.length} sub="9+ produtos diferentes" color="border-emerald-200" />
                        <StatCard emoji="🙂" label="Compradores Médios" value={stats.medios.length} sub="4 a 8 produtos" color="border-blue-200" />
                        <StatCard emoji="⚠️" label="Precisam de Atenção" value={stats.atencao.length} sub="1 a 3 produtos" color="border-amber-200" />
                        <StatCard emoji="🚨" label="Inativos (não compraram)" value={stats.inativos.length} sub="sem histórico" color="border-rose-200" />
                    </div>

                    {/* Destaque do dia */}
                    {destaque && (
                        <div className="bg-gradient-to-br from-rose-700 to-rose-900 rounded-3xl p-6 text-white shadow-lg relative overflow-hidden">
                            <div className="absolute top-0 right-0 text-[120px] opacity-10 leading-none -mt-4 -mr-2">🎯</div>
                            <p className="text-xs font-bold uppercase tracking-widest text-rose-200">Recomendação do Dia</p>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="bg-white text-rose-800 px-2.5 py-1 rounded-lg font-mono font-black text-lg leading-none shadow-sm">{destaque.client.code || '—'}</span>
                                <h3 className="text-2xl font-extrabold">{destaque.client.name}</h3>
                            </div>
                            <p className="text-rose-200 text-sm mt-1">{catLabel[destaque.cat]} · {destaque.hist === 0 ? 'ainda não comprou nada' : `${destaque.hist} produto(s) no histórico`}</p>
                            <div className="bg-white/15 backdrop-blur rounded-2xl p-4 mt-4 border border-white/20">
                                <p className="text-xs text-rose-100">Ofereça hoje:</p>
                                <p className="text-lg font-bold leading-tight mt-0.5">{destaque.product.code} — {destaque.product.name}</p>
                            </div>
                            <div className="flex gap-2 mt-4">
                                <button onClick={() => gerarOferta(destaque.product.code)} className="bg-white text-rose-800 font-bold px-4 py-2.5 rounded-xl text-sm shadow hover:bg-rose-50 transition-colors flex items-center gap-2"><div className="h-4 w-4"><IconWhatsApp/></div> Gerar Oferta no Zap</button>
                                <button onClick={() => abrirCliente(destaque.client)} className="bg-white/20 hover:bg-white/30 text-white font-bold px-4 py-2.5 rounded-xl text-sm transition-colors">Ver Perfil</button>
                            </div>
                        </div>
                    )}

                    {/* Lista de recomendações */}
                    <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-5 border-b border-slate-100"><h3 className="font-bold text-slate-800 flex items-center gap-2"><div className="h-5 w-5 text-rose-600"><IconWand/></div> Quem abordar hoje (por prioridade)</h3></div>
                        <div className="divide-y divide-slate-100 max-h-[420px] overflow-y-auto">
                            {recs.slice(1, 16).map((r, i) => (
                                <div key={i} className="p-4 flex items-center justify-between gap-3 hover:bg-slate-50 transition-colors">
                                    <div className="min-w-0 flex-1">
                                        <div className="flex items-center gap-2">
                                            <span className="bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-black text-xs flex-shrink-0">{r.client.code || '—'}</span>
                                            <p className="font-bold text-slate-800 text-sm truncate">{r.client.name}</p>
                                            <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full flex-shrink-0">{catLabel[r.cat]}</span>
                                            {r.hist === 0 && <span className="text-[10px] font-bold bg-rose-100 text-rose-600 px-2 py-0.5 rounded-full flex-shrink-0">inativo</span>}
                                        </div>
                                        <p className="text-xs text-slate-500 truncate mt-0.5">Sugestão: <b className="text-slate-700">{r.product.code}</b> — {r.product.name}</p>
                                    </div>
                                    <div className="flex gap-1.5 flex-shrink-0">
                                        <button onClick={() => gerarOferta(r.product.code)} title="Gerar oferta" className="bg-emerald-100 hover:bg-emerald-200 text-emerald-700 h-9 w-9 rounded-lg flex items-center justify-center transition-colors"><div className="h-4 w-4"><IconWhatsApp/></div></button>
                                        <button onClick={() => abrirCliente(r.client)} title="Ver perfil" className="bg-slate-100 hover:bg-slate-200 text-slate-600 h-9 w-9 rounded-lg flex items-center justify-center transition-colors"><div className="h-4 w-4"><IconUser/></div></button>
                                    </div>
                                </div>
                            ))}
                            {recs.length === 0 && <div className="p-8 text-center text-slate-400 text-sm">Cadastre clientes e carregue a tabela de produtos para ver recomendações.</div>}
                        </div>
                    </div>

                    {/* Ranking + listas situacionais */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="p-5 border-b border-slate-100"><h3 className="font-bold text-slate-800">🏆 Ranking de Compradores</h3></div>
                            <div className="divide-y divide-slate-100 max-h-[360px] overflow-y-auto">
                                {stats.ranking.slice(0, 20).map((c, i) => (
                                    <button key={c.id} onClick={() => abrirCliente(c)} className="w-full p-3 flex items-center gap-3 hover:bg-slate-50 transition-colors text-left">
                                        <span className={`h-7 w-7 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0 ${i < 3 ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500'}`}>{i + 1}</span>
                                        <span className="bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-black text-xs flex-shrink-0">{c.code || '—'}</span>
                                        <span className="font-bold text-sm text-slate-700 truncate flex-1">{c.name}</span>
                                        <span className="text-xs font-bold text-slate-400">{(c.history || []).length} itens</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                            <div className="p-5 border-b border-slate-100"><h3 className="font-bold text-slate-800">🚨 Clientes para resgatar</h3><p className="text-xs text-slate-400">Inativos e de baixa compra — foco de atenção</p></div>
                            <div className="divide-y divide-slate-100 max-h-[360px] overflow-y-auto">
                                {[...stats.inativos, ...stats.atencao].slice(0, 20).map(c => (
                                    <button key={c.id} onClick={() => abrirCliente(c)} className="w-full p-3 flex items-center gap-3 hover:bg-slate-50 transition-colors text-left">
                                        <span className={`h-2.5 w-2.5 rounded-full flex-shrink-0 ${(c.history || []).length === 0 ? 'bg-rose-500' : 'bg-amber-400'}`}></span>
                                        <span className="bg-rose-700 text-white px-2 py-0.5 rounded font-mono font-black text-xs flex-shrink-0">{c.code || '—'}</span>
                                        <span className="font-bold text-sm text-slate-700 truncate flex-1">{c.name}</span>
                                        <span className="text-xs font-bold text-slate-400">{(c.history || []).length === 0 ? 'nunca comprou' : `${(c.history || []).length} itens`}</span>
                                    </button>
                                ))}
                                {stats.inativos.length === 0 && stats.atencao.length === 0 && <div className="p-8 text-center text-slate-400 text-sm">Nenhum cliente precisando de atenção. 🎉</div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ===== TUTORIAL: guia completo de uso do site =====
        const TutorialScreen = ({ setActiveRoute }) => {
            const [aberta, setAberta] = useState('inicio');
            const toggle = (id) => setAberta(aberta === id ? '' : id);

            // Banner ilustrativo de cada seção
            const Banner = ({ grad, emoji, titulo }) => (
                <div className={`rounded-2xl p-5 mb-4 bg-gradient-to-br ${grad} text-white relative overflow-hidden`}>
                    <div className="absolute -right-3 -top-4 text-[90px] opacity-20 leading-none">{emoji}</div>
                    <p className="text-xs font-bold uppercase tracking-widest opacity-80">Como funciona</p>
                    <p className="text-lg font-extrabold mt-0.5 relative">{titulo}</p>
                </div>
            );
            const Passo = ({ n, children }) => (
                <div className="flex gap-3 items-start">
                    <span className="h-6 w-6 rounded-full bg-rose-100 text-rose-700 flex items-center justify-center text-xs font-black flex-shrink-0 mt-0.5">{n}</span>
                    <p className="text-sm text-slate-600 leading-relaxed flex-1">{children}</p>
                </div>
            );
            const Dica = ({ children }) => (
                <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-800 flex gap-2"><span>💡</span><span>{children}</span></div>
            );
            const Secao = ({ id, icon: Icon, cor, titulo, sub, children }) => {
                const ativa = aberta === id;
                return (
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">

                            <div className={`h-11 w-11 rounded-xl flex items-center justify-center text-white flex-shrink-0 ${cor}`}><div className="h-6 w-6"><Icon/></div></div>
                            <div className="flex-1 min-w-0">
                                <h3 className="font-bold text-slate-800 leading-tight">{titulo}</h3>
                                <p className="text-xs text-slate-400 truncate">{sub}</p>
                            </div>
                            <div className={`h-5 w-5 text-slate-400 transition-transform flex-shrink-0 ${ativa ? 'rotate-180' : ''}`}><IconChevron/></div>
                        </button>
                        {ativa && <div className="px-4 pb-5 pt-1 space-y-3 animate-in fade-in slide-in-from-top-2">{children}</div>}
                    </div>
                );
            };
            const Ir = ({ rota, children }) => (
                <button onClick={() => setActiveRoute(rota)} className="text-xs font-bold text-rose-700 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition-colors">{children} →</button>
            );

            return (
                <div className="animate-in fade-in max-w-3xl mx-auto space-y-4">
                    {/* Cabeçalho */}
                    <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-6 text-white text-center relative overflow-hidden">
                        <div className="h-16 w-16 mx-auto mb-3 bg-white rounded-2xl p-1.5 shadow-lg"><FrigansoLogo className="w-full h-full" /></div>

                        <p className="text-slate-300 text-sm mt-1">Aprenda a usar todas as funções do sistema, passo a passo.</p>
                    </div>

                    {/* Ordem ideal */}

                        <div className="flex flex-wrap gap-1.5 text-xs">
                            {['1. Carregar Tabela (PDF)', '2. Importar Clientes', '3. Importar Histórico', '4. Usar Resumo/Radar/Disparos'].map(s => (
                                <span key={s} className="bg-white border border-rose-200 text-rose-700 font-bold px-2.5 py-1 rounded-lg">{s}</span>

                        </div>
                    </div>

                    {/* 1. Tabela do Dia */}
