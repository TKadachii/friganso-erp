        };

        // ===== DEBUG (somente admin) =====
        const DebugScreen = ({ user, showMessage }) => {
            const [usuario, setUsuario] = useState(() => window.localStorage.getItem('friganso_spamov_user') || '');
            const [senha, setSenha] = useState(() => window.localStorage.getItem('friganso_spamov_pass') || '');
            const [verSenha, setVerSenha] = useState(false);

            // 🧪 Valor da Nota (teste) = Peso (P.Liq. KG) × Preço/Kg — pra comparar com o total real do SPAmov
            const lerValorNota = () => { try { const raw = window.localStorage.getItem('friganso_debug_valor_nota'); return raw ? JSON.parse(raw) : null; } catch (e) { return null; } };
            const [valorNota, setValorNota] = useState(lerValorNota);
            useEffect(() => {
                const atualizar = () => setValorNota(lerValorNota());
                window.addEventListener('storage', atualizar);
                const iv = setInterval(atualizar, 1500); // a mesma aba não dispara 'storage' -> também faz polling
                return () => { window.removeEventListener('storage', atualizar); clearInterval(iv); };
            }, []);
            const limparValorNota = () => { window.localStorage.removeItem('friganso_debug_valor_nota'); setValorNota(null); };

            // 🧹 Correção de pedidos duplicados (mesmo SPAmov registrado mais de uma vez, de antes da
            // regra "mesmo SPAmov = mesmo pedido" existir). Faz um escaneamento primeiro (não mexe em
            // nada), mostra o que seria corrigido, e só executa depois de confirmar.
            const [dedupPreview, setDedupPreview] = useState(null);
            const [dedupBusy, setDedupBusy] = useState(false);
            const escanearDuplicatas = async () => {
                setDedupBusy(true);
                try {
                    const snap = await db.collection('purchases').get();
                    const todos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const porSpamov = {};
                    todos.forEach(p => { const sp = (p.spamov || '').trim(); if (!sp) return; (porSpamov[sp] = porSpamov[sp] || []).push(p); });
                    const grupos = Object.keys(porSpamov).map(sp => porSpamov[sp]).filter(g => g.length > 1)
                        .map(g => g.slice().sort((a, b) => (a.ts || 0) - (b.ts || 0)));
                    setDedupPreview({ grupos, totalDocsRemovidos: grupos.reduce((a, g) => a + g.length - 1, 0) });
                    if (!grupos.length) showMessage('Nenhuma duplicata encontrada! 🎉', 'success');
                } catch (e) { showMessage('Erro ao escanear duplicatas.', 'error'); }
                setDedupBusy(false);
            };
            const corrigirDuplicatas = async () => {
                if (!dedupPreview || !dedupPreview.grupos.length) return;
                if (!window.confirm(`Vai juntar ${dedupPreview.grupos.length} grupo(s) duplicado(s), removendo ${dedupPreview.totalDocsRemovidos} registro(s) repetido(s).\n\nO conteúdo de cada um fica salvo pra sempre no histórico de edições do pedido que continua ativo. Confirma?`)) return;
                setDedupBusy(true);
                try {
                    for (const grupo of dedupPreview.grupos) {
                        const keeper = grupo[0]; // o mais antigo — mantém id/data original da venda
                        const outros = grupo.slice(1); // mais novos, em ordem cronológica
                        let itensAtual = keeper.itens, valorAtual = keeper.valor, pesoAtual = keeper.pesoTotal;
                        let clienteCodeAtual = keeper.clienteCode, clienteNameAtual = keeper.clienteName, tipoPessoaAtual = keeper.tipoPessoa;
                        const entradasHist = (keeper.historicoEdicoes || []).slice();
                        outros.forEach(dup => {
                            entradasHist.push(criarEntradaHistoricoEdicao(
                                { clienteCode: clienteCodeAtual, clienteName: clienteNameAtual, spamov: keeper.spamov, itens: itensAtual, valor: valorAtual, pesoTotal: pesoAtual },
                                'fusao_duplicata_automatica', 'sistema'
                            ));
                            itensAtual = dup.itens; valorAtual = dup.valor; pesoAtual = dup.pesoTotal;
                            clienteCodeAtual = dup.clienteCode || clienteCodeAtual; clienteNameAtual = dup.clienteName || clienteNameAtual; tipoPessoaAtual = dup.tipoPessoa || tipoPessoaAtual;
                            if (dup.historicoEdicoes && dup.historicoEdicoes.length) entradasHist.push(...dup.historicoEdicoes);
                        });
                        await db.collection('purchases').doc(keeper.id).update({
                            clienteCode: clienteCodeAtual, clienteName: clienteNameAtual, tipoPessoa: tipoPessoaAtual,
                            itens: itensAtual, valor: valorAtual, pesoTotal: pesoAtual,
                            editadoEm: Date.now(), editadoPor: 'sistema (correção de duplicatas)',
                            historicoEdicoes: entradasHist
                        });
                        for (const dup of outros) { await db.collection('purchases').doc(dup.id).delete(); }
                    }
                    showMessage(`${dedupPreview.grupos.length} grupo(s) corrigido(s)! 🎉`, 'success');
                    setDedupPreview(null);
                } catch (e) { showMessage('Erro ao corrigir duplicatas.', 'error'); }
                setDedupBusy(false);
            };

            const salvar = () => {
                window.localStorage.setItem('friganso_spamov_user', usuario);
                window.localStorage.setItem('friganso_spamov_pass', senha);
                window.postMessage({ source: 'friganso-app', type: 'SET_CREDS', usuario: usuario, senha: senha, autoLogin: false }, '*');
                showMessage('Credenciais salvas neste dispositivo.', 'success');
            };
            const abrirELogar = () => {
                if (!usuario.trim() || !senha) { showMessage('Preencha usuário e senha primeiro.', 'error'); return; }
                window.localStorage.setItem('friganso_spamov_user', usuario);
                window.localStorage.setItem('friganso_spamov_pass', senha);
                window.postMessage({ source: 'friganso-app', type: 'SET_CREDS', usuario: usuario, senha: senha, autoLogin: true, irVendas: true }, '*');
                showMessage('Abrindo SPAmov, logando e indo pra Vendas...', 'success');
                setTimeout(() => { window.open('http://spd1.friganso.com.br/rdm-business/', 'spamov_login'); }, 500);
            };

            return (
                <div className="animate-in fade-in max-w-2xl mx-auto space-y-5">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><span>🐞</span> Debug (Admin)</h2>
                        <p className="text-slate-500 text-sm">Ferramentas internas, só pra você.</p>
                    </div>

                    <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 space-y-4">
                        <h3 className="font-bold text-slate-800 flex items-center gap-2"><span>🔐</span> Login automático no SPAmov</h3>
                        <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
                            ⚠️ Suas credenciais ficam salvas <b>só neste aparelho</b> (nunca no servidor/GitHub). Use só num dispositivo de confiança.
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500">Usuário</label>
                            <input type="text" value={usuario} onChange={e => setUsuario(e.target.value)} placeholder="ex: f.v.99206" className="w-full mt-1 px-3 py-2.5 bg-slate-50 border rounded-xl text-sm outline-none focus:border-rose-500" />
                        </div>
                        <div>
                            <label className="text-xs font-bold text-slate-500">Senha</label>
                            <div className="relative mt-1">
                                <input type={verSenha ? 'text' : 'password'} value={senha} onChange={e => setSenha(e.target.value)} placeholder="sua senha do SPAmov" className="w-full px-3 py-2.5 pr-16 bg-slate-50 border rounded-xl text-sm outline-none focus:border-rose-500" />
                                <button onClick={() => setVerSenha(!verSenha)} className="absolute right-2 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 hover:text-slate-600 px-2 py-1">{verSenha ? 'ocultar' : 'ver'}</button>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={abrirELogar} className="flex-1 bg-rose-700 hover:bg-rose-800 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2"><span>🚀</span> Abrir SPAmov e Logar</button>
                            <button onClick={salvar} className="bg-white border-2 border-slate-200 hover:border-rose-400 text-slate-700 font-bold py-3 px-5 rounded-xl transition-colors">💾 Salvar</button>
                        </div>
                        <p className="text-[11px] text-slate-400">A extensão precisa estar instalada e com acesso aos sites. Ao clicar em "Abrir e Logar", a página do SPAmov abre e a extensão preenche e clica em <b>Log In</b>.</p>
                    </div>

                    <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 space-y-4">
                        <div className="flex items-center justify-between">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2"><span>💰</span> Valor da Nota (teste)</h3>
                            {valorNota && <button onClick={limparValorNota} className="text-xs font-bold text-slate-400 hover:text-rose-600">limpar</button>}
                        </div>
                        <p className="text-xs text-slate-400">Calculado como <b>Peso (P.Liq. KG) × Preço/Kg</b> — exatamente como o SPAmov calcula. É só pra conferir; <b>não muda</b> o Resumo de Pedido normal.</p>
                        {!valorNota ? (
                            <div className="text-sm text-slate-400 italic py-2">Nenhum pedido lido ainda. No SPAmov, clique em "📋 Enviar pro Friganso ERP".</div>
                        ) : (
                            <div className="space-y-3">
                                <div className="text-xs text-slate-500">Cliente <b>{valorNota.cliente || '?'}</b> · SPAmov <b>{valorNota.spamov || '?'}</b> · {new Date(valorNota.ts).toLocaleTimeString('pt-BR')}</div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-xs">
                                        <thead>
                                            <tr className="text-slate-400 text-left">
                                                <th className="py-1 pr-2">Código</th><th className="pr-2">Produto</th><th className="pr-2">Qtd</th><th className="pr-2">Peso (kg)</th><th className="pr-2">R$/kg (tabela)</th><th className="pr-2">R$/kg (SPAmov)</th><th>Subtotal</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {valorNota.itens.map((it, i) => (
                                                <tr key={i} className="border-t border-slate-100">
                                                    <td className="py-1.5 pr-2 font-mono">{it.code}</td>
                                                    <td className="pr-2">{it.nome}</td>
                                                    <td className="pr-2">{it.qty}</td>
                                                    <td className={"pr-2 " + ((!it.peso) ? 'text-rose-500 font-bold' : '')}>{(it.peso || 0).toFixed(2)}</td>
                                                    <td className="pr-2">{it.precoTabela ? formatPrice(it.precoTabela) : '—'}</td>
                                                    <td className="pr-2">{it.precoSpamov ? formatPrice(it.precoSpamov) : '—'}</td>
                                                    <td className="font-bold">{formatPrice(it.subtotal)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="text-right text-lg font-extrabold text-rose-700">Total: {formatPrice(valorNota.total)}</div>
                            </div>
                        )}
                    </div>

                    <div className="bg-white rounded-3xl border border-slate-200 shadow-sm p-6 space-y-4">
                        <h3 className="font-bold text-slate-800 flex items-center gap-2"><span>🧹</span> Corrigir pedidos duplicados (mesmo SPAmov)</h3>
                        <p className="text-xs text-slate-400">Pedidos de antes da regra "mesmo SPAmov = mesmo pedido" existir podem estar duplicados no Histórico, contando faturamento duas vezes. Isso escaneia primeiro (não mexe em nada) e só corrige depois de você confirmar. O conteúdo de cada duplicata removida fica salvo pra sempre no histórico de edições do pedido que sobra.</p>
                        <button onClick={escanearDuplicatas} disabled={dedupBusy} className="bg-slate-800 hover:bg-slate-900 disabled:opacity-50 text-white font-bold py-3 px-5 rounded-xl transition-colors">{dedupBusy ? 'Escaneando...' : '🔍 Escanear duplicatas'}</button>
                        {dedupPreview && (
                            <div className="space-y-2">
                                {dedupPreview.grupos.length === 0 ? (
                                    <p className="text-sm text-emerald-700 font-bold">✅ Nenhuma duplicata encontrada.</p>
                                ) : (
                                    <>
                                        <p className="text-sm font-bold text-amber-700">{dedupPreview.grupos.length} grupo(s) duplicado(s) — {dedupPreview.totalDocsRemovidos} registro(s) serão fundidos.</p>
                                        <div className="max-h-56 overflow-y-auto space-y-1.5">
                                            {dedupPreview.grupos.map((g, i) => (
                                                <div key={i} className="text-xs bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                                                    <b>SPAmov {g[0].spamov}</b> · {g.length} registros · cliente {g[0].clienteCode} ({g[0].clienteName || '?'})
                                                    <div className="text-slate-500 mt-0.5">{g.map(p => (p.ts ? new Date(p.ts).toLocaleString('pt-BR') : '?') + ' (' + formatPrice(p.valor || 0) + ')').join(' → ')}</div>
                                                </div>
                                            ))}
                                        </div>
                                        <button onClick={corrigirDuplicatas} disabled={dedupBusy} className="w-full bg-amber-600 hover:bg-amber-700 disabled:opacity-50 text-white font-bold py-3 rounded-xl transition-colors">{dedupBusy ? 'Corrigindo...' : '✅ Confirmar e corrigir agora'}</button>
                                    </>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 🌐 Navegador embutido (só no programa de PC / Electron) — Chrome dentro do app
        const NavegadorScreen = () => {
            const wvRef = useRef(null);
            const UA_CHROME = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36';
            const INICIAL = 'http://spd1.friganso.com.br/rdm-business/';
            const [barra, setBarra] = useState(INICIAL);
            const [carregando, setCarregando] = useState(false);
            const [urlAtual, setUrlAtual] = useState(INICIAL);

            useEffect(() => {
                const wv = wvRef.current; if (!wv) return;
                const onStart = () => setCarregando(true);
                const onStop = () => { setCarregando(false); try { const u = wv.getURL(); setUrlAtual(u); setBarra(u); } catch (e) {} };
                wv.addEventListener('did-start-loading', onStart);
                wv.addEventListener('did-stop-loading', onStop);
                return () => { try { wv.removeEventListener('did-start-loading', onStart); wv.removeEventListener('did-stop-loading', onStop); } catch (e) {} };
            }, []);

            const irPara = (u) => {
                let x = (u || '').trim(); if (!x) return;
                if (!/^https?:\/\//i.test(x) && !/^[a-z]+:\/\//i.test(x)) x = 'https://' + x;
                setBarra(x);
                try { wvRef.current.loadURL(x); } catch (e) {}
            };
            const voltar = () => { try { if (wvRef.current.canGoBack()) wvRef.current.goBack(); } catch (e) {} };
            const avancar = () => { try { if (wvRef.current.canGoForward()) wvRef.current.goForward(); } catch (e) {} };
            const recarregar = () => { try { wvRef.current.reload(); } catch (e) {} };

            // 📲 No app do celular: abre o site da Friganso no navegador nativo controlado (já loga sozinho
            // com as credenciais salvas). Serve pra mexer manualmente no SPAmov — conferir pedido, mudar algo, etc.
            if (isCapacitor) {
                const abrir = () => { if (window.__frigAbrirSpamov) window.__frigAbrirSpamov(); };
                return (
                    <div className="animate-in fade-in max-w-md mx-auto text-center py-10 space-y-5">
                        <div className="text-5xl">🌐</div>
                        <div>
                            <h2 className="text-xl font-bold text-slate-800">Site da Friganso (SPAmov)</h2>
                            <p className="text-slate-500 text-sm mt-1">Abre o site de verdade pra você navegar, conferir ou mudar algo na mão.</p>
                        </div>
                        <button onClick={abrir} className="w-full bg-rose-700 hover:bg-rose-800 text-white font-black py-4 rounded-2xl shadow-lg transition-colors flex items-center justify-center gap-2 text-lg">
                            <span>🚀</span> Abrir o site da Friganso
                        </button>
                        <p className="text-xs text-slate-400">Se você já salvou usuário/senha em 🐞 Debug, ele loga sozinho. Lá dentro use o botão <b>📋 ERP</b> no topo pra trazer um pedido de volta pro Resumo.</p>
                    </div>
                );
            }

            if (!isElectron) {
                return (
                    <div className="max-w-xl mx-auto bg-amber-50 border border-amber-200 rounded-2xl p-6 text-amber-800 text-sm">
                        🌐 O <b>Navegador embutido</b> só funciona no <b>programa de PC</b> (Friganso ERP Desktop) e no <b>app do celular</b>. No site, use as abas normais do navegador.
                    </div>
                );
            }

            const Btn = ({ onClick, children, title }) => (
                <button onClick={onClick} title={title} className="h-9 w-9 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold flex-shrink-0">{children}</button>
            );

            return (
                <div className="animate-in fade-in flex flex-col" style={{ height: 'calc(100vh - 80px)' }}>
                    <div className="flex items-center gap-2 mb-2 flex-wrap">
                        <Btn onClick={voltar} title="Voltar">←</Btn>
                        <Btn onClick={avancar} title="Avançar">→</Btn>
                        <Btn onClick={recarregar} title="Recarregar">{carregando ? '×' : '⟳'}</Btn>
                        <input
                            type="text" value={barra}
                            onChange={e => setBarra(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter') irPara(barra); }}
                            className="flex-1 min-w-[200px] px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:border-rose-500"
                            placeholder="Digite um endereço e Enter..."
                        />
                        <button onClick={() => irPara(barra)} className="px-3 py-2 bg-rose-700 hover:bg-rose-800 text-white rounded-lg text-sm font-bold">Ir</button>
                    </div>
                    <div className="flex items-center gap-2 mb-2 flex-wrap">

        const App = () => {

            const [siteUpdate, setSiteUpdate] = useState(null);

                checar();
                const id = setInterval(checar, 3 * 60 * 1000);

                document.addEventListener('visibilitychange', onVis);

            const atualizarSiteAgora = async () => {

            // 📲 AUTO-ATUALIZAÇÃO do APK (estilo Discord): ao abrir, compara a versão instalada

            // 🎨 Tema escolhido: auto | claro | escuro | sakura | oceano | esmeralda

            useEffect(() => { try { window.localStorage.setItem('friganso_zapW', String(zapW)); window.localStorage.setItem('friganso_zapH', String(zapH)); } catch (e) {} }, [zapW, zapH]);

            // 🖱️ Redimensionar o painel do WhatsApp arrastando o canto (ancorado embaixo à direita → cresce p/ cima e p/ esquerda)
            const [resizandoZap, setResizandoZap] = useState(false);

            useEffect(() => {

                const scriptInApp = (num, texto) => {
                    const N = JSON.stringify(String(num)), T = JSON.stringify(String(texto));

                        var numero=${N}, texto=${T};
                        var passo="busca", t=0, marco=0;

                        function caixaBusca(){ var c=document.querySelectorAll('#side div[contenteditable="true"], div[contenteditable="true"][data-tab="3"]'); for(var i=0;i<c.length;i++){ if(vis(c[i])) return c[i]; } return null; }
                        function composer(){ var c=document.querySelectorAll('#main footer div[contenteditable="true"], footer div[contenteditable="true"][data-tab="10"]'); for(var i=0;i<c.length;i++){ if(vis(c[i])) return c[i]; } return null; }
                        function btnEnviar(){ return document.querySelector('[data-icon="send"]')||document.querySelector('button[aria-label="Enviar"]')||document.querySelector('button[aria-label="Send"]'); }
                        function digitar(el,val){ try{el.focus();}catch(e){} try{document.execCommand("selectAll",false,null);document.execCommand("delete",false,null);}catch(e){} var ls=String(val).split(String.fromCharCode(10)); for(var i=0;i<ls.length;i++){ if(i>0){ try{document.execCommand("insertLineBreak");}catch(e){} } try{document.execCommand("insertText",false,ls[i]);}catch(e){} } }
                        var iv=setInterval(function(){ t++; try{
                            if(passo==="busca"){ var cx=caixaBusca(); if(cx){ digitar(cx,numero); passo="abrir"; marco=t; } else if(t>20){ clearInterval(iv); resolve("nao_carregado"); } }
                            else if(passo==="abrir"){ if(t-marco<4) return; var it=document.querySelectorAll('#pane-side [role="listitem"]'); if(it&&it.length){ var a=it[0].querySelector('[role="button"]')||it[0].querySelector('div[role="row"]')||it[0]; try{a.click();}catch(e){try{it[0].click();}catch(e2){}} passo="abriu"; marco=t; } else if(t-marco>16){ clearInterval(iv); resolve("nao_achou"); } }

                            else if(passo==="enviar"){ if(t-marco<3) return; var b=btnEnviar(); if(b){ var x=b; for(var i=0;i<5&&x;i++){ if(x.tagName==="BUTTON"||(x.getAttribute&&x.getAttribute("role")==="button")) break; x=x.parentElement; } try{(x||b).click();}catch(e){} passo="limpar"; marco=t; } else if(t-marco>16){ clearInterval(iv); resolve("sem_botao"); } }

                        }catch(e){} if(t>180){ clearInterval(iv); resolve("timeout"); } },250);

            // 🌐 Navegador embutido SEMPRE montado (não recarrega ao trocar de aba) — só no programa de PC.

            const NAV_INICIAL = 'http://spd1.friganso.com.br/rdm-business/';
            const NAV_UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36';
            const navWvRef = useRef(null);
            const [navBarra, setNavBarra] = useState(NAV_INICIAL);

            // 🎯 Valor Máximo de Venda — preço fixo por produto (R$). Compartilhado na nuvem;

                // atualização otimista (a nuvem confirma logo em seguida via onSnapshot)

            // 🧾 O histórico de compras NÃO carrega mais no boot (era pesado).

            const setProducts = (newProducts) => {

                    case 'debug': return user.role === 'admin' ? <DebugScreen user={user} showMessage={showMessage} /> : <DashboardScreen user={user} />;

                                    <input type="text" value={navBarra} onChange={e => setNavBarra(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') navIrPara(navBarra); }} className="flex-1 min-w-[200px] px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm outline-none focus:border-rose-500" placeholder="Digite um endereço e Enter..." />

    <!-- PWA: Service Worker + Deep Link -->
    <script>
        // Captura ?route= dos atalhos do manifest antes do React inicializar
        (function() {
            const p = new URLSearchParams(window.location.search);
            const r = p.get('route');
            if (r) window.sessionStorage.setItem('friganso_initial_route', r);
            // Pedido vindo da extensão do Chrome (lê a tela do SPAmov)
            const pedJson = p.get('pedidojson');
            const ped = p.get('pedido');
            if (pedJson) {
                try { window.sessionStorage.setItem('friganso_pedido_json', decodeURIComponent(escape(atob(pedJson)))); } catch (e) { window.sessionStorage.setItem('friganso_pedido_json', pedJson); }
                window.sessionStorage.setItem('friganso_initial_route', 'resumo');
                if (window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
            } else if (ped) {
                try { window.sessionStorage.setItem('friganso_pedido_texto', decodeURIComponent(escape(atob(ped)))); } catch (e) { window.sessionStorage.setItem('friganso_pedido_texto', ped); }
                window.sessionStorage.setItem('friganso_initial_route', 'resumo');
                if (window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
            }
            // 📥 Tabela de Preços lida DIRETO da tela "Lista de Preços" do SPAmov (sem PDF)
            const tabJson = p.get('tabelaJson');
            if (tabJson) {
                try { window.sessionStorage.setItem('friganso_tabela_json', decodeURIComponent(escape(atob(tabJson)))); } catch (e) { window.sessionStorage.setItem('friganso_tabela_json', tabJson); }
                window.sessionStorage.setItem('friganso_initial_route', 'pdf');
                if (window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
            } else if (p.get('tabela') === 'pendente') {
                // A tabela vem por postMessage (extensão) em vez de ir na URL — só prepara a rota aqui.
                window.sessionStorage.setItem('friganso_initial_route', 'pdf');
                if (window.history.replaceState) window.history.replaceState({}, '', window.location.pathname);
            }
        })();

        // 📥 Tabela de Preços entregue pela extensão via chrome.storage (URL curta, evita "I/O error"
        // com tabelas grandes) — precisa estar registrado JÁ, antes do React montar, senão a mensagem
        // pode chegar antes de qualquer listener existir e se perder.
        window.addEventListener('message', function (e) {
            const d = e.data;
            if (!d || d.source !== 'friganso-ext' || d.type !== 'TABELA_PENDENTE' || !d.produtos) return;
            try {
                window.sessionStorage.setItem('friganso_tabela_json', JSON.stringify(d.produtos));
                window.sessionStorage.setItem('friganso_initial_route', 'pdf');
            } catch (err) {}
        });

        // Captura o prompt de instalação do PWA para usar no botão do Perfil
        window.__pwaInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            window.__pwaInstallPrompt = e;
            window.dispatchEvent(new Event('pwaInstallReady'));
        });
        window.addEventListener('appinstalled', () => {
            window.__pwaInstallPrompt = null;
            window.dispatchEvent(new Event('pwaAppInstalled'));
        });

        // Registra o Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[SW] Registrado:', reg.scope))
                    .catch(err => console.warn('[SW] Falhou:', err));
            });
        }
    </script>
