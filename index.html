<body>
    <!-- 🎨 Tema do sistema (Claro/Escuro/Sakura/Oceano/Esmeralda). Escolha salva em friganso_tema.
         'auto' = claro no dia a dia, e Sakura nos dias especiais (21 e 27 de junho). -->
    <script>
        (function () {
            function petalas(ligar) {
                var ov = document.querySelector('.sakura-petals');
                if (ligar) {
                    if (!ov && document.body) {
                        ov = document.createElement('div'); ov.className = 'sakura-petals';
                        for (var i = 0; i < 14; i++) { var s = document.createElement('span'); s.style.left = (Math.random() * 100) + 'vw'; s.style.animationDuration = (6 + Math.random() * 8) + 's'; s.style.animationDelay = (-Math.random() * 12) + 's'; var sz = 8 + Math.random() * 10; s.style.width = sz + 'px'; s.style.height = sz + 'px'; ov.appendChild(s); }
                        document.body.appendChild(ov);
                    }
                } else if (ov) { ov.remove(); }
            }
            window.aplicarTema = function (escolha) {
                try { if (escolha) localStorage.setItem('friganso_tema', escolha); } catch (e) {}
                var t = escolha; if (!t) { try { t = localStorage.getItem('friganso_tema') || 'auto'; } catch (e) { t = 'auto'; } }
                var efetivo = t;
                if (t === 'auto') {
                    var d = new Date();
                    if (d.getMonth() === 5 && (d.getDate() === 21 || d.getDate() === 27)) efetivo = 'sakura';
                    else { var old = 'claro'; try { if (localStorage.getItem('friganso_theme') === 'dark') old = 'escuro'; } catch (e) {} efetivo = old; }
                }
                var el = document.documentElement;
                el.classList.remove('dark', 'tema-sakura', 'tema-oceano', 'tema-esmeralda');
                if (efetivo === 'escuro') el.classList.add('dark');
                else if (efetivo === 'sakura') el.classList.add('dark', 'tema-sakura');
                else if (efetivo === 'oceano') el.classList.add('dark', 'tema-oceano');
                else if (efetivo === 'esmeralda') el.classList.add('dark', 'tema-esmeralda');
                window.__temaEscolha = t; window.__temaEfetivo = efetivo;
                petalas(efetivo === 'sakura');
            };
            // logo vira sakura só no tema sakura
            window.ehTemaSakura = function () { return document.documentElement.classList.contains('tema-sakura'); };
            try { window.aplicarTema(); } catch (e) {}
            document.addEventListener('DOMContentLoaded', function () { try { window.aplicarTema(); } catch (e) {} });
        })();
    </script>

        if (!firebase.apps.length) {

        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Persistência offline — dados ficam em cache local no dispositivo
        db.enablePersistence({ synchronizeTabs: true })
            .catch(err => {
                if (err.code === 'failed-precondition') {
                    // Múltiplas abas abertas — offline funciona só na aba ativa
                    console.warn('[Firestore] Persistência limitada a uma aba por vez.');
                } else if (err.code === 'unimplemented') {
                    // Navegador não suporta (raro em Android/iOS modernos)
                    console.warn('[Firestore] Persistência offline não suportada neste navegador.');
                }
            });

        // 🔒 Login anônimo automático do Firebase — SILENCIOSO, não mexe na tela de login por código+senha.
        // O login por código+senha (abaixo) é uma checagem própria direto no Firestore, não passa pelo
        // Firebase Auth de verdade — então, sem isso, request.auth ficaria SEMPRE null pra esses usuários,
        // e uma regra de segurança normal (que exige request.auth != null) bloquearia todo mundo. Isso
        // garante que TODO app aberto tenha uma sessão autenticada (mesmo que anônima), permitindo trocar
        // a regra do Firestore de "aberto pra qualquer um" pra "só quem estiver autenticado".
        auth.onAuthStateChanged(u => { if (!u) auth.signInAnonymously().catch(e => console.warn('[Auth anônimo] falhou:', e)); });

        // Electron Desktop Bridge — recebe token do browser e dispara evento no React
        if (window.electronBridge) {
            window.electronBridge.onAuthResult(({ idToken, accessToken, action }) => {
                window.dispatchEvent(new CustomEvent('electronAuthResult', { detail: { idToken, accessToken, action } }));
            });
        }

        const hashPassword = async (password) => {
            if (!password) return '';
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        };

        const IconMapPin = () => <svg className="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;

        const normalizeForSearch = (str) => {
            if (!str) return '';
            let s = str.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
            s = s.replace(/\bcong\.?\b/g, "congelado").replace(/\b(resf|ref)\.?\b/g, "resfriado").replace(/[-_./]/g, " ").replace(/\s+/g, " ").trim();
            return s;
        };
        // Busca de produto tolerante: cada palavra digitada precisa existir no nome (em qualquer ordem),
        // tratando "contra file" e "contrafile" como iguais. Também casa por código.
        const matchProduto = (p, query) => {
            if (!p) return false;
            const q = (query || '').trim();
            if (!q) return false;
            if (String(p.code).includes(q)) return true;
            const nName = normalizeForSearch(p.name);
            const nNameJunto = nName.replace(/\s+/g, '');
            const norm = normalizeForSearch(q);
            const tokens = norm.split(' ').filter(Boolean);
            if (!tokens.length) return false;
            return tokens.every(t => nName.includes(t) || nNameJunto.includes(t));
        };
        const parsePrice = (priceStr) => {
            if (!priceStr) return null;
            let cleanStr = priceStr.includes('.') && priceStr.includes(',') ? priceStr.replace(/\./g, '').replace(',', '.') : priceStr.replace(',', '.');
            const val = parseFloat(cleanStr); return isNaN(val) ? null : val;
        };
        const formatPrice = (value) => {
            if (value === null || value === undefined) return 'R$ 0,00';
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 2 });
        };
        // true quando rodando dentro do programa de PC (Electron) — habilita o navegador embutido
        const isElectron = (typeof window !== 'undefined') && (!!window.electronBridge || (navigator.userAgent || '').indexOf('Electron') !== -1);
        // 📱 App Android nativo (Capacitor): tem o navegador controlado pra automação do SPAmov
        const isCapacitor = (typeof window !== 'undefined') && !!(window.Capacitor && (typeof window.Capacitor.isNativePlatform === 'function' ? window.Capacitor.isNativePlatform() : window.Capacitor.isNative));
        // 🔄 Versão desta página, pra comparar com web-version.json e saber se tem atualização pendente
        // (site/PWA/PC). PRECISA bater com o número em web-version.json — bump os dois juntos SEMPRE.
        const APP_BUILD_VERSION = 143;
        const checkDiscountRules = (code, name, originalPrice) => {
            const codeStr = (code || '').toString().trim(), nameStr = (name || '').toLowerCase().trim(), origPrice = parseFloat(originalPrice) || 0;
            // 🎯 Valor Máximo de Venda (Tabela): quando definido pro produto, o preço final é FIXO nesse
            // valor — e some SEMPRE como se tivesse levado o desconto normal de 3% (o "de" riscado é
            // calculado pra trás: valorMáximo / 0.97), pra não expor que na verdade não teve desconto.
            // Sincronizado na nuvem via window.__valorMaximo, vale em Resumo, Fazer Pedido, Zap e Disparos.
            try {
                const vm = window.__valorMaximo && window.__valorMaximo[codeStr];
                if (vm != null && Number(vm) > 0) {
                    const unitFinalPrice = Math.round(Number(vm) * 100) / 100;
                    const origFake = Math.round((unitFinalPrice / 0.97) * 100) / 100;
                    return { hasDiscount: true, origPrice: origFake, unitFinalPrice };
                }
            } catch (e) {}
            let hasDiscount = true;
            if (codeStr.startsWith('16') || codeStr.startsWith('27') || codeStr.startsWith('90')) hasDiscount = false; // grupos sem desconto
            if (codeStr === '24962') hasDiscount = false; // Fraldinha Ramax (por código, garantido)
            if (nameStr.includes('fraldinha ramax') || (nameStr.includes('fraldinha') && nameStr.includes('ramax'))) hasDiscount = false;
            return { hasDiscount, origPrice, unitFinalPrice: hasDiscount ? Math.round((origPrice * 0.97) * 100) / 100 : origPrice };
        };
        // 📲 Bloco de um produto pro texto do WhatsApp (Gerador de Zap e Disparos). Dois estilos:
        // "novo" (padrão) — linha única de preço + Cartão/Parcelado combinados quando existir esse dado;
        // "antigo" — o formato de sempre, "(Com 3% de Desconto)" por extenso, sem Cartão/Parcelado.
        const montarBlocoProdutoZap = (p, estilo) => {
            const { hasDiscount, origPrice, unitFinalPrice } = checkDiscountRules(p.code, p.name, p.originalPrice);
            if (estilo === 'antigo') {
                let b = `Cod: ${p.code}\n\n${p.name}\n`;
                b += hasDiscount
                    ? `💰 Valor: ~${formatPrice(origPrice)}~ por *${formatPrice(unitFinalPrice)}/kg* 🔥 (Com 3% de Desconto)\n`
                    : `💰 Valor: *${formatPrice(origPrice)}/kg*\n`;
                return b;
            }
            let b = `Cod: *${p.code}*\n*${p.name}*\n\n`;
            b += hasDiscount
                ? `💰 Valor: ~${formatPrice(origPrice)}~ por *${formatPrice(unitFinalPrice)}/kg* 🔥\n`
                : `💰 Valor: *${formatPrice(origPrice)}/kg*\n`;
            if (p.precoCartao != null) b += `💳 Cartão: ${formatPrice(p.precoCartao)}/kg 🧩 Parcelado: ${formatPrice(origPrice)}/kg\n`;
            return b;
        };
        // Separador entre produtos nas mensagens de WhatsApp — curto pra não quebrar feio em tela estreita.
        // (só usado no estilo "novo" — o "antigo" mantém a separação por linha em branco, como sempre foi)
        const SEPARADOR_ZAP = '- - - - - - - - - -';
        const ESTILO_ZAP_KEY = 'friganso_estilo_zap';
        const getEstiloZapSalvo = () => { try { const v = window.localStorage.getItem(ESTILO_ZAP_KEY); return v === 'antigo' ? 'antigo' : 'novo'; } catch (e) { return 'novo'; } };
        // Botão pequeno de escolha de estilo, reaproveitado no Gerador de Zap e nos Disparos.
        const SeletorEstiloZap = ({ estilo, setEstilo }) => (
            <div className="flex items-center gap-2 text-xs">
                <span className="font-bold text-slate-500">Estilo da mensagem:</span>
                <button onClick={() => setEstilo('novo')} className={`px-3 py-1.5 rounded-lg font-bold transition-colors ${estilo === 'novo' ? 'bg-rose-700 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>✨ Novo</button>
                <button onClick={() => setEstilo('antigo')} className={`px-3 py-1.5 rounded-lg font-bold transition-colors ${estilo === 'antigo' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>📄 Antigo</button>
            </div>
        );

        // 🧾 Registra a compra na ficha do cliente (nuvem). Anti-duplicata de 5 min.
        let _ultimaCompraReg = { sig: '', ts: 0 };
        // 📜 Monta uma entrada de histórico de edição a partir do estado ANTIGO de um pedido (antes da
        // mudança). Usada com FieldValue.arrayUnion — só ADICIONA ao array, nunca remove, então o
        // histórico de edições de um pedido nunca pode ser apagado pelo app.
        const criarEntradaHistoricoEdicao = (dadosAntigos, motivo, userCode) => ({
            em: Date.now(),
            por: userCode || '',
            motivo: motivo || 'edicao',
            antes: {
                clienteCode: dadosAntigos.clienteCode || '',
                clienteName: dadosAntigos.clienteName || '',
                spamov: dadosAntigos.spamov || '',
                itens: dadosAntigos.itens || [],
                valor: Number(dadosAntigos.valor) || 0,
                pesoTotal: Number(dadosAntigos.pesoTotal) || 0
            }
        });

        const registrarCompra = async (clienteCode, itensValidos, tipo, via, clients, user, spamov, condicaoPagamento) => {
            try {
                const itensSafe = (itensValidos || [])
                    .map(i => ({ code: String(i.code), name: i.name || i.nome || ('Produto ' + i.code), qty: Number(i.qty != null ? i.qty : i.quantity), peso: Number(i.peso) || 0, valorKg: Number(i.valorKg) || 0 }))
                    .filter(i => i.code && i.qty > 0);
                if (!clienteCode || !itensSafe.length) return;
                const sig = String(clienteCode) + '|' + itensSafe.map(i => i.code + 'x' + i.qty).sort().join(',');
                const agora = Date.now();
                if (_ultimaCompraReg.sig === sig && (agora - _ultimaCompraReg.ts) < 5 * 60 * 1000) return;
                _ultimaCompraReg = { sig, ts: agora };
                const cli = (clients || []).find(c => String(c.code) === String(clienteCode));
                // 💰 Faturamento da venda = soma de peso(kg) × preço/kg de cada item (a "nota" do SPAmov)
                const valorTotal = Math.round(itensSafe.reduce((a, i) => a + (i.peso * i.valorKg), 0) * 100) / 100;
                const pesoTotal = Math.round(itensSafe.reduce((a, i) => a + i.peso, 0) * 100) / 100;
                const atualizarHistoricoCliente = async () => {
                    if (!cli || !cli.id) return;
                    const atual = cli.history || [];
                    const novos = [...new Set([...atual, ...itensSafe.map(i => i.code)])];
                    if (novos.length !== atual.length) { try { await db.collection('clients').doc(cli.id).update({ history: novos }); } catch (e) {} }
                };

                // 🧾 Mesmo SPAmov = mesma nota. Se já existe um pedido ATIVO com esse SPAmov, isso é uma
                // EDIÇÃO dele (item adicionado/mudado) — atualiza em vez de duplicar, pra não contar duas
                // vezes no faturamento. Mantém a data original da venda (dia/ts não mudam).
                const spamovStr = (spamov || '').trim();
                if (spamovStr) {
                    try {
                        const existente = await db.collection('purchases').where('spamov', '==', spamovStr).limit(1).get();
                        if (!existente.empty) {
                            const doc = existente.docs[0];
                            const dadosAntigos = doc.data();
                            const entradaHist = criarEntradaHistoricoEdicao(dadosAntigos, 'reenvio_resumo', (user && user.code));
                            await doc.ref.update({
                                clienteCode: String(clienteCode),
                                clienteName: (cli && cli.name) || dadosAntigos.clienteName || '',
                                tipoPessoa: tipo || (cli && cli.tipo) || dadosAntigos.tipoPessoa || 'juridica',
                                itens: itensSafe,
                                valor: valorTotal,
                                pesoTotal: pesoTotal,
                                condicaoPagamento: condicaoPagamento || dadosAntigos.condicaoPagamento || '',
                                editadoEm: agora,
                                editadoPor: (user && user.code) || '',
                                historicoEdicoes: firebase.firestore.FieldValue.arrayUnion(entradaHist)
                            });
                            await atualizarHistoricoCliente();
                            return;
                        }
                    } catch (e) { /* se a checagem falhar, segue e cria um novo abaixo */ }
                }

                const d = new Date(agora);
                const dia = d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
                await db.collection('purchases').add({
                    clienteCode: String(clienteCode),
                    clienteName: (cli && cli.name) || '',
                    tipoPessoa: tipo || (cli && cli.tipo) || 'juridica',
                    itens: itensSafe,
                    valor: valorTotal,
                    pesoTotal: pesoTotal,
                    spamov: spamovStr,
                    condicaoPagamento: condicaoPagamento || '',
                    dia: dia,
                    ts: agora,
                    via: via || '',
                    vendedor: (user && user.code) || ''
                });
                await atualizarHistoricoCliente();
            } catch (e) { /* silencioso */ }
        };

        // 💳 Reduz o texto cru da condição de pagamento do SPAmov (ex.: "21 Dias", "À Vista / PIX",
        // "Cartao Credito") pra uma das 4 categorias da regra de negócio.
        const normalizarCondicaoPagamento = (texto) => {
            const t = (texto || '').toLowerCase().trim();
            if (!t) return null;
            if (t.indexOf('vista') !== -1 || t.indexOf('pix') !== -1) return 'avista';
            if (t.indexOf('cart') !== -1) return 'cartao';
            if (t.indexOf('parcel') !== -1) return 'parcelado'; // escolhido na mão no Resumo manual
            // "7/14/21 Dias" (vários vencimentos separados por "/") é parcelado também, mesmo sem a
            // palavra "parcelado" — o SPAmov mostra assim quando o pedido é dividido em várias datas.
            if (/\d+\s*\/\s*\d+/.test(t)) return 'parcelado';
            if (/\d+\s*dias?/.test(t)) return 'prazo';
            return 'outro';
        };
        const LABEL_CONDICAO = { avista: 'À Vista', cartao: 'Cartão', prazo: 'A Prazo', parcelado: 'Prazo Parcelado', outro: 'Outra' };
        // Opções pro seletor manual — os textos batem com o que o SPAmov usa (pra normalizarCondicaoPagamento
        // reconhecer igualzinho), + "Prazo Parcelado" que só existe aqui (arranjo manual do vendedor).
        const OPCOES_CONDICAO_MANUAL = ['À Vista / PIX', 'Cartao Credito', '07 Dias', '14 Dias', '21 Dias', '28 Dias', '30 Dias', '35 Dias', '45 Dias', 'Prazo Parcelado'];

        // 📊 Histórico de condição de pagamento de um cliente: conta quantas compras passadas foram em
        // cada categoria (dominante = mais frequente) E acha a condição da ÚLTIMA compra dele. O aviso no
        // Resumo compara com a ÚLTIMA (não a dominante) — ex.: cliente que sempre compra à vista mas cuja
        // última compra foi a prazo de 7 dias, e agora tá vindo 21 dias, é isso que dispara o aviso.
        const condicaoDominanteCliente = async (clienteCode) => {
            try {
                const snap = await db.collection('purchases').where('clienteCode', '==', String(clienteCode)).get();
                const contagens = {};
                let ultimaTs = -1, ultimaCondicaoRaw = null;
                snap.forEach(doc => {
                    const d = doc.data();
                    const cat = normalizarCondicaoPagamento(d.condicaoPagamento);
                    if (cat) contagens[cat] = (contagens[cat] || 0) + 1;
                    if (d.condicaoPagamento && Number(d.ts || 0) > ultimaTs) { ultimaTs = Number(d.ts || 0); ultimaCondicaoRaw = d.condicaoPagamento; }
                });
                const total = Object.values(contagens).reduce((a, b) => a + b, 0);
                let dominante = null, max = 0;
                Object.keys(contagens).forEach(cat => { if (contagens[cat] > max) { max = contagens[cat]; dominante = cat; } });
                return { dominante, contagens, total, ultimaCondicaoRaw, ultimaCondicaoCat: normalizarCondicaoPagamento(ultimaCondicaoRaw) };
            } catch (e) { return { dominante: null, contagens: {}, total: 0, ultimaCondicaoRaw: null, ultimaCondicaoCat: null }; }
        };

        const CustomMessageBox = ({ message, type = 'info', onClose }) => {
            // Fecha sozinha depois de 3 segundos
            useEffect(() => {
                const t = setTimeout(() => { onClose && onClose(); }, 3000);
                return () => clearTimeout(t);
            }, [message]);
            return (
                // Clicar em qualquer lugar (o fundo) também fecha

            const [regPassword, setRegPassword] = useState('');
            const [pendingGoogleUser, setPendingGoogleUser] = useState(null);
            const [googleCode, setGoogleCode] = useState('');
            // Conta Google sem senha: força definir uma senha (pra poder entrar pelo celular com código+senha)
            const [needsPass, setNeedsPass] = useState(null);
            const [setPass1, setSetPass1] = useState('');
            const [setPass2, setSetPass2] = useState('');

            // Electron: recebe resultado da autenticação feita no browser externo
            useEffect(() => {
                if (!window.electronBridge) return;
                const handler = async (e) => {
                    const { idToken, accessToken, action } = e.detail;
                    setIsLoading(true);
                    try {
                        const credential = firebase.auth.GoogleAuthProvider.credential(idToken, accessToken);
                        const result = await auth.signInWithCredential(credential);
                        if (action === 'register') {
                            const snapshot = await db.collection('users').where('email', '==', result.user.email).get();
                            if (!snapshot.empty) { showMessage('Google já cadastrado. Faça login.', 'error'); auth.signOut(); }
                            else { setPendingGoogleUser(result.user); }
                        } else {
                            const snapshot = await db.collection('users').where('email', '==', result.user.email).get();
                            if (!snapshot.empty) {
                                const d = snapshot.docs[0].data();
                                if (!d.password) { setNeedsPass({ ...d, id: snapshot.docs[0].id }); } // sem senha → define agora
                                else { onLogin({ ...d, id: snapshot.docs[0].id }); }
                            } else {
                                showMessage('Conta não encontrada. Crie seu cadastro primeiro.', 'error');
                                auth.signOut();
                            }
                        }
                    } catch(error) { showMessage(`Erro: ${error.message}`, 'error'); }
                    finally { setIsLoading(false); }
                };
                window.addEventListener('electronAuthResult', handler);
                return () => window.removeEventListener('electronAuthResult', handler);
            }, []);


            const passwordRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&.])[A-Za-z\d@$!%*#?&.]{6,}$/;

            const handleLogin = async (e) => {
                e.preventDefault();

                    const hashedPass = await hashPassword(password);

                    if (snapshot.empty) {
                        snapshot = await db.collection('users').where('code', '==', loginCode).where('password', '==', password).get();
                        if (!snapshot.empty) await db.collection('users').doc(snapshot.docs[0].id).update({ password: hashedPass });
                    }

                } catch(err) { showMessage('Erro de conexão com o banco.', 'error'); } finally { setIsLoading(false); }

            // Conta Google sem senha → grava a senha (hash) no ID e entra. Depois dá pra logar no celular com código+senha.

                e.preventDefault();

                    if (!snapshot.empty) {

            const handleRegister = async (e) => {

            const handleConfirmGoogleCode = async (e) => {

                setIsLoading(true);

                    const docRef = await db.collection('users').add(newUser);
                    showMessage('Conta Google vinculada com senha!', 'success');

            return (

                    <div className="w-full max-w-md p-8 glass rounded-3xl shadow-2xl relative z-10 border border-white/20 animate-in fade-in slide-in-from-bottom-4">

                            <p className="text-slate-500 text-sm mt-1">{isRegistering ? 'Crie sua conta de Vendedor' : 'Gestão Inteligente de Vendas'}</p>

                                <div className="relative"><div className="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"><IconLock/></div><input type="password" value={setPass2} onChange={e => setSetPass2(e.target.value)} disabled={isLoading} className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none text-sm" required placeholder="Repita a senha"/></div>

                                <div className="relative"><div className="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"><IconLock/></div><input type="password" value={setPass1} onChange={e => setSetPass1(e.target.value)} disabled={isLoading} className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none text-sm" required placeholder="Crie uma senha (letras, números, especial)"/></div>
                                <div className="relative"><div className="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"><IconLock/></div><input type="password" value={setPass2} onChange={e => setSetPass2(e.target.value)} disabled={isLoading} className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none text-sm" required placeholder="Repita a senha"/></div>

                                <div className="relative"><div className="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"><IconLock/></div><input type="password" value={password} onChange={e => setPassword(e.target.value)} disabled={isLoading} className="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-rose-500 outline-none text-sm" required placeholder="Sua Senha"/></div>
                                <button type="submit" disabled={isLoading} className="w-full bg-rose-700 hover:bg-rose-800 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all flex justify-center">{isLoading ? <div className="h-5 w-5"><IconLoader2/></div> : 'Entrar no Sistema'}</button>

                                <button type="button" onClick={handleGoogleLoginOnly} disabled={isLoading} className="w-full bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 font-bold py-3 rounded-xl shadow-sm transition-all flex items-center justify-center gap-2 text-sm"><div className="h-5 w-5"><IconGoogle/></div> Entrar com Google</button>
                                </>)}

                                <div className="text-center mt-4"><button type="button" onClick={() => setIsRegistering(true)} disabled={isLoading} className="text-sm font-bold text-slate-600 hover:text-rose-700 transition-colors">Não possui acesso? <span className="underline">Cadastrar</span></button></div>

                                <div className="relative flex py-1 items-center"><div className="flex-grow border-t border-slate-300"></div><span className="flex-shrink-0 mx-4 text-slate-400 text-xs font-medium">OU MANUAL</span><div className="flex-grow border-t border-slate-300"></div></div>

                                <input type="text" value={regName} onChange={e => setRegName(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:border-rose-500" required placeholder="Nome Completo"/>

                                <input type="email" value={regEmail} onChange={e => setRegEmail(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:border-rose-500" required placeholder="E-mail Corporativo"/>
                                <input type="password" value={regPassword} onChange={e => setRegPassword(e.target.value)} className="w-full px-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none text-sm focus:border-rose-500" required placeholder="Senha (Letras, Núm, Especiais)"/>
                                <button type="submit" disabled={isLoading} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-lg mt-2 flex justify-center">{isLoading ? <div className="h-5 w-5"><IconLoader2/></div> : 'Criar Cadastro'}</button>
                                <div className="text-center mt-2"><button type="button" onClick={() => setIsRegistering(false)} disabled={isLoading} className="text-sm font-bold text-rose-700 hover:text-rose-800">Voltar para Login</button></div>

            const salvarPortfolio = async () => {

                setSalvandoPortfolio(true);
                try {
                    await db.collection('users').doc(user.id).update(portfolioDados);

                } catch (e) { showMessage('Erro ao salvar.', 'error'); } finally { setSalvandoPortfolio(false); }

            const gerarCartao = async () => {

            // 💬 Mensagem pra mandar junto com o cartão — puxa conversa com um cliente novo em vez de

            // características). Guarda variedade em arrays pra não mandar sempre o texto idêntico.
            const gerarMensagemIntroPortfolio = () => {
                const nome = (user.name || '').split(' ')[0] || '';
                const cargo = portfolioDados.cargo || 'Vendedor Friganso';
                const abertura = SPIN_ABERTURAS_INTRO[Math.floor(Math.random() * SPIN_ABERTURAS_INTRO.length)]
                    .replace('{nome}', nome).replace('{cargo}', cargo);
                const pergunta = SPIN_PERGUNTAS_SITUACAO[Math.floor(Math.random() * SPIN_PERGUNTAS_SITUACAO.length)];
                return `${abertura}\n\n${pergunta}`;

            const [usersList, setUsersList] = useState([]);
            const [loading, setLoading] = useState(false);
            const [installPrompt, setInstallPrompt] = useState(window.__pwaInstallPrompt || null);
            const [isInstalled, setIsInstalled] = useState(window.matchMedia('(display-mode: standalone)').matches);
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            // 🔑 Alterar senha da própria conta
            const [mostrarSenha, setMostrarSenha] = useState(false);
            const [novaSenha, setNovaSenha] = useState('');
            const [novaSenha2, setNovaSenha2] = useState('');

            const alterarSenha = async (e) => {

        // 📊 Gráfico reutilizável (Chart.js)

            useEffect(() => {

        const CardGrafico = ({ titulo, children }) => (

        // 📅 "Mês útil" = ciclo de fechamento de nota do vendedor: fecha sempre no dia 30 (ou no
        // último dia do mês, em fevereiro). O dia 31 (quando existe) já entra no fechamento do mês
        // SEGUINTE — regra do usuário: "tudo que for pedido depois do dia 30 cai pro mês que vem".
        const diaStrGlobal = (d) => d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
        const fimMesUtil = (ano, mesZero) => { const ultimo = new Date(ano, mesZero + 1, 0).getDate(); return new Date(ano, mesZero, Math.min(30, ultimo)); };
        const inicioMesUtil = (ano, mesZero) => {
            const anoAnt = mesZero === 0 ? ano - 1 : ano, mesAnt = mesZero === 0 ? 11 : mesZero - 1;
            const ini = new Date(fimMesUtil(anoAnt, mesAnt)); ini.setDate(ini.getDate() + 1); ini.setHours(0, 0, 0, 0);
            return ini;
        };
        // A qual "mês útil" (ano, mesZero) uma data pertence
        const mesUtilDe = (d) => { let ano = d.getFullYear(), mes = d.getMonth(); if (d.getDate() === 31) { mes += 1; if (mes > 11) { mes = 0; ano += 1; } } return { ano, mes }; };
        // Calcula {desde, ate, label, fechaEm} pra um "modo" de período: 'dia' | 'semana' | 'mes' (+offset) | número de dias | 0 (todos)
        const calcularPeriodo = (modo, mesOffset) => {
            const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
            if (modo === 'dia') return { desde: hoje, ate: hoje, label: 'Hoje' };
            if (modo === 'semana') { const d = new Date(hoje); d.setDate(d.getDate() - 6); return { desde: d, ate: hoje, label: 'Últimos 7 dias' }; }
            if (modo === 'mes') {
                const atual = mesUtilDe(hoje);
                let mesZero = atual.mes + (mesOffset || 0), ano = atual.ano;
                ano += Math.floor(mesZero / 12); mesZero = ((mesZero % 12) + 12) % 12;
                const desde = inicioMesUtil(ano, mesZero), ate = fimMesUtil(ano, mesZero);
                const nomesMes = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
                return { desde, ate, label: nomesMes[mesZero] + '/' + ano, fechaEm: ate };
            }
            if (typeof modo === 'number' && modo > 0) { const d = new Date(hoje); d.setDate(d.getDate() - (modo - 1)); return { desde: d, ate: hoje, label: modo + ' dias' }; }
            return { desde: null, ate: null, label: 'Todos' }; // modo === 0 (todos)
        };

        const DashboardScreen = ({ user, clients, products }) => {

            const [mesOffset, setMesOffset] = useState(0); // navegação de meses (só usada quando periodo === 'mes')
            const [prodPreco, setProdPreco] = useState('');
            // 💵 Margem de lucro estimada (% sobre o faturamento). Padrão 1%, troca pra 3%. Lembra a escolha.
            const [margem, setMargem] = useState(() => { const v = parseFloat(window.localStorage.getItem('friganso_margem')); return (v === 1 || v === 3) ? v : 1; });
            useEffect(() => { try { window.localStorage.setItem('friganso_margem', String(margem)); } catch (e) {} }, [margem]);
            const semChart = !window.Chart;

            useEffect(() => {
                if (window.Chart) { window.Chart.defaults.color = '#94a3b8'; window.Chart.defaults.font.family = "system-ui, 'Segoe UI', sans-serif"; }
                const unsub = db.collection('purchases').orderBy('ts', 'desc').limit(1500).onSnapshot(s => setPurchases(s.docs.map(d => d.data())), () => {});
                db.collection('pdf_versions').orderBy('updatedAt', 'asc').limit(60).get().then(s => setVersions(s.docs.map(d => d.data()))).catch(() => {});
                return () => unsub();
            }, []);

            const diaStr = diaStrGlobal;
            const construirDias = (desde, ate) => { const dias = []; if (!desde || !ate) return dias; const d = new Date(desde); while (d <= ate) { dias.push(diaStr(d)); d.setDate(d.getDate() + 1); } return dias; };
            const dados = useMemo(() => {
                const { desde, ate, label, fechaEm } = calcularPeriodo(periodo, mesOffset);
                const dias = construirDias(desde, ate);
                const desdeStr = desde ? diaStr(desde) : null, ateStr = ate ? diaStr(ate) : null;
                const comprasP = purchases.filter(p => (!desdeStr || (p.dia || '') >= desdeStr) && (!ateStr || (p.dia || '') <= ateStr));
                const qtdDia = {}, pedDia = {}, valDia = {}, prodQ = {}, tipoC = { juridica: 0, fisica: 0 }, cliC = {}, vendC = {}, cliValC = {};
                let totalItens = 0, totalValor = 0; const cliSet = new Set(), prodSet = new Set();
                comprasP.forEach(p => {
                    const dia = p.dia || diaStr(new Date(p.ts || Date.now()));
                    const q = (p.itens || []).reduce((a, it) => a + (Number(it.qty) || 0), 0);
                    const val = Number(p.valor) || 0;
                    qtdDia[dia] = (qtdDia[dia] || 0) + q; pedDia[dia] = (pedDia[dia] || 0) + 1; valDia[dia] = (valDia[dia] || 0) + val;
                    totalItens += q; totalValor += val;
                    cliSet.add(String(p.clienteCode));
                    tipoC[/fis/i.test(p.tipoPessoa || '') ? 'fisica' : 'juridica']++;
                    const cnome = p.clienteName || ('Cliente ' + (p.clienteCode || '?')); cliC[cnome] = (cliC[cnome] || 0) + 1; cliValC[cnome] = (cliValC[cnome] || 0) + val;
                    vendC[p.vendedor || '—'] = (vendC[p.vendedor || '—'] || 0) + 1;
                    (p.itens || []).forEach(it => { const c = String(it.code); prodSet.add(c); if (!prodQ[c]) prodQ[c] = { nome: it.name || ('Cod ' + c), qty: 0 }; prodQ[c].qty += Number(it.qty) || 0; });
                });
                const serieQtd = dias.map(d => qtdDia[d] || 0);
                const seriePed = dias.map(d => pedDia[d] || 0);
                const serieVal = dias.map(d => Math.round((valDia[d] || 0) * 100) / 100);
                const labelsDia = dias.map(d => d.slice(8, 10) + '/' + d.slice(5, 7));
                const topProd = Object.keys(prodQ).map(c => ({ code: c, nome: prodQ[c].nome, qty: prodQ[c].qty })).sort((a, b) => b.qty - a.qty);
                const topCli = Object.keys(cliC).map(n => ({ nome: n, n: cliC[n], val: cliValC[n] || 0 })).sort((a, b) => b.n - a.n);
                let melhorDia = '—', melhorQ = 0; dias.forEach(d => { if ((qtdDia[d] || 0) > melhorQ) { melhorQ = qtdDia[d]; melhorDia = d; } });
                let melhorDiaV = '—', melhorV = 0; dias.forEach(d => { if ((valDia[d] || 0) > melhorV) { melhorV = valDia[d]; melhorDiaV = d; } });
                const ticketMedio = comprasP.length ? totalValor / comprasP.length : 0;
                return { dias, labelsDia, serieQtd, seriePed, serieVal, topProd, topCli, tipoC, vendC, comprasP, totalItens, totalValor, ticketMedio, cliCount: cliSet.size, prodCount: prodSet.size, melhorDia, melhorQ, melhorDiaV, melhorV, periodoLabel: label, periodoFechaEm: fechaEm };
            }, [purchases, periodo, mesOffset]);

            const precoSerie = useMemo(() => {
                const code = String(prodPreco || (dados.topProd[0] && dados.topProd[0].code) || (products[0] && products[0].code) || '');
                if (!code || !versions.length) return null;
                const labels = [], valores = [];
                versions.forEach(v => {
                    const dt = (v.updatedAt && v.updatedAt.toDate) ? v.updatedAt.toDate() : new Date(v.updatedAt || Date.now());
                    const p = (v.products || []).find(x => String(x.code) === code);
                    if (p) { labels.push(('0' + dt.getDate()).slice(-2) + '/' + ('0' + (dt.getMonth() + 1)).slice(-2)); valores.push(Number(p.originalPrice) || 0); }
                });
                const nome = (products.find(x => String(x.code) === code) || {}).name || ('Cod ' + code);
                return { code, nome, labels, valores };
            }, [versions, prodPreco, dados, products]);

            const optBase = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(148,163,184,.12)' }, ticks: { maxTicksLimit: 12 } }, y: { grid: { color: 'rgba(148,163,184,.12)' }, beginAtZero: true } } };
            const fmtRS = (v) => 'R$ ' + (Number(v) || 0).toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
            const optMoney = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => fmtRS(c.parsed.y) } } }, scales: { x: { grid: { color: 'rgba(148,163,184,.12)' }, ticks: { maxTicksLimit: 12 } }, y: { grid: { color: 'rgba(148,163,184,.12)' }, beginAtZero: true, ticks: { callback: (v) => fmtRS(v) } } } };
            const optBarH = { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: 'rgba(148,163,184,.12)' }, beginAtZero: true }, y: { grid: { display: false } } } };
            const optPie = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 10 } } } };
            const topProd10 = dados.topProd.slice(0, 10);
            const topCli6 = dados.topCli.slice(0, 6);
            const outrosCli = dados.topCli.slice(6).reduce((a, c) => a + c.n, 0);
            const vendKeys = Object.keys(dados.vendC);
            const Kpi = ({ icon, cor, label, valor }) => (
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <div className={`h-9 w-9 ${cor} rounded-xl flex items-center justify-center mb-2 text-lg`}>{icon}</div>
                    <p className="text-slate-500 font-semibold text-xs">{label}</p>
                    <h3 className="text-2xl font-black text-slate-800 mt-0.5">{valor}</h3>
                </div>
            );

            return (
                <div className="animate-in fade-in space-y-6">
                    <div className="bg-slate-900 rounded-3xl p-7 text-white relative overflow-hidden shadow-xl border border-slate-800">
                        <img src={BG_IMAGE} className="absolute inset-0 w-full h-full object-cover opacity-20 mix-blend-overlay" />
                        <div className="absolute inset-0 bg-gradient-to-r from-slate-900 via-rose-950/90 to-transparent"></div>
                        <div className="relative z-10 flex flex-col gap-4">
                            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                                <div><h2 className="text-2xl sm:text-3xl font-extrabold mb-1">Olá, {user.name}! 📊</h2><p className="text-rose-200 font-medium opacity-80">Seu painel de controle de vendas.</p></div>
                                <div className="flex gap-1.5 bg-black/30 p-1 rounded-xl flex-wrap">
                                    {[['dia', 'Hoje'], ['semana', 'Semana'], ['mes', 'Mês'], [90, '90 dias'], [365, '1 ano']].map(([d, l]) => (
                                        <button key={d} onClick={() => { setPeriodo(d); if (d === 'mes') setMesOffset(0); }} className={`text-xs font-bold px-3 py-1.5 rounded-lg transition-colors ${periodo === d ? 'bg-rose-600 text-white' : 'text-rose-200 hover:bg-white/10'}`}>{l}</button>
                                    ))}
                                </div>
                            </div>
                            {periodo === 'mes' && (
                                <div className="flex items-center gap-3 bg-black/20 rounded-xl px-4 py-2 w-fit">
                                    <button onClick={() => setMesOffset(o => o - 1)} title="Mês anterior" className="text-rose-200 hover:text-white font-black px-1">←</button>
                                    <span className="text-sm font-bold text-white">🗓️ {dados.periodoLabel}</span>
                                    <button onClick={() => setMesOffset(o => o + 1)} title="Mês seguinte" className="text-rose-200 hover:text-white font-black px-1">→</button>
                                    {dados.periodoFechaEm && <span className="text-[10px] text-rose-300">fecha em {('0' + dados.periodoFechaEm.getDate()).slice(-2)}/{('0' + (dados.periodoFechaEm.getMonth() + 1)).slice(-2)}</span>}
                                    {mesOffset !== 0 && <button onClick={() => setMesOffset(0)} className="text-[10px] font-bold text-rose-300 hover:text-white underline">voltar pro mês atual</button>}
                                </div>
                            )}
                        </div>
                    </div>

                    {semChart && <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-amber-700 text-sm font-semibold">⚠️ Os gráficos precisam de internet pra carregar (a biblioteca Chart.js). Conecte e recarregue.</div>}

                    {/* KPIs */}
                    <div className="grid grid-cols-2 lg:grid-cols-6 gap-3">
                        <Kpi icon="💰" cor="bg-rose-100" label="Faturamento no período" valor={formatPrice(dados.totalValor)} />
                        <Kpi icon="🧾" cor="bg-emerald-100" label="Pedidos no período" valor={dados.comprasP.length} />
                        <Kpi icon="🎯" cor="bg-sky-100" label="Ticket médio" valor={formatPrice(dados.ticketMedio)} />
                        <Kpi icon="👥" cor="bg-blue-100" label="Clientes que compraram" valor={dados.cliCount} />
                        <Kpi icon="📦" cor="bg-amber-100" label="Itens vendidos" valor={dados.totalItens} />
                        <Kpi icon="🔥" cor="bg-purple-100" label="Melhor dia (R$)" valor={dados.melhorV > 0 ? (dados.melhorDiaV.slice(8, 10) + '/' + dados.melhorDiaV.slice(5, 7)) : '—'} />
                    </div>

                    {/* 💵 Lucro estimado = faturamento × margem (1% ou 3%) */}
                    <div className="bg-gradient-to-r from-emerald-600 to-emerald-500 rounded-3xl p-6 text-white shadow-lg flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div>
                            <p className="text-emerald-100 font-semibold text-sm">💵 Lucro estimado no período ({margem}%)</p>
                            <h3 className="text-3xl sm:text-4xl font-black mt-0.5">{formatPrice(dados.totalValor * margem / 100)}</h3>
                            <p className="text-emerald-100/80 text-xs mt-1">{margem}% de {formatPrice(dados.totalValor)} de faturamento</p>
                        </div>
                        <div className="flex flex-col items-start sm:items-end gap-1.5">
                            <span className="text-emerald-100/80 text-xs font-bold">Margem de lucro</span>
                            <div className="flex gap-1.5 bg-black/20 p-1 rounded-xl">
                                {[1, 3].map(m => (
                                    <button key={m} onClick={() => setMargem(m)} className={`text-sm font-black px-4 py-2 rounded-lg transition-colors ${margem === m ? 'bg-white text-emerald-700' : 'text-emerald-100 hover:bg-white/10'}`}>{m}%</button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {dados.comprasP.length === 0 ? (
                        <div className="bg-white rounded-3xl border border-slate-200 p-10 text-center text-slate-400">
                            <p className="text-lg font-bold">Ainda não há vendas registradas neste período.</p>
                            <p className="text-sm mt-1">Cada venda entra aqui quando você toca em <b>"Copiar Resumo"</b> no Resumo de Pedido. 📈</p>
                        </div>
                    ) : (
                        <>
                            <CardGrafico titulo={`💰 Faturamento por dia — R$ (${dados.periodoLabel})`}>
                                <Grafico tipo="line" altura={280} options={optMoney} data={{ labels: dados.labelsDia, datasets: [{ label: 'R$', data: dados.serieVal, borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,.15)', fill: true, tension: .35, pointRadius: 2, borderWidth: 2 }] }} />
                            </CardGrafico>

                            <CardGrafico titulo={`📈 Vendas por dia — itens vendidos (${dados.periodoLabel})`}>
                                <Grafico tipo="line" altura={280} options={optBase} data={{ labels: dados.labelsDia, datasets: [{ label: 'Itens', data: dados.serieQtd, borderColor: '#e11d48', backgroundColor: 'rgba(225,29,72,.15)', fill: true, tension: .35, pointRadius: 2, borderWidth: 2 }] }} />
                            </CardGrafico>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                                <CardGrafico titulo="📊 Top 10 produtos (por quantidade)">
                                    <Grafico tipo="bar" altura={320} options={optBarH} data={{ labels: topProd10.map(p => (p.nome || '').slice(0, 22)), datasets: [{ label: 'Qtd', data: topProd10.map(p => p.qty), backgroundColor: '#fb4b3a', borderRadius: 6 }] }} />
                                </CardGrafico>
                                <CardGrafico titulo="🥧 Pedidos por tipo de cliente">
                                    <Grafico tipo="doughnut" altura={320} options={optPie} data={{ labels: ['Jurídica (CNPJ)', 'Física (CPF)'], datasets: [{ data: [dados.tipoC.juridica, dados.tipoC.fisica], backgroundColor: ['#e11d48', '#38bdf8'], borderWidth: 0 }] }} />
                                </CardGrafico>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
                                <CardGrafico titulo="🥧 Top clientes (por nº de pedidos)">
                                    <Grafico tipo="pie" altura={300} options={optPie} data={{ labels: topCli6.map(c => (c.nome || '').slice(0, 18)).concat(outrosCli > 0 ? ['Outros'] : []), datasets: [{ data: topCli6.map(c => c.n).concat(outrosCli > 0 ? [outrosCli] : []), backgroundColor: PALETA, borderWidth: 0 }] }} />
                                </CardGrafico>
                                <CardGrafico titulo="📉 Pedidos por dia (movimento)">
                                    <Grafico tipo="bar" altura={300} options={optBase} data={{ labels: dados.labelsDia, datasets: [{ label: 'Pedidos', data: dados.seriePed, backgroundColor: '#a78bfa', borderRadius: 4 }] }} />
                                </CardGrafico>
                            </div>

                            {vendKeys.length > 1 && (
                                <CardGrafico titulo="👤 Pedidos por vendedor">
                                    <Grafico tipo="bar" altura={240} options={optBarH} data={{ labels: vendKeys, datasets: [{ label: 'Pedidos', data: vendKeys.map(k => dados.vendC[k]), backgroundColor: '#34d399', borderRadius: 6 }] }} />
                                </CardGrafico>
                            )}

                            {/* Variação de preço por data */}
                            <CardGrafico titulo="💲 Variação de preço por data (entre as tabelas distribuídas)">
                                <div className="mb-3">
                                    <select value={prodPreco || (precoSerie ? precoSerie.code : '')} onChange={e => setProdPreco(e.target.value)} className="w-full sm:w-auto px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none focus:border-rose-500 font-bold">
                                        {products.slice().sort((a, b) => (a.name || '').localeCompare(b.name || '')).map(p => <option key={p.code} value={p.code}>{p.code} — {p.name}</option>)}
                                    </select>
                                </div>
                                {precoSerie && precoSerie.labels.length > 1
                                    ? <Grafico tipo="line" altura={260} options={optBase} data={{ labels: precoSerie.labels, datasets: [{ label: 'R$/kg', data: precoSerie.valores, borderColor: '#fbbf24', backgroundColor: 'rgba(251,191,36,.15)', fill: true, tension: .3, pointRadius: 3, borderWidth: 2 }] }} />
                                    : <p className="text-sm text-slate-400 py-6 text-center">Poucas tabelas distribuídas pra comparar esse produto. Distribua tabelas em dias diferentes pra ver a variação. 📅</p>}
                            </CardGrafico>
                        </>
                    )}
                </div>
            );
        };

        // 🧾 Histórico de Vendas — prova de cada pedido confirmado: preço na hora, quantidade e peso (kg).
        // Lê direto da coleção 'purchases' (a mesma que alimenta o Dashboard), gravada ao tocar em "Copiar Resumo".
        // Editar recalcula valor/peso (afeta o faturamento). Remover NÃO apaga: move pro 'purchases_lixeira'
        // (fica salvo pra sempre como prova) e some do faturamento, já que o Dashboard só lê 'purchases'.
        const recomputarPedido = (itens) => {
            const valor = (itens || []).reduce((a, i) => a + (Number(i.peso) || 0) * (Number(i.valorKg) || 0), 0);
            const pesoTotal = (itens || []).reduce((a, i) => a + (Number(i.peso) || 0), 0);
            return { valor: Math.round(valor * 100) / 100, pesoTotal: Math.round(pesoTotal * 100) / 100 };
        };

        const HistoricoScreen = ({ user, showMessage }) => {
            const [purchases, setPurchases] = useState([]);
            const [loading, setLoading] = useState(true);
            const [periodo, setPeriodo] = useState('mes'); // 'dia' | 'semana' | 'mes' | 90 | 365 | 0 (todos)
            const [mesOffset, setMesOffset] = useState(0); // navegação de meses (só usada quando periodo === 'mes')
            const [busca, setBusca] = useState('');
            const [expandido, setExpandido] = useState(null);
            const [editando, setEditando] = useState(null);   // cópia do pedido em edição
            const [salvandoEdit, setSalvandoEdit] = useState(false);
            const [processando, setProcessando] = useState(() => new Set()); // ids sendo movidos pra lixeira
            const [mostrarLixeira, setMostrarLixeira] = useState(false);
            const [lixeira, setLixeira] = useState([]);
            const [lixeiraLoading, setLixeiraLoading] = useState(false);

            useEffect(() => {
                const unsub = db.collection('purchases').orderBy('ts', 'desc').limit(1000).onSnapshot(s => {
                    setPurchases(s.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoading(false);
                }, () => setLoading(false));
                return () => unsub();
            }, []);

            const carregarLixeira = async () => {
                setLixeiraLoading(true);
                try {
                    const s = await db.collection('purchases_lixeira').orderBy('removidoEm', 'desc').limit(500).get();
                    setLixeira(s.docs.map(d => ({ id: d.id, ...d.data() })));
                } catch (e) { showMessage && showMessage('Erro ao carregar a lixeira.', 'error'); }
                setLixeiraLoading(false);
            };
            const toggleLixeira = () => {
                const abrir = !mostrarLixeira;
                setMostrarLixeira(abrir);
                if (abrir && lixeira.length === 0) carregarLixeira();
            };

            const diaStr = diaStrGlobal;
            const periodoInfo = useMemo(() => calcularPeriodo(periodo, mesOffset), [periodo, mesOffset]);

            const filtradas = useMemo(() => {
                let lista = purchases;
                const { desde, ate } = periodoInfo;
                if (desde || ate) {
                    const desdeStr = desde ? diaStr(desde) : null, ateStr = ate ? diaStr(ate) : null;
                    lista = lista.filter(p => (!desdeStr || (p.dia || '') >= desdeStr) && (!ateStr || (p.dia || '') <= ateStr));
                }
                const q = busca.trim().toLowerCase();
                if (q) {
                    lista = lista.filter(p =>
                        String(p.clienteCode || '').toLowerCase().includes(q) ||
                        String(p.clienteName || '').toLowerCase().includes(q) ||
                        String(p.spamov || '').toLowerCase().includes(q) ||
                        (p.itens || []).some(it => String(it.name || '').toLowerCase().includes(q) || String(it.code || '').includes(q))
                    );
                }
                return lista;
            }, [purchases, periodoInfo, busca]);

            const totalPeriodo = filtradas.reduce((a, p) => a + (Number(p.valor) || 0), 0);
            const pesoPeriodo = filtradas.reduce((a, p) => a + (Number(p.pesoTotal) || 0), 0);

            // ---------- Editar ----------
            const abrirEdicao = (p) => setEditando(JSON.parse(JSON.stringify(p)));
            const mudarCampo = (campo, valor) => setEditando(e => ({ ...e, [campo]: valor }));
            const mudarItem = (idx, campo, valor) => setEditando(e => {
                const itens = e.itens.slice();
                itens[idx] = { ...itens[idx], [campo]: (campo === 'name') ? valor : (Number(valor) || 0) };
                return { ...e, itens };
            });
            const removerItemEdit = (idx) => setEditando(e => ({ ...e, itens: e.itens.filter((_, i) => i !== idx) }));
            const salvarEdicao = async () => {
                if (!editando) return;
                const itensValidos = (editando.itens || []).filter(i => Number(i.qty) > 0);
                if (!itensValidos.length) { showMessage && showMessage('O pedido precisa ter ao menos 1 item.', 'error'); return; }
                setSalvandoEdit(true);
                try {
                    const { valor, pesoTotal } = recomputarPedido(itensValidos);
                    const ref = db.collection('purchases').doc(editando.id);
                    // 📜 Pega o estado ATUAL de verdade na nuvem (não o que estava na tela ao abrir o
                    // modal) pra registrar no histórico de edições — evita perder uma mudança concorrente.
                    const snap = await ref.get();
                    const dadosAntigos = snap.exists ? snap.data() : editando;
                    const entradaHist = criarEntradaHistoricoEdicao(dadosAntigos, 'edicao_manual', (user && user.code));
                    await ref.update({
                        clienteCode: String(editando.clienteCode || ''),
                        clienteName: editando.clienteName || '',
                        spamov: editando.spamov || '',
                        itens: itensValidos,
                        valor, pesoTotal,
                        editadoEm: Date.now(),
                        editadoPor: (user && user.code) || '',
                        historicoEdicoes: firebase.firestore.FieldValue.arrayUnion(entradaHist)
                    });
                    showMessage && showMessage('Pedido atualizado! Faturamento recalculado. ✏️', 'success');
                    setEditando(null);
                } catch (e) { showMessage && showMessage('Erro ao salvar edição.', 'error'); }
                setSalvandoEdit(false);
            };

            // ---------- Mover pra lixeira (nunca apaga de verdade) ----------
            const moverParaLixeira = async (p) => {
                if (!window.confirm('Mover este pedido pra lixeira?\n\nEle sai do faturamento, mas fica salvo pra sempre como prova (não é possível apagar de vez).')) return;
                setProcessando(s => new Set(s).add(p.id));
                try {
                    await db.collection('purchases_lixeira').doc(p.id).set({ ...p, removidoEm: Date.now(), removidoPor: (user && user.code) || '' });
                    await db.collection('purchases').doc(p.id).delete();
                    showMessage && showMessage('Pedido movido pra lixeira. Não entra mais no faturamento. 🗑️', 'success');
                } catch (e) { showMessage && showMessage('Erro ao mover pra lixeira.', 'error'); }
                setProcessando(s => { const n = new Set(s); n.delete(p.id); return n; });
            };

            const Badge = ({ children, cor }) => <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${cor || 'bg-slate-100 text-slate-500'}`}>{children}</span>;

            const Cartao = ({ p, dono }) => {
                const dt = new Date(p.ts || Date.now());
                const aberto = expandido === (dono + p.id);
                const emProcesso = processando.has(p.id);
                return (
                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                        <button onClick={() => setExpandido(aberto ? null : (dono + p.id))} className="w-full p-4 flex items-center justify-between gap-3 text-left hover:bg-slate-50 transition-colors">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className="h-10 w-10 rounded-xl bg-rose-100 text-rose-700 flex items-center justify-center font-black text-sm flex-shrink-0">{p.clienteCode || '?'}</div>
                                <div className="min-w-0">
                                    <p className="font-bold text-slate-800 truncate">{p.clienteName || ('Cliente ' + (p.clienteCode || '?'))}</p>
                                    <p className="text-xs text-slate-400">{dt.toLocaleDateString('pt-BR')} às {dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</p>
                                    <div className="flex flex-wrap gap-1 mt-1">
                                        {p.spamov && <Badge cor="bg-rose-50 text-rose-600">SPAmov {p.spamov}</Badge>}
                                        <Badge>ID {p.clienteCode || '?'}</Badge>
                                        {p.tipoPessoa && <Badge>{/fis/i.test(p.tipoPessoa) ? 'Física' : 'Jurídica'}</Badge>}
                                        {p.vendedor && <Badge>{p.vendedor}</Badge>}
                                        {p.via && <Badge>via {p.via}</Badge>}
                                        {dono === 'lix' && <Badge cor="bg-slate-800 text-white">🗑️ removido {p.removidoEm ? new Date(p.removidoEm).toLocaleDateString('pt-BR') : ''}{p.removidoPor ? ' por ' + p.removidoPor : ''}</Badge>}
                                        {p.editadoEm && <Badge cor="bg-amber-50 text-amber-700">✏️ editado {new Date(p.editadoEm).toLocaleDateString('pt-BR')}</Badge>}
                                    </div>
                                </div>
                            </div>
                            <div className="text-right flex-shrink-0">
                                <p className={`font-black ${dono === 'lix' ? 'text-slate-400 line-through' : 'text-emerald-700'}`}>{formatPrice(p.valor || 0)}</p>
                                <p className="text-xs text-slate-400">{(p.itens || []).length} item(ns){p.pesoTotal ? ' · ' + Number(p.pesoTotal).toFixed(2) + ' kg' : ''}</p>
                            </div>
                        </button>
                        {aberto && (
                            <div className="border-t border-slate-100 p-4 bg-slate-50 overflow-x-auto space-y-3">
                                <table className="w-full text-xs min-w-[480px]">
                                    <thead>
                                        <tr className="text-slate-400 text-left">

            return (

                    <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 space-y-3">

                        {periodo === 'mes' && (

                                {mesOffset !== 0 && <button onClick={() => setMesOffset(0)} className="text-[10px] font-bold text-rose-600 hover:text-rose-800 underline">voltar pro mês atual</button>}

                    </div>

                    <div className="grid grid-cols-3 gap-3">
                        <div className="bg-white rounded-2xl border border-slate-200 p-4">

                    {loading ? (

                            <span>🗑️</span> {mostrarLixeira ? 'Ocultar lixeira' : 'Ver lixeira (pedidos removidos)'}
                        </button>
                        {mostrarLixeira && (
                            <div className="mt-3 space-y-3">

                                {lixeiraLoading ? (

                    {/* Modal de edição */}
                    {editando && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl flex flex-col max-h-[88vh] overflow-hidden">
                                <div className="p-5 border-b bg-slate-50 flex justify-between items-center flex-shrink-0">
